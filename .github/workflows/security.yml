                                  has_default = isinstance(node.value, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_-e1vFbw$ ) and len(node.value.args) >= 2
                                  if isinstance(node.value, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_-e1vFbw$ ):
