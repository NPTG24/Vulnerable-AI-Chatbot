name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# No bloquea por defecto. Cambia fail_on manualmente si quieres gate.
env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Policy — Dependency Pinning"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning and resolvable versions
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re, shutil, subprocess, sys, tempfile, tomllib

          findings = []
          skip_dirs = {'.git', '.github', 'node_modules', '.venv', 'venv', 'dist', 'build', '__pycache__'}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace('\\','/').split('/'))

          def add(severity, rule, file_path, line, message, kind='vulnerability'):
              findings.append({
                  'tool':'Dependency Policy', 'severity':severity, 'rule':rule,
                  'file':str(file_path), 'line':int(line or 1), 'message':message,
                  'kind':kind
              })

          def level(sev):
              s = str(sev).lower()
              return 'error' if s in {'critical','high'} else ('warning' if s == 'medium' else 'note')

          req_files = sorted(set(pathlib.Path('.').glob('requirements*.txt')) | set(pathlib.Path('.').glob('**/requirements*.txt')))
          skip_req = re.compile(r'^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)', re.I)
          exact_req = re.compile(r'^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$')
          pinned_python = []

          for req in req_files:
              if skip(req):
                  continue
              for lineno, raw in enumerate(req.read_text(encoding='utf-8', errors='ignore').splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue
                  clean = line.split(' #', 1)[0].strip()
                  m = exact_req.match(clean)
                  if not m:
                      add('medium', 'UNPINNED_DEPENDENCY', req, lineno, f'Dependencia Python sin pin exacto ==: {line}', 'hygiene')
                      continue
                  pinned_python.append((m.group(1), m.group(3), req, lineno, clean))

          for name, version, req, lineno, clean in pinned_python:
              with tempfile.TemporaryDirectory() as tmpdir:
                  cmd = [sys.executable, '-m', 'pip', 'download', '--no-deps', '--disable-pip-version-check', '-d', tmpdir, f'{name}=={version}']
                  try:
                      proc = subprocess.run(cmd, text=True, capture_output=True, timeout=90)
                  except subprocess.TimeoutExpired:
                      add('info','PYTHON_VERSION_VALIDATION_TIMEOUT',req,lineno,f'Timeout validando versión Python: {clean}', 'hygiene')
                      continue
                  out = ((proc.stdout or '') + '\n' + (proc.stderr or '')).lower()
                  if proc.returncode == 0:
                      continue
                  if 'no matching distribution found' in out or 'could not find a version' in out:
                      add('high','PYTHON_VERSION_NOT_RESOLVABLE',req,lineno,f'Versión Python no resoluble/no disponible: {clean}', 'vulnerability')
                  elif any(x in out for x in ['temporary failure','connection','timed out','proxy','ssl']):
                      add('info','PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE',req,lineno,f'No se pudo validar por red/proxy/SSL: {clean}', 'hygiene')
                  else:
                      add('info','PYTHON_VERSION_VALIDATION_INCONCLUSIVE',req,lineno,f'Validación inconclusa: {clean}', 'hygiene')

          for pyproject in sorted(pathlib.Path('.').glob('**/pyproject.toml')):
              if skip(pyproject):
                  continue
              try:
                  data = tomllib.loads(pyproject.read_text(encoding='utf-8', errors='ignore'))
              except Exception:
                  continue
              project = data.get('project', {}) if isinstance(data, dict) else {}
              candidates = []
              if isinstance(project.get('dependencies'), list):
                  candidates.extend(project['dependencies'])
              optional = project.get('optional-dependencies', {})
              if isinstance(optional, dict):
                  for deps in optional.values():
                      if isinstance(deps, list): candidates.extend(deps)
              poetry_deps = data.get('tool', {}).get('poetry', {}).get('dependencies', {}) if isinstance(data, dict) else {}
              if isinstance(poetry_deps, dict):
                  for dep_name, dep_spec in poetry_deps.items():
                      if str(dep_name).lower() == 'python': continue
                      version = dep_spec if isinstance(dep_spec, str) else str(dep_spec.get('version','') if isinstance(dep_spec, dict) else '')
                      candidates.append(f'{dep_name}{version}' if str(version).startswith('==') else f'{dep_name} {version}')
              pep508_exact = re.compile(r'^\s*[A-Za-z0-9_.-]+(\[[A-Za-z0-9_,.-]+\])?\s*==\s*[A-Za-z0-9_.!+*-]+.*$')
              for dep in candidates:
                  if not pep508_exact.match(str(dep)):
                      add('medium','PYPROJECT_NON_EXACT_DEPENDENCY',pyproject,1,f'Dependencia pyproject sin pin exacto ==: {dep}', 'hygiene')

          package_json_files = sorted(pathlib.Path('.').glob('**/package.json'))
          exact_npm = re.compile(r'^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$')
          npm_available = shutil.which('npm') is not None
          for package_json in package_json_files:
              if skip(package_json): continue
              try: pkg = json.loads(package_json.read_text(encoding='utf-8', errors='ignore'))
              except Exception: continue
              for section in ['dependencies','devDependencies','peerDependencies','optionalDependencies']:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict): continue
                  for dep_name, dep_version in deps.items():
                      version = str(dep_version).strip()
                      if version.startswith(('file:','git+','github:','workspace:','link:')):
                          add('info','NPM_LOCAL_OR_WORKSPACE_DEPENDENCY',package_json,1,f'Dependencia local/workspace no validada: {dep_name}@{version}', 'hygiene')
                          continue
                      if not exact_npm.match(version):
                          add('medium','NPM_NON_EXACT_DEPENDENCY',package_json,1,f'Dependencia npm sin versión exacta: {dep_name}@{version}', 'hygiene')
                          continue
                      if npm_available:
                          try:
                              proc = subprocess.run(['npm','view',f'{dep_name}@{version}','version','--json'], text=True, capture_output=True, timeout=90)
                          except subprocess.TimeoutExpired:
                              add('info','NPM_VERSION_VALIDATION_TIMEOUT',package_json,1,f'Timeout validando npm: {dep_name}@{version}', 'hygiene')
                              continue
                          out = ((proc.stdout or '') + '\n' + (proc.stderr or '')).lower()
                          if proc.returncode != 0 and ('notarget' in out or 'no matching version found' in out or '404' in out):
                              add('high','NPM_VERSION_NOT_RESOLVABLE',package_json,1,f'Versión npm no resoluble/no disponible: {dep_name}@{version}', 'vulnerability')

          pathlib.Path('dependency_policy_findings.json').write_text(json.dumps({'tool':'Dependency Policy','findings':findings}, indent=2, ensure_ascii=False), encoding='utf-8')

          rules, results = {}, []
          for f in findings:
              rid = f['rule']; lvl = level(f['severity'])
              rules.setdefault(rid, {'id':rid,'name':rid,'shortDescription':{'text':rid},'fullDescription':{'text':f['message']},'defaultConfiguration':{'level':lvl}})
              results.append({'ruleId':rid,'level':lvl,'message':{'text':f['message']},'properties':{'kind':f.get('kind','vulnerability')},'locations':[{'physicalLocation':{'artifactLocation':{'uri':f['file']},'region':{'startLine':f['line']}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Dependency__;JSUlJQ!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdYFhUYh0Q$  Policy','informationUri':'https://urldefense.com/v3/__https://docs.github.com/actions','rules':list(rules.values())*7D*7D,'results':results__;JSU!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdbwWBYfWA$ }]}
          pathlib.Path('dependency_policy.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          print(f'Dependency policy findings: {len(findings)}')
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  ruff:
    name: "Dev Quality — Ruff"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff as development-quality report only
        continue-on-error: true
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          python3 - <<'PY'
          import json, pathlib
          try: data = json.loads(pathlib.Path('ruff_lint.json').read_text(encoding='utf-8') or '[]')
          except Exception: data = []
          pathlib.Path('ruff_dev_quality_findings.json').write_text(json.dumps({'tool':'Ruff','kind':'development_quality','findings':data}, indent=2, ensure_ascii=False), encoding='utf-8')
          # SARIF vacío a propósito: Ruff queda como artifact/report, no como anotación de vulnerabilidad.
          pathlib.Path('ruff_dev_quality.sarif').write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff Dev Quality","rules":[]}},"results":[]}]}', encoding='utf-8')
          PY
      - name: Upload Ruff dev-quality SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff_dev_quality.sarif
          category: ruff-dev-quality
      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-dev-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff_dev_quality_findings.json
            ruff_dev_quality.sarif
          retention-days: 30

  codeql:
    name: "SAST — CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4
      - name: Analyze with CodeQL
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}
      - name: Create CodeQL metadata
        if: always()
        run: |
          echo '{"tool":"CodeQL","kind":"vulnerability","message":"CodeQL executed"}' > codeql_${{ matrix.language }}_metadata.json
      - name: Upload CodeQL metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-metadata
          path: codeql_${{ matrix.language }}_metadata.json
          retention-days: 30

  sast-semgrep:
    name: "SAST — Semgrep General Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run high-signal Semgrep security rules
        continue-on-error: true
        run: |
          semgrep --config p/python --config p/javascript --config p/typescript --config p/secrets --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --sarif --output semgrep.sarif . || true
          semgrep --config p/python --config p/javascript --config p/typescript --config p/secrets --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --json --output semgrep.json . || true
      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-general-security
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-general-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  ai-sast-semgrep:
    name: "AI SAST — Precise LLM Code Vulnerabilities"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create precise AI Semgrep rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML_RULES'
          rules:
            - id: ai-python-flask-user-input-direct-to-openai-prompt
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: request/user input flows directly into OpenAI prompt/messages. Add instruction isolation, validation, allowlisted context, and prompt-injection defenses."
              metadata:
                category: security
                technology: [ai, llm, openai, flask]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: request.$ANY.get(...)
                - pattern: request.$ANY[...]
                - pattern: request.get_json(...)
                - pattern: request.form.get(...)
                - pattern: request.args.get(...)
                - pattern: request.json.get(...)
              pattern-sinks:
                - pattern: openai.ChatCompletion.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.chat.completions.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.responses.create(..., input=$SINK, ...)
                - pattern: $MODEL.invoke($SINK, ...)
                - pattern: $CHAIN.invoke($SINK, ...)

            - id: ai-python-llm-output-to-exec-eval
              languages: [python]
              severity: ERROR
              message: "AI RCE: LLM response/output flows into eval/exec. This is critical arbitrary code execution risk."
              metadata:
                category: security
                technology: [ai, llm, rce]
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: openai.ChatCompletion.create(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: $MODEL.invoke(...)
                - pattern: $CHAIN.invoke(...)
              pattern-sinks:
                - pattern: eval($SINK)
                - pattern: exec($SINK)

            - id: ai-python-llm-output-to-shell-command
              languages: [python]
              severity: ERROR
              message: "AI Command Injection: LLM output flows into OS command execution. Use strict allowlists and never execute raw model output."
              metadata:
                category: security
                technology: [ai, llm, command-injection]
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: openai.ChatCompletion.create(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: $MODEL.invoke(...)
                - pattern: $CHAIN.invoke(...)
              pattern-sinks:
                - pattern: os.system($SINK)
                - pattern: os.popen($SINK)
                - pattern: subprocess.run($SINK, shell=True, ...)
                - pattern: subprocess.Popen($SINK, shell=True, ...)

            - id: ai-python-user-input-to-shell-tool
              languages: [python]
              severity: ERROR
              message: "Agentic AI Excessive Agency: external user input reaches shell execution. This is command injection / tool abuse risk."
              metadata:
                category: security
                technology: [ai, agent, command-injection]
                owasp_llm: LLM06 Excessive Agency
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: request.$ANY.get(...)
                - pattern: request.get_json(...)
                - pattern: input(...)
              pattern-sinks:
                - pattern: os.system($SINK)
                - pattern: subprocess.run($SINK, shell=True, ...)
                - pattern: subprocess.Popen($SINK, shell=True, ...)

            - id: ai-js-user-input-direct-to-openai-prompt
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI Prompt Injection: req/user input flows directly into LLM prompt/messages. Add validation and prompt-injection defenses."
              metadata:
                category: security
                technology: [ai, llm, openai, express]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: req.body.$FIELD
                - pattern: req.query.$FIELD
                - pattern: req.params.$FIELD
                - pattern: request.body.$FIELD
              pattern-sinks:
                - pattern: $CLIENT.chat.completions.create({..., messages: $SINK, ...})
                - pattern: openai.chat.completions.create({..., messages: $SINK, ...})
                - pattern: $CLIENT.responses.create({..., input: $SINK, ...})

            - id: ai-js-llm-output-to-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI RCE: LLM output flows into eval/new Function. Critical arbitrary code execution risk."
              metadata:
                category: security
                technology: [ai, llm, rce]
                owasp_llm: LLM05 Improper Output Handling
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: openai.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
              pattern-sinks:
                - pattern: eval($SINK)
                - pattern: new Function($SINK)
          YAML_RULES
      - name: Run precise AI Semgrep rules
        continue-on-error: true
        run: |
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --sarif --output semgrep_ai.sarif . || true
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --json --output semgrep_ai.json . || true
      - name: Normalize AI SARIF metadata
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path('semgrep_ai.sarif')
          if not p.exists():
              p.write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}', encoding='utf-8')
          try: data = json.loads(p.read_text(encoding='utf-8', errors='ignore'))
          except Exception: data = {'version':'2.1.0','runs':[]}
          if not data.get('runs'):
              data['runs'] = [{'tool': {'driver': {'name':'AI Security','rules':[]}}, 'results': []}]
          for run in data.get('runs', []):
              driver = run.setdefault('tool', {}).setdefault('driver', {})
              driver['name'] = 'AI Security — Precise LLM Vulns'
              driver['informationUri'] = 'https://urldefense.com/v3/__https://owasp.org/www-project-top-10-for-large-language-model-applications/__;!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdZMmnl13Q$ '
              for res in run.get('results', []):
                  res.setdefault('properties', {})['kind'] = 'vulnerability'
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure AI artifacts exist
        if: always()
        run: |
          test -f semgrep_ai.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}' > semgrep_ai.sarif
          test -f semgrep_ai.json || echo '{"results":[]}' > semgrep_ai.json
      - name: Upload AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai.sarif
          category: ai-security-precise
      - name: Upload AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ai-precise-results
          path: |
            semgrep_ai.sarif
            semgrep_ai.json
          retention-days: 30

  sca-dependencies:
    name: "SCA — Trivy + pip-audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit against project files
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off 2>/dev/null || pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv 2>/dev/null || pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path('pip_audit_osv.json')
          if not src.exists(): src.write_text('{"dependencies":[]}', encoding='utf-8')
          try: data = json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: data = {'dependencies': []}
          deps = data.get('dependencies', []) if isinstance(data, dict) else data
          rules, results = {}, []
          def lev(sev):
              s = str(sev or '').upper()
              return 'error' if s in {'CRITICAL','HIGH'} else ('warning' if s == 'MEDIUM' else 'note')
          for dep in deps:
              if not isinstance(dep, dict): continue
              pkg, ver = dep.get('name','unknown'), dep.get('version','')
              for v in dep.get('vulns', []):
                  vid, sev = v.get('id','PYTHON_VULN'), v.get('severity','UNKNOWN')
                  msg = f'{pkg} {ver}: {vid} severity={sev}'
                  rules.setdefault(vid, {'id':vid,'name':vid,'shortDescription':{'text':vid},'fullDescription':{'text':msg},'defaultConfiguration':{'level':lev(sev)}})
                  results.append({'ruleId':vid,'level':lev(sev),'message':{'text':msg},'properties':{'kind':'vulnerability'},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'python-dependencies'}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'pip-audit','informationUri':'https:/*pypi.org/project/pip-audit/','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJS8lJSUl!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdacAbk2mw$ }
          pathlib.Path('pip_audit.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Run Trivy filesystem scan without trivy-action
        continue-on-error: true
        run: |
          docker run --rm --user $(id -u):$(id -g) -v "$PWD:/repo" aquasec/trivy:0.63.0 fs /repo --format sarif --output /repo/trivy_results.sarif --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln,secret,misconfig --skip-dirs /repo/.git --skip-dirs /repo/node_modules || true
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif
      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca
      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            trivy_results.sarif
          retention-days: 30

  secret-scan:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks without failing job
        continue-on-error: true
        run: |
          docker run --rm --user $(id -u):$(id -g) -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect --source /repo --report-format json --report-path /repo/gitleaks_report.json --exit-code 0 --redact --verbose || true
      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path('gitleaks_report.json')
          if not src.exists(): src.write_text('[]', encoding='utf-8')
          try: data = json.loads(src.read_text(encoding='utf-8', errors='ignore') or '[]')
          except Exception: data = []
          rules, results = {}, []
          for item in data:
              rid = item.get('RuleID') or item.get('Description') or 'SECRET'
              desc = item.get('Description') or 'Possible exposed secret'
              file = item.get('File') or 'unknown'
              line = int(item.get('StartLine') or 1)
              rules.setdefault(rid, {'id':rid,'name':rid,'shortDescription':{'text':desc},'fullDescription':{'text':desc},'defaultConfiguration':{'level':'error'}})
              results.append({'ruleId':rid,'level':'error','message':{'text':desc},'properties':{'kind':'vulnerability'},'locations':[{'physicalLocation':{'artifactLocation':{'uri':file},'region':{'startLine':line}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Gitleaks','informationUri':'https:/*github.com/gitleaks/gitleaks','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJS8lJSUl!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdbxLUlRjg$ }
          pathlib.Path('gitleaks.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

  iac-checkov:
    name: "IaC — Checkov"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Checkov full IaC scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: all
          soft_fail: true
          output_format: sarif,json
          output_file_path: checkov_results
          download_external_modules: false
          quiet: true
      - name: Normalize Checkov artifacts
        if: always()
        run: |
          if [ -d checkov_results ]; then
            find checkov_results -name "*.sarif" -type f -exec cp {} checkov_results.sarif \; || true
            find checkov_results -name "*.json" -type f -exec cp {} checkov_results.json \; || true
          fi
          test -f checkov_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}' > checkov_results.sarif
          test -f checkov_results.json || echo '{}' > checkov_results.json
      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_results.sarif
          category: checkov-iac
      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            checkov_results.sarif
            checkov_results.json
          retention-days: 30

  docker-scan:
    name: "Docker — Hadolint high-signal scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Locate Dockerfiles
        run: |
          find . -type f \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \) -not -path './.git/*' -not -path './node_modules/*' > dockerfiles.txt || true
          cat dockerfiles.txt
      - name: Run Hadolint high-signal Dockerfile scan
        continue-on-error: true
        run: |
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          if [ -s dockerfiles.txt ]; then
            docker run --rm --user $(id -u):$(id -g) -v "$PWD:/work" -w /work hadolint/hadolint:2.12.0-alpine sh -c '
              hadolint --failure-threshold error --no-fail --format sarif $(cat dockerfiles.txt) > hadolint.sarif
            ' || true
          fi
      - name: Upload Hadolint SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint-docker
      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-results
          path: |
            dockerfiles.txt
            hadolint.sarif
          retention-days: 30

  dast-zap:
    name: "DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.run_dast == 'true'
    permissions:
      contents: read
      security-events: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate DAST target URL
        id: validate_url
        env:
          DAST_TARGET_URL_VALUE: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$DAST_TARGET_URL_VALUE" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi
      - name: Run OWASP ZAP Baseline Scan
        if: steps.validate_url.outputs.skip != 'true'
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          report_html: zap_report.html
          report_json: zap_report.json
          cmd_options: "-l HIGH"
          fail_action: false
          allow_issue_writing: false
      - name: Convert ZAP JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          src = pathlib.Path('zap_report.json')
          if not src.exists(): src.write_text('{"site":[]}', encoding='utf-8')
          try: zap = json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: zap = {'site': []}
          clean = lambda v: re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', str(v or ''))).strip()
          rules, results = {}, []
          level_map = {'3':'error','2':'warning','1':'note','0':'note'}
          for site in zap.get('site', []):
              for alert in site.get('alerts', []):
                  rid = 'ZAP-' + str(alert.get('pluginid','unknown'))
                  level = level_map.get(str(alert.get('riskcode','1')), 'note')
                  name = clean(alert.get('alert','Unknown ZAP alert'))
                  rules.setdefault(rid, {'id':rid,'name':name,'shortDescription':{'text':name},'fullDescription':{'text':clean(alert.get('desc',''))},'defaultConfiguration':{'level':level}})
                  for inst in alert.get('instances') or [{}]:
                      uri = inst.get('uri') or site.get('@name') or 'unknown'
                      results.append({'ruleId':rid,'level':level,'message':{'text':f'{name} | URL: {uri}'},'properties':{'kind':'vulnerability'},'locations':[{'physicalLocation':{'artifactLocation':{'uri':uri}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'OWASP__;JSUlJQ!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdaZW_HFHw$  ZAP','informationUri':'https://urldefense.com/v3/__https://www.zaproxy.org/','rules':list(rules.values())*7D*7D,'results':results__;JSU!!P110LumUDw!_V_dq5izIVMeA8p7AYDPDsdcZqNJGtVyfAfYUxgM9tA2G41OXDwVbOOSrEGMhUW835ayhavKMQp89-hPWxn8kdaQzdU9nw$ }]}
          pathlib.Path('zap_results.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure ZAP artifacts exist
        if: always()
        run: |
          test -f zap_report.html || echo '<html><body><h1>ZAP skipped or no report generated</h1></body></html>' > zap_report.html
          test -f zap_report.json || echo '{"site":[]}' > zap_report.json
          test -f zap_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"OWASP ZAP","rules":[]}},"results":[]}]}' > zap_results.sarif
      - name: Upload ZAP SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap_results.sarif
          category: zap-dast
      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_report.json
            zap_results.sarif
          retention-days: 30

  security-report:
    name: "Security Report — Ordered by Criticality"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - ruff
      - codeql
      - sast-semgrep
      - ai-sast-semgrep
      - sca-dependencies
      - secret-scan
      - iac-checkov
      - docker-scan
      - dast-zap
    if: always()
    permissions:
      contents: read
    steps:
      - name: Create artifact directory
        run: mkdir -p all_scan_results security_reports
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results/
      - name: Generate ordered security report
        run: |
          python3 - <<'PY'
          import json, pathlib
          from html import escape

          root = pathlib.Path('all_scan_results')
          out = pathlib.Path('security_reports'); out.mkdir(exist_ok=True)
          severity_order = ['critical','high','medium','low','info','unknown']
          vulns = {s: [] for s in severity_order}
          dev_quality = []

          def normalize_level(level, rule='', msg=''):
              text = f'{level} {rule} {msg}'.lower()
              if any(x in text for x in ['critical', 'severity=critical']): return 'critical'
              if any(x in text for x in ['error', 'high', 'severity=high']): return 'high'
              if any(x in text for x in ['warning', 'medium', 'moderate', 'severity=medium']): return 'medium'
              if 'low' in text or 'note' in text: return 'low'
              if 'info' in text or 'informational' in text: return 'info'
              return 'unknown'

          def add_vuln(tool, sev, rule, msg, file='', line='', kind='vulnerability'):
              item = {'tool':tool or 'Unknown','severity':sev,'rule':rule or 'unknown','message':str(msg or '').strip(),'file':str(file or ''),'line':str(line or '')}
              if kind == 'development_quality' or (tool or '').lower().startswith('ruff'):
                  dev_quality.append(item); return
              vulns[sev].append(item)

          def parse_sarif(p):
              try: data = json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for run in data.get('runs', []):
                  tool = run.get('tool', {}).get('driver', {}).get('name', p.stem)
                  rules = {r.get('id','unknown'): r.get('defaultConfiguration', {}).get('level','') for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
                  for res in run.get('results', []):
                      rid = res.get('ruleId','unknown')
                      msg = res.get('message', {}).get('text','')
                      kind = res.get('properties', {}).get('kind', 'vulnerability')
                      level = res.get('level') or rules.get(rid) or 'unknown'
                      sev = normalize_level(level, rid, msg)
                      file = ''; line = ''
                      locs = res.get('locations', [])
                      if locs:
                          phys = locs[0].get('physicalLocation', {})
                          file = phys.get('artifactLocation', {}).get('uri','')
                          line = phys.get('region', {}).get('startLine','')
                      add_vuln(tool, sev, rid, msg, file, line, kind)

          def parse_findings_json(p):
              try: data = json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for item in data.get('findings', []):
                  tool = item.get('tool', p.stem)
                  kind = item.get('kind', 'vulnerability')
                  sev = normalize_level(item.get('severity'), item.get('rule'), item.get('message'))
                  add_vuln(tool, sev, item.get('rule'), item.get('message'), item.get('file'), item.get('line'), kind)

          def parse_ruff_json(p):
              try: data = json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
              except Exception: return
              for item in data:
                  loc = item.get('location', {})
                  dev_quality.append({'tool':'Ruff Dev Quality','severity':'dev','rule':item.get('code','RUFF'),'message':item.get('message',''),'file':item.get('filename',''),'line':str(loc.get('row',''))})

          for p in root.rglob('*.sarif'): parse_sarif(p)
          for p in root.rglob('*findings.json'): parse_findings_json(p)
          for p in root.rglob('ruff_lint.json'): parse_ruff_json(p)

          # dedupe
          for sev in severity_order:
              seen, cleaned = set(), []
              for i in vulns[sev]:
                  key = (i['tool'], i['rule'], i['file'], i['line'], i['message'])
                  if key not in seen:
                      seen.add(key); cleaned.append(i)
              vulns[sev] = cleaned
          seen, dq = set(), []
          for i in dev_quality:
              key = (i['rule'], i['file'], i['line'], i['message'])
              if key not in seen:
                  seen.add(key); dq.append(i)
          dev_quality = dq

          counts = {s: len(vulns[s]) for s in severity_order}
          total_vulns = sum(counts.values())
          names = {'critical':'CRÍTICAS','high':'ALTAS','medium':'MEDIAS','low':'BAJAS','info':'INFORMATIVAS','unknown':'SIN CLASIFICAR'}

          lines = []
          lines.append('REPORTE CENTRALIZADO DE SEGURIDAD')
          lines.append('='*88)
          lines.append('')
          lines.append('RESUMEN')
          lines.append('-'*88)
          lines.append(f'Vulnerabilidades / hallazgos de seguridad : {total_vulns}')
          lines.append(f'Críticas                                : {counts["critical"]}')
          lines.append(f'Altas                                   : {counts["high"]}')
          lines.append(f'Medias                                  : {counts["medium"]}')
          lines.append(f'Bajas                                   : {counts["low"]}')
          lines.append(f'Informativas                            : {counts["info"]}')
          lines.append(f'Sin clasificar                          : {counts["unknown"]}')
          lines.append(f'Mejoras de desarrollo Ruff              : {len(dev_quality)}')
          lines.append('')

          for sev in severity_order:
              lines.append('')
              lines.append(f'{names[sev]} ({len(vulns[sev])})')
              lines.append('-'*88)
              if not vulns[sev]:
                  lines.append('Sin hallazgos.')
              for idx, item in enumerate(vulns[sev], 1):
                  lines.append(f'{idx}. [{item["tool"]}] {item["rule"]}')
                  lines.append(f'   Archivo : {item["file"]}:{item["line"]}')
                  lines.append(f'   Detalle : {item["message"]}')
                  lines.append('')

          lines.append('')
          lines.append('MEJORAS DE DESARROLLO / CALIDAD — RUFF')
          lines.append('-'*88)
          if not dev_quality:
              lines.append('Sin observaciones Ruff.')
          for idx, item in enumerate(dev_quality, 1):
              lines.append(f'{idx}. [{item["rule"]}] {item["file"]}:{item["line"]} — {item["message"]}')

          (out/'security_report_es.txt').write_text('\n'.join(lines), encoding='utf-8')
          (out/'security_report_es.json').write_text(json.dumps({'summary':counts,'total_vulnerabilities':total_vulns,'vulnerabilities':vulns,'dev_quality_ruff':dev_quality}, indent=2, ensure_ascii=False), encoding='utf-8')

          badge = lambda sev: {'critical':'🔴','high':'🟠','medium':'🟡','low':'🔵','info':'⚪','unknown':'⚫'}.get(sev,'⚫')
          html = ['<!doctype html><html><head><meta charset="utf-8"><title>Reporte de Seguridad</title><style>body{font-family:Arial,sans-serif;margin:24px;line-height:1.4}h1{margin-bottom:4px}.summary{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:12px;margin:18px 0}.card{border:1px solid #ddd;border-radius:10px;padding:12px;background:#fafafa}.sev{margin-top:28px}table{border-collapse:collapse;width:100%;margin:10px 0 24px}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f4f4f4;text-align:left}code{white-space:pre-wrap}</style></head><body>']
          html.append('<h1>Reporte Centralizado de Seguridad</h1><p>Ordenado por criticidad. Ruff se separa como mejoras de desarrollo/calidad, no como vulnerabilidades.</p>')
          html.append('<div class="summary">')
          for sev in severity_order:
              html.append(f'<div class="card"><b>{badge(sev)} {escape(names[sev])}</b><br>{counts[sev]}</div>')
          html.append(f'<div class="card"><b>🧹 Ruff / calidad</b><br>{len(dev_quality)}</div>')
          html.append('</div>')
          for sev in severity_order:
              html.append(f'<h2 class="sev">{badge(sev)} {escape(names[sev])} ({counts[sev]})</h2>')
              html.append('<table><tr><th>#</th><th>Herramienta</th><th>Regla</th><th>Ubicación</th><th>Detalle</th></tr>')
              if not vulns[sev]: html.append('<tr><td colspan="5">Sin hallazgos.</td></tr>')
              for idx, item in enumerate(vulns[sev],1):
                  html.append(f'<tr><td>{idx}</td><td>{escape(item["tool"])}</td><td><code>{escape(item["rule"])}</code></td><td><code>{escape(item["file"])}:{escape(str(item["line"]))}</code></td><td>{escape(item["message"])}</td></tr>')
              html.append('</table>')
          html.append(f'<h2>🧹 Mejoras de desarrollo / calidad — Ruff ({len(dev_quality)})</h2><table><tr><th>#</th><th>Regla</th><th>Ubicación</th><th>Detalle</th></tr>')
          if not dev_quality: html.append('<tr><td colspan="4">Sin observaciones Ruff.</td></tr>')
          for idx, item in enumerate(dev_quality,1):
              html.append(f'<tr><td>{idx}</td><td><code>{escape(item["rule"])}</code></td><td><code>{escape(item["file"])}:{escape(str(item["line"]))}</code></td><td>{escape(item["message"])}</td></tr>')
          html.append('</table></body></html>')
          (out/'security_report_es.html').write_text('\n'.join(html), encoding='utf-8')
          print('\n'.join(lines))
          PY
      - name: Add ordered report to job summary
        if: always()
        run: |
          python3 - <<'PY'
          import os, pathlib
          report = pathlib.Path('security_reports/security_report_es.txt')
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              summary.write('## Reporte centralizado de seguridad\n\n')
              summary.write('Vulnerabilidades ordenadas por criticidad. Ruff queda separado como calidad/desarrollo.\n\n```text\n')
              summary.write(report.read_text(encoding='utf-8', errors='ignore')[:120000] if report.exists() else 'No se encontró el reporte local.')
              summary.write('\n```\n')
          PY
      - name: Upload centralized security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports/
          retention-days: 30
      - name: Final verdict
        run: |
          python3 - <<'PY'
          import json, os, sys
          path = 'security_reports/security_report_es.json'
          if not os.path.exists(path):
              print('Report was not created. Neutral verdict.')
              sys.exit(0)
          data = json.load(open(path, encoding='utf-8'))
          summary = data.get('summary', {})
          threshold = '${{ github.event.inputs.fail_on }}' or os.environ.get('DEFAULT_FAIL_ON','never')
          threshold = threshold.lower()
          order = {'critical':5,'high':4,'medium':3,'low':2,'info':1,'unknown':0,'never':99}
          if threshold == 'never':
              print('Final verdict configured as never fail.')
              sys.exit(0)
          blocking = sum(int(c) for sev, c in summary.items() if order.get(sev,0) >= order.get(threshold,99))
          if blocking:
              print(f'Security Report failed: {blocking} finding(s) at or above threshold {threshold}.')
              sys.exit(1)
          print('Security Report passed.')
          PY
