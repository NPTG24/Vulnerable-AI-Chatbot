name: Security Pipeline Preciso

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "docs/**"

concurrency:
  group: security-preciso-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  EXCLUDES: >-
    --exclude .github/workflows/**
    --exclude node_modules/**
    --exclude dist/**
    --exclude build/**
    --exclude coverage/**
    --exclude .venv/**
    --exclude venv/**
    --exclude __pycache__/**

jobs:
  codeql:
    name: CodeQL — código real
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear config CodeQL excluyendo workflows
        run: |
          cat > codeql-config.yml <<'YAML'
          name: codeql-code-only
          paths-ignore:
            - .github/workflows/**
            - node_modules/**
            - dist/**
            - build/**
            - coverage/**
            - .venv/**
            - venv/**
            - docs/**
            - "**/*.md"
          query-filters:
            - include:
                precision:
                  - high
                  - very-high
          YAML

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config-file: codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: codeql-${{ matrix.language }}

  semgrep_code:
    name: Semgrep — SAST alta señal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Reglas locales SAST alta señal
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/code-high-signal.yml <<'YAML'
          rules:
            - id: py-command-injection-shell-true
              languages: [python]
              severity: ERROR
              message: "RCE/Command injection: subprocess con shell=True."
              metadata:
                confidence: high
                cwe: "CWE-78"
                category: security
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: py-os-command-execution
              languages: [python]
              severity: ERROR
              message: "RCE: ejecución de comandos con os.system/os.popen."
              metadata:
                confidence: high
                cwe: "CWE-78"
                category: security
              pattern-either:
                - pattern: os.system(...)
                - pattern: os.popen(...)

            - id: py-dangerous-eval-exec
              languages: [python]
              severity: ERROR
              message: "RCE: eval/exec ejecuta contenido dinámico."
              metadata:
                confidence: high
                cwe: "CWE-94"
                category: security
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: py-flask-debug-true
              languages: [python]
              severity: ERROR
              message: "Flask debug=True expone debugger interactivo."
              metadata:
                confidence: high
                cwe: "CWE-489"
                category: security
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: py-unsafe-yaml-load
              languages: [python]
              severity: ERROR
              message: "Deserialización insegura: yaml.load sin SafeLoader."
              metadata:
                confidence: high
                cwe: "CWE-502"
                category: security
              patterns:
                - pattern: yaml.load(...)
                - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
                - pattern-not: yaml.load(..., Loader=SafeLoader, ...)

            - id: py-pickle-load
              languages: [python]
              severity: WARNING
              message: "Deserialización con pickle. Alto riesgo si recibe datos no confiables."
              metadata:
                confidence: medium
                cwe: "CWE-502"
                category: security
              pattern-either:
                - pattern: pickle.load(...)
                - pattern: pickle.loads(...)

            - id: py-sql-string-formatting
              languages: [python]
              severity: WARNING
              message: "Posible SQL injection: query construida con interpolación."
              metadata:
                confidence: medium
                cwe: "CWE-89"
                category: security
              pattern-either:
                - pattern: $CUR.execute("..." % ...)
                - pattern: $CUR.execute("...".format(...))
                - pattern: $CUR.execute(f"...{...}...")

            - id: js-dangerous-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "RCE/XSS: eval/new Function ejecuta contenido dinámico."
              metadata:
                confidence: high
                cwe: "CWE-94"
                category: security
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: node-child-process-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "RCE: ejecución de comandos con child_process.exec/execSync."
              metadata:
                confidence: high
                cwe: "CWE-78"
                category: security
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)
          YAML

      - name: Ejecutar Semgrep SAST
        run: |
          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/code-high-signal.yml \
            $EXCLUDES \
            --severity ERROR --severity WARNING \
            --sarif --output semgrep-code.sarif . || true

          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/code-high-signal.yml \
            $EXCLUDES \
            --severity ERROR --severity WARNING \
            --json --output semgrep-code.json . || true

      - name: Asegurar artifacts
        if: always()
        run: |
          test -f semgrep-code.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep Code","rules":[]}},"results":[]}]}' > semgrep-code.sarif
          test -f semgrep-code.json || echo '{"results":[]}' > semgrep-code.json

      - name: Subir SARIF Semgrep Code
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: semgrep-code.sarif
          category: semgrep-code

      - name: Subir artifacts Semgrep Code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-code-results
          path: |
            semgrep-code.sarif
            semgrep-code.json
          retention-days: 30

  semgrep_ai:
    name: Semgrep — AI/LLM alta señal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Reglas AI/LLM alta señal
        run: |
          mkdir -p .semgrep/ai
          cat > .semgrep/ai/ai-high-signal.yml <<'YAML'
          rules:
            - id: ai-python-shell-tool-or-command-exec
              languages: [python]
              severity: ERROR
              message: "LLM06 Excessive Agency / RCE: código AI con herramienta o función que ejecuta comandos."
              metadata:
                confidence: high
                owasp_llm: "LLM06 Excessive Agency"
                cwe: "CWE-78"
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: os.system(...)
                - pattern: os.popen(...)
                - pattern: ShellTool(...)
                - pattern: BashProcess(...)
                - pattern: PythonREPLTool(...)

            - id: ai-js-shell-tool-or-command-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "LLM06 Excessive Agency / RCE: código AI con ejecución de comandos Node.js."
              metadata:
                confidence: high
                owasp_llm: "LLM06 Excessive Agency"
                cwe: "CWE-78"
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            - id: ai-insecure-output-handling-python
              languages: [python]
              severity: ERROR
              message: "LLM05 Insecure Output Handling: output/input de IA puede llegar a eval/exec."
              metadata:
                confidence: high
                owasp_llm: "LLM05 Improper Output Handling"
                cwe: "CWE-94"
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: ai-insecure-output-handling-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "LLM05 Insecure Output Handling: output/input de IA puede llegar a eval/new Function."
              metadata:
                confidence: high
                owasp_llm: "LLM05 Improper Output Handling"
                cwe: "CWE-94"
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: ai-system-or-developer-message-user-controlled-python
              languages: [python]
              severity: WARNING
              message: "LLM01 Prompt Injection: posible input externo dentro de system/developer message."
              metadata:
                confidence: medium
                owasp_llm: "LLM01 Prompt Injection"
              patterns:
                - pattern-either:
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(request|input|user|query|prompt|message|body|content|question|payload).*

            - id: ai-system-or-developer-message-user-controlled-js
              languages: [javascript, typescript]
              severity: WARNING
              message: "LLM01 Prompt Injection: posible input externo dentro de system/developer message."
              metadata:
                confidence: medium
                owasp_llm: "LLM01 Prompt Injection"
              patterns:
                - pattern-either:
                    - pattern: '{role: "system", content: $X}'
                    - pattern: '{role: "developer", content: $X}'
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(req|request|input|user|query|prompt|message|body|content|question|payload).*

            - id: ai-llm-call-without-output-limit-python
              languages: [python]
              severity: WARNING
              message: "LLM10 Unbounded Consumption: llamada LLM sin max_tokens/max_output_tokens visible."
              metadata:
                confidence: medium
                owasp_llm: "LLM10 Unbounded Consumption"
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: openai.ChatCompletion.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
                - pattern-not: openai.ChatCompletion.create(..., max_tokens=$M, ...)

            - id: ai-llm-call-without-output-limit-js
              languages: [javascript, typescript]
              severity: WARNING
              message: "LLM10 Unbounded Consumption: llamada LLM sin max_tokens/max_output_tokens visible."
              metadata:
                confidence: medium
                owasp_llm: "LLM10 Unbounded Consumption"
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens: $M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens: $M, ...)

            - id: ai-ssrf-url-fetch-python
              languages: [python]
              severity: ERROR
              message: "SSRF en app AI/RAG: URL potencialmente controlada por usuario enviada a requests/httpx."
              metadata:
                confidence: high
                owasp_llm: "LLM05 Improper Output Handling / LLM06 Excessive Agency"
                cwe: "CWE-918"
              patterns:
                - pattern-either:
                    - pattern: requests.get($URL, ...)
                    - pattern: requests.post($URL, ...)
                    - pattern: httpx.get($URL, ...)
                    - pattern: httpx.post($URL, ...)
                - metavariable-regex:
                    metavariable: $URL
                    regex: (?i).*(url|uri|link|website|target|request|input|query|form|args).*

            - id: ai-dangerous-faiss-deserialization-python
              languages: [python]
              severity: ERROR
              message: "RAG/vector DB: FAISS allow_dangerous_deserialization=True permite deserialización peligrosa."
              metadata:
                confidence: high
                owasp_llm: "LLM08 Vector and Embedding Weaknesses"
                cwe: "CWE-502"
              pattern: $FAISS.load_local(..., allow_dangerous_deserialization=True, ...)

            - id: ai-agent-tools-no-obvious-guardrails-python
              languages: [python]
              severity: WARNING
              message: "LLM06 Excessive Agency: agente/tools sin señal visible de allowlist, permisos o human approval."
              metadata:
                confidence: medium
                owasp_llm: "LLM06 Excessive Agency"
              patterns:
                - pattern-either:
                    - pattern: initialize_agent(..., tools=$TOOLS, ...)
                    - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                    - pattern: create_react_agent(..., tools=$TOOLS, ...)
                    - pattern: Tool(..., func=$FUNC, ...)
                    - pattern: StructuredTool.from_function($FUNC, ...)
                - pattern-not-regex: (?i)(allowlist|whitelist|denylist|approval|human|confirm|permission|sandbox|readonly|read_only|validate)
          YAML

      - name: Ejecutar Semgrep AI/LLM
        run: |
          semgrep scan \
            --config .semgrep/ai/ai-high-signal.yml \
            $EXCLUDES \
            --sarif --output semgrep-ai.sarif . || true

          semgrep scan \
            --config .semgrep/ai/ai-high-signal.yml \
            $EXCLUDES \
            --json --output semgrep-ai.json . || true

      - name: Asegurar artifacts AI
        if: always()
        run: |
          test -f semgrep-ai.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep AI","rules":[]}},"results":[]}]}' > semgrep-ai.sarif
          test -f semgrep-ai.json || echo '{"results":[]}' > semgrep-ai.json

      - name: Subir SARIF Semgrep AI
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: semgrep-ai.sarif
          category: semgrep-ai-llm

      - name: Subir artifacts Semgrep AI
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ai-results
          path: |
            semgrep-ai.sarif
            semgrep-ai.json
          retention-days: 30

  dependencies:
    name: Dependencias — pip-audit + Trivy vuln/secret
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit solo si existe requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format=json --output=pip-audit.json || true
          else
            echo '{"dependencies":[]}' > pip-audit.json
          fi

      - name: Trivy filesystem — solo vulnerabilidades y secretos, sin workflows ni misconfig
        uses: aquasecurity/trivy-action@0.30.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: .github,node_modules,dist,build,coverage,.venv,venv,__pycache__

      - name: Subir SARIF Trivy
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-vuln-secret

      - name: Subir artifacts dependencias
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-results
          path: |
            pip-audit.json
            trivy-fs.sarif
          retention-days: 30

  dependency_review:
    name: Dependency Review — solo PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review report only
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: critical
          warn-only: true
          comment-summary-in-pr: always

  report:
    name: Reporte final — hallazgos útiles
    runs-on: ubuntu-latest
    needs: [codeql, semgrep_code, semgrep_ai, dependencies]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Crear resumen legible
        run: |
          python3 - <<'PY'
          import json, pathlib

          root = pathlib.Path('artifacts')
          md = pathlib.Path('https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!9RAvgAHU9kyvoTo7eanWy2i4somTOynW36huOq-bCrO4vHjk5zK20EyjNZokdFx3zPQywevUUxI88l2YE1jCjfNqeZ_SnA$ ')
          rows = []

          def add(tool, area, severity, rule, path, line, msg):
              p = str(path or '')
              if p.startswith('.github/workflows/'):
                  return
              rows.append({
                  'tool': tool,
                  'area': area,
                  'severity': str(severity or '').upper(),
                  'rule': rule or '',
                  'path': p or 'sin archivo',
                  'line': line or '',
                  'msg': (msg or '').replace('\n', ' ')[:300]
              })

          for jf in root.rglob('semgrep-*.json'):
              try:
                  data = json.loads(jf.read_text())
              except Exception:
                  continue
              area = 'AI/LLM' if 'ai' in https://urldefense.com/v3/__http://jf.name__;!!P110LumUDw!9RAvgAHU9kyvoTo7eanWy2i4somTOynW36huOq-bCrO4vHjk5zK20EyjNZokdFx3zPQywevUUxI88l2YE1jCjfOiR6ZV5A$  else 'Código'
              for r in data.get('results', []):
                  extra = r.get('extra', {})
                  add('Semgrep', area, extra.get('severity'), r.get('check_id'), r.get('path'), r.get('start', {}).get('line'), extra.get('message'))

          pa = next(root.rglob('pip-audit.json'), None)
          if pa:
              try:
                  data = json.loads(pa.read_text())
                  for dep in data.get('dependencies', []):
                      for v in dep.get('vulns', []):
                          add('pip-audit', 'Dependencias', 'HIGH', v.get('id'), 'requirements.txt', '', f"{dep.get('name')} {dep.get('version')} - fixed: {v.get('fix_versions')}")
              except Exception:
                  pass

          sev_order = {'CRITICAL': 0, 'ERROR': 1, 'HIGH': 2, 'WARNING': 3, 'MEDIUM': 4, 'LOW': 5, 'INFO': 6, '': 7}
          rows.sort(key=lambda r: (sev_order.get(r['severity'], 9), r['area'], r['path'], str(r['line'])))

          with md.open('w') as f:
              f.write('# Security Pipeline Preciso — resumen\n\n')
              f.write('Modo: REPORT ONLY. No bloquea PR/push. Excluye `.github/workflows/**`.\n\n')
              f.write(f'Total Semgrep/pip-audit resumido: **{len(rows)}**\n\n')
              if not rows:
                  f.write('Sin hallazgos útiles en los artifacts resumidos. Revisa igualmente CodeQL/Trivy en Security > Code scanning.\n')
              else:
                  f.write('| Severidad | Área | Herramienta | Regla | Archivo | Línea | Mensaje |\n')
                  f.write('|---|---|---|---|---|---:|---|\n')
                  for r in rows[:80]:
                      f.write(f"| {r['severity']} | {r['area']} | {r['tool']} | `{r['rule']}` | `{r['path']}` | {r['line']} | {r['msg']} |\n")
                  if len(rows) > 80:
                      f.write(f"\nMostrando 80 de {len(rows)} hallazgos. Ver artifacts completos.\n")
          print(md.read_text())
          PY
          cat https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!9RAvgAHU9kyvoTo7eanWy2i4somTOynW36huOq-bCrO4vHjk5zK20EyjNZokdFx3zPQywevUUxI88l2YE1jCjfNqeZ_SnA$  >> "$GITHUB_STEP_SUMMARY"

      - name: Subir resumen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!9RAvgAHU9kyvoTo7eanWy2i4somTOynW36huOq-bCrO4vHjk5zK20EyjNZokdFx3zPQywevUUxI88l2YE1jCjfNqeZ_SnA$ 
          retention-days: 30
