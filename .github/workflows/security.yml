  dast-zap:
    name: "DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_dast == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Validate DAST target URL
        id: validate_url
        env:
          DAST_TARGET_URL_VALUE: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$DAST_TARGET_URL_VALUE" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi

      - name: Run OWASP ZAP Baseline Scan
        if: steps.validate_url.outputs.skip != 'true'
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          report_html: zap_report.html
          report_json: zap_report.json
          cmd_options: "-a -l HIGH"
          fail_action: false
          allow_issue_writing: false

      - name: Convert ZAP JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          src = pathlib.Path("zap_report.json")
          if not src.exists(): src.write_text('{"site":[]}', encoding="utf-8")
          try: zap = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception: zap = {"site":[]}
          def clean(v): return re.sub(r"\s+", " ", re.sub(r"<[^>]+>", " ", str(v or ""))).strip()
          rules, results = {}, []
          level_map = {"3":"error","2":"warning","1":"note","0":"note"}
          for site in zap.get("site", []):
              for alert in site.get("alerts", []):
                  rid = "ZAP-" + str(alert.get("pluginid","unknown"))
                  level = level_map.get(str(alert.get("riskcode","1")), "note")
                  name = clean(alert.get("alert","Unknown ZAP alert"))
                  rules.setdefault(rid, {"id":rid,"name":name,"shortDescription":{"text":name},"fullDescription":{"text":clean(alert.get("desc",""))},"defaultConfiguration":{"level":level}})
                  for inst in alert.get("instances") or [{}]:
                      uri = inst.get("uri") or site.get("@name") or "unknown"
                      results.append({"ruleId":rid,"level":level,"message":{"text":f"{name} | URL: {uri}"},"locations":[{"physicalLocation":{"artifactLocation":{"uri":uri}}}]})
          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22OWASP__;JSUlJSUlJSUlJSUlJSU!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afX-yV9p8g$  ZAP","informationUri":"https://urldefense.com/v3/__https://www.zaproxy.org/*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results__;JSUlJSUlJQ!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afWyn7s-xw$ }]}
          pathlib.Path("zap_results.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure ZAP artifacts
        if: always()
        run: |
          test -f zap_report.html || echo '<html><body><h1>ZAP skipped or no report generated</h1></body></html>' > zap_report.html
          test -f zap_report.json || echo '{"site":[]}' > zap_report.json
          test -f zap_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"OWASP ZAP","rules":[]}},"results":[]}]}' > zap_results.sarif

      - name: Upload ZAP SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap_results.sarif
          category: zap-dast

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_report.json
            zap_results.sarif
          retention-days: 30

  security-report:
    name: "Security Report — Centralized Verdict"
    runs-on: ubuntu-latest
    needs:
      - dependency-review
      - dependency-policy
      - codeql
      - semgrep-security
      - ai-agentic-security
      - endor-labs
      - osv-dependencies
      - pip-audit
      - trivy-filesystem
      - docker-security
      - gitleaks
      - checkov-iac
      - scorecard
      - dast-zap
    if: always()
    permissions:
      contents: read
    steps:
      - name: Create report directories
        run: mkdir -p all_scan_results security_reports

      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results/

      - name: Generate centralized report
        run: |
          python3 - <<'PY'
          import json, pathlib
          from html import escape

          root = pathlib.Path("all_scan_results")
          out = pathlib.Path("security_reports")
          out.mkdir(exist_ok=True)

          order = ["critical","high","medium","low","info","unknown"]
          grouped = {s: [] for s in order}

          def norm(v):
              v = str(v or "").lower().strip()
              return {
                  "error":"high",
                  "warning":"medium",
                  "note":"low",
                  "none":"info",
                  "critical":"critical",
                  "high":"high",
                  "medium":"medium",
                  "moderate":"medium",
                  "low":"low",
                  "info":"info",
                  "informational":"info"
              }.get(v, "unknown")

          def add(tool, sev, rule, msg, file="", line=""):
              sev = norm(sev)
              grouped[sev].append({
                  "tool": tool or "Unknown",
                  "severity": sev,
                  "rule": rule or "unknown",
                  "message": str(msg or "").strip(),
                  "file": str(file or ""),
                  "line": str(line or "")
              })

          def parse_sarif(p):
              try: data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
              except Exception: return

              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", p.stem)
                  rules = {r.get("id","unknown"): r.get("defaultConfiguration", {}).get("level","") for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
                  for res in run.get("results", []):
                      rid = res.get("ruleId","unknown")
                      level = res.get("level") or rules.get(rid) or "unknown"
                      msg = res.get("message", {}).get("text","")
                      file = ""
                      line = ""
                      locs = res.get("locations", [])
                      if locs:
                          phys = locs[0].get("physicalLocation", {})
                          file = phys.get("artifactLocation", {}).get("uri","")
                          line = phys.get("region", {}).get("startLine","")
                      add(tool, level, rid, msg, file, line)

          def parse_findings_json(p):
              try: data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
              except Exception: return
              for item in data.get("findings", []):
                  add(item.get("tool"), item.get("severity"), item.get("rule"), item.get("message"), item.get("file"), item.get("line"))

          for p in root.rglob("*.sarif"):
              parse_sarif(p)

          for p in root.rglob("*findings.json"):
              parse_findings_json(p)

          counts = {sev: len(grouped[sev]) for sev in order}
          total = sum(counts.values())

          names = {
              "critical":"Críticos",
              "high":"Altos",
              "medium":"Medios",
              "low":"Bajos",
              "info":"Informativos",
              "unknown":"Desconocidos"
          }

          lines = [
              "REPORTE CENTRALIZADO DE SEGURIDAD",
              "=" * 80,
              "",
              "MODO",
              "-" * 80,
              "Report only: este pipeline NO bloquea aunque existan hallazgos.",
              "",
              "RESUMEN EJECUTIVO",
              "-" * 80,
              f"Total de hallazgos : {total}",
              f"Críticos           : {counts['critical']}",
              f"Altos              : {counts['high']}",
              f"Medios             : {counts['medium']}",
              f"Bajos              : {counts['low']}",
              f"Informativos       : {counts['info']}",
              f"Desconocidos       : {counts['unknown']}",
              ""
          ]

          for sev in order:
              lines += ["", f"HALLAZGOS {names[sev].upper()} ({len(grouped[sev])})", "-" * 80]
              if not grouped[sev]:
                  lines.append("Sin hallazgos.")
              for i, item in enumerate(grouped[sev], 1):
                  lines += [
                      f"{i}. Herramienta : {item['tool']}",
                      f"   Severidad   : {item['severity']}",
                      f"   Regla       : {item['rule']}",
                      f"   Archivo     : {item['file']}",
                      f"   Línea       : {item['line']}",
                      f"   Descripción : {item['message']}",
                      ""
                  ]

          (out / "security_report_es.txt").write_text("\n".join(lines), encoding="utf-8")
          (out / "security_report_es.json").write_text(json.dumps({"summary":counts,"total":total,"findings":grouped}, indent=2, ensure_ascii=False), encoding="utf-8")

          html = ["<!doctype html><html><head><meta charset='utf-8'><title>Reporte centralizado de seguridad</title>",
                  "<style>body{font-family:Arial,sans-serif;margin:24px}table{border-collapse:collapse;width:100%;margin-bottom:32px}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f4f4f4}</style>",
                  "</head><body><h1>Reporte centralizado de seguridad</h1>",
                  "<p><strong>Modo:</strong> Report only. Este pipeline no bloquea aunque existan hallazgos.</p>",
                  "<h2>Resumen ejecutivo</h2><ul>"]
          for sev in order:
              html.append(f"<li>{escape(names[sev])}: {counts[sev]}</li>")
          html.append("</ul>")
          for sev in order:
              html.append(f"<h2>Hallazgos {escape(names[sev])} ({counts[sev]})</h2>")
              html.append("<table><tr><th>Herramienta</th><th>Severidad</th><th>Regla</th><th>Archivo</th><th>Línea</th><th>Descripción</th></tr>")
              for item in grouped[sev]:
                  html.append(f"<tr><td>{escape(item['tool'])}</td><td>{escape(item['severity'])}</td><td>{escape(item['rule'])}</td><td>{escape(item['file'])}</td><td>{escape(str(item['line']))}</td><td>{escape(item['message'])}</td></tr>")
              html.append("</table>")
          html.append("</body></html>")
          (out / "security_report_es.html").write_text("\n".join(html), encoding="utf-8")

          print("\n".join(lines))
          PY

      - name: Add report to job summary
        if: always()
        run: |
          python3 - <<'PY'
          import os, pathlib
          report = pathlib.Path("security_reports/security_report_es.txt")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Reporte centralizado de seguridad\n\n```text\n")
              summary.write(report.read_text(encoding="utf-8", errors="ignore")[:120000] if report.exists() else "No se encontró el reporte generado.")
              summary.write("\n```\n")
          PY

      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports/
          retention-days: 30

      - name: Final verdict — report only
        if: always()
        run: |
          echo "Report-only mode: no se bloquea el pipeline."
          exit 0
