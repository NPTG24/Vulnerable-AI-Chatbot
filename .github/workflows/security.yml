                  return call_name(node.func)
              if isinstance(node, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_onOYkVg$ ):
                  return https://urldefense.com/v3/__http://node.id__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_x94u2KQ$ 
