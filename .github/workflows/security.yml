  sca:
    name: "SCA — pip-audit + Trivy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit against project files
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          fi

          python3 - <<'PY'
          import json
          import pathlib

          src = pathlib.Path("pip_audit_osv.json")
          try:
              data = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = {"dependencies": []}

          deps = data.get("dependencies", []) if isinstance(data, dict) else data
          rules = {}
          results = []

          def level(sev):
              s = str(sev or "").upper()
              if s in {"CRITICAL", "HIGH"}:
                  return "error"
              if s == "MEDIUM":
                  return "warning"
              return "note"

          for dep in deps:
              if not isinstance(dep, dict):
                  continue

              pkg = dep.get("name", "unknown")
              ver = dep.get("version", "")

              for vuln in dep.get("vulns", []):
                  vid = vuln.get("id", "PYTHON_VULN")
                  sev = vuln.get("severity", "UNKNOWN")
                  msg = f"{pkg} {ver}: {vid} severity={sev}"
                  rules.setdefault(vid, {
                      "id": vid,
                      "name": vid,
                      "shortDescription": {"text": vid},
                      "fullDescription": {"text": msg},
                      "defaultConfiguration": {"level": level(sev)}
                  })
                  results.append({
                      "ruleId": vid,
                      "level": level(sev),
                      "message": {"text": msg},
                      "properties": {"kind": "vulnerability"},
                      "locations": [{"physicalLocation": {"artifactLocation": {"uri": "python-dependencies"}}}]
                  })

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "pip-audit",
                          "informationUri": "https://urldefense.com/v3/__https://pypi.org/project/pip-audit/__;!!P110LumUDw!8__sqzWHZdWdOsEQeFpxuRGjPECJDDQuMwZ5WL6qpypd4n4PgXQR1Qrimv01dQiiD_r1jiq90HMCXOxNmszbyJYelB0jkQ$ ",
                          "rules": list(rules.values())
                      }
                  },
                  "results": results
              }]
          }

          pathlib.Path("pip_audit.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Run Trivy filesystem SARIF without trivy-action
        continue-on-error: true
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -v "$PWD:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format sarif \
            --output /repo/trivy_results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            /repo || true

      - name: Ensure SCA artifacts exist
        if: always()
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif

      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            trivy_results.sarif
          retention-days: 30

  secret-scan:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks without failing job
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks_report.json \
            --exit-code 0 \
            --redact \
            --verbose || true

      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          p = pathlib.Path("gitleaks_report.json")

          try:
              data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = []

          rules = {}
          results = []

          for item in data:
              rid = item.get("RuleID") or item.get("Description") or "SECRET"
              desc = item.get("Description") or "Possible exposed secret"
              file = item.get("File") or "unknown"
              line = int(item.get("StartLine") or 1)
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": desc},
                  "fullDescription": {"text": desc},
                  "defaultConfiguration": {"level": "error"}
              })
              results.append({
                  "ruleId": rid,
                  "level": "error",
                  "message": {"text": desc},
                  "properties": {"kind": "vulnerability"},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": file},
                          "region": {"startLine": line}
                      }
                  }]
              })

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {
                      "driver": {
                          "name": "Gitleaks",
                          "informationUri": "https://urldefense.com/v3/__https://github.com/gitleaks/gitleaks__;!!P110LumUDw!8__sqzWHZdWdOsEQeFpxuRGjPECJDDQuMwZ5WL6qpypd4n4PgXQR1Qrimv01dQiiD_r1jiq90HMCXOxNmszbyJYJs5cwlA$ ",
                          "rules": list(rules.values())
                      }
                  },
                  "results": results
              }]
          }

          pathlib.Path("gitleaks.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure Gitleaks artifacts exist
        if: always()
        run: |
          test -f gitleaks_report.json || echo '[]' > gitleaks_report.json
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

  iac-checkov:
    name: "IaC — Checkov full framework"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov full IaC scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: all
          soft_fail: true
          output_format: sarif,json
          output_file_path: checkov_results
          download_external_modules: false
          quiet: true

      - name: Normalize Checkov artifacts
        if: always()
        run: |
          if [ -d checkov_results ]; then
            find checkov_results -name "*.sarif" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.sarif
            find checkov_results -name "*.json" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.json
          fi

          test -f checkov_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}' > checkov_results.sarif
          test -f checkov_results.json || echo '{"results":{"failed_checks":[]}}' > checkov_results.json

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_results.sarif
          category: checkov-iac

      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            checkov_results.sarif
            checkov_results.json
          retention-days: 30

  centralized-report:
    name: "Report — Centralized Security Summary"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - ruff
      - codeql
      - semgrep
      - ai-security
      - sca
      - secret-scan
      - iac-checkov
    if: always()
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Build centralized report
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path("all_scan_results")
          output_dir = pathlib.Path("central-security-report")
          output_dir.mkdir(exist_ok=True)
          report = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"
          report_json = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.json"

          findings = []
          quality = []

          def norm_sev(sev):
              sev = str(sev or "UNKNOWN").upper()
              mapping = {
                  "ERROR": "HIGH",
                  "WARNING": "MEDIUM",
                  "WARN": "MEDIUM",
                  "MODERATE": "MEDIUM",
                  "INFORMATIONAL": "INFO",
                  "INFORMATIVE": "INFO"
              }
              return mapping.get(sev, sev if sev in {"CRITICAL","HIGH","MEDIUM","LOW","INFO","UNKNOWN"} else "UNKNOWN")

          def add(category, severity, tool, location, detail, rule="", source_file=""):
              findings.append({
                  "category": category,
                  "severity": norm_sev(severity),
                  "tool": tool,
                  "rule": rule or "",
                  "location": location or "?",
                  "detail": str(detail or "").replace("\n", " ")[:2000],
                  "source_file": source_file or ""
              })

          def load_all(pattern):
              results = []
              for path in root.rglob(pattern):
                  try:
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          results.append((path, json.loads(text)))
                  except Exception as error:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", str(path), f"No se pudo leer JSON: {error}", "PARSER_ERROR", str(path))
              return results

          # Semgrep OSS: muestra absolutamente todo lo detectado por semgrep.json
          for src_path, data in load_all("semgrep.json"):
              for item in data.get("results", []) if isinstance(data, dict) else []:
                  extra = item.get("extra", {})
                  check_id = item.get("check_id", "")
                  add(
                      "Código aplicativo",
                      extra.get("severity", "UNKNOWN"),
                      "Semgrep OSS",
                      f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}",
                      extra.get("message", ""),
                      check_id,
                      str(src_path)
                  )

          # AI Semgrep: muestra todo lo detectado por semgrep_ai.json
          for src_path, data in load_all("semgrep_ai.json"):
              for item in data.get("results", []) if isinstance(data, dict) else []:
                  extra = item.get("extra", {})
                  check_id = item.get("check_id", "")
                  add(
                      "AI / LLM / Agentic",
                      extra.get("severity", "UNKNOWN"),
                      "AI Security Precise",
                      f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}",
                      extra.get("message", ""),
                      check_id,
                      str(src_path)
                  )

          # pip-audit: muestra todo
          for src_path, data in load_all("pip_audit_osv.json"):
              deps = data.get("dependencies", []) if isinstance(data, dict) else data
              if not isinstance(deps, list):
                  continue
              for dep in deps:
                  if not isinstance(dep, dict):
                      continue
                  for vuln in dep.get("vulns", []) or []:
                      add(
                          "Dependencias / SCA",
                          vuln.get("severity", "HIGH"),
                          "pip-audit",
                          dep.get("name", "?"),
                          f"{dep.get('name','?')} {dep.get('version','')}: {vuln.get('id','')} - {vuln.get('description','')}",
                          vuln.get("id", ""),
                          str(src_path)
                      )

          # Gitleaks: muestra todo
          for src_path, data in load_all("gitleaks_report.json"):
              if isinstance(data, list):
                  for item in data:
                      add(
                          "Secretos",
                          "HIGH",
                          "Gitleaks",
                          f"{item.get('File','?')}:{item.get('StartLine','?')}",
                          item.get("Description", "Possible exposed secret"),
                          item.get("RuleID", ""),
                          str(src_path)
                      )

          # Dependency Policy: muestra vulnerabilidades + hygiene
          for src_path, data in load_all("dependency_policy_findings.json"):
              for item in data.get("findings", []) if isinstance(data, dict) else []:
                  add(
                      "Dependencias / Policy",
                      item.get("severity", "UNKNOWN"),
                      "Dependency Policy",
                      f"{item.get('file','?')}:{item.get('line','?')}",
                      item.get("message", ""),
                      item.get("rule", ""),
                      str(src_path)
                  )

          # Checkov: muestra todo
          for src_path, data in load_all("checkov_results.json"):
              reports = data if isinstance(data, list) else [data]
              for rep in reports:
                  if not isinstance(rep, dict):
                      continue
                  for check in rep.get("results", {}).get("failed_checks", []) or []:
                      file_path = check.get("file_path", "?")
                      category = "Docker / Contenedores" if "dockerfile" in str(file_path).lower() else "IaC / Cloud / Config"
                      line_range = check.get("file_line_range") or ["?"]
                      add(
                          category,
                          "HIGH",
                          "Checkov",
                          f"{file_path}:{line_range[0]}",
                          check.get("check_name", ""),
                          check.get("check_id", ""),
                          str(src_path)
                      )

          # Ruff: quality separado, pero completo
          for src_path, data in load_all("ruff_dev_quality_findings.json"):
              if isinstance(data, dict):
                  for item in data.get("findings", []) or []:
                      item["_source_file"] = str(src_path)
                      quality.append(item)

          categories = sorted(set([f["category"] for f in findings]) | {
              "AI / LLM / Agentic",
              "Código aplicativo",
              "Dependencias / SCA",
              "Dependencias / Policy",
              "Secretos",
              "Docker / Contenedores",
              "IaC / Cloud / Config",
              "Pipeline / Parser"
          })

          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {c: {s: 0 for s in severities} for c in categories}

          for f in findings:
              sev = f["severity"] if f["severity"] in severities else "UNKNOWN"
              table[f["category"]][sev] += 1

          order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "INFO": 4, "UNKNOWN": 5}
          findings.sort(key=lambda x: (order.get(x["severity"], 99), x["category"], x["tool"], x["location"]))
          critical_high = [f for f in findings if f["severity"] in {"CRITICAL", "HIGH"}]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Hallazgos totales             : {len(findings)}")
          lines.append(f"Críticas + Altas              : {len(critical_high)}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORÍA")
          lines.append("-" * 90)
          lines.append(f"{'Categoría':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")

          for cat in categories:
              lines.append(
                  f"{cat:35} "
                  f"{table[cat]['CRITICAL']:>8} "
                  f"{table[cat]['HIGH']:>5} "
                  f"{table[cat]['MEDIUM']:>7} "
                  f"{table[cat]['LOW']:>5} "
                  f"{table[cat]['INFO']:>5} "
                  f"{table[cat]['UNKNOWN']:>8}"
              )

          lines.append("")
          lines.append("TODOS LOS HALLAZGOS ORDENADOS POR CRITICIDAD")
          lines.append("=" * 90)

          if not findings:
              lines.append("Sin hallazgos.")
          else:
              for idx, f in enumerate(findings, 1):
                  lines.append("")
                  lines.append(f"{idx}. [{f['severity']}] [{f['category']}] {f['rule']}")
                  lines.append(f"   Herramienta : {f['tool']}")
                  lines.append(f"   Ubicación   : {f['location']}")
                  lines.append(f"   Detalle     : {f['detail']}")
                  lines.append(f"   Fuente      : {f['source_file']}")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)

          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for idx, item in enumerate(quality, 1):
                  lines.append("")
                  lines.append(f"{idx}. {item.get('code','?')}")
                  lines.append(f"   Ubicación: {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle  : {item.get('message','')}")
                  lines.append(f"   Fuente   : {item.get('_source_file','')}")

          report.write_text("\n".join(lines), encoding="utf-8")
          report_json.write_text(json.dumps({"findings": findings, "quality": quality}, indent=2, ensure_ascii=False), encoding="utf-8")
          print(report.read_text(encoding="utf-8"))
          PY

      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-security-report
          path: central-security-report
          retention-days: 30
