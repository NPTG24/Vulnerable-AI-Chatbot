  docker-security:
    name: "Docker - Hadolint"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Hadolint on Dockerfiles
        continue-on-error: true
        shell: bash
        run: |
          echo "[]" > hadolint_results.json
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          dockerfiles="$(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -not -path './.git/*' -not -path './node_modules/*' -not -path './.github/*')"
          if [ -n "$dockerfiles" ]; then
            idx=0
            : > hadolint_file_map.tsv
            for file in $dockerfiles; do
              idx=$((idx+1))
              printf "%s\t%s\n" "$idx" "$file" >> hadolint_file_map.tsv
              docker run --rm -i hadolint/hadolint:latest hadolint --format json - < "$file" > "hadolint_${idx}.json" || true
            done
            python3 - <<'PY'
          import json
          import pathlib

          file_map = {}
          map_path = pathlib.Path("hadolint_file_map.tsv")
          if map_path.exists():
              for raw in map_path.read_text(encoding="utf-8", errors="ignore").splitlines():
                  parts = raw.split("\t", 1)
                  if len(parts) == 2:
                      file_map[parts[0]] = parts[1]

          findings = []
          for path in sorted(pathlib.Path(".").glob("hadolint_*.json")):
              idx = path.stem.replace("hadolint_", "", 1)
              dockerfile = file_map.get(idx, "Dockerfile")
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore") or "[]")
              except Exception:
                  data = []

              if isinstance(data, dict):
                  data = [data]

              for item in data:
                  if not isinstance(item, dict):
                      continue

                  line = item.get("line") or item.get("lineNumber") or item.get("startLine") or 1
                  column = item.get("column") or item.get("columnNumber") or 1

                  item["file"] = dockerfile
                  item["filename"] = dockerfile
                  item["path"] = dockerfile
                  item["line"] = int(line or 1)
                  item["lineNumber"] = int(line or 1)
                  item["column"] = int(column or 1)
                  item["location"] = f"{dockerfile}:{int(line or 1)}"
                  findings.append(item)

          pathlib.Path("hadolint_results.json").write_text(json.dumps(findings, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []

          def level(value):
              value = str(value or "").lower()
              if value in {"error"}:
                  return "error"
              if value in {"warning"}:
                  return "warning"
              return "note"

          for item in findings:
              code = item.get("code") or item.get("rule") or "HADOLINT"
              message = item.get("message") or item.get("description") or "Hallazgo Hadolint"
              dockerfile = item.get("file") or item.get("filename") or "Dockerfile"
              line = int(item.get("line") or item.get("lineNumber") or 1)
              col = int(item.get("column") or 1)

              rules.setdefault(code, {
                  "id": code,
                  "name": code,
                  "shortDescription": {"text": code},
                  "fullDescription": {"text": message},
                  "defaultConfiguration": {"level": level(item.get("level"))}
              })

              results.append({
                  "ruleId": code,
                  "level": level(item.get("level")),
                  "message": {"text": message},
                  "properties": {
                      "kind": "vulnerability",
                      "category": "Docker / Contenedores",
                      "dockerfile": dockerfile
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": dockerfile},
                          "region": {
                              "startLine": line,
                              "startColumn": col
                          }
                      }
                  }]
              })

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "Hadolint", "rules": list(rules.values())}},
                  "results": results
              }]
          }
          pathlib.Path("hadolint.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
          fi
          echo "[]" > dockle_results.json
      - name: Upload Docker security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            hadolint_results.json
            hadolint.sarif
            dockle_results.json
          retention-days: 30

