                  if "innerhtml" in lower or ".html(" in lower:
                      add(py, idx, "MEDIUM", "WEB_DOM_XSS_SINK_REVIEW", "CÃ³digo aplicativo", "Sink HTML/DOM detectado. Revisar si recibe datos del usuario o del LLM sin sanitizaciÃ³n.", line, "MEDIUM")

                  if any(x in lower for x in ["dangerouslysetinnerhtml", "bypasssecuritytrusthtml"]):
                      add(py, idx, "HIGH", "WEB_UNSAFE_HTML_RENDERING", "CÃ³digo aplicativo", "Renderizado HTML inseguro detectado. Revisar XSS con salida de usuario/LLM.", line, "HIGH")

              if has_route and has_ai:
