          def is_route_dec(dec):
              return isinstance(dec, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_-e1vFbw$ ) and ".route" in call_name(dec)

          def is_none_guarded(prefix, var):
              patterns = [rf"{re.escape(var)}\s+is\s+None", rf"not\s+{re.escape(var)}\b", rf"{re.escape(var)}\s*==\s*None", rf"{re.escape(var)}\s*!=\s*None"]
              return any(re.search(p, prefix) for p in patterns)

          def analyze_python(py):
              text = py.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              try:
                  tree = ast.parse(text)
              except SyntaxError as error:
