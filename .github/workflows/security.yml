                  for x in data:
                      count += 1
                      add("Docker / Contenedores", x.get("level","warning"), "Hadolint", f"{x.get('file', x.get('filename','Dockerfile'))}:{x.get('line', x.get('lineNumber','?'))}", x.get("message", x.get("description","")), x.get("code",""), str(p), "Hadolint suele ser hardening/calidad Docker; priorizar segÃºn exposiciÃ³n.")
              tool_status.append({"artifact": str(p), "tool": "Hadolint", "findings": count})

          for p, data in load_all("ruff_dev_quality_findings.json"):
