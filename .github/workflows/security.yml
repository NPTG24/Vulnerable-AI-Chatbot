name: "Security Pipeline"

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  security:
    name: "Strong Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Prepare folders"
        shell: bash
        run: |
          rm -rf security-results
          mkdir -p security-results/reports
          mkdir -p security-results/sarif

      - name: "Detect repository languages"
        id: detect
        shell: bash
        run: |
          langs=""

          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            langs="${langs},python"
          fi

          if find . \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) -not -path "./.git/*" | grep -q .; then
            langs="${langs},javascript-typescript"
          fi

          if find . -name "*.java" -not -path "./.git/*" | grep -q .; then
            langs="${langs},java"
          fi

          if find . -name "*.go" -not -path "./.git/*" | grep -q .; then
            langs="${langs},go"
          fi

          if find . \( -name "*.c" -o -name "*.cc" -o -name "*.cpp" -o -name "*.cxx" -o -name "*.h" -o -name "*.hpp" \) -not -path "./.git/*" | grep -q .; then
            langs="${langs},c-cpp"
          fi

          if find . -name "*.cs" -not -path "./.git/*" | grep -q .; then
            langs="${langs},csharp"
          fi

          langs="${langs#,}"
          echo "codeql_languages=${langs}" >> "$GITHUB_OUTPUT"
          echo "Detected CodeQL languages: ${langs}"

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: "Install security tools"
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep pip-audit ruff checkov

      # ==========================================================
      # CODEQL OFICIAL
      # ==========================================================

      - name: "Initialize CodeQL"
        if: ${{ steps.detect.outputs.codeql_languages != '' }}
        uses: github/codeql-action/init@v3
        continue-on-error: true
        with:
          languages: "${{ steps.detect.outputs.codeql_languages }}"
          queries: "security-extended,security-and-quality"

      - name: "CodeQL Autobuild"
        if: ${{ steps.detect.outputs.codeql_languages != '' }}
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: "CodeQL Analyze"
        if: ${{ steps.detect.outputs.codeql_languages != '' }}
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:auto"

      # ==========================================================
      # REGLAS AI / LLM / AGENTIC GENÃ‰RICAS
      # ==========================================================

      - name: "Create generic AI AppSec Semgrep rules"
        shell: bash
        run: |
          cat > ai-appsec-rules.yml <<'EOF'
          rules:
            - id: ai.untrusted-input-to-llm
              message: User-controlled input appears to reach an LLM or AI chain. Review prompt injection, authorization, tool-use and data leakage controls.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: $LLM.invoke($INPUT)
                - pattern: $LLM.predict($INPUT)
                - pattern: $LLM.generate($INPUT)
                - pattern: $CHAIN.invoke($INPUT)
                - pattern: $CHAIN.run($INPUT)
                - pattern: $AGENT.invoke($INPUT)
                - pattern: $AGENT.run($INPUT)
                - pattern: $CLIENT.chat.completions.create(..., messages=$INPUT, ...)
                - pattern: $CLIENT.responses.create(..., input=$INPUT, ...)

            - id: ai.prompt-template-risk
              message: Prompt template construction detected. Review whether untrusted input can override system instructions or leak data.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: PromptTemplate(...)
                - pattern: ChatPromptTemplate(...)
                - pattern: SystemMessagePromptTemplate(...)
                - pattern: HumanMessagePromptTemplate(...)

            - id: ai.rag-retrieval-chain-risk
              message: RAG or retrieval chain detected. Validate document isolation, metadata authorization, prompt injection defenses and source filtering.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: RetrievalQA.from_chain_type(...)
                - pattern: ConversationalRetrievalChain.from_llm(...)
                - pattern: VectorStoreIndexWrapper(...)
                - pattern: FAISS.from_documents(...)
                - pattern: Chroma.from_documents(...)
                - pattern: $VECTORSTORE.as_retriever(...)

            - id: ai.agent-tool-execution-risk
              message: AI agent/tool execution detected. Review whether the model can trigger filesystem, shell, network, database or privileged operations.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: initialize_agent(...)
                - pattern: AgentExecutor(...)
                - pattern: create_openai_tools_agent(...)
                - pattern: create_react_agent(...)
                - pattern: Tool(...)
                - pattern: StructuredTool(...)
                - pattern: PythonREPLTool(...)
                - pattern: ShellTool(...)
                - pattern: RequestsGetTool(...)
                - pattern: RequestsPostTool(...)

            - id: ai.llm-output-used-as-command
              message: LLM or AI-generated output may reach command execution. This can create prompt-to-RCE risk.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: subprocess.run($CMD, shell=True, ...)
                - pattern: subprocess.call($CMD, shell=True, ...)
                - pattern: subprocess.check_output($CMD, shell=True, ...)
                - pattern: os.system($CMD)
                - pattern: eval($CMD)
                - pattern: exec($CMD)

            - id: ai.sensitive-keyword-security-control
              message: Keyword filtering appears to be used as a security boundary. This is usually bypassable in AI/LLM applications.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: |
                    if any($WORD in $INPUT for $WORD in $WORDS):
                        ...
                - pattern: |
                    if $WORD in $INPUT:
                        ...

            - id: ai.secret-or-env-disclosure-risk
              message: Environment variable or secret-like value is used in application logic. Check for disclosure through AI responses, logs or debugging routes.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: os.environ[$KEY]
                - pattern: os.getenv($KEY)
                - pattern: dotenv_values(...)
                - pattern: load_dotenv(...)

            - id: ai.unsafe-document-loader
              message: Document parsing/loader detected. Validate uploaded files, file type, size, sandboxing and malicious document handling.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: PyPDFLoader(...)
                - pattern: UnstructuredFileLoader(...)
                - pattern: TextLoader(...)
                - pattern: DirectoryLoader(...)
                - pattern: CSVLoader(...)
                - pattern: Docx2txtLoader(...)

            - id: ai.embedding-sensitive-data-risk
              message: Embeddings/vector storage detected. Check whether secrets, PII or tenant data can be embedded or retrieved across authorization boundaries.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: OpenAIEmbeddings(...)
                - pattern: HuggingFaceEmbeddings(...)
                - pattern: SentenceTransformerEmbeddings(...)
                - pattern: $VECTORSTORE.add_documents(...)
                - pattern: $VECTORSTORE.similarity_search(...)

            - id: web.flask-debug-enabled
              message: Flask debug mode enabled.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: web.flask-public-host
              message: Flask app exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!8mvJ1OHDLR_jqq54YS0qeM3uNdCRogpz8NH21gnEzhoWim3M6NjO-M1VM3eUjMQFd9nSL_jn7bvWpdOFfQ9oicTRYhra8A$ . Confirm intended exposure, auth and network controls.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: app.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!8mvJ1OHDLR_jqq54YS0qeM3uNdCRogpz8NH21gnEzhoWim3M6NjO-M1VM3eUjMQFd9nSL_jn7bvWpdOFfQ9oicTRYhra8A$ ", ...)
                - pattern: $APP.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!8mvJ1OHDLR_jqq54YS0qeM3uNdCRogpz8NH21gnEzhoWim3M6NjO-M1VM3eUjMQFd9nSL_jn7bvWpdOFfQ9oicTRYhra8A$ ", ...)

            - id: web.file-upload-risk
              message: File upload detected. Validate extension, MIME type, size, storage path, malware scanning and path traversal controls.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: request.files[$X]
                - pattern: $FILE.save(...)

            - id: web.open-redirect-risk
              message: Redirect detected. Check whether the target can be user-controlled.
              severity: WARNING
              languages:
                - python
              pattern: redirect($TARGET)

            - id: code.subprocess-shell-true
              message: subprocess with shell=True detected. Possible command injection if input is attacker-controlled.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: code.eval-exec-risk
              message: Dynamic code execution detected.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)
                - pattern: compile(...)
          EOF

      # ==========================================================
      # SEMGREP
      # ==========================================================

      - name: "Semgrep general security JSON"
        shell: bash
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude ".git" \
            --exclude "security-results" \
            --exclude "node_modules" \
            --exclude "vendor" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".venv" \
            --json \
            --output security-results/reports/semgrep.json \
            . || true

      - name: "Semgrep general security SARIF"
        shell: bash
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude ".git" \
            --exclude "security-results" \
            --exclude "node_modules" \
            --exclude "vendor" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".venv" \
            --sarif \
            --output security-results/sarif/semgrep.sarif \
            . || true

      - name: "Semgrep AI AppSec JSON"
        shell: bash
        run: |
          semgrep scan \
            --config ai-appsec-rules.yml \
            --exclude ".git" \
            --exclude "security-results" \
            --exclude "node_modules" \
            --exclude "vendor" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".venv" \
            --json \
            --output security-results/reports/semgrep-ai.json \
            . || true

      - name: "Semgrep AI AppSec SARIF"
        shell: bash
        run: |
          semgrep scan \
            --config ai-appsec-rules.yml \
            --exclude ".git" \
            --exclude "security-results" \
            --exclude "node_modules" \
            --exclude "vendor" \
            --exclude "dist" \
            --exclude "build" \
            --exclude ".venv" \
            --sarif \
            --output security-results/sarif/semgrep-ai.sarif \
            . || true

      # ==========================================================
      # DEPENDENCIAS / SCA
      # ==========================================================

      - name: "Python dependency scan - pip-audit"
        shell: bash
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt \
              --format json \
              --output security-results/reports/pip-audit.json || true
          else
            echo '{"dependencies":[]}' > security-results/reports/pip-audit.json
          fi

      - name: "Node dependency scan - npm audit"
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm audit --json > security-results/reports/npm-audit.json || true
          else
            echo '{}' > security-results/reports/npm-audit.json
          fi

      # ==========================================================
      # SECRETOS
      # ==========================================================

      - name: "Gitleaks secrets scan"
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # ==========================================================
      # TRIVY
      # ==========================================================

      - name: "Trivy SARIF"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          format: sarif
          output: security-results/sarif/trivy.sarif

      - name: "Trivy JSON"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: "."
          scanners: "vuln,secret,misconfig"
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          ignore-unfixed: true
          format: json
          output: security-results/reports/trivy.json

      # ==========================================================
      # CHECKOV
      # ==========================================================

      - name: "Checkov JSON"
        shell: bash
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --skip-path .git \
            --skip-path security-results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output json \
            > security-results/reports/checkov.json || true

      - name: "Checkov SARIF"
        shell: bash
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --skip-path .git \
            --skip-path security-results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output sarif \
            > security-results/sarif/checkov.sarif || true

      # ==========================================================
      # RUFF
      # ==========================================================

      - name: "Ruff quality scan"
        shell: bash
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            ruff check . \
              --exclude .git \
              --exclude security-results \
              --exclude node_modules \
              --exclude vendor \
              --exclude dist \
              --exclude build \
              --exclude .venv \
              --output-format json \
              > security-results/reports/ruff.json || true
          else
            echo "[]" > security-results/reports/ruff.json
          fi

      # ==========================================================
      # SARIF VÃLIDO
      # ==========================================================

      - name: "Ensure SARIF files are valid"
        shell: bash
        run: |
          for file in semgrep.sarif semgrep-ai.sarif trivy.sarif checkov.sarif; do
            path="security-results/sarif/$file"

            if [ -d "$path" ]; then
              rm -rf "$path"
            fi

            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi

            python -c "import json, pathlib; p=pathlib.Path('$path'); json.loads(p.read_text(errors='ignore'))" || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
          done

      # ==========================================================
      # SUBIR SARIF
      # ==========================================================

      - name: "Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/semgrep.sarif
          category: semgrep-general

      - name: "Upload Semgrep AI SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/semgrep-ai.sarif
          category: semgrep-ai-appsec

      - name: "Upload Trivy SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/trivy.sarif
          category: trivy

      - name: "Upload Checkov SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/checkov.sarif
          category: checkov

      # ==========================================================
      # REPORTE CENTRALIZADO
      # ==========================================================

      - name: "Build centralized security report"
        if: always()
        shell: bash
        run: |
          cat > https://urldefense.com/v3/__http://build_security_report.py__;!!P110LumUDw!8mvJ1OHDLR_jqq54YS0qeM3uNdCRogpz8NH21gnEzhoWim3M6NjO-M1VM3eUjMQFd9nSL_jn7bvWpdOFfQ9oicT9dTjvVw$  <<'PY'
          import json
          from pathlib import Path

          base = Path("security-results/reports")
          out = Path("security-results/REPORTE_CENTRALIZADO_SEGURIDAD.txt")

          findings = []

          def normalize_sev(sev):
              sev = (sev or "UNKNOWN").upper()
              mapping = {
                  "ERROR": "HIGH",
                  "WARNING": "MEDIUM",
                  "WARN": "MEDIUM",
                  "MODERATE": "MEDIUM",
                  "INFORMATIONAL": "INFO",
                  "INFORMATIVE": "INFO"
              }
              allowed = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
              return mapping.get(sev, sev if sev in allowed else "UNKNOWN")

          def add(category, severity, tool, location, detail):
              findings.append({
                  "category": category,
                  "severity": normalize_sev(severity),
                  "tool": tool,
                  "location": str(location or "?"),
                  "detail": str(detail or "").replace("\n", " ")[:1200]
              })

          def read_json(path):
              try:
                  if path.exists():
                      txt = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if txt:
                          return json.loads(txt)
              except Exception as e:
                  add("Pipeline / Parser", "UNKNOWN", "Report parser", https://urldefense.com/v3/__http://path.name__;!!P110LumUDw!8mvJ1OHDLR_jqq54YS0qeM3uNdCRogpz8NH21gnEzhoWim3M6NjO-M1VM3eUjMQFd9nSL_jn7bvWpdOFfQ9oicRm--i_kw$ , f"No se pudo leer JSON: {e}")
              return None

          def semgrep_category(check_id):
              cid = (check_id or "").lower()
              if cid.startswith("ai.") or "llm" in cid or "rag" in cid or "agent" in cid or "embedding" in cid:
                  return "AI / LLM / Agentic"
              if cid.startswith("web.") or "flask" in cid or "redirect" in cid:
                  return "CÃ³digo aplicativo"
              if cid.startswith("code."):
                  return "CÃ³digo aplicativo"
              if "secret" in cid:
                  return "Secretos"
              return "CÃ³digo aplicativo"

          for filename, tool in [
              ("semgrep.json", "Semgrep OSS"),
              ("semgrep-ai.json", "Semgrep AI AppSec")
          ]:
              data = read_json(base / filename)
              if data:
                  for r in data.get("results", []):
                      check_id = r.get("check_id", "")
                      extra = r.get("extra", {})
                      path = r.get("path", "?")
                      line = r.get("start", {}).get("line", "?")
                      add(
                          semgrep_category(check_id),
                          extra.get("severity", "UNKNOWN"),
                          tool,
                          f"{path}:{line}",
                          f"{check_id} - {extra.get('message','')}"
                      )

          data = read_json(base / "pip-audit.json")
          if data:
              for dep in data.get("dependencies", []):
                  for v in dep.get("vulns", []):
                      add(
                          "Dependencias / Python",
                          "HIGH",
                          "pip-audit",
                          dep.get("name", "?"),
                          f"{v.get('id','')} - {v.get('description','')}"
                      )

          data = read_json(base / "npm-audit.json")
          if data and isinstance(data, dict):
              for name, v in data.get("vulnerabilities", {}).items():
                  add(
                      "Dependencias / Node",
                      v.get("severity", "UNKNOWN"),
                      "npm audit",
                      name,
                      v.get("title", "Dependency vulnerability")
                  )

          data = read_json(base / "trivy.json")
          if data:
              for result in data.get("Results", []) or []:
                  target = result.get("Target", "?")

                  for v in result.get("Vulnerabilities", []) or []:
                      add(
                          "Dependencias / SCA",
                          v.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{v.get('PkgName','')} {v.get('InstalledVersion','')} - {v.get('VulnerabilityID','')} - {v.get('Title','')}"
                      )

                  for s in result.get("Secrets", []) or []:
                      add(
                          "Secretos",
                          s.get("Severity", "HIGH"),
                          "Trivy",
                          target,
                          s.get("Title", "Possible secret")
                      )

                  for m in result.get("Misconfigurations", []) or []:
                      category = "Docker / Contenedores" if "dockerfile" in target.lower() else "IaC / Cloud / Config"
                      add(
                          category,
                          m.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{m.get('ID','')} - {m.get('Title','')}"
                      )

          data = read_json(base / "checkov.json")
          if data:
              reports = data if isinstance(data, list) else [data]
              for rep in reports:
                  for r in rep.get("results", {}).get("failed_checks", []) or []:
                      file_path = r.get("file_path", "?")
                      category = "Docker / Contenedores" if "dockerfile" in file_path.lower() else "IaC / Cloud / Config"
                      lines = r.get("file_line_range") or ["?"]
                      add(
                          category,
                          "HIGH",
                          "Checkov",
                          f"{file_path}:{lines[0]}",
                          f"{r.get('check_id','')} - {r.get('check_name','')}"
                      )

          ruff = read_json(base / "ruff.json")
          quality = ruff if isinstance(ruff, list) else []

          categories = [
              "AI / LLM / Agentic",
              "CÃ³digo aplicativo",
              "Dependencias / Python",
              "Dependencias / Node",
              "Dependencias / SCA",
              "Secretos",
              "Docker / Contenedores",
              "IaC / Cloud / Config",
              "Pipeline / Parser"
          ]

          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {c: {s: 0 for s in severities} for c in categories}

          for f in findings:
              table.setdefault(f["category"], {s: 0 for s in severities})
              sev = f["severity"] if f["severity"] in severities else "UNKNOWN"
              table[f["category"]][sev] += 1

          order = {
              "CRITICAL": 0,
              "HIGH": 1,
              "MEDIUM": 2,
              "LOW": 3,
              "INFO": 4,
              "UNKNOWN": 5
          }

          findings.sort(key=lambda x: order.get(x["severity"], 99))
          critical_high = [f for f in findings if f["severity"] in ["CRITICAL", "HIGH"]]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
