name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]
      run_dast:
        description: "Run ZAP only when DAST_TARGET_URL secret exists"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  DEFAULT_FAIL_ON: "never"

jobs:
  codeql:
    name: "SAST — CodeQL security only"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

      - name: Upload CodeQL marker
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-marker
          path: .github
          if-no-files-found: ignore
          retention-days: 15

  ai-code-semgrep:
    name: "AI Code — Semgrep high-confidence rules"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create focused AI/security rules
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/ai_vuln_high_confidence.yml <<'YAML'
          rules:
            - id: ai-python-llm-response-to-eval
              languages: [python]
              severity: ERROR
              message: "AI RCE: salida/respuesta de LLM llega a eval/exec. Riesgo crítico de ejecución arbitraria."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: openai.ChatCompletion.create(...)
                    - pattern: $LLM.invoke(...)
                    - pattern: $CHAIN.invoke(...)
                    - pattern: $AGENT.run(...)
                    - pattern: $AGENT.invoke(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: eval(...)
                    - pattern: exec(...)
                    - pattern: compile(...)

            - id: ai-python-llm-response-to-shell
              languages: [python]
              severity: ERROR
              message: "AI command injection: salida/respuesta de LLM llega a shell/comandos."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: openai.ChatCompletion.create(...)
                    - pattern: $LLM.invoke(...)
                    - pattern: $CHAIN.invoke(...)
                    - pattern: $AGENT.run(...)
                    - pattern: $AGENT.invoke(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: subprocess.run($X, shell=True, ...)
                    - pattern: subprocess.Popen($X, shell=True, ...)
                    - pattern: os.system($X)
                    - pattern: os.popen($X)

            - id: ai-js-llm-response-to-eval
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI RCE: salida/respuesta de LLM llega a eval/new Function."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: $MODEL.invoke(...)
                    - pattern: $CHAIN.call(...)
                    - pattern: $AGENT.call(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: eval(...)
                    - pattern: new Function(...)

            - id: ai-js-llm-response-to-child-process
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI command injection: salida/respuesta de LLM llega a child_process."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: $MODEL.invoke(...)
                    - pattern: $CHAIN.call(...)
                    - pattern: $AGENT.call(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: child_process.exec(...)
                    - pattern: child_process.execSync(...)
                    - pattern: exec(...)
                    - pattern: execSync(...)

            - id: ai-python-user-controlled-prompt-no-guardrails
              languages: [python]
              severity: WARNING
              message: "Prompt injection probable: input HTTP entra a prompt LLM sin señales de guardrails/sanitización."
              metadata:
                category: security
                confidence: medium-high
                owasp_llm: LLM01 Prompt Injection
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: request.json[$KEY]
                    - pattern: request.form[$KEY]
                    - pattern: request.args[$KEY]
                    - pattern: request.get_json(...)
                    - pattern: flask.request.json[$KEY]
                    - pattern: fastapi.Request(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(..., messages=$MSG, ...)
                    - pattern: $CLIENT.responses.create(..., input=$MSG, ...)
                    - pattern: openai.ChatCompletion.create(..., messages=$MSG, ...)
                    - pattern: $LLM.invoke($MSG, ...)
                    - pattern: $CHAIN.invoke($MSG, ...)
              pattern-sanitizers:
                - pattern-either:
                    - pattern: sanitize_prompt(...)
                    - pattern: validate_prompt(...)
                    - pattern: guardrails.validate(...)
                    - pattern: $GUARD.validate(...)
                    - pattern: $MODERATION.create(...)

            - id: ai-python-system-prompt-returned-to-user
              languages: [python]
              severity: ERROR
              message: "Prompt leakage: system/developer prompt parece ser retornado directamente al usuario."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM07 System Prompt Leakage
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: $SYSTEM_PROMPT
                    - pattern: $DEVELOPER_PROMPT
                    - pattern: $SECRET_INSTRUCTIONS
              pattern-sinks:
                - pattern-either:
                    - pattern: return $X
                    - pattern: jsonify($X)
                    - pattern: Response($X, ...)

            - id: ai-python-dangerous-agent-tool-shell
              languages: [python]
              severity: ERROR
              message: "Agentic AI: tool/agente con shell habilitado. Requiere allowlist estricta o eliminación."
              metadata:
                category: security
                confidence: high
                owasp_llm: LLM06 Excessive Agency
              patterns:
                - pattern-either:
                    - pattern: Tool(..., func=$FUNC, ...)
                    - pattern: StructuredTool.from_function($FUNC, ...)
                    - pattern: initialize_agent(..., tools=$TOOLS, ...)
                    - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                - pattern-inside: |
                    def $FUNC(...):
                      ...
                - pattern-either:
                    - pattern: subprocess.run(..., shell=True, ...)
                    - pattern: subprocess.Popen(..., shell=True, ...)
                    - pattern: os.system(...)
                    - pattern: os.popen(...)

            - id: ai-python-openai-key-hardcoded
              languages: [python]
              severity: ERROR
              message: "Secreto AI hardcodeado: posible API key OpenAI/LLM en código."
              metadata:
                category: security
                confidence: high
              patterns:
                - pattern-regex: "(?i)(openai|anthropic|gemini|groq|mistral).{0,30}(api[_-]?key|token).{0,20}['\"][A-Za-z0-9_\\-]{20,}['\"]"

            - id: ai-js-openai-key-hardcoded
              languages: [javascript, typescript]
              severity: ERROR
              message: "Secreto AI hardcodeado: posible API key OpenAI/LLM en código."
              metadata:
                category: security
                confidence: high
              patterns:
                - pattern-regex: "(?i)(openai|anthropic|gemini|groq|mistral).{0,30}(api[_-]?key|token).{0,20}['\"][A-Za-z0-9_\\-]{20,}['\"]"

            - id: py-sql-injection-high-confidence
              languages: [python]
              severity: ERROR
              message: "SQL injection: input controlado llega a execute/raw SQL."
              metadata:
                category: security
                confidence: high
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: request.args[$KEY]
                    - pattern: request.form[$KEY]
                    - pattern: request.json[$KEY]
                    - pattern: request.get_json(...)
              pattern-sinks:
                - pattern-either:
                    - pattern: $CURSOR.execute($QUERY, ...)
                    - pattern: $DB.execute($QUERY, ...)
                    - pattern: $SESSION.execute($QUERY, ...)
              pattern-sanitizers:
                - pattern-either:
                    - pattern: text(...)
                    - pattern: bindparam(...)

            - id: js-nosql-injection-high-confidence
              languages: [javascript, typescript]
              severity: ERROR
              message: "NoSQL injection: body/query controlado llega a find/findOne sin validación."
              metadata:
                category: security
                confidence: high
              mode: taint
              pattern-sources:
                - pattern-either:
                    - pattern: req.body
                    - pattern: req.query
                    - pattern: req.params
              pattern-sinks:
                - pattern-either:
                    - pattern: $MODEL.find($X, ...)
                    - pattern: $MODEL.findOne($X, ...)
                    - pattern: $COLLECTION.find($X, ...)
                    - pattern: $COLLECTION.findOne($X, ...)
              pattern-sanitizers:
                - pattern-either:
                    - pattern: sanitize(...)
                    - pattern: mongoSanitize(...)
                    - pattern: validator.escape(...)
                    - pattern: zod.$SCHEMA.parse(...)
          YAML

      - name: Run focused Semgrep rules
        continue-on-error: true
        run: |
          semgrep --config .semgrep/local/ai_vuln_high_confidence.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude .venv \
            --exclude venv \
            --exclude dist \
            --exclude build \
            --sarif --output semgrep_ai_code.sarif . || true
          semgrep --config .semgrep/local/ai_vuln_high_confidence.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude .venv \
            --exclude venv \
            --exclude dist \
            --exclude build \
            --json --output semgrep_ai_code.json . || true

      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep_ai_code.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep AI Code","rules":[]}},"results":[]}]}' > semgrep_ai_code.sarif
          test -f semgrep_ai_code.json || echo '{"results":[]}' > semgrep_ai_code.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai_code.sarif
          category: ai-code-semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-semgrep-results
          path: |
            semgrep_ai_code.sarif
            semgrep_ai_code.json
            .semgrep/local/ai_vuln_high_confidence.yml
          retention-days: 30

  secrets:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 0 \
            --redact || true
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks.json \
            --exit-code 0 \
            --redact || true

      - name: Ensure artifacts exist
        if: always()
        run: |
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif
          test -f gitleaks.json || echo '[]' > gitleaks.json

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks.sarif
            gitleaks.json
          retention-days: 30

  sca:
    name: "SCA — pip-audit, npm audit, Trivy fs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Python audit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit.json --progress-spinner off || true
          elif [ -f pyproject.toml ]; then
            pip-audit --format json --output pip_audit.json --progress-spinner off || true
          else
            echo '{"dependencies":[]}' > pip_audit.json
          fi

      - name: npm audit
        continue-on-error: true
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm audit --audit-level=high --json > npm_audit.json || true
          elif [ -f package.json ]; then
            npm install --package-lock-only --ignore-scripts || true
            npm audit --audit-level=high --json > npm_audit.json || true
          else
            echo '{"vulnerabilities":{}}' > npm_audit.json
          fi

      - name: Trivy filesystem scan without trivy-action
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs /repo \
            --format sarif \
            --output /repo/trivy_fs.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            --skip-dirs /repo/.venv \
            --skip-dirs /repo/venv \
            --skip-dirs /repo/dist \
            --skip-dirs /repo/build || true
          docker run --rm -v "$PWD:/repo" aquasec/trivy:latest fs /repo \
            --format json \
            --output /repo/trivy_fs.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln,secret,misconfig \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            --skip-dirs /repo/.venv \
            --skip-dirs /repo/venv \
            --skip-dirs /repo/dist \
            --skip-dirs /repo/build || true

      - name: Ensure SCA artifacts exist
        if: always()
        run: |
          test -f pip_audit.json || echo '{"dependencies":[]}' > pip_audit.json
          test -f npm_audit.json || echo '{"vulnerabilities":{}}' > npm_audit.json
          test -f trivy_fs.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_fs.sarif
          test -f trivy_fs.json || echo '{}' > trivy_fs.json

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_fs.sarif
          category: trivy-fs

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit.json
            npm_audit.json
            trivy_fs.sarif
            trivy_fs.json
          retention-days: 30

  docker-security:
    name: "Docker — Hadolint, Checkov, Trivy, Dockle"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover Docker files
        id: dockerfiles
        shell: bash
        run: |
          mapfile -t files < <(find . -type f \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' -o -iname '*dockerfile*' \) \
            -not -path './.git/*' -not -path './node_modules/*' -not -path './.venv/*' -not -path './venv/*' | sort)
          printf '%s\n' "${files[@]}" > dockerfiles.txt
          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Hadolint Dockerfiles, only error-level findings
        if: steps.dockerfiles.outputs.has_docker == 'true'
        continue-on-error: true
        run: |
          echo '[]' > hadolint.json
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            docker run --rm -i hadolint/hadolint:latest-debian hadolint \
              --failure-threshold error \
              --format json - < "$file" > "hadolint_${file//[^A-Za-z0-9]/_}.json" || true
          done < dockerfiles.txt
          python3 - <<'PY'
          import json, pathlib
          all_items=[]
          for p in pathlib.Path('.').glob('hadolint_*.json'):
              try:
                  data=json.loads(p.read_text() or '[]')
                  if isinstance(data, list): all_items.extend(data)
              except Exception: pass
          pathlib.Path('hadolint.json').write_text(json.dumps(all_items, indent=2), encoding='utf-8')
          PY

      - name: Checkov Dockerfile scan, quiet
        if: steps.dockerfiles.outputs.has_docker == 'true'
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip checkov
          checkov -d . --framework dockerfile --quiet --soft-fail \
            --output sarif --output-file-path checkov_docker.sarif || true
          checkov -d . --framework dockerfile --quiet --soft-fail \
            --output json --output-file-path checkov_docker.json || true

      - name: Build Docker images for image scanning
        if: steps.dockerfiles.outputs.has_docker == 'true'
        continue-on-error: true
        run: |
          mkdir -p docker-build-logs
          i=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            dir="$(dirname "$file")"
            tag="local-security-scan:$i"
            docker build --pull --no-cache -f "$file" -t "$tag" "$dir" > "docker-build-logs/build_$i.log" 2>&1 || true
            echo "$tag" >> built_images.txt
            i=$((i+1))
          done < dockerfiles.txt

      - name: Trivy image scan without trivy-action
        if: steps.dockerfiles.outputs.has_docker == 'true'
        continue-on-error: true
        run: |
          echo '{"version":"2.1.0","runs":[]}' > trivy_image.sarif
          echo '[]' > trivy_image.json
          i=0
          if [ -f built_images.txt ]; then
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              docker image inspect "$tag" >/dev/null 2>&1 || continue
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:latest image "$tag" \
                --format sarif --output "/repo/trivy_image_$i.sarif" \
                --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln,secret,misconfig || true
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:latest image "$tag" \
                --format json --output "/repo/trivy_image_$i.json" \
                --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln,secret,misconfig || true
              i=$((i+1))
            done < built_images.txt
          fi
          python3 - <<'PY'
          import json, pathlib
          runs=[]; js=[]
          for p in pathlib.Path('.').glob('trivy_image_*.sarif'):
              try: runs += json.loads(p.read_text()).get('runs', [])
              except Exception: pass
          pathlib.Path('trivy_image.sarif').write_text(json.dumps({'version':'2.1.0','runs':runs}, indent=2), encoding='utf-8')
          for p in pathlib.Path('.').glob('trivy_image_*.json'):
              try: js.append(json.loads(p.read_text()))
              except Exception: pass
          pathlib.Path('trivy_image.json').write_text(json.dumps(js, indent=2), encoding='utf-8')
          PY

      - name: Dockle image scan, fatal/warn only
        if: steps.dockerfiles.outputs.has_docker == 'true'
        continue-on-error: true
        run: |
          echo '[]' > dockle.json
          i=0
          if [ -f built_images.txt ]; then
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              docker image inspect "$tag" >/dev/null 2>&1 || continue
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock goodwithtech/dockle:latest \
                --exit-code 0 --exit-level fatal --format json "$tag" > "dockle_$i.json" || true
              i=$((i+1))
            done < built_images.txt
          fi
          python3 - <<'PY'
          import json, pathlib
          out=[]
          for p in pathlib.Path('.').glob('dockle_*.json'):
              try: out.append(json.loads(p.read_text() or '{}'))
              except Exception: pass
          pathlib.Path('dockle.json').write_text(json.dumps(out, indent=2), encoding='utf-8')
          PY

      - name: Ensure Docker artifacts exist
        if: always()
        run: |
          test -f dockerfiles.txt || touch dockerfiles.txt
          test -f hadolint.json || echo '[]' > hadolint.json
          test -f checkov_docker.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov Docker","rules":[]}},"results":[]}]}' > checkov_docker.sarif
          test -f checkov_docker.json || echo '{}' > checkov_docker.json
          test -f trivy_image.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image.sarif
          test -f trivy_image.json || echo '[]' > trivy_image.json
          test -f dockle.json || echo '[]' > dockle.json

      - name: Upload Docker SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_docker.sarif
          category: checkov-docker

      - name: Upload Trivy image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_image.sarif
          category: trivy-image

      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            dockerfiles.txt
            built_images.txt
            docker-build-logs/
            hadolint.json
            checkov_docker.sarif
            checkov_docker.json
            trivy_image.sarif
            trivy_image.json
            dockle.json
          if-no-files-found: ignore
          retention-days: 30

  dast-zap:
    name: "DAST — ZAP optional"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_dast == 'true'
    steps:
      - name: Validate target
        id: validate
        env:
          DAST_TARGET_URL: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$DAST_TARGET_URL" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi

      - name: Run ZAP baseline
        if: steps.validate.outputs.skip != 'true'
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          report_html: zap_report.html
          report_json: zap_report.json
          cmd_options: "-l HIGH"
          fail_action: false
          allow_issue_writing: false

      - name: Ensure ZAP artifacts exist
        if: always()
        run: |
          test -f zap_report.html || echo '<html><body>ZAP skipped</body></html>' > zap_report.html
          test -f zap_report.json || echo '{"site":[]}' > zap_report.json

      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_report.json
          retention-days: 30

  security-report:
    name: "Security Report — Centralized non-blocking"
    runs-on: ubuntu-latest
    needs: [codeql, ai-code-semgrep, secrets, sca, docker-security, dast-zap]
    if: always()
    steps:
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Generate centralized report
        run: |
          mkdir -p security_reports
          python3 - <<'PY'
          import json, pathlib, re, os, sys
          from html import escape
          root=pathlib.Path('all_scan_results')
          out=pathlib.Path('security_reports'); out.mkdir(exist_ok=True)
          order=['critical','high','medium','low','info','unknown']
          grouped={s:[] for s in order}
          def norm(v):
              v=str(v or '').lower().strip()
              return {'error':'high','warning':'medium','note':'low','none':'info','critical':'critical','high':'high','medium':'medium','moderate':'medium','low':'low','info':'info','informational':'info','fatal':'critical'}.get(v,'unknown')
          def add(tool, sev, rule, msg, file='', line=''):
              s=norm(sev)
              grouped[s].append({'tool':tool or 'Unknown','severity':s,'rule':rule or 'unknown','message':str(msg or '').strip(),'file':str(file or ''),'line':str(line or '')})
          def parse_sarif(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for run in data.get('runs',[]):
                  tool=run.get('tool',{}).get('driver',{}).get('name',p.stem)
                  rule_levels={r.get('id','unknown'):r.get('defaultConfiguration',{}).get('level','') for r in run.get('tool',{}).get('driver',{}).get('rules',[])}
                  for res in run.get('results',[]):
                      rid=res.get('ruleId','unknown')
                      sev=res.get('level') or rule_levels.get(rid) or 'unknown'
                      msg=res.get('message',{}).get('text','')
                      file=''; line=''
                      locs=res.get('locations') or []
                      if locs:
                          phys=locs[0].get('physicalLocation',{})
                          file=phys.get('artifactLocation',{}).get('uri','')
                          line=phys.get('region',{}).get('startLine','')
                      add(tool, sev, rid, msg, file, line)
          def parse_semgrep_json(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for r in data.get('results',[]):
                  extra=r.get('extra',{})
                  sev=extra.get('severity','warning')
                  add('Semgrep AI Code', sev, r.get('check_id','semgrep'), extra.get('message',''), r.get('path',''), r.get('start',{}).get('line',''))
          def parse_pip_audit(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              deps=data.get('dependencies',[]) if isinstance(data,dict) else []
              for d in deps:
                  for v in d.get('vulns',[]) or []:
                      add('pip-audit','high',v.get('id','PYTHON_VULN'),f"{d.get('name')} {d.get('version','')}: {v.get('id')} {v.get('fix_versions','')}",'python-dependencies','')
          def parse_npm_audit(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              vulns=data.get('vulnerabilities',{}) if isinstance(data,dict) else {}
              for name,v in vulns.items():
                  sev=v.get('severity','unknown')
                  if norm(sev) in {'high','critical'}:
                      add('npm audit',sev,name,v.get('title') or f"{name}: {sev}",'package-lock.json','')
          def parse_gitleaks_json(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
              except Exception: return
              if isinstance(data,list):
                  for x in data:
                      add('Gitleaks','critical',x.get('RuleID','SECRET'),x.get('Description','Secret detected'),x.get('File',''),x.get('StartLine',''))
          def parse_hadolint(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
              except Exception: return
              for x in data if isinstance(data,list) else []:
                  add('Hadolint',x.get('level','info'),x.get('code','HADOLINT'),x.get('message',''),x.get('file','Dockerfile'),x.get('line',''))
          def parse_dockle(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
              except Exception: return
              items=data if isinstance(data,list) else [data]
              for doc in items:
                  for d in doc.get('details',[]) if isinstance(doc,dict) else []:
                      sev=d.get('level','info')
                      if norm(sev) in {'critical','high'}:
                          add('Dockle',sev,d.get('code','DOCKLE'),d.get('title',''),d.get('filename','Docker image'),d.get('line',''))
          for p in root.rglob('*.sarif'): parse_sarif(p)
          for p in root.rglob('semgrep_ai_code.json'): parse_semgrep_json(p)
          for p in root.rglob('pip_audit.json'): parse_pip_audit(p)
          for p in root.rglob('npm_audit.json'): parse_npm_audit(p)
          for p in root.rglob('gitleaks.json'): parse_gitleaks_json(p)
          for p in root.rglob('hadolint.json'): parse_hadolint(p)
          for p in root.rglob('dockle.json'): parse_dockle(p)
          seen=set(); dedup={s:[] for s in order}
          for s in order:
              for item in grouped[s]:
                  key=(item['tool'],item['rule'],item['file'],item['line'],item['message'][:160])
                  if key not in seen:
                      seen.add(key); dedup[s].append(item)
          grouped=dedup
          counts={s:len(grouped[s]) for s in order}
          total=sum(counts.values())
          names={'critical':'Críticos','high':'Altos','medium':'Medios','low':'Bajos','info':'Informativos','unknown':'Desconocidos'}
          lines=['REPORTE CENTRALIZADO DE SEGURIDAD','='*80,'','Perfil: bajo falso positivo, AI code vulnerable, Docker fuerte, no bloqueante.','','RESUMEN','-'*80,f'Total       : {total}',f'Críticos    : {counts["critical"]}',f'Altos       : {counts["high"]}',f'Medios      : {counts["medium"]}',f'Bajos       : {counts["low"]}',f'Info        : {counts["info"]}',f'Desconocido : {counts["unknown"]}','']
          for sev in order:
              lines += ['',f'HALLAZGOS {names[sev].upper()} ({counts[sev]})','-'*80]
              if not grouped[sev]: lines.append('Sin hallazgos.')
              for i,item in enumerate(grouped[sev],1):
                  lines += [f'{i}. Herramienta : {item["tool"]}',f'   Regla       : {item["rule"]}',f'   Archivo     : {item["file"]}',f'   Línea       : {item["line"]}',f'   Descripción : {item["message"]}','']
          (out/'security_report_es.txt').write_text('\n'.join(lines),encoding='utf-8')
          (out/'security_report_es.json').write_text(json.dumps({'summary':counts,'total':total,'findings':grouped},indent=2,ensure_ascii=False),encoding='utf-8')
          html=['<!doctype html><html><head><meta charset="utf-8"><title>Security Report</title><style>body{font-family:Arial;margin:24px}table{border-collapse:collapse;width:100%;margin-bottom:28px}td,th{border:1px solid #ddd;padding:7px;vertical-align:top}th{background:#eee}</style></head><body><h1>Reporte centralizado de seguridad</h1><p>Perfil bajo falso positivo, AI code vulnerable y Docker fuerte.</p><ul>']
          for sev in order: html.append(f'<li>{escape(names[sev])}: {counts[sev]}</li>')
          html.append('</ul>')
          for sev in order:
              html.append(f'<h2>{escape(names[sev])} ({counts[sev]})</h2><table><tr><th>Tool</th><th>Rule</th><th>File</th><th>Line</th><th>Description</th></tr>')
              for it in grouped[sev]: html.append(f'<tr><td>{escape(it["tool"])}</td><td>{escape(it["rule"])}</td><td>{escape(it["file"])}</td><td>{escape(str(it["line"]))}</td><td>{escape(it["message"])}</td></tr>')
              html.append('</table>')
          html.append('</body></html>')
          (out/'security_report_es.html').write_text('\n'.join(html),encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Add report to summary
        if: always()
        run: |
          echo "## Reporte centralizado de seguridad" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat security_reports/security_report_es.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports/
          retention-days: 30

      - name: Final verdict
        run: |
          python3 - <<'PY'
          import json, os, sys
          path='security_reports/security_report_es.json'
          if not os.path.exists(path): sys.exit(0)
          data=json.load(open(path,encoding='utf-8'))
          threshold='${{ github.event.inputs.fail_on }}' or os.environ.get('DEFAULT_FAIL_ON','never')
          threshold=threshold.lower()
          if threshold == 'never':
              print('Final verdict: never fail. Reports only.')
              sys.exit(0)
          order={'critical':5,'high':4,'medium':3,'low':2,'info':1,'unknown':0}
          blocking=sum(int(c) for sev,c in data.get('summary',{}).items() if order.get(sev,0) >= order.get(threshold,99))
          if blocking:
              print(f'Fail threshold reached: {blocking} finding(s) >= {threshold}')
              sys.exit(1)
          print('No blocking findings for configured threshold.')
          PY
