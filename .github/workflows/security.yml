                      if cname.endswith(".save_local") or cname.endswith(".load_local") or cname in {"FAISS.load_local", "Chroma.load_local"}:
                          add(py, line, "LOW", "AI_LOCAL_VECTORSTORE_PERSISTENCE_CONTEXTUAL", "AI / LLM / Agentic", "Persistencia/carga local de vectorstore detectada. Riesgo contextual: poisoning/manipulaciÃ³n local/deserializaciÃ³n si el storage es controlable o compartido.", src, "MEDIUM", "Bajado a LOW porque suele ser contextual si el path no es controlable.")

