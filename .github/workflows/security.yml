  docker:
    name: Docker — Dockerfile, imagen y misconfig importante
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile*') != ''
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint solo reglas importantes
        run: |
          docker run --rm -i hadolint/hadolint:latest hadolint \
            --failure-threshold error \
            --ignore DL3008 \
            --ignore DL3013 \
            --ignore DL3018 \
            Dockerfile > hadolint.txt 2>&1 || true
          cat hadolint.txt

      - name: Instalar Trivy CLI estable
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://urldefense.com/v3/__https://aquasecurity.github.io/trivy-repo/deb/public.key__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6rtdRLxlA$  | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://urldefense.com/v3/__https://aquasecurity.github.io/trivy-repo/deb__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6r6f6HXpg$  generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy

      - name: Trivy config Dockerfile — HIGH/CRITICAL
        run: |
          trivy config . \
            --severity "$TRIVY_SEVERITY" \
            --skip-dirs .github,node_modules,dist,build,coverage,.venv,venv,__pycache__ \
            --format sarif \
            --output trivy-config.sarif || true
          trivy config . \
            --severity "$TRIVY_SEVERITY" \
            --skip-dirs .github,node_modules,dist,build,coverage,.venv,venv,__pycache__ \
            --format json \
            --output trivy-config.json || true

      - name: Build imagen Docker para scan
        run: |
          docker build -t local/vulnerable-ai-chatbot:ci . || true

      - name: Trivy image si build fue exitoso
        run: |
          if docker image inspect local/vulnerable-ai-chatbot:ci >/dev/null 2>&1; then
            trivy image local/vulnerable-ai-chatbot:ci \
              --scanners vuln,secret \
              --severity "$TRIVY_SEVERITY" \
              --ignore-unfixed \
              --format sarif \
              --output trivy-image.sarif || true
            trivy image local/vulnerable-ai-chatbot:ci \
              --scanners vuln,secret \
              --severity "$TRIVY_SEVERITY" \
              --ignore-unfixed \
              --format json \
              --output trivy-image.json || true
          else
            echo '{"Results":[]}' > trivy-image.json
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy-image.sarif
          fi

      - name: Subir SARIF Trivy config/image
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-config.sarif
          category: trivy-docker-config

      - name: Subir SARIF Trivy image
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-docker-image

      - name: Subir artifacts Docker
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-results
          path: |
            hadolint.txt
            trivy-config.sarif
            trivy-config.json
            trivy-image.sarif
            trivy-image.json
          retention-days: 30

  dependency_review:
    name: Dependency Review — PR real
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review high/critical report only
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: critical
          warn-only: true
          comment-summary-in-pr: always

  report:
    name: Reporte final — hallazgos útiles
    runs-on: ubuntu-latest
    needs: [policy, codeql_python, codeql_js, semgrep, dependencies, docker]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Crear resumen legible sin romper Python
        shell: bash
        run: |
          cat > https://urldefense.com/v3/__http://make_summary.py__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6rxlD1mPQ$  <<'PY'
          import json
          import pathlib

          root = pathlib.Path('artifacts')
          rows = []

          def clean(s):
              return str(s or '').replace('\n', ' ').replace('|', '/').strip()[:350]

          def add(tool, area, severity, rule, path, line, msg):
              p = clean(path) or 'sin archivo'
              if p.startswith('.github/workflows/'):
                  return
              rows.append({
                  'severity': clean(severity).upper() or 'INFO',
                  'area': clean(area),
                  'tool': clean(tool),
                  'rule': clean(rule),
                  'path': p,
                  'line': clean(line),
                  'msg': clean(msg),
              })

          for jf in root.rglob('policy-results.json'):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  for f in data.get('findings', []):
                      add('Policy', f.get('area'), f.get('severity'), f.get('rule'), f.get('path'), '', f.get('message'))
              except Exception:
                  pass

          for jf in root.rglob('semgrep.json'):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  for r in data.get('results', []):
                      extra = r.get('extra', {})
                      meta = extra.get('metadata', {}) or {}
                      area = 'AI/LLM' if meta.get('area') == 'ai' or str(r.get('check_id','')).startswith('llm') else 'Codigo'
                      add('Semgrep', area, extra.get('severity'), r.get('check_id'), r.get('path'), (r.get('start') or {}).get('line'), extra.get('message'))
              except Exception:
                  pass

          for jf in root.rglob('pip-audit.json'):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  for dep in data.get('dependencies', []):
                      for v in dep.get('vulns', []):
                          add('pip-audit', 'Dependencias', 'HIGH', v.get('id'), 'requirements.txt', '', f"{dep.get('name')} {dep.get('version')} fixed={v.get('fix_versions')}")
              except Exception:
                  pass

          for jf in root.rglob('npm-audit.json'):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  vulns = data.get('vulnerabilities') or {}
                  for name, v in vulns.items():
                      sev = v.get('severity', 'INFO').upper()
                      if sev in ['HIGH', 'CRITICAL']:
                          add('npm audit', 'Dependencias', sev, name, 'package-lock.json', '', v.get('title') or v.get('name') or name)
              except Exception:
                  pass

          for jf in root.rglob('trivy-fs.json'):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  for res in data.get('Results', []):
                      target = res.get('Target')
                      for v in res.get('Vulnerabilities', []) or []:
                          add('Trivy FS', 'Dependencias/Secretos', v.get('Severity'), v.get('VulnerabilityID'), target, '', f"{v.get('PkgName')} {v.get('InstalledVersion')} fixed={v.get('FixedVersion')}")
                      for s in res.get('Secrets', []) or []:
                          add('Trivy Secret', 'Secretos', s.get('Severity'), s.get('RuleID'), target, s.get('StartLine'), s.get('Title'))
              except Exception:
                  pass

          for jf in list(root.rglob('trivy-config.json')) + list(root.rglob('trivy-image.json')):
              try:
                  data = json.loads(jf.read_text(errors='ignore'))
                  tool = 'Trivy Docker'
                  for res in data.get('Results', []):
                      target = res.get('Target')
                      for m in res.get('Misconfigurations', []) or []:
                          sev = m.get('Severity')
                          if sev in ['HIGH', 'CRITICAL']:
                              add(tool, 'Docker', sev, m.get('ID') or m.get('AVDID'), target, m.get('CauseMetadata', {}).get('StartLine'), m.get('Message') or m.get('Title'))
                      for v in res.get('Vulnerabilities', []) or []:
                          add(tool, 'Docker/Image', v.get('Severity'), v.get('VulnerabilityID'), target, '', f"{v.get('PkgName')} {v.get('InstalledVersion')} fixed={v.get('FixedVersion')}")
                      for s in res.get('Secrets', []) or []:
                          add(tool, 'Docker/Secretos', s.get('Severity'), s.get('RuleID'), target, s.get('StartLine'), s.get('Title'))
              except Exception:
                  pass

          sev_order = {'CRITICAL':0, 'ERROR':1, 'HIGH':2, 'WARNING':3, 'MEDIUM':4, 'LOW':5, 'INFO':6}
          seen = set()
          unique = []
          for r in sorted(rows, key=lambda x: (sev_order.get(x['severity'], 9), x['area'], x['path'], x['rule'])):
              key = (r['tool'], r['rule'], r['path'], r['line'], r['msg'])
              if key not in seen:
                  seen.add(key)
                  unique.append(r)

          md = pathlib.Path('https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6oC3EbjXQ$ ')
          with md.open('w', encoding='utf-8') as f:
              f.write('# Security Pipeline Preciso v2 — resumen útil\n\n')
              f.write('Excluye `.github/workflows/**`. Mantiene policy de versiones/pinning, SAST, AI/LLM, dependencias, secretos y Docker.\n\n')
              f.write(f'Total resumido: **{len(unique)}**\n\n')
              if not unique:
                  f.write('Sin hallazgos útiles en artifacts resumidos. Revisa Code scanning para resultados SARIF completos.\n')
              else:
                  f.write('| Severidad | Área | Herramienta | Regla | Archivo | Línea | Mensaje |\n')
                  f.write('|---|---|---|---|---|---:|---|\n')
                  for r in unique[:120]:
                      f.write('| {severity} | {area} | {tool} | `{rule}` | `{path}` | {line} | {msg} |\n'.format(**r))
                  if len(unique) > 120:
                      f.write('\nMostrando 120 de {} hallazgos. Ver artifacts completos.\n'.format(len(unique)))
          print(md.read_text(encoding='utf-8'))
          PY
          python3 https://urldefense.com/v3/__http://make_summary.py__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6rxlD1mPQ$ 
          cat https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6oC3EbjXQ$  >> "$GITHUB_STEP_SUMMARY"

      - name: Subir resumen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6oC3EbjXQ$ 
          retention-days: 30
