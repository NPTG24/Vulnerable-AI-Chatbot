              tool_status.append({"artifact": str(path), "tool": "Gitleaks", "findings": count})

          for path, data in load_all("checkov_results.json"):
              count = 0
              reports = data if isinstance(data, list) else [data]
              for report in reports:
                  if not isinstance(report, dict):
                      continue
                  failed = report.get("results", {}).get("failed_checks", []) if isinstance(report.get("results", {}), dict) else []
                  for check in failed:
                      count += 1
                      fp = check.get("file_path", "?")
                      cat = "Docker / Contenedores" if "dockerfile" in str(fp).lower() else "IaC / Cloud / Config"
                      lr = check.get("file_line_range") or ["?"]
                      add(cat, "HIGH", "Checkov", f"{fp}:{lr[0]}", check.get("check_name", ""), check.get("check_id", ""), str(path), "; validar contexto antes de tratarlos como vulnerabilidad explotable.")
              tool_status.append({"artifact": str(path), "tool": "Checkov", "findings": count})

          for path, data in load_all("hadolint_results.json"):
              count = 0
              if isinstance(data, list):
                  for item in data:
                      count += 1
                      dockerfile = item.get("file") or item.get("filename") or item.get("path") or "Dockerfile"
                      line = item.get("line") or item.get("lineNumber") or item.get("startLine") or 1
                      loc = item.get("location") or f"{dockerfile}:{line}"
                      detalle = item.get("message") or item.get("description") or "Hallazgo Hadolint"
                      add("Docker / Contenedores", item.get("level", "warning"), "Hadolint", loc, detalle, item.get("code", ""), str(path), "Recomendacion: Corrija este hallazgo siguiendo las buenas practicas de construccion de imagenes Docker. El archivo afectado y la linea se muestran en la ubicacion del hallazgo.")
              tool_status.append({"artifact": str(path), "tool": "Hadolint", "findings": count})

          for path, data in load_all("ruff_dev_quality_findings.json"):
              count = 0
              for item in data.get("findings", []) if isinstance(data, dict) else []:
                  count += 1
                  quality.append(item)
              tool_status.append({"artifact": str(path), "tool": "Ruff", "findings": count, "type": "quality"})

          recommendation_by_category = {
              "AI / LLM / Agentic": [
                  "Implementar defensas contra prompt injection: separacion estricta de instrucciones del sistema, delimitacion de contexto, validacion de entrada y filtros de salida.",
                  "Aplicar autorizacion sobre documentos y datos recuperados antes de entregarlos al modelo.",
                  "Definir limites de costo, rate limiting, monitoreo y logging seguro para llamadas a proveedores de IA."
              ],
              "Dependencias / SCA": [
