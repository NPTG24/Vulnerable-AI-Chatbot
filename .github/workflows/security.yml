                  for item in cat_findings:
                      tools = item.get("tools") or [item.get("tool")]
                      tools = [t for t in tools if t]
                      main_tool = item.get("tool") or (tools[0] if tools else "No disponible")
                      other_tools = [t for t in tools if t != main_tool]

                      lines.append("")
                      lines.append(f"{idx}. [{item['severity']}] {item['rule']}")
                      lines.append(f"   Herramienta principal : {main_tool}")
