name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
      fail_on:
        description: "Security gate: never, critical, high"
        required: false
        default: "never"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Dependencies — Policy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning and resolvable versions
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import tempfile

          findings = []
          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(severity, rule, file_path, line, message, kind="vulnerability"):
              findings.append({
                  "tool": "Dependency Policy",
                  "category": "Dependencias / Policy",
                  "severity": severity,
                  "rule": rule,
                  "file": str(file_path),
                  "line": int(line or 1),
                  "message": message,
                  "kind": kind
              })

          skip_req = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact_req = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")
          any_pkg = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*([<>=!~]=?|===)?\s*([^;#\s]+)?")
          pinned_python = []

          req_files = sorted(set(pathlib.Path(".").glob("requirements*.txt")) | set(pathlib.Path(".").glob("**/requirements*.txt")))

          for req in req_files:
              if skip(req):
                  continue

              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue

                  clean = line.split(" #", 1)[0].strip()
                  exact = exact_req.match(clean)

                  if not exact:
                      parsed = any_pkg.match(clean)
                      if parsed:
                          operator = parsed.group(3)
                          version = parsed.group(4)
                          if not operator or not version:
                              add("MEDIUM", "PYTHON_DEPENDENCY_WITHOUT_VERSION", req, lineno, f"Dependencia Python sin version declarada: {line}")
                          elif operator != "==":
                              add("MEDIUM", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", req, lineno, f"Dependencia Python sin pin exacto ==: {line}", "hygiene")
                          else:
                              add("MEDIUM", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Dependencia Python con formato no validable: {line}", "hygiene")
                      else:
                          add("MEDIUM", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Linea de dependencia Python no validable: {line}", "hygiene")
                      continue

                  pinned_python.append((exact.group(1), exact.group(3), req, lineno, clean))

          for name, version, req, lineno, clean in pinned_python:
              with tempfile.TemporaryDirectory() as tmpdir:
                  cmd = [sys.executable, "-m", "pip", "download", "--no-deps", "--disable-pip-version-check", "-d", tmpdir, f"{name}=={version}"]
                  try:
                      proc = subprocess.run(cmd, text=True, capture_output=True, timeout=90)
                  except subprocess.TimeoutExpired:
                      add("INFO", "PYTHON_VERSION_VALIDATION_TIMEOUT", req, lineno, f"Timeout validando version Python: {clean}", "hygiene")
                      continue

                  output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                  if proc.returncode == 0:
                      continue
                  if "no matching distribution found" in output or "could not find a version" in output:
                      add("HIGH", "PYTHON_PACKAGE_OR_VERSION_NOT_RESOLVABLE", req, lineno, f"Paquete o version Python no existe/no es resoluble: {clean}")
                  elif any(x in output for x in ["temporary failure", "connection", "timed out", "proxy", "ssl", "network"]):
                      add("INFO", "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE", req, lineno, f"No se pudo validar por red/proxy/SSL: {clean}", "hygiene")
                  else:
                      add("INFO", "PYTHON_VERSION_VALIDATION_INCONCLUSIVE", req, lineno, f"Validacion inconclusa de version Python: {clean}", "hygiene")

          exact_npm = re.compile(r"^\d+\.\d+\.\d+([-+][0-9A-Za-z.-]+)?$")

          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip(package_json):
                  continue

              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              for section in ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict):
                      continue
                  for dep_name, dep_version in deps.items():
                      version = str(dep_version).strip()
                      if version.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                          add("INFO", "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY", package_json, 1, f"Dependencia npm local/workspace no validada: {dep_name}@{version}", "hygiene")
                      elif version in {"", "*", "latest"}:
                          add("MEDIUM", "NPM_DEPENDENCY_WITHOUT_VERSION", package_json, 1, f"Dependencia npm sin version exacta: {dep_name}@{version}")
                      elif not exact_npm.match(version):
                          add("MEDIUM", "NPM_DEPENDENCY_NOT_EXACT_PIN", package_json, 1, f"Dependencia npm sin version exacta: {dep_name}@{version}", "hygiene")
                      else:
                          proc = subprocess.run(["npm", "view", f"{dep_name}@{version}", "version", "--json"], text=True, capture_output=True, timeout=90)
                          output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                          if proc.returncode != 0 and ("notarget" in output or "no matching version found" in output or "404" in output):
                              add("HIGH", "NPM_PACKAGE_OR_VERSION_NOT_RESOLVABLE", package_json, 1, f"Paquete o version npm no existe/no es resoluble: {dep_name}@{version}")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool": "Dependency Policy", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []

          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          for item in findings:
              rid = item["rule"]
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": item["message"]},
                  "defaultConfiguration": {"level": level(item["severity"])}
              })
              results.append({
                  "ruleId": rid,
                  "level": level(item["severity"]),
                  "message": {"text": item["message"]},
                  "properties": {"kind": item.get("kind", "vulnerability"), "category": item.get("category", "Dependencias / Policy")},
                  "locations": [{"physicalLocation": {"artifactLocation": {"uri": item["file"]}, "region": {"startLine": item["line"]}}}]
              })

          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Dependency Policy", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  code-ai-static:
    name: "AI/App Code — Precise Static Analyzer"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run precise Python AI/AppSec analyzer
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import ast
          import json
          import pathlib
          import re

          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}
          findings = []

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(file, line, severity, rule, category, message, snippet=""):
              findings.append({
                  "tool": "AI/App Static Analyzer",
                  "file": str(file),
                  "line": int(line or 1),
                  "severity": severity,
                  "rule": rule,
                  "category": category,
                  "message": message,
                  "snippet": snippet[:500]
              })

          def line_text(lines, line):
              if 1 <= int(line or 1) <= len(lines):
                  return lines[int(line or 1) - 1].strip()
              return ""

          def call_name(node):
              if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAGf1yixkA$ ):
                  return call_name(node.func)
              if isinstance(node, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAH6gG7D7A$ ):
                  return https://urldefense.com/v3/__http://node.id__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAGepioqoQ$ 
              if isinstance(node, ast.Attribute):
                  base = call_name(node.value)
                  return f"{base}.{node.attr}" if base else node.attr
              if isinstance(node, ast.Subscript):
                  return call_name(node.value)
              return ""

          def const_str(node):
              if isinstance(node, ast.Constant) and isinstance(node.value, str):
                  return node.value
              return None

          def env_key(target):
              if isinstance(target, ast.Subscript) and call_name(target.value) == "os.environ":
                  return const_str(target.slice)
              return None

          for py in pathlib.Path(".").rglob("*.py"):
              if skip(py):
                  continue

              text = py.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()

              try:
                  tree = ast.parse(text)
              except SyntaxError as error:
                  add(py, error.lineno or 1, "MEDIUM", "PYTHON_SYNTAX_ERROR", "Código aplicativo", f"SyntaxError impide analizar el archivo: {error}", "")
                  continue

              has_flask_route = any("@app.route" in x or ".route(" in x for x in lines)
              has_request_input = any("request.args.get" in x or "request.form.get" in x or "request.get_json" in x or "request.json" in x for x in lines)
              has_rag = "RetrievalQA" in text or "FAISS" in text or "PyPDFLoader" in text

              if has_flask_route and has_request_input and has_rag:
                  add(py, 1, "HIGH", "AI_FLASK_RAG_ATTACK_SURFACE", "AI / LLM / Agentic", "Superficie AI/RAG expuesta por Flask: hay rutas, input de request y componentes RAG/LLM en el mismo archivo. Revisar prompt injection, auth, rate limiting y aislamiento de datos.", "")

              for node in ast.walk(tree):
                  line = getattr(node, "lineno", 1)
                  src = line_text(lines, line)

                  if isinstance(node, ast.FunctionDef):
                      if any(isinstance(dec, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAGf1yixkA$ ) and ".route" in call_name(dec) for dec in node.decorator_list):
                          add(py, line, "INFO", "WEB_FLASK_ROUTE_AUTH_REVIEW", "Código aplicativo", f"Ruta Flask detectada en {https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAFDjMrJbA$ }(). Confirmar autenticación/autorización si expone datos o acciones.", src)

                  if isinstance(node, ast.Assign):
                      # request input variables
                      value_dump = ast.dump(node.value)
                      value_call = call_name(node.value)
                      request_based = "request." in value_call or "request." in value_dump

                      if request_based:
                          for target in node.targets:
                              if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAH6gG7D7A$ ):
                                  add(py, line, "INFO", "WEB_REQUEST_INPUT_ENTRYPOINT", "Código aplicativo", f"Entrada controlada por usuario asignada a '{https://urldefense.com/v3/__http://target.id__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEm1SXPKg$ }'.", src)

                      # sensitive_keywords
                      for target in node.targets:
                          if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAH6gG7D7A$ ) and "sensitive" in target.id.lower() and isinstance(node.value, (ast.List, ast.Tuple)):
                              words = []
                              for item in node.value.elts:
                                  if isinstance(item, ast.Constant):
                                      words.append(str(item.value).lower())
                              if any(w in {"secret", "secrets", "password", "passwords", "credential", "credentials", "key", "keys", "token"} for w in words):
                                  add(py, line, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Prompt injection / bypass: blacklist de keywords sensibles usada como control de seguridad. Es evadible con encoding, separación de caracteres, idioma o reformulación.", src)

                      # os.environ mutable security state
                      for target in node.targets:
                          key = env_key(target)
                          if key and any(k in key.lower() for k in ["reveal", "secret", "owner", "token", "key", "password"]):
                              add(py, line, "MEDIUM", "AI_MUTABLE_SECURITY_STATE_IN_ENV", "AI / LLM / Agentic", f"Estado de seguridad/sensibilidad guardado en os.environ['{key}']. Si cambia por flujo de usuario puede generar bypass.", src)

                  if isinstance(node, ast.If):
                      condition = src.lower()
                      if ("forget" in condition and "rules" in condition) or ("new" in condition and "operator" in condition):
                          add(py, line, "HIGH", "AI_PROMPT_TRIGGERED_SECURITY_FLAG_BYPASS", "AI / LLM / Agentic", "Prompt injection/backdoor: condición textual permite activar comportamiento sensible o cambiar flags de seguridad.", src)

                      if "os.environ" in condition and "yes" in condition and any(x in condition for x in ["secret", "owner", "reveal", "token", "key"]):
                          add(py, line, "HIGH", "AI_ENV_FLAG_AUTHORIZATION_GATE", "AI / LLM / Agentic", "Gate de autorización/divulgación sensible depende de os.environ y valor mutable. Riesgo de bypass de política.", src)

                      if "<script>" in condition:
                          add(py, line, "MEDIUM", "WEB_WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "Código aplicativo", "Mitigación XSS débil: solo bloquea literal '<script>'. No reemplaza sanitización/encoding contextual.", src)

                  if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAGf1yixkA$ ):
                      cname = call_name(node)

                      if cname == "RetrievalQA.from_chain_type" or cname.endswith(".RetrievalQA.from_chain_type"):
                          add(py, line, "MEDIUM", "AI_RAG_RETRIEVALQA_CHAIN", "AI / LLM / Agentic", "Uso de RetrievalQA/RAG detectado. Revisar prompt injection, autorización sobre documentos, aislamiento por tenant y filtrado de fuentes.", src)
                          if "chain_type=\"stuff\"" in src or "chain_type='stuff'" in src:
                              add(py, line, "MEDIUM", "AI_RAG_STUFF_CHAIN_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", "RAG chain_type='stuff': contenido recuperado se inserta directo en el prompt; riesgo de prompt injection desde documentos.", src)

                      if cname in {"PyPDFLoader", "UnstructuredFileLoader", "Docx2txtLoader", "CSVLoader", "TextLoader", "DirectoryLoader"}:
                          add(py, line, "MEDIUM", "AI_DOCUMENT_LOADER_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", f"Loader de documento {cname} detectado. Validar origen, tipo, tamaño, sandboxing y prompt injection desde documentos.", src)

                      if cname in {"FAISS.from_documents", "Chroma.from_documents"}:
                          add(py, line, "MEDIUM", "AI_VECTORSTORE_FROM_DOCUMENTS", "AI / LLM / Agentic", "Vectorstore desde documentos detectado. Revisar data poisoning, PII, secretos embebidos y autorización de recuperación.", src)

                      if cname.endswith(".save_local") or cname.endswith(".load_local") or cname == "FAISS.load_local":
                          add(py, line, "MEDIUM", "AI_LOCAL_VECTORSTORE_PERSISTENCE", "AI / LLM / Agentic", "Persistencia/carga local de vectorstore detectada. Revisar poisoning, manipulación local, aislamiento y deserialización insegura.", src)

                      if cname in {"OpenAI", "OpenAIEmbeddings", "ChatOpenAI"}:
                          severity = "MEDIUM" if has_flask_route else "INFO"
                          add(py, line, severity, "AI_PROVIDER_USAGE_COST_AND_DATA_BOUNDARY", "AI / LLM / Agentic", f"Uso de {cname} detectado. Revisar API key, límites de costo, rate limiting, logging seguro y datos sensibles enviados al proveedor.", src)

                      if cname.endswith(".run") or cname.endswith(".invoke") or cname.endswith(".predict") or cname.endswith(".generate"):
                          arg_names = []
                          for arg in node.args:
                              if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAH6gG7D7A$ ):
                                  arg_names.append(https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAF--NOr2w$ )
                          if any(x in {"query", "user_query", "prompt", "msg", "message", "search_query"} for x in arg_names):
                              add(py, line, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", f"Prompt injection: variable potencialmente controlada por usuario llega a {cname}().", src)

                      if cname == "time.sleep":
                          seconds = None
                          if node.args and isinstance(node.args[0], ast.Constant) and isinstance(node.args[0].value, (int, float)):
                              seconds = node.args[0].value
                          if seconds and seconds >= 30:
                              add(py, line, "MEDIUM", "WEB_ROUTE_LONG_SLEEP_DOS", "Código aplicativo", f"time.sleep({seconds}) detectado; si está en ruta HTTP bloquea workers y puede causar DoS.", src)

                      if cname.endswith(".lower"):
                          if "request." in text[: text.find(src) if src in text else len(text)]:
                              add(py, line, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "Código aplicativo", "Uso de .lower() sobre dato que puede venir de request. Si el parámetro falta puede causar 500/DoS.", src)

              # Regex de respaldo para cosas multilinea o difíciles para AST.
              for idx, raw in enumerate(lines, 1):
                  line = raw.strip()

                  if "qa.run(" in line or ".run(query" in line or ".run(user_query" in line:
                      add(py, idx, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", "Prompt injection: query/input llega a qa.run()/chain.run().", line)

                  if "request.args.get" in line and "msg" in line:
                      add(py, idx, "INFO", "WEB_REQUEST_MSG_ENTRYPOINT", "Código aplicativo", "Entrada de usuario desde request.args.get('msg').", line)

                  if "reveal_secret" in line or "reveal_owner" in line:
                      if "os.environ" in line:
                          add(py, idx, "MEDIUM", "AI_REVEAL_FLAG_MUTABLE_ENV", "AI / LLM / Agentic", "Flag reveal_* en os.environ detectado. Revisar bypass de política y exposición de secretos/owner.", line)

                  if "if '<script>' in" in line or 'if "<script>" in' in line:
                      add(py, idx, "MEDIUM", "WEB_WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "Código aplicativo", "Mitigación XSS débil: solo filtra literal <script>.", line)

              if has_flask_route and has_rag:
                  expensive_terms = ["OpenAIEmbeddings", "FAISS.from_documents", "save_local", "FAISS.load_local", "RetrievalQA.from_chain_type"]
                  count = sum(1 for term in expensive_terms if term in text)
                  if count >= 3:
                      add(py, 1, "MEDIUM", "AI_EXPENSIVE_RAG_REBUILT_PER_REQUEST", "AI / LLM / Agentic", "Posible DoS/costo: el archivo combina rutas Flask y reconstrucción de embeddings/vectorstore/RAG. Revisar cache, rate limiting y límites de costo.", "")

          # deduplicate
          unique = {}
          for item in findings:
              key = (item["file"], item["line"], item["rule"], item["message"])
              unique[key] = item
          findings = list(unique.values())

          pathlib.Path("ai_app_static_findings.json").write_text(json.dumps({"tool": "AI/App Static Analyzer", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []

          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": f["message"]},
                  "defaultConfiguration": {"level": level(f["severity"])}
              })
              results.append({
                  "ruleId": rid,
                  "level": level(f["severity"]),
                  "message": {"text": f["message"]},
                  "properties": {
                      "kind": "vulnerability",
                      "category": f["category"],
                      "snippet": f["snippet"],
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": f["file"]},
                          "region": {"startLine": f["line"]}
                      }
                  }]
              })

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "AI/App Static Analyzer", "rules": list(rules.values())}},
                  "results": results
              }]
          }

          pathlib.Path("ai_app_static.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"AI/App static analyzer findings: {len(findings)}")
          PY

      - name: Ensure AI/App static artifacts exist
