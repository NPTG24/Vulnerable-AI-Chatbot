name: Security Pipeline Preciso v2

# ==============================================================================
# SECURITY PIPELINE — CODE-FIRST / AI-FIRST / SUPPLY-CHAIN ÚTIL
# ==============================================================================
# Objetivo:
# - Revisar código real de desarrolladores, NO .github/workflows/**.
# - Mantener controles útiles de dependencias, versiones Python/Node/npm y pinning.
# - Mostrar Docker importante sin relleno: USER no-root, WORKDIR absoluto, imagen base,
#   secretos, vulnerabilidades HIGH/CRITICAL y misconfig relevantes.
# - Detectar fallos AI/LLM en PoC vulnerable con reglas Semgrep locales.
# - Reducir falsos positivos: sin Scorecard en el reporte principal; sin alerts contra security.yml.
#
# Guardar como: .github/workflows/security.yml
# Modo: policy gate falla si no cumple estándares mínimos; vulnerabilidades/reportes no bloquean.
# ==============================================================================
on:
  workflow_dispatch:
    inputs:
      enforce_policy:
        description: "Fallar si dependencias/versiones/pinning/Docker mínimo no cumplen"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
  push:
    branches: [main, master]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - ".github/workflows/**"
      - "**/*.md"
      - "docs/**"

concurrency:
  group: security-preciso-v2-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Versiones mínimas/política. Ajustables.
env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  MIN_PYTHON_MAJOR: "3"
  MIN_PYTHON_MINOR: "11"
  MIN_NODE_MAJOR: "20"
  MIN_NPM_MAJOR: "10"
  TRIVY_SEVERITY: "HIGH,CRITICAL"

jobs:
  policy:
    name: Policy — versiones, manifests y pinning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node si existe package.json
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Comprobar versiones y política de dependencias
        id: policy_check
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          import json, os, pathlib, re, sys

          enforce = os.getenv("ENFORCE_POLICY", "true").lower() == "true"
          root = pathlib.Path('.')
          findings = []

          def add(sev, area, rule, path, msg):
              findings.append({"severity": sev, "area": area, "rule": rule, "path": str(path), "message": msg})

          def parse_version_tuple(s):
              m = re.search(r'(\d+)\.(\d+)', s or '')
              return (int(m.group(1)), int(m.group(2))) if m else None

          # Python runtime usado por el pipeline.
          pyv = sys.version.split()[0]
          got = parse_version_tuple(pyv)
          want = (int(os.getenv('MIN_PYTHON_MAJOR', '3')), int(os.getenv('MIN_PYTHON_MINOR', '11')))
          if got and got < want:
              add('ERROR', 'Base', 'python-version-min', 'runtime', f'Python {pyv} menor que {want[0]}.{want[1]}')

          # Archivos esperados para Python.
          req = root / 'requirements.txt'
          pyproject = root / 'pyproject.toml'
          if not req.exists() and not pyproject.exists():
              add('WARNING', 'Dependencias', 'python-manifest-missing', '.', 'No existe requirements.txt ni pyproject.toml')

          # Pinning Python: se exige == o hashes. Permite comentarios, opciones pip y git editable.
          if req.exists():
              for i, raw in enumerate(req.read_text(errors='ignore').splitlines(), 1):
                  line = raw.strip()
                  if not line or line.startswith('#') or line.startswith('-'):
                      continue
                  if line.startswith(('git+', 'http://', 'https://')):
                      if '@' not in line and '#egg=' not in line:
                          add('ERROR', 'Dependencias', 'python-vcs-unpinned', f'requirements.txt:{i}', 'Dependencia VCS/URL sin referencia clara')
                      continue
                  if '==' not in line and ' @ ' not in line:
                      add('ERROR', 'Dependencias', 'python-dependency-not-pinned', f'requirements.txt:{i}', f'Dependencia no fijada con ==: {line}')
                  if any(op in line for op in ['>=', '<=', '~=', '>', '<']) and '==' not in line:
                      add('ERROR', 'Dependencias', 'python-version-range', f'requirements.txt:{i}', f'Rango de versión no determinístico: {line}')

          # Node/npm.
          pkg = root / 'package.json'
          lock = root / 'package-lock.json'
          if pkg.exists():
              try:
                  data = json.loads(pkg.read_text(errors='ignore'))
              except Exception as e:
                  add('ERROR', 'Dependencias', 'package-json-invalid', 'package.json', str(e))
                  data = {}

              if not lock.exists():
                  add('ERROR', 'Dependencias', 'npm-lockfile-missing', 'package-lock.json', 'package.json existe pero falta package-lock.json')

              engines = data.get('engines') or {}
              node_engine = str(engines.get('node', ''))
              if node_engine and re.search(r'(\d+)', node_engine):
                  m = re.search(r'(\d+)', node_engine)
                  if int(m.group(1)) < int(os.getenv('MIN_NODE_MAJOR', '20')):
                      add('ERROR', 'Base', 'node-engine-old', 'package.json', f'engines.node={node_engine} menor que Node {os.getenv("MIN_NODE_MAJOR")}')
              else:
                  add('WARNING', 'Base', 'node-engine-missing', 'package.json', 'No se define engines.node')

              for section in ['dependencies', 'devDependencies', 'optionalDependencies']:
                  deps = data.get(section) or {}
                  for name, ver in deps.items():
                      ver = str(ver)
                      if ver.startswith(('^', '~', '>=', '>', '<=', '<', '*')):
                          add('ERROR', 'Dependencias', 'npm-dependency-not-exact', f'package.json:{section}', f'{name}: {ver} no es versión exacta')
                      if ver in ['latest', '*']:
                          add('ERROR', 'Dependencias', 'npm-dependency-floating', f'package.json:{section}', f'{name}: {ver} es flotante')

          # Dockerfile mínimo: sí muestra problemas importantes, sin ruido de estilo.
          dockerfiles = list(root.glob('Dockerfile*'))
          for df in dockerfiles:
              text = df.read_text(errors='ignore').splitlines()
              clean = [l.strip() for l in text if l.strip() and not l.strip().startswith('#')]
              if clean:
                  first_from = next((l for l in clean if l.upper().startswith('FROM ')), '')
                  if ':latest' in first_from or re.match(r'FROM\s+\S+\s*$', first_from, re.I):
                      add('ERROR', 'Docker', 'docker-base-image-not-pinned', df, f'Imagen base no fijada claramente: {first_from}')
              if not any(l.upper().startswith('USER ') for l in clean):
                  add('ERROR', 'Docker', 'docker-missing-non-root-user', df, 'Dockerfile no define USER no-root')
              for n, l in enumerate(text, 1):
                  s = l.strip()
                  if s.upper().startswith('WORKDIR '):
                      wd = s.split(None, 1)[1].strip()
                      if not wd.startswith('/'):
                          add('ERROR', 'Docker', 'docker-workdir-not-absolute', f'{df}:{n}', f'WORKDIR debe ser absoluto: {wd}')
                  if re.search(r'(?i)ENV\s+.*(API_KEY|TOKEN|SECRET|PASSWORD|OPENAI_API_KEY)\s*=', s):
                      add('ERROR', 'Secretos', 'docker-secret-env', f'{df}:{n}', 'Posible secreto definido en ENV')
                  if re.search(r'(?i)COPY\s+\.\s+', s):
                      add('WARNING', 'Docker', 'docker-copy-all-context', f'{df}:{n}', 'COPY . puede subir archivos innecesarios; revisar .dockerignore')

          out = pathlib.Path('policy-results.json')
          out.write_text(json.dumps({"findings": findings}, indent=2), encoding='utf-8')
          print(json.dumps({"total": len(findings), "findings": findings}, indent=2))

          errors = [f for f in findings if f['severity'] == 'ERROR']
          if enforce and errors:
              sys.exit(1)
          PY
        env:
          ENFORCE_POLICY: ${{ github.event.inputs.enforce_policy || 'true' }}

      - name: Subir policy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-results
          path: policy-results.json
          retention-days: 30

  codeql_python:
    name: CodeQL — código real Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: CodeQL config
        run: |
          cat > codeql-config.yml <<'YAML'
          name: codeql-code-only
          paths-ignore:
            - .github/workflows/**
            - node_modules/**
            - dist/**
            - build/**
            - coverage/**
            - .venv/**
            - venv/**
            - docs/**
            - "**/*.md"
          query-filters:
            - include:
                precision:
                  - high
                  - very-high
          YAML
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
          config-file: codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: codeql-python-code-only

  codeql_js:
    name: CodeQL — código real JS/TS
    runs-on: ubuntu-latest
    if: hashFiles('package.json', '**/*.js', '**/*.ts') != ''
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: CodeQL config
        run: |
          cat > codeql-config.yml <<'YAML'
          name: codeql-js-code-only
          paths-ignore:
            - .github/workflows/**
            - node_modules/**
            - dist/**
            - build/**
            - coverage/**
            - docs/**
            - "**/*.md"
          query-filters:
            - include:
                precision:
                  - high
                  - very-high
          YAML
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
          config-file: codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: codeql-js-code-only

  semgrep:
    name: Semgrep — SAST + AI/LLM alta señal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Crear reglas locales precisas
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/high-signal.yml <<'YAML'
          rules:
            # -------------------- Código general alta señal --------------------
            - id: py-command-injection-shell-true
              languages: [python]
              severity: ERROR
              message: "RCE/Command injection: subprocess con shell=True."
              metadata: {confidence: high, cwe: "CWE-78", area: code}
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: py-os-command-execution
              languages: [python]
              severity: ERROR
              message: "RCE: ejecución de comandos con os.system/os.popen."
              metadata: {confidence: high, cwe: "CWE-78", area: code}
              pattern-either:
                - pattern: os.system(...)
                - pattern: os.popen(...)

            - id: py-dangerous-eval-exec
              languages: [python]
              severity: ERROR
              message: "RCE: eval/exec ejecuta contenido dinámico."
              metadata: {confidence: high, cwe: "CWE-94", area: code}
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: py-flask-debug-true
              languages: [python]
              severity: ERROR
              message: "Flask debug=True expone debugger interactivo."
              metadata: {confidence: high, cwe: "CWE-489", area: code}
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: py-unsafe-yaml-load
              languages: [python]
              severity: ERROR
              message: "Deserialización insegura: yaml.load sin SafeLoader."
              metadata: {confidence: high, cwe: "CWE-502", area: code}
              patterns:
                - pattern: yaml.load(...)
                - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
                - pattern-not: yaml.load(..., Loader=SafeLoader, ...)

            - id: py-pickle-load
              languages: [python]
              severity: WARNING
              message: "Deserialización con pickle. Alto riesgo si recibe datos no confiables."
              metadata: {confidence: medium, cwe: "CWE-502", area: code}
              pattern-either:
                - pattern: pickle.load(...)
                - pattern: pickle.loads(...)

            - id: py-ssrf-user-controlled-url
              languages: [python]
              severity: ERROR
              message: "SSRF: URL probablemente controlada por usuario enviada a requests/httpx."
              metadata: {confidence: high, cwe: "CWE-918", area: code}
              patterns:
                - pattern-either:
                    - pattern: requests.get($URL, ...)
                    - pattern: requests.post($URL, ...)
                    - pattern: httpx.get($URL, ...)
                    - pattern: httpx.post($URL, ...)
                - metavariable-regex:
                    metavariable: $URL
                    regex: (?i).*(url|uri|link|website|target|request|input|query|form|args).*

            - id: py-sql-string-formatting
              languages: [python]
              severity: WARNING
              message: "Posible SQL injection: query construida con interpolación."
              metadata: {confidence: medium, cwe: "CWE-89", area: code}
              pattern-either:
                - pattern: $CUR.execute("..." % ...)
                - pattern: $CUR.execute("...".format(...))
                - pattern: $CUR.execute(f"...{...}...")

            - id: js-dangerous-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "RCE/XSS: eval/new Function ejecuta contenido dinámico."
              metadata: {confidence: high, cwe: "CWE-94", area: code}
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: node-child-process-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "RCE: ejecución de comandos con child_process.exec/execSync."
              metadata: {confidence: high, cwe: "CWE-78", area: code}
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            # -------------------- AI/LLM OWASP alta señal --------------------
            - id: llm01-system-message-user-controlled-python
              languages: [python]
              severity: WARNING
              message: "LLM01 Prompt Injection: input externo dentro de system/developer message."
              metadata: {confidence: medium, owasp_llm: "LLM01 Prompt Injection", area: ai}
              patterns:
                - pattern-either:
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(request|input|user|query|prompt|message|body|content|question|payload).*

            - id: llm02-sensitive-info-in-prompt-or-log-python
              languages: [python]
              severity: WARNING
              message: "LLM02 Sensitive Information Disclosure: posible secreto/PII enviado a prompt o log."
              metadata: {confidence: medium, owasp_llm: "LLM02 Sensitive Information Disclosure", area: ai}
              pattern-either:
                - pattern: $CLIENT.chat.completions.create(..., messages=[..., {"content": $SECRET}, ...], ...)
                - pattern: $CLIENT.responses.create(..., input=$SECRET, ...)
                - pattern: logging.$LEVEL(..., $SECRET, ...)
                - pattern: print($SECRET)
              metavariable-regex:
                metavariable: $SECRET
                regex: (?i).*(api_key|token|secret|password|authorization|cookie|credential|rut|ssn|email|phone|address).*

            - id: llm03-unsafe-dynamic-package-install-python
              languages: [python]
              severity: ERROR
              message: "LLM03 Supply Chain: instalación dinámica de paquetes desde código."
              metadata: {confidence: high, owasp_llm: "LLM03 Supply Chain", area: ai}
              pattern-either:
                - pattern: subprocess.run([..., "pip", "install", ...], ...)
                - pattern: subprocess.run("pip install ...", shell=True, ...)
                - pattern: os.system("pip install ...")

            - id: llm04-rag-ingestion-without-source-metadata-python
              languages: [python]
              severity: WARNING
              message: "LLM04 Data/Model Poisoning: ingestión RAG/vectorstore sin metadata/source/tenant visible."
              metadata: {confidence: medium, owasp_llm: "LLM04 Data and Model Poisoning", area: ai}
              patterns:
                - pattern-either:
                    - pattern: $DB.add_documents($DOCS, ...)
                    - pattern: $DB.add_texts($TEXTS, ...)
                    - pattern: $VECTORSTORE.from_documents($DOCS, ...)
                    - pattern: $VECTORSTORE.from_texts($TEXTS, ...)
                - pattern-not-regex: (?i)(metadata|source|tenant|trusted|validate|sanitize|allowlist)

            - id: llm05-insecure-output-handling-python
              languages: [python]
              severity: ERROR
              message: "LLM05 Improper Output Handling: eval/exec puede ejecutar output del modelo o input externo."
              metadata: {confidence: high, owasp_llm: "LLM05 Improper Output Handling", area: ai, cwe: "CWE-94"}
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: llm06-agent-shell-tool-python
              languages: [python]
              severity: ERROR
              message: "LLM06 Excessive Agency: agente/tool con shell o comandos."
              metadata: {confidence: high, owasp_llm: "LLM06 Excessive Agency", area: ai, cwe: "CWE-78"}
              pattern-either:
                - pattern: ShellTool(...)
                - pattern: BashProcess(...)
                - pattern: PythonREPLTool(...)
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: os.system(...)

            - id: llm07-system-prompt-exposed-endpoint-python
              languages: [python]
              severity: ERROR
              message: "LLM07 System Prompt Leakage: endpoint o función retorna prompt de sistema."
              metadata: {confidence: high, owasp_llm: "LLM07 System Prompt Leakage", area: ai}
              patterns:
                - pattern-either:
                    - pattern: return $SYSTEM_PROMPT
                    - pattern: jsonify(..., system_prompt=$X, ...)
                    - pattern: jsonify({"system_prompt": $X, ...})
                - metavariable-regex:
                    metavariable: $SYSTEM_PROMPT
                    regex: (?i).*(system_prompt|developer_prompt|hidden_prompt|policy_prompt|instructions).*

            - id: llm08-faiss-dangerous-deserialization-python
              languages: [python]
              severity: ERROR
              message: "LLM08 Vector/Embedding Weaknesses: FAISS dangerous deserialization."
              metadata: {confidence: high, owasp_llm: "LLM08 Vector and Embedding Weaknesses", area: ai, cwe: "CWE-502"}
              pattern: $FAISS.load_local(..., allow_dangerous_deserialization=True, ...)

            - id: llm09-no-answer-verification-marker-python
              languages: [python]
              severity: INFO
              message: "LLM09 Misinformation: llamada LLM/RAG sin marcador local de evaluación, citas o groundedness. Revisar dinámicamente."
              metadata: {confidence: low, owasp_llm: "LLM09 Misinformation", area: ai}
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not-regex: (?i)(citation|source|grounded|eval|faithful|hallucination|ragas|deepeval|validate_answer|verify)

            - id: llm10-llm-call-without-output-limit-python
              languages: [python]
              severity: WARNING
              message: "LLM10 Unbounded Consumption: llamada LLM sin max_tokens/max_output_tokens visible."
              metadata: {confidence: medium, owasp_llm: "LLM10 Unbounded Consumption", area: ai}
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                    - pattern: openai.ChatCompletion.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
                - pattern-not: openai.ChatCompletion.create(..., max_tokens=$M, ...)
          YAML

      - name: Ejecutar Semgrep preciso
        run: |
          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules/** \
            --exclude dist/** \
            --exclude build/** \
            --exclude coverage/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude __pycache__/** \
            --sarif --output semgrep.sarif . || true

          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules/** \
            --exclude dist/** \
            --exclude build/** \
            --exclude coverage/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude __pycache__/** \
            --json --output semgrep.json . || true

      - name: Asegurar artifacts Semgrep
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json

      - name: Subir SARIF Semgrep
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep-code-ai

      - name: Subir artifacts Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  dependencies:
    name: Dependencias — pip-audit, npm audit, OSV y Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format=json --output=pip-audit.json || true
          else
            echo '{"dependencies":[]}' > pip-audit.json
          fi

      - name: npm audit si existe package-lock.json
        if: hashFiles('package-lock.json') != ''
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Crear npm-audit vacío si no aplica
        if: hashFiles('package-lock.json') == ''
        run: echo '{"vulnerabilities":{}}' > npm-audit.json

      - name: Instalar OSV Scanner
        run: |
          curl -sSfL https://urldefense.com/v3/__https://raw.githubusercontent.com/google/osv-scanner/main/install.sh__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6qkbPSD5w$  | sh -s -- -b /usr/local/bin

      - name: OSV Scanner lockfiles
        run: |
          osv-scanner scan --format json --output osv-results.json . || true

