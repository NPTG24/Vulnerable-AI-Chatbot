  docker-security:
    name: "Docker — Hadolint + Image Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfiles
        run: |
          if find . -name 'Dockerfile*' -type f | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            find . -name 'Dockerfile*' -type f > dockerfiles.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            touch dockerfiles.txt
          fi

      - name: Run Hadolint
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" hadolint/hadolint:2.12.0-debian sh -c \
            'cd /repo && while read f; do hadolint --format sarif "$f"; done < dockerfiles.txt' \
            > hadolint.sarif || true

      - name: Build Docker image for scanning
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        run: docker build -t local-security-scan:${{ github.sha }} . || true

      - name: Run Trivy image scan
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: local-security-scan:${{ github.sha }}
          format: sarif
          output: trivy_image.sarif
          scanners: "vuln,secret,misconfig"
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: "0"

      - name: Ensure Docker artifacts
        if: always()
        run: |
          test -f hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          test -f trivy_image.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image.sarif
          test -f dockerfiles.txt || touch dockerfiles.txt

      - name: Upload Docker SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_image.sarif
          category: trivy-docker-image

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-security-results
          path: |
            hadolint.sarif
            trivy_image.sarif
            dockerfiles.txt
          retention-days: 30

  gitleaks:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks_report.json \
            --exit-code 0 \
            --redact \
            --verbose || true

      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("gitleaks_report.json")
          if not src.exists(): src.write_text("[]", encoding="utf-8")
          try: data = json.loads(src.read_text(encoding="utf-8", errors="ignore") or "[]")
          except Exception: data = []
          rules, results = {}, []
          for item in data:
              rid = item.get("RuleID") or item.get("Description") or "SECRET"
              desc = item.get("Description") or "Posible secreto expuesto"
              file = item.get("File") or "unknown"
              line = int(item.get("StartLine") or 1)
              rules.setdefault(rid, {"id":rid,"name":rid,"shortDescription":{"text":desc},"fullDescription":{"text":desc},"defaultConfiguration":{"level":"error"}})
              results.append({"ruleId":rid,"level":"error","message":{"text":desc},"locations":[{"physicalLocation":{"artifactLocation":{"uri":file},"region":{"startLine":line}}}]})
          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22Gitleaks*22,*22informationUri*22:*22https:/*github.com/gitleaks/gitleaks*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results*7D*5D__;JSUlJSUlJSUlJSUlJSUlJSUlLyUlJSUlJSUlJQ!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afVuWYwRAw$ }
          pathlib.Path("gitleaks.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure artifacts
        if: always()
        run: |
          test -f gitleaks_report.json || echo '[]' > gitleaks_report.json
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

  checkov-iac:
    name: "IaC — Checkov"
    runs-on: ubuntu-latest
    permissions:
      contents: read
