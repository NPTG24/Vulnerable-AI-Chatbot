name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      fail_on:
        description: "Security gate: never, critical, high"
        required: false
        default: "never"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  dependency-sca-policy:
    name: "Dependencies - Policy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Python and npm dependency files
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import tomllib

          findings = []
          inventory = []
          python_dependency_files_found = 0
          npm_dependency_files_found = 0
          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "env", ".env", "dist", "build", "__pycache__", "coverage", ".tox", ".mypy_cache", ".pytest_cache", ".ruff_cache"}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def dependency_severity(sev, rule, kind="vulnerability"):
              rule = str(rule or "").upper()
              sev = str(sev or "HIGH").upper()

              if rule in {"PYPROJECT_TOML_PARSE_ERROR", "NPM_PACKAGE_JSON_PARSE_ERROR"}:
                  return "CRITICAL"

              # Politica organizacional:
              # todo hallazgo de dependencias queda como HIGH como minimo.
              # Justificacion: riesgo actual de supply chain, malware, typosquatting,
              # dependency confusion, paquetes comprometidos, builds no reproducibles
              # y dependencias transitivas no controladas.
              order = {"CRITICAL": 4, "HIGH": 3, "MEDIUM": 2, "LOW": 1, "INFO": 0, "UNKNOWN": 0}
              return sev if order.get(sev, 0) >= order["HIGH"] else "HIGH"

          def add(sev, rule, file_path, line, msg, kind="vulnerability", ecosystem="unknown", package="", version=""):
              final_sev = dependency_severity(sev, rule, kind)
              findings.append({"tool": "Dependency Policy", "category": "Dependencias / SCA", "severity": final_sev, "rule": rule, "file": str(file_path), "line": int(line or 1), "message": msg, "kind": kind, "ecosystem": ecosystem, "package": package, "version": version})

          def inv(ecosystem, file_path, line, package, version, source):
              inventory.append({"ecosystem": ecosystem, "file": str(file_path), "line": int(line or 1), "package": str(package or ""), "version": str(version or ""), "source": source})

          def line_of(path, needle):
              try:
                  for idx, raw in enumerate(path.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                      if needle and str(needle) in raw:
                          return idx
              except Exception:
                  pass
              return 1

          def check_python_req(path, line_no, raw, source):
              line = str(raw).strip()
              if not line or line.startswith("#") or line.startswith(("-r ", "-c ", "-f ", "--")):
                  return
              if re.match(r"^(https?|git|ssh)://|^file:", line, re.I):
                  inv("python", path, line_no, line, line, source)
                  add("INFO", "PYTHON_DEPENDENCY_URL_OR_VCS", path, line_no, "Dependencia Python declarada mediante URL, VCS o ruta local. Riesgo alto de supply chain, sustitucion de origen, malware y builds no reproducibles. Use un registro confiable, fije una version exacta y valide integridad: " + line, "hygiene", "python", line, line)
                  return
              clean = line.split(" #", 1)[0].strip()
              name_match = re.match(r"^\s*([A-Za-z0-9_.-]+)", clean)
              pkg = name_match.group(1) if name_match else clean
              inv("python", path, line_no, pkg, clean, source)
              exact = re.match(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$", clean)
              strict_version = re.compile(r"^\d+\.\d+\.\d+([a-zA-Z0-9_.!+-]+)?$")
              if exact:
                  version_value = exact.group(3)
                  if strict_version.match(version_value):
                      return
                  add("MEDIUM", "PYTHON_DEPENDENCY_INCOMPLETE_VERSION", path, line_no, "Dependencia Python con version incompleta o no estandar. La politica exige formato MAJOR.MINOR.PATCH, por ejemplo 0.12.5. Corrija la version: " + line, "hygiene", "python", pkg, version_value)
                  return
              if re.match(r"^\s*[A-Za-z0-9_.-]+(\[[A-Za-z0-9_,.-]+\])?\s*$", clean):
                  add("MEDIUM", "PYTHON_DEPENDENCY_WITHOUT_VERSION", path, line_no, "La dependencia Python no especifica una version fija. Utilice un pin exacto (==) para garantizar reproducibilidad, facilitar el analisis SCA y reducir el riesgo de cambios inesperados: " + line, "vulnerability", "python", pkg, "")
                  return
              if re.search(r"\s*(>=|<=|~=|>|<|!=|===|\^)\s*", clean):
                  add("MEDIUM", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", path, line_no, "La dependencia Python utiliza un rango o un especificador no deterministico. Tras validar la compatibilidad, sustituya el rango por una version fija con == y formato MAJOR.MINOR.PATCH: " + line, "hygiene", "python", pkg, clean)
                  return
              add("MEDIUM", "PYTHON_DEPENDENCY_INVALID_FORMAT", path, line_no, "La declaracion de la dependencia Python no pudo interpretarse correctamente. Revise el formato y utilice una sintaxis compatible con PEP 440: " + line, "hygiene", "python", pkg, clean)

          def check_python_runtime(path, line_no, value, source):
              value = str(value or "").strip()
              inv("python-runtime", path, line_no, "python", value, source)
              if not value:
                  add("MEDIUM", "PYTHON_REQUIRES_PYTHON_MISSING", path, line_no, "requires-python no esta declarado o esta vacio. Riesgo alto: permite ejecutar el proyecto sobre runtimes no validados. Defina una version de Python controlada.", "hygiene", "python", "python", value)
                  return
              if re.search(r"(>=|<=|>|<|~=|\*|,)", value) or not re.match(r"^\d+\.\d+\.\d+([a-zA-Z0-9_.!+-]+)?$", value):
                  add("MEDIUM", "PYTHON_RUNTIME_NOT_EXACT_PIN", path, line_no, "Version de Python no exacta o no reproducible. La politica exige formato MAJOR.MINOR.PATCH, por ejemplo 3.12.1, salvo excepcion formal. Valor detectado: requires-python = " + value, "hygiene", "python", "python", value)

          def check_npm(path, line_no, name, version, source):
              name = str(name)
              version = str(version).strip()
              inv("npm", path, line_no, name, version, source)
              exact = re.compile(r"^\d+\.\d+\.\d+([-+][0-9A-Za-z.-]+)?$")
              if version.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                  add("INFO", "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY", path, line_no, f"Dependencia npm local, workspace o enlazada. Riesgo alto: puede evadir controles de registro, integridad y versionado. Valide origen, trazabilidad y versionado: {name}@{version}", "hygiene", "npm", name, version)
              elif version in {"", "*", "latest"}:
                  add("MEDIUM", "NPM_DEPENDENCY_WITHOUT_VERSION", path, line_no, f"La dependencia npm no utiliza una version fija completa. La politica exige formato MAJOR.MINOR.PATCH, por ejemplo 0.12.5. Evite rangos (^, ~, >=, latest o *) y establezca una version exacta: {name}@{version}", "vulnerability", "npm", name, version)
              elif not exact.match(version):
                  add("MEDIUM", "NPM_DEPENDENCY_NOT_EXACT_PIN", path, line_no, f"La dependencia npm no utiliza una version fija completa. La politica exige formato MAJOR.MINOR.PATCH, por ejemplo 0.12.5. Evite rangos (^, ~, >=, latest o *) y establezca una version exacta: {name}@{version}", "hygiene", "npm", name, version)

          for path in sorted(pathlib.Path(".").rglob("*")):
              if skip(path) or not path.is_file():
                  continue
              n = path.name.lower()
              if n in {"requirements.txt", "requirements-dev.txt", "requirements-test.txt", "requirements-prod.txt", "requirements-production.txt", "https://urldefense.com/v3/__http://requirements.in__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0XbjBUAiKA$ ", "constraints.txt", "dev-requirements.txt", "test-requirements.txt", "prod-requirements.txt"} or (n.startswith("requirements") and n.endswith((".txt", ".in", ".pip"))):
                  python_dependency_files_found += 1
                  raw_lines = path.read_text(encoding="utf-8", errors="ignore").splitlines()
                  useful_lines = [line.strip() for line in raw_lines if line.strip() and not line.strip().startswith("#")]
                  if not useful_lines:
                      add("HIGH", "PYTHON_DEPENDENCY_FILE_EMPTY", path, 1, "Archivo de dependencias Python vacio o sin dependencias utiles. Riesgo alto: el analisis SCA puede quedar incompleto si el proyecto utiliza librerias externas no declaradas.", "hygiene", "python")
                  for idx, raw in enumerate(raw_lines, 1):
                      check_python_req(path, idx, raw, "requirements")

          for path in sorted(pathlib.Path(".").rglob("pyproject.toml")):
              if skip(path):
                  continue
              python_dependency_files_found += 1
              try:
                  data = tomllib.loads(path.read_text(encoding="utf-8", errors="ignore"))
              except Exception as error:
                  add("MEDIUM", "PYPROJECT_TOML_PARSE_ERROR", path, 1, f"No se pudo interpretar pyproject.toml. Riesgo critico: impide construir el inventario completo de dependencias y puede dejar vulnerabilidades sin analizar: {error}", "hygiene", "python")
                  continue
              project = data.get("project", {})
              if isinstance(project, dict):
                  check_python_runtime(path, line_of(path, "requires-python"), project.get("requires-python", ""), "pyproject.project.requires-python")
                  deps = project.get("dependencies")
                  if deps is None:
                      add("MEDIUM", "PYPROJECT_NO_PROJECT_DEPENDENCIES", path, 1, "pyproject.toml no declara [project].dependencies. Riesgo alto: si el proyecto utiliza librerias externas, quedaran fuera del inventario y del analisis SCA. Declare todas las dependencias directas.", "hygiene", "python")
                  elif isinstance(deps, list) and len(deps) == 0:
                      add("MEDIUM", "PYPROJECT_EMPTY_PROJECT_DEPENDENCIES", path, line_of(path, "dependencies"), "pyproject.toml declara dependencies vacio. Riesgo alto: si existen librerias externas, quedaran fuera del inventario y del analisis SCA. Declare todas las dependencias directas.", "hygiene", "python")
                  elif isinstance(deps, list):
                      for dep in deps:
                          check_python_req(path, line_of(path, dep), dep, "pyproject.project.dependencies")
                  optional = project.get("optional-dependencies", {})
                  if isinstance(optional, dict):
                      for group, deps in optional.items():
                          for dep in deps or []:
                              check_python_req(path, line_of(path, dep), dep, f"pyproject.project.optional-dependencies.{group}")
              tool = data.get("tool", {})
              poetry = tool.get("poetry", {}) if isinstance(tool, dict) else {}
              if isinstance(poetry, dict):
                  for section in ["dependencies", "dev-dependencies"]:
                      deps = poetry.get(section, {})
                      if isinstance(deps, dict):
                          for name, spec in deps.items():
                              if name.lower() == "python":
                                  continue
                              line = line_of(path, name)
                              version = spec if isinstance(spec, str) else str(spec.get("version", "")) if isinstance(spec, dict) else str(spec)
                              inv("python", path, line, name, version, f"poetry.{section}")
                              if not version or version == "*":
                                  add("MEDIUM", "PYTHON_DEPENDENCY_WITHOUT_VERSION", path, line, f"Dependencia Poetry sin version exacta. Riesgo alto de supply chain y builds no reproducibles. Fije una version especifica y valide su origen: {name}", "vulnerability", "python", name, version)
                              elif version.startswith(("^", "~")) or any(op in version for op in [">=", "<=", ">", "<", "!="]):
                                  add("MEDIUM", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", path, line, f"Dependencia Poetry con rango o especificador no deterministico. Riesgo alto: puede resolver versiones no verificadas. Reemplace el rango por una version exacta validada en formato MAJOR.MINOR.PATCH: {name} = {version}", "hygiene", "python", name, version)
                              elif not re.match(r"^\d+\.\d+\.\d+([a-zA-Z0-9_.!+-]+)?$", version):
                                  add("MEDIUM", "PYTHON_DEPENDENCY_INCOMPLETE_VERSION", path, line, f"Dependencia Poetry con version incompleta. La politica exige formato MAJOR.MINOR.PATCH, por ejemplo 0.12.5: {name} = {version}", "hygiene", "python", name, version)
              pdm = tool.get("pdm", {}) if isinstance(tool, dict) else {}
              if isinstance(pdm, dict):
                  dev_deps = pdm.get("dev-dependencies", {})
                  if isinstance(dev_deps, dict):
                      for group, deps in dev_deps.items():
                          for dep in deps or []:
                              check_python_req(path, line_of(path, dep), dep, f"pdm.dev-dependencies.{group}")
              uv = tool.get("uv", {}) if isinstance(tool, dict) else {}
              if isinstance(uv, dict):
                  for key in ["dev-dependencies", "override-dependencies", "constraint-dependencies"]:
                      deps = uv.get(key, [])
                      if isinstance(deps, list):
                          for dep in deps:
                              check_python_req(path, line_of(path, dep), dep, f"uv.{key}")
              dep_groups = data.get("dependency-groups", {})
              if isinstance(dep_groups, dict):
                  for group, deps in dep_groups.items():
                      for dep in deps or []:
                          if isinstance(dep, str):
                              check_python_req(path, line_of(path, dep), dep, f"dependency-groups.{group}")

          for dep_file in ["poetry.lock", "Pipfile", "Pipfile.lock", "pdm.lock", "uv.lock", "setup.cfg", "https://urldefense.com/v3/__http://setup.py__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0XYIah_JAA$ ", "tox.ini", "environment.yml", "environment.yaml", "conda.yml", "conda.yaml"]:
              for path in sorted(pathlib.Path(".").rglob(dep_file)):
                  if not skip(path) and path.is_file():
                      add("INFO", "PYTHON_DEPENDENCY_FILE_DETECTED", path, 1, f"Archivo de dependencias Python detectado. Riesgo alto si queda fuera del inventario SCA. Incluyalo en el control de supply chain y trazabilidad: {path}", "hygiene", "python")

          for package_json in sorted(pathlib.Path(".").rglob("package.json")):
              if skip(package_json):
                  continue
              npm_dependency_files_found += 1
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception as error:
                  add("MEDIUM", "NPM_PACKAGE_JSON_PARSE_ERROR", package_json, 1, f"No se pudo interpretar package.json. Riesgo critico: impide construir el inventario npm y puede dejar vulnerabilidades sin analizar: {error}", "hygiene", "npm")
                  continue
              declared_dependency_sections = 0
              non_empty_dependency_sections = 0
              for section in ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies", "bundledDependencies"]:
                  deps = pkg.get(section, {})
                  if section in pkg:
                      declared_dependency_sections += 1
                  if isinstance(deps, dict):
                      if len(deps) > 0:
                          non_empty_dependency_sections += 1
                      for name, version in deps.items():
                          check_npm(package_json, line_of(package_json, name), name, version, f"package.json.{section}")
                  elif isinstance(deps, list):
                      if len(deps) > 0:
                          non_empty_dependency_sections += 1
                      for name in deps:
                          check_npm(package_json, line_of(package_json, name), name, "", f"package.json.{section}")
              if declared_dependency_sections == 0:
                  add("HIGH", "NPM_PACKAGE_JSON_NO_DEPENDENCY_SECTIONS", package_json, 1, "package.json no declara secciones de dependencias. Riesgo alto: si el proyecto utiliza librerias externas, quedaran fuera del inventario y del analisis SCA.", "hygiene", "npm")
              elif non_empty_dependency_sections == 0:
                  add("HIGH", "NPM_PACKAGE_JSON_EMPTY_DEPENDENCIES", package_json, 1, "package.json declara secciones de dependencias vacias. Riesgo alto: si el proyecto utiliza librerias externas, el analisis SCA quedara incompleto.", "hygiene", "npm")

          for dep_file in ["package-lock.json", "npm-shrinkwrap.json", "yarn.lock", "pnpm-lock.yaml", "pnpm-workspace.yaml", "lerna.json", "rush.json", "turbo.json", ".npmrc", ".yarnrc", ".yarnrc.yml"]:
              for path in sorted(pathlib.Path(".").rglob(dep_file)):
                  if not skip(path) and path.is_file():
                      add("INFO", "NPM_DEPENDENCY_FILE_DETECTED", path, 1, f"Archivo de dependencias o configuracion npm detectado. Riesgo alto si queda fuera del inventario SCA. Incluyalo en el control de supply chain y dependencias transitivas: {path}", "hygiene", "npm")

          python_source_found = any(not skip(p) for p in pathlib.Path(".").rglob("*.py"))
          npm_source_found = any(not skip(p) for pattern in ["*.js", "*.ts", "*.jsx", "*.tsx"] for p in pathlib.Path(".").rglob(pattern))

          if python_source_found and python_dependency_files_found == 0:
              add("HIGH", "PYTHON_DEPENDENCY_FILE_MISSING", ".", 1, "No se detecto archivo de dependencias Python, pero existen archivos .py. Riesgo alto: el proyecto puede usar librerias externas no inventariadas, lo que impide un analisis SCA completo.", "hygiene", "python")

          if npm_source_found and npm_dependency_files_found == 0:
              add("HIGH", "NPM_DEPENDENCY_FILE_MISSING", ".", 1, "No se detecto archivo de dependencias npm, pero existen archivos JavaScript/TypeScript. Riesgo alto: el proyecto puede usar librerias externas no inventariadas, lo que impide un analisis SCA completo.", "hygiene", "npm")

          pathlib.Path("dependency_inventory.json").write_text(json.dumps({"inventory": inventory, "python_dependency_files_found": python_dependency_files_found, "npm_dependency_files_found": npm_dependency_files_found}, indent=2, ensure_ascii=False), encoding="utf-8")
          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool": "Dependency Policy", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          rules = {}
          results = []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": f["message"]}, "defaultConfiguration": {"level": level(f["severity"])}})
              results.append({"ruleId": rid, "level": level(f["severity"]), "message": {"text": f["message"]}, "properties": {"kind": f.get("kind", "vulnerability"), "category": f.get("category", "Dependencias / SCA"), "ecosystem": f.get("ecosystem", ""), "package": f.get("package", ""), "version": f.get("version", "")}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": f["file"]}, "region": {"startLine": f["line"]}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Dependency Policy", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print("Dependency policy findings:", len(findings))
          print("Dependency inventory entries:", len(inventory))
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        shell: bash
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-sca-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-sca-policy-results
          path: |
            dependency_policy_findings.json
            dependency_inventory.json
            dependency_policy.sarif
          retention-days: 30

  code-ai-static:
    name: "AI/App Code - Precise Static Analyzer"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run regex-based AI/AppSec analyzer
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re

          findings = []
          skip_parts = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__", "coverage"}

          def skip(path):
              return any(part in skip_parts for part in str(path).replace("\\", "/").split("/"))

          def add(file_path, line, sev, rule, cat, msg, snippet="", confidence="HIGH", fp_note=""):
              findings.append({
                  "tool": "AI/App Static Analyzer",
                  "file": str(file_path),
                  "line": int(line or 1),
                  "severity": sev,
                  "rule": rule,
                  "category": cat,
                  "message": msg,
                  "snippet": snippet[:500],
                  "confidence": confidence,
                  "fp_note": fp_note
              })

          def line_at(lines, idx):
              return lines[idx - 1].strip() if 1 <= idx <= len(lines) else ""

          def has_any(text, tokens):
              return any(token in text for token in tokens)

          def scan_text_file(path):
              text = path.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              low = text.lower()

              is_py = path.suffix == ".py"
              is_js = path.suffix in {".js", ".ts", ".jsx", ".tsx"}

              has_route = "@app.route" in text or ".route(" in text or "FastAPI(" in text or "@router." in text
              has_request = has_any(text, ["request.args", "request.form", "request.json", "request.get_json", "req.body", "req.query", "req.params"])
              has_ai = has_any(text, ["RetrievalQA", "FAISS", "PyPDFLoader", "OpenAI", "ChatOpenAI", "OpenAIEmbeddings", "llama_index", "LlamaIndex", "CrewAI", "autogen", "Haystack", "Chroma", "Pinecone", "AgentExecutor", "chat.completions", "responses.create"])

              if has_route and has_request and has_ai:
                  add(path, 1, "HIGH", "AI_HTTP_RAG_ATTACK_SURFACE", "AI / LLM / Agentic", "Superficie AI/RAG expuesta: rutas HTTP + input de usuario + LLM/RAG en el mismo archivo. Verificar prompt injection, auth, rate limiting, aislamiento de datos y costos.", "", "HIGH")

              request_vars = {}
              for idx, line in enumerate(lines, 1):
                  stripped = line.strip()

                  m = re.search(r"([A-Za-z_][A-Za-z0-9_]*)\s*=\s*request\.(args|form|values)\.get\((.*)\)", stripped)
                  if m:
                      var = m.group(1)
                      args = m.group(3)
                      has_default = "," in args or "default=" in args
                      request_vars[var] = {"line": idx, "default": has_default}
                      add(path, idx, "INFO", "WEB_REQUEST_INPUT_ENTRYPOINT", "Codigo aplicativo", f"Entrada controlada por usuario asignada a '{var}'.", stripped, "HIGH")

                  if re.search(r"@\w*app\.route|@\w*router\.", stripped):
                      add(path, idx, "INFO", "WEB_ROUTE_AUTH_REVIEW", "Codigo aplicativo", "Ruta HTTP detectada. Verificar autenticacion/autorizacion si expone datos o acciones.", stripped, "MEDIUM", "Si la ruta es publica por diseno documente el riesgo; de lo contrario implemente autenticacion, autorizacion y controles de acceso.")

                  if "sensitive_keywords" in stripped and "[" in stripped:
                      add(path, idx, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Posible Prompt Injection / bypass: blacklist de keywords sensibles usada como control de seguridad. Es evadible con encoding, separacion de caracteres, idioma o reformulacion.", stripped, "HIGH")

                  if "any(" in stripped and " in " in stripped and "sensitive" in stripped.lower():
                      add(path, idx, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Posible Prompt Injection / bypass: comprobacion por keywords sensibles. Es evadible y no reemplaza autorizacion real.", stripped, "HIGH")

                  if "os.environ" in stripped and any(token in stripped.lower() for token in ["reveal", "secret", "owner", "token", "key", "password"]):
                      sev = "HIGH" if "!=" in stripped or "==" in stripped else "MEDIUM"
                      rule = "AI_ENV_FLAG_AUTHORIZATION_GATE" if sev == "HIGH" else "AI_MUTABLE_SECURITY_STATE_IN_ENV"
                      msg = "Gate/estado sensible basado en os.environ. Riesgo de bypass si el estado es mutable o influenciado por input."
                      add(path, idx, sev, rule, "AI / LLM / Agentic", msg, stripped, "HIGH")

                  if (("forget" in stripped.lower() and "rules" in stripped.lower()) or ("new" in stripped.lower() and "operator" in stripped.lower())):
                      add(path, idx, "HIGH", "AI_PROMPT_TRIGGERED_SECURITY_FLAG_BYPASS", "AI / LLM / Agentic", "Posible Prompt Injection/backdoor: condicion textual permite activar comportamiento sensible o cambiar flags de seguridad.", stripped, "HIGH")

                  if "RetrievalQA.from_chain_type" in stripped:
                      add(path, idx, "MEDIUM", "AI_RAG_RETRIEVALQA_CHAIN", "AI / LLM / Agentic", "Uso de RetrievalQA/RAG detectado. Verificar prompt injection, autorizacion sobre documentos, aislamiento por tenant y filtrado de fuentes.", stripped, "HIGH")
                      if "chain_type=\"stuff\"" in stripped or "chain_type='stuff'" in stripped:
                          add(path, idx, "MEDIUM", "AI_RAG_STUFF_CHAIN_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", "RAG chain_type='stuff': contenido recuperado se inserta directo en el prompt; riesgo de prompt injection desde documentos.", stripped, "HIGH")

                  if any(loader in stripped for loader in ["PyPDFLoader(", "UnstructuredFileLoader(", "Docx2txtLoader(", "CSVLoader(", "TextLoader(", "DirectoryLoader("]):
                      sev = "MEDIUM" if has_route or has_request else "INFO"
                      add(path, idx, sev, "AI_DOCUMENT_LOADER_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", "Loader de documento para AI/RAG detectado. Verificar origen, tipo, tamano, sandboxing y prompt injection desde documentos.", stripped, "MEDIUM", "Si el documento es fijo y confiable, puede ser riesgo contextual.")

                  if any(v in stripped for v in ["FAISS.from_documents", "Chroma.from_documents", "Pinecone.from_documents"]):
                      add(path, idx, "MEDIUM", "AI_VECTORSTORE_FROM_DOCUMENTS", "AI / LLM / Agentic", "Vectorstore desde documentos detectado. Verificar data poisoning, PII, secretos embebidos y autorizacion de recuperacion.", stripped, "HIGH")

                  if any(v in stripped for v in [".save_local(", ".load_local(", "FAISS.load_local", "Chroma.load_local"]):
                      add(path, idx, "LOW", "AI_LOCAL_VECTORSTORE_PERSISTENCE_CONTEXTUAL", "AI / LLM / Agentic", "Persistencia/carga local de vectorstore detectada. Riesgo contextual: poisoning/manipulacion local/deserializacion si el storage es controlable o compartido.", stripped, "MEDIUM", "Bajado a LOW porque suele ser contextual si el path no es controlable.")

                  if any(v in stripped for v in ["OpenAI(", "OpenAIEmbeddings(", "ChatOpenAI(", "AzureChatOpenAI("]):
                      sev = "MEDIUM" if has_route or has_request else "INFO"
                      add(path, idx, sev, "AI_PROVIDER_USAGE_COST_AND_DATA_BOUNDARY", "AI / LLM / Agentic", "Uso de proveedor/modelo AI detectado. Verificar API key, limites de costo, rate limiting, logging seguro y datos sensibles enviados al proveedor.", stripped, "MEDIUM")

                  if re.search(r"\.(run|invoke|predict|generate|complete)\((query|user_query|prompt|msg|message|search_query|input|question)\b", stripped):
                      add(path, idx, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", "La entrada controlada por el usuario puede influir en el comportamiento del modelo. Aplique validacion de entrada, aislamiento del contexto, delimitacion estricta del prompt del sistema, filtros contra prompt injection y controles de autorizacion sobre los datos recuperados. Implemente validacion de entrada, aislamiento del contexto, filtros de prompt injection y autorizacion sobre los datos recuperados.", stripped, "HIGH")

                  if "qa.run(" in stripped or ".run(query" in stripped or ".run(user_query" in stripped:
                      add(path, idx, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", "Posible Prompt Injection: query/input llega a qa.run()/chain.run().", stripped, "HIGH")

                  if "shell=True" in stripped and any(fn in stripped for fn in ["subprocess", "Popen", "check_output", "run("]):
                      add(path, idx, "HIGH", "CODE_COMMAND_INJECTION_SHELL_TRUE", "Codigo aplicativo", "Comando con shell=True detectado. Verificar si algun argumento depende de input de usuario.", stripped, "HIGH")

                  if "time.sleep(" in stripped:
                      m_sleep = re.search(r"time\.sleep\((\d+)\)", stripped)
                      if m_sleep and int(m_sleep.group(1)) >= 30:
                          sev = "MEDIUM" if has_route else "LOW"
                          add(path, idx, sev, "WEB_ROUTE_LONG_SLEEP_DOS", "Codigo aplicativo", f"time.sleep({m_sleep.group(1)}) detectado; si esta en ruta HTTP bloquea workers y puede causar DoS.", stripped, "HIGH")

                  for var, meta in request_vars.items():
                      if re.search(rf"\b{re.escape(var)}\.lower\(\)", stripped) and not meta["default"]:
                          prefix = "\n".join(lines[:idx])
                          guarded = re.search(rf"{re.escape(var)}\s+is\s+None|not\s+{re.escape(var)}\b|{re.escape(var)}\s*==\s*None|{re.escape(var)}\s*!=\s*None", prefix)
                          if not guarded:
                              add(path, idx, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "Codigo aplicativo", f"Parametro de request '{var}' usado con .lower() sin default/check visible de None; si falta el parametro puede causar 500/DoS.", stripped, "HIGH")

                  if "<script>" in stripped and " in " in stripped:
                      add(path, idx, "MEDIUM", "WEB_WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "Codigo aplicativo", "La mitigacion basada en listas negras es insuficiente. Utilice encoding contextual de salida, sanitizacion robusta y validacion de entrada.", stripped, "HIGH")

                  if "innerhtml" in stripped.lower() or ".html(" in stripped.lower():
                      add(path, idx, "MEDIUM", "WEB_DOM_XSS_SINK_REVIEW", "Codigo aplicativo", "Sink HTML/DOM detectado. Verificar si recibe datos del usuario o del LLM sin sanitizacion.", stripped, "MEDIUM")

                  if any(token in stripped.lower() for token in ["dangerouslysetinnerhtml", "bypasssecuritytrusthtml"]):
                      add(path, idx, "HIGH", "WEB_UNSAFE_HTML_RENDERING", "Codigo aplicativo", "Renderizado HTML inseguro detectado. Verificar XSS con salida de usuario/LLM.", stripped, "HIGH")

                  if is_js and ("eval(" in stripped.lower() or "new function(" in stripped.lower()):
                      add(path, idx, "HIGH", "JS_EVAL_RCE_REVIEW", "Codigo aplicativo", "eval/new Function detectado. Riesgo critico si recibe input de usuario o salida LLM.", stripped, "HIGH")

                  if is_js and ("child_process" in stripped.lower() or "exec(" in stripped.lower() or "execsync(" in stripped.lower()):
                      add(path, idx, "HIGH", "JS_COMMAND_EXECUTION_REVIEW", "Codigo aplicativo", "Ejecucion de comandos en JS detectada. Verificar si argumentos vienen de usuario o LLM.", stripped, "HIGH")

                  if "except Exception" in stripped or stripped == "except:":
                      add(path, idx, "INFO", "CODE_BROAD_EXCEPTION_OBSERVABILITY", "Codigo aplicativo", "Manejo amplio de excepciones. No es vulnerabilidad directa; puede ocultar errores de seguridad y dificultar trazabilidad.", stripped, "MEDIUM", "No contabilizar como vulnerabilidad explotable directa.")

              if has_route and has_ai:
                  expensive = ["OpenAIEmbeddings", "FAISS.from_documents", "save_local", "FAISS.load_local", "RetrievalQA.from_chain_type", "Chroma.from_documents"]
                  if len([x for x in expensive if x in text]) >= 3:
                      add(path, 1, "MEDIUM", "AI_EXPENSIVE_RAG_REBUILT_PER_REQUEST", "AI / LLM / Agentic", "Posible DoS/costo: archivo combina rutas HTTP y reconstruccion de embeddings/vectorstore/RAG. Verificar cache, rate limiting y limites de costo.", "", "HIGH")

          for pattern in ["*.py", "*.js", "*.ts", "*.jsx", "*.tsx"]:
              for path in pathlib.Path(".").rglob(pattern):
                  if not skip(path):
                      scan_text_file(path)

          unique = {}
          for item in findings:
              key=(item["file"],item["line"],item["rule"])
              prev = unique.get(key)
              if prev is None or len(str(item.get("message", ""))) > len(str(prev.get("message", ""))):
                  unique[key] = item
          findings = list(unique.values())

          pathlib.Path("ai_app_static_findings.json").write_text(json.dumps({"tool": "AI/App Static Analyzer", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          rules = {}
          results = []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": f["message"]}, "defaultConfiguration": {"level": level(f["severity"])}})
              results.append({
                  "ruleId": rid,
                  "level": level(f["severity"]),
                  "message": {"text": f["message"]},
                  "properties": {"kind": "vulnerability", "category": f["category"], "snippet": f["snippet"], "confidence": f["confidence"], "false_positive_note": f.get("fp_note", "")},
                  "locations": [{"physicalLocation": {"artifactLocation": {"uri": f["file"]}, "region": {"startLine": f["line"]}}}]
              })
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "AI/App Static Analyzer", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("ai_app_static.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print("AI/App static analyzer findings:", len(findings))
          PY

      - name: Ensure AI/App static artifacts exist
        if: always()
        shell: bash
        run: |
          test -f ai_app_static_findings.json || echo '{"tool":"AI/App Static Analyzer","findings":[]}' > ai_app_static_findings.json
          test -f ai_app_static.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI/App Static Analyzer","rules":[]}},"results":[]}]}' > ai_app_static.sarif

      - name: Upload AI/App static SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai_app_static.sarif
          category: ai-app-static

      - name: Upload AI/App static artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-static-results
          path: |
            ai_app_static_findings.json
            ai_app_static.sarif
          retention-days: 30

  ruff:
    name: "Dev Quality - Ruff"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff as development-quality report only
        shell: bash
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          python3 - <<'PY'
          import json, pathlib
          try:
              data = json.loads(pathlib.Path("ruff_lint.json").read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []
          pathlib.Path("ruff_dev_quality_findings.json").write_text(json.dumps({"tool": "Ruff", "kind": "development_quality", "findings": data}, indent=2, ensure_ascii=False), encoding="utf-8")
          pathlib.Path("ruff_dev_quality.sarif").write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff Dev Quality","rules":[]}},"results":[]}]}', encoding="utf-8")
          PY
      - name: Upload Ruff dev-quality SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff_dev_quality.sarif
          category: ruff-dev-quality
      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-dev-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff_dev_quality_findings.json
            ruff_dev_quality.sarif
          retention-days: 30

  codeql:
    name: "SAST - CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true
      - name: Analyze and upload CodeQL SARIF
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: true
      - name: Normalize CodeQL artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p codeql-results
          if ! find codeql-results -name "*.sarif" -type f | grep -q .; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL","rules":[]}},"results":[]}]}' > codeql-results/codeql_${{ matrix.language }}.sarif
          fi
          python3 - <<'PY'
          import json, pathlib
          findings = []
          for sarif in pathlib.Path("codeql-results").rglob("*.sarif"):
              try:
                  data = json.loads(sarif.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", "CodeQL")
                  for result in run.get("results", []) or []:
                      rid = result.get("ruleId", "")
                      lvl = result.get("level", "warning")
                      sev = "HIGH" if lvl == "error" else ("MEDIUM" if lvl == "warning" else "LOW")
                      msg = result.get("message", {}).get("text", "")
                      loc = "?"
                      try:
                          phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                          loc = f"{phys.get('artifactLocation', {}).get('uri', '?')}:{phys.get('region', {}).get('startLine', '?')}"
                      except Exception:
                          pass
                      findings.append({"tool": tool, "rule": rid, "severity": sev, "category": "Codigo aplicativo", "location": loc, "message": msg})
          pathlib.Path("codeql_findings.json").write_text(json.dumps({"tool": "CodeQL", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-results
          path: |
            codeql-results
            codeql_findings.json
          retention-days: 30

  semgrep:
    name: "SAST - Semgrep OSS"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create high-signal app security rules
        shell: bash
        run: |
          mkdir -p .semgrep/app-security
          cat > .semgrep/app-security/app_rules.yml <<'YAML_RULES'
          rules:
            - id: web-python-flask-public-host
              languages: [python]
              severity: WARNING
              message: "Flask app is exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0Xb2mPQYbQ$ . Confirm network controls, authentication and production WSGI deployment."
              pattern-either:
                - pattern: app.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0Xb2mPQYbQ$ ", ...)
                - pattern: app.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0Xb2mPQYbQ$ ", ...)
                - pattern: $APP.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0Xb2mPQYbQ$ ", ...)
                - pattern: $APP.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!6qLRXE3ihCI_FxY9gCHuV2_kLJ_yCUwoYW1tRQtZWe9lK9KRsd5L6TExnMIKDaVboS27naUza-JV9GcoSd5I0Xb2mPQYbQ$ ", ...)
            - id: web-python-route-long-sleep-dos
              languages: [python]
              severity: WARNING
              message: "Request handler sleeps for a long time. This can tie up workers and cause denial of service."
              patterns:
                - pattern: |
                    @app.route(...)
                    def $FUNC(...):
                        ...
                        time.sleep($SECONDS)
                        ...
                - metavariable-comparison:
                    metavariable: $SECONDS
                    comparison: $SECONDS >= 30
            - id: web-python-xss-blacklist-script-only
              languages: [python]
              severity: WARNING
              message: "Weak XSS mitigation: blacklist only checks literal <script>. Use contextual output encoding/sanitization."
              pattern-either:
                - pattern: |
                    if "<script>" in $VALUE:
                        ...
                - pattern: |
                    if '<script>' in $VALUE:
                        ...
          YAML_RULES
      - name: Run Semgrep official and custom rules
        shell: bash
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** \
            --sarif --output semgrep.sarif . || true
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** \
            --json --output semgrep.json . || true
      - name: Ensure Semgrep artifacts exist
        if: always()
        shell: bash
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
            .semgrep/app-security/app_rules.yml
          retention-days: 30

  ai-security:
    name: "AI Security - Semgrep LLM Rules"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create precise AI Semgrep rules
        shell: bash
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML_RULES'
          rules:
            - id: ai-python-retrievalqa-variable-run
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: variable input reaches RetrievalQA/LLM run(). Validate prompt injection and authorization controls."
              pattern-either:
                - pattern: $QA.run($QUERY)
                - pattern: $CHAIN.run($QUERY)
              pattern-not: $QA.run("...")
            - id: ai-python-retrievalqa-stuff-chain
              languages: [python]
              severity: WARNING
              message: "RAG chain_type='stuff' detected. Retrieved content is stuffed into prompt; review prompt injection from documents."
              pattern-either:
                - pattern: RetrievalQA.from_chain_type(..., chain_type="stuff", ...)
                - pattern: RetrievalQA.from_chain_type(..., chain_type='stuff', ...)
            - id: ai-python-keyword-blacklist-security-control
              languages: [python]
              severity: WARNING
              message: "Prompt Injection bypass: keyword blacklist appears to protect secrets/system rules."
              pattern-either:
                - pattern: |
                    sensitive_keywords = [...]
                - pattern: |
                    if any($WORD in $TEXT for $WORD in $WORDS):
                        ...
            - id: ai-python-prompt-triggered-env-flag
              languages: [python]
              severity: ERROR
              message: "Prompt Injection/backdoor: user-controlled text can toggle environment/security flag."
              pattern-either:
                - pattern: |
                    if "forget" in $INPUT and "rules" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if "new" in $INPUT and "operator" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if $A in $INPUT and $B in $INPUT:
                        os.environ[$KEY] = "yes"
            - id: ai-python-env-gate-sensitive-disclosure
              languages: [python]
              severity: ERROR
              message: "Sensitive disclosure/authorization gate controlled by mutable environment variable."
              pattern-either:
                - pattern: |
                    if os.environ[$KEY] != "yes":
                        ...
                - pattern: |
                    if os.getenv($KEY) != "yes":
                        ...
                - pattern: |
                    os.environ[$KEY] = "yes"
            - id: ai-python-document-loader-rag-prompt-injection
              languages: [python]
              severity: WARNING
              message: "Prompt Injection from documents: AI/RAG document loader detected. Validate origin, type, size and sandboxing."
              pattern-either:
                - pattern: PyPDFLoader($FILE)
                - pattern: UnstructuredFileLoader($FILE)
                - pattern: Docx2txtLoader($FILE)
                - pattern: CSVLoader($FILE)
                - pattern: TextLoader($FILE)
                - pattern: DirectoryLoader($FILE)
            - id: ai-python-local-vectorstore-persistence
              languages: [python]
              severity: INFO
              message: "Local vectorstore persistence detected. Contextual risk: poisoning/deserialization if storage is attacker-controlled or shared."
              pattern-either:
                - pattern: $VECTORSTORE.save_local(...)
                - pattern: FAISS.load_local(...)
                - pattern: $VECTORSTORE.load_local(...)
            - id: ai-python-flask-input-to-llm-taint
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: Flask request input flows to LLM/chain."
              mode: taint
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $MODEL.invoke($SINK, ...)
                - pattern: $CHAIN.invoke($SINK, ...)
                - pattern: $CHAIN.run($SINK, ...)
                - pattern: $QA.run($SINK)
                - pattern: $CLIENT.chat.completions.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.responses.create(..., input=$SINK, ...)
          YAML_RULES
      - name: Run precise AI Semgrep rules
        continue-on-error: true
        shell: bash
        run: |
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** --sarif --output semgrep_ai.sarif . || true
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** --json --output semgrep_ai.json . || true
      - name: Ensure AI artifacts exist
        if: always()
        shell: bash
        run: |
          test -f semgrep_ai.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}' > semgrep_ai.sarif
          test -f semgrep_ai.json || echo '{"results":[]}' > semgrep_ai.json
      - name: Upload AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai.sarif
          category: ai-security-precise
      - name: Upload AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-results
          path: |
            semgrep_ai.sarif
            semgrep_ai.json
            .semgrep/ai-security/ai_rules.yml
          retention-days: 30

  dojigiri-ai-security:
    name: "AI Security - Dojigiri optional"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dojigiri if available
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Dojigiri is installed opportunistically. If the package name or registry changes,
          # the job still produces empty artifacts and does not break the pipeline.
          pip install dojigiri || true

      - name: Run Dojigiri AI/LLM scan
        continue-on-error: true
        shell: bash
        run: |
          echo '{"tool":"Dojigiri","findings":[]}' > dojigiri_results.json
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dojigiri","rules":[]}},"results":[]}]}' > dojigiri.sarif
          echo "Dojigiri status: not executed" > dojigiri_status.txt

          if command -v dojigiri >/dev/null 2>&1; then
            echo "Dojigiri status: CLI found" > dojigiri_status.txt

            # Try common CI-friendly variants. The first successful one keeps its output.
            dojigiri scan . --format json --output dojigiri_results.json || \
            dojigiri scan . --json --output dojigiri_results.json || \
            dojigiri . --format json --output dojigiri_results.json || \
            true

            dojigiri scan . --format sarif --output dojigiri.sarif || \
            dojigiri scan . --sarif --output dojigiri.sarif || \
            dojigiri . --format sarif --output dojigiri.sarif || \
            true
          else
            echo "Dojigiri status: CLI not available after pip install" > dojigiri_status.txt
          fi

          # Normalize artifacts if the tool returned empty/invalid output.
          python3 - <<'PY'
          import json
          import pathlib

          def valid_json(path):
              try:
                  text = pathlib.Path(path).read_text(encoding="utf-8", errors="ignore").strip()
                  if not text:
                      return False
                  json.loads(text)
                  return True
              except Exception:
                  return False

          if not valid_json("dojigiri_results.json"):
              pathlib.Path("dojigiri_results.json").write_text('{"tool":"Dojigiri","findings":[]}', encoding="utf-8")

          if not valid_json("dojigiri.sarif"):
              pathlib.Path("dojigiri.sarif").write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dojigiri","rules":[]}},"results":[]}]}', encoding="utf-8")
          PY

      - name: Upload Dojigiri SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dojigiri.sarif
          category: dojigiri-ai-security

      - name: Upload Dojigiri artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dojigiri-ai-security-results
          path: |
            dojigiri_results.json
            dojigiri.sarif
            dojigiri_status.txt
          retention-days: 30

  sca:
    name: "SCA - pip-audit + Trivy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Run pip-audit against project files
        shell: bash
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          fi
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
      - name: Run Trivy SCA only JSON and SARIF
        continue-on-error: true
        shell: bash
        run: |
          # Trivy queda dedicado a SCA/CVEs, secretos y licencias.
          # No ejecuta scanners config/misconfig para evitar duplicados con Checkov.
          docker run --rm --user "$(id -u):$(id -g)" -e TRIVY_CACHE_DIR=/tmp/trivy-cache -v "$PWD:/repo" aquasec/trivy:latest fs --scanners vuln,secret,license --format json --output /repo/trivy_fs_results_raw.json --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --skip-dirs /repo/.git --skip-dirs /repo/node_modules --skip-dirs /repo/.github --skip-files /repo/.github/workflows/security.yml /repo || true
          docker run --rm --user "$(id -u):$(id -g)" -e TRIVY_CACHE_DIR=/tmp/trivy-cache -v "$PWD:/repo" aquasec/trivy:latest fs --scanners vuln,secret,license --format sarif --output /repo/trivy_fs_results_raw.sarif --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --skip-dirs /repo/.git --skip-dirs /repo/node_modules --skip-dirs /repo/.github --skip-files /repo/.github/workflows/security.yml /repo || true

          echo '{"Results":[]}' > trivy_image_results_raw.json
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image_results_raw.sarif

          if [ -f Dockerfile ]; then
            docker build -t appsec-image:latest . || true
            if docker image inspect appsec-image:latest >/dev/null 2>&1; then
              docker run --rm --user "$(id -u):$(id -g)" -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:latest image --scanners vuln --format json --output /repo/trivy_image_results_raw.json --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL appsec-image:latest || true
              docker run --rm --user "$(id -u):$(id -g)" -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:latest image --scanners vuln --format sarif --output /repo/trivy_image_results_raw.sarif --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL appsec-image:latest || true
            fi
          fi

          python3 - <<'PY'
          import json
          import pathlib

          repo = pathlib.Path('.').resolve()

          def read_json(path, fallback):
              try:
                  return json.loads(pathlib.Path(path).read_text(encoding='utf-8', errors='ignore'))
              except Exception:
                  return fallback

          def clean_target(target):
              target = str(target or '').replace('\\\\', '/')
              target = target.replace('/repo/', '').lstrip('/')
              return '' if target in {'.', ''} else target

          def find_line_in_file(file_path, patterns):
              try:
                  lines = pathlib.Path(file_path).read_text(encoding='utf-8', errors='ignore').splitlines()
              except Exception:
                  return 1
              pats = [str(p) for p in patterns if p]
              for idx, line in enumerate(lines, 1):
                  for pat in pats:
                      if pat and pat in line:
                          return idx
              lowered = [p.lower() for p in pats]
              for idx, line in enumerate(lines, 1):
                  low = line.lower()
                  for pat in lowered:
                      if pat and pat in low:
                          return idx
              return 1

          def resolve_line(target, item, kind):
              target_clean = clean_target(target)
              for key in ['StartLine', 'Line', 'EndLine']:
                  value = item.get(key)
                  if isinstance(value, int) and value > 0:
                      return value
              candidates = []
              if kind == 'vulnerability':
                  candidates += [item.get('PkgName', ''), item.get('Name', ''), item.get('VulnerabilityID', '')]
              elif kind == 'secret':
                  candidates += [item.get('RuleID', ''), item.get('Title', ''), item.get('Match', '')]
              file_path = repo / target_clean if target_clean else None
              if file_path and file_path.exists() and file_path.is_file():
                  return find_line_in_file(file_path, candidates)
              return 1

          def enrich_json(in_path, out_path, source_name):
              data = read_json(in_path, {'Results': []})
              for result in data.get('Results', []) if isinstance(data, dict) else []:
                  result.pop('Misconfigurations_DISABLED', None)
                  target = result.get('Target', '')
                  for vuln in result.get('Vulnerabilities', []) or []:
                      line = resolve_line(target, vuln, 'vulnerability')
                      vuln['StartLine'] = line
                      vuln['Line'] = line
                      vuln['Location'] = f"{clean_target(target)}:{line}"
                      vuln['TrivySource'] = source_name
                  for secret in result.get('Secrets', []) or []:
                      line = resolve_line(target, secret, 'secret')
                      secret['StartLine'] = line
                      secret['Line'] = line
                      secret['Location'] = f"{clean_target(target)}:{line}"
                      secret['TrivySource'] = source_name
              pathlib.Path(out_path).write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding='utf-8')
              return data

          fs_data = enrich_json('trivy_fs_results_raw.json', 'trivy_fs_results.json', 'filesystem')
          image_data = enrich_json('trivy_image_results_raw.json', 'trivy_image_results.json', 'image')

          combined = {'Results': []}
          for data in [fs_data, image_data]:
              for result in data.get('Results', []) if isinstance(data, dict) else []:
                  result.pop('Misconfigurations_DISABLED', None)
                  combined['Results'].append(result)

          pathlib.Path('trivy_results.json').write_text(json.dumps(combined, indent=2, ensure_ascii=False), encoding='utf-8')

          # SARIF principal para GitHub Security: filesystem SCA. Image queda como artefacto adicional.
          fs_sarif = read_json('trivy_fs_results_raw.sarif', {'version': '2.1.0', 'runs': [{'tool': {'driver': {'name': 'Trivy FS', 'rules': []}}, 'results': []}]})
          pathlib.Path('trivy_results.sarif').write_text(json.dumps(fs_sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure SCA artifacts exist
        if: always()
        shell: bash
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
          test -f trivy_fs_results_raw.json || echo '{"Results":[]}' > trivy_fs_results_raw.json
          test -f trivy_fs_results_raw.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy FS","rules":[]}},"results":[]}]}' > trivy_fs_results_raw.sarif
          test -f trivy_image_results_raw.json || echo '{"Results":[]}' > trivy_image_results_raw.json
          test -f trivy_image_results_raw.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image_results_raw.sarif
          test -f trivy_fs_results.json || echo '{"Results":[]}' > trivy_fs_results.json
          test -f trivy_image_results.json || echo '{"Results":[]}' > trivy_image_results.json
          test -f trivy_results.json || echo '{"Results":[]}' > trivy_results.json
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif
      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca
      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            trivy_fs_results_raw.json
            trivy_fs_results_raw.sarif
            trivy_image_results_raw.json
            trivy_image_results_raw.sarif
            trivy_fs_results.json
            trivy_image_results.json
            trivy_results.json
            trivy_results.sarif
          retention-days: 30

