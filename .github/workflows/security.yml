          import pathlib

          root = pathlib.Path("all_scan_results")
          outdir = pathlib.Path("central-security-report")
          outdir.mkdir(exist_ok=True)
          findings = []
          quality = []
          tool_status = []

          def norm(s):
              s = str(s or "UNKNOWN").upper()
              return {"ERROR":"HIGH","WARNING":"MEDIUM","WARN":"MEDIUM","NOTE":"LOW","STYLE":"LOW"}.get(s, s)

          def add(category, severity, tool, location, detail, rule="", source="", fp_note=""):
              findings.append({
                  "category": category,
                  "severity": norm(severity),
                  "tool": tool,
                  "location": location or "?:?",
                  "detail": str(detail or "").replace("\n", " ")[:3000],
                  "rule": rule or "",
                  "source": source or "",
                  "fp_note": fp_note or ""
              })

          def load_all(name):
              matched = False
              for p in root.rglob(name):
                  matched = True
                  try:
                      txt = p.read_text(encoding="utf-8", errors="ignore").strip()
                      if txt:
                          yield p, json.loads(txt)
                  except Exception as e:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", f"{p}:1", f"No se pudo leer JSON: {e}", "PARSER_ERROR", str(p))
              if not matched:
                  tool_status.append({"artifact": name, "status": "missing"})

          for p, data in load_all("ai_app_static_findings.json"):
              count = 0
              for x in data.get("findings", []):
                  count += 1
                  add(x.get("category","AI / LLM / Agentic"), x.get("severity","UNKNOWN"), x.get("tool","AI/App Static Analyzer"), f"{x.get('file','?')}:{x.get('line','?')}", x.get("message",""), x.get("rule",""), str(p), x.get("fp_note",""))
              tool_status.append({"artifact": str(p), "tool": "AI/App Static Analyzer", "findings": count})

          for p, data in load_all("semgrep_ai.json"):
              count = 0
              for x in data.get("results", []):
                  count += 1
                  e = x.get("extra", {})
                  add("AI / LLM / Agentic", e.get("severity","UNKNOWN"), "Semgrep AI", f"{x.get('path','?')}:{x.get('start',{}).get('line','?')}", e.get("message",""), x.get("check_id",""), str(p))
              tool_status.append({"artifact": str(p), "tool": "Semgrep AI", "findings": count})

          for p, data in load_all("semgrep.json"):
              count = 0
              for x in data.get("results", []):
                  count += 1
                  e = x.get("extra", {})
                  add("CÃ³digo aplicativo", e.get("severity","UNKNOWN"), "Semgrep OSS", f"{x.get('path','?')}:{x.get('start',{}).get('line','?')}", e.get("message",""), x.get("check_id",""), str(p))
              tool_status.append({"artifact": str(p), "tool": "Semgrep OSS", "findings": count})

          for p, data in load_all("codeql_findings.json"):
              count = 0
              for x in data.get("findings", []):
                  count += 1
                  add(x.get("category","CÃ³digo aplicativo"), x.get("severity","UNKNOWN"), x.get("tool","CodeQL"), x.get("location","?:?"), x.get("message",""), x.get("rule",""), str(p))
              tool_status.append({"artifact": str(p), "tool": "CodeQL", "findings": count})

          for p, data in load_all("dependency_policy_findings.json"):
              count = 0
              for x in data.get("findings", []):
                  count += 1
                  add(x.get("category","Dependencias / Policy"), x.get("severity","UNKNOWN"), "Dependency Policy", f"{x.get('file','?')}:{x.get('line','?')}", x.get("message",""), x.get("rule",""), str(p))
              tool_status.append({"artifact": str(p), "tool": "Dependency Policy", "findings": count})

          for p, data in load_all("pip_audit_osv.json"):
              count = 0
              deps = data.get("dependencies", []) if isinstance(data, dict) else []
              for dep in deps:
                  for v in dep.get("vulns", []) or []:
                      count += 1
                      add("Dependencias / SCA", v.get("severity","HIGH"), "pip-audit", f"{dep.get('name','?')}:?", f"{dep.get('name','?')} {dep.get('version','')}: {v.get('id','')} - {v.get('description','')}", v.get("id",""), str(p))
              tool_status.append({"artifact": str(p), "tool": "pip-audit", "findings": count})

          for p, data in load_all("trivy_results.json"):
              count = 0
              for r in data.get("Results", []) if isinstance(data, dict) else []:
                  target = r.get("Target","?")
