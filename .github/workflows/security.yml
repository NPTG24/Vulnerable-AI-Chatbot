        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          fi
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif

      - name: Run Trivy filesystem JSON and SARIF
