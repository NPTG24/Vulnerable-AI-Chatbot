name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare folders
        run: |
          rm -rf all_scan_results
          mkdir -p all_scan_results/semgrep-results
          mkdir -p all_scan_results/semgrep-ai-results
          mkdir -p all_scan_results/pip-audit-results
          mkdir -p all_scan_results/npm-audit-results
          mkdir -p all_scan_results/trivy-results
          mkdir -p all_scan_results/checkov-results
          mkdir -p all_scan_results/ruff-quality-results
          mkdir -p all_scan_results/sarif

      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          pip install semgrep pip-audit checkov ruff

      # ==========================================================
      # AI / LLM / AGENTIC - REGLAS PRECISAS
      # Solo alertan cuando hay flujo desde request Flask hacia LLM/RAG,
      # herramientas peligrosas de agentes, secretos devueltos o request -> shell.
      # ==========================================================

      - name: Create precise AI security rules
        run: |
          cat > precise-ai-security.yml <<'EOF'
          rules:
            - id: ai.flask-request-to-llm
              mode: taint
              languages:
                - python
              severity: ERROR
              message: User-controlled Flask request data reaches an LLM or AI chain. Review prompt injection, authorization, tool-use and data leakage controls.
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
                - pattern: https://urldefense.com/v3/__http://request.data__;!!P110LumUDw!-iX5LRQjiliRse5dyATRBTzSRuM1CRcuFfYDChOgdg4gu-4Z53-4zImkviVdQ1U0zdbwNxTL2Iz9UfPw2A-7MdXaNZM_5g$ 
              pattern-sinks:
                - pattern: $LLM.invoke(...)
                - pattern: $LLM.predict(...)
                - pattern: $LLM.generate(...)
                - pattern: $CHAIN.invoke(...)
                - pattern: $CHAIN.run(...)
                - pattern: $AGENT.invoke(...)
                - pattern: $AGENT.run(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)

            - id: ai.flask-request-to-rag
              mode: taint
              languages:
                - python
              severity: ERROR
              message: User-controlled Flask request data reaches a RAG/retrieval chain. Validate authorization, tenant isolation, prompt injection defenses and source filtering.
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $QA.run(...)
                - pattern: $QA.invoke(...)
                - pattern: RetrievalQA.from_chain_type(...).run(...)
                - pattern: $RETRIEVER.get_relevant_documents(...)
                - pattern: $VECTORSTORE.similarity_search(...)

            - id: ai.agent-dangerous-tooling
              languages:
                - python
              severity: ERROR
              message: AI agent/tool execution detected with a dangerous capability. Review whether the model can trigger shell, code execution, HTTP or filesystem actions.
              pattern-either:
                - pattern: PythonREPLTool(...)
                - pattern: ShellTool(...)
                - pattern: RequestsGetTool(...)
                - pattern: RequestsPostTool(...)
                - pattern: Tool(..., func=eval, ...)
                - pattern: Tool(..., func=exec, ...)
                - pattern: Tool(..., func=os.system, ...)
                - pattern: StructuredTool(..., func=eval, ...)
                - pattern: StructuredTool(..., func=exec, ...)
                - pattern: StructuredTool(..., func=os.system, ...)

            - id: ai.secret-env-returned-to-user
              languages:
                - python
              severity: ERROR
              message: Secret-like environment variable appears to be returned, rendered or serialized to the user.
              pattern-either:
                - pattern: return os.environ["SECRET"]
                - pattern: return os.environ["OPENAI_API_KEY"]
                - pattern: return os.environ["API_KEY"]
                - pattern: return os.environ["TOKEN"]
                - pattern: return os.environ["PASSWORD"]
                - pattern: return os.getenv("SECRET")
                - pattern: return os.getenv("OPENAI_API_KEY")
                - pattern: return os.getenv("API_KEY")
                - pattern: return os.getenv("TOKEN")
                - pattern: return os.getenv("PASSWORD")
                - pattern: jsonify(..., os.environ["SECRET"], ...)
                - pattern: jsonify(..., os.environ["OPENAI_API_KEY"], ...)
                - pattern: jsonify(..., os.environ["API_KEY"], ...)
                - pattern: jsonify(..., os.environ["TOKEN"], ...)
                - pattern: jsonify(..., os.environ["PASSWORD"], ...)
                - pattern: jsonify(..., os.getenv("SECRET"), ...)
                - pattern: jsonify(..., os.getenv("OPENAI_API_KEY"), ...)
                - pattern: jsonify(..., os.getenv("API_KEY"), ...)
                - pattern: jsonify(..., os.getenv("TOKEN"), ...)
                - pattern: jsonify(..., os.getenv("PASSWORD"), ...)
                - pattern: render_template(..., secret=os.environ["SECRET"], ...)
                - pattern: render_template(..., api_key=os.environ["OPENAI_API_KEY"], ...)
                - pattern: render_template(..., token=os.environ["TOKEN"], ...)

            - id: ai.uploaded-file-to-document-loader
              mode: taint
              languages:
                - python
              severity: ERROR
              message: Uploaded file reaches a document loader. Validate file type, size, extension, sandboxing and malicious document handling.
              pattern-sources:
                - pattern: request.files[$X]
                - pattern: request.files.get(...)
              pattern-sinks:
                - pattern: PyPDFLoader(...)
                - pattern: UnstructuredFileLoader(...)
                - pattern: Docx2txtLoader(...)
                - pattern: CSVLoader(...)
                - pattern: TextLoader(...)
                - pattern: DirectoryLoader(...)

            - id: code.request-to-subprocess-shell
              mode: taint
              languages:
                - python
              severity: ERROR
              message: User-controlled request data reaches subprocess shell execution. Possible command injection.
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: os.system(...)

            - id: code.subprocess-shell-true
              languages:
                - python
              severity: WARNING
              message: subprocess with shell=True detected. Review for command injection if any command part is attacker-controlled.
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: web.flask-debug-enabled
              languages:
                - python
              severity: ERROR
              message: Flask debug mode enabled.
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: web.flask-public-host
              languages:
                - python
              severity: WARNING
              message: Flask app exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-iX5LRQjiliRse5dyATRBTzSRuM1CRcuFfYDChOgdg4gu-4Z53-4zImkviVdQ1U0zdbwNxTL2Iz9UfPw2A-7MdVtmDuJow$ . Confirm intended exposure, authentication and network controls.
              pattern-either:
                - pattern: app.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-iX5LRQjiliRse5dyATRBTzSRuM1CRcuFfYDChOgdg4gu-4Z53-4zImkviVdQ1U0zdbwNxTL2Iz9UfPw2A-7MdVtmDuJow$ ", ...)
                - pattern: $APP.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-iX5LRQjiliRse5dyATRBTzSRuM1CRcuFfYDChOgdg4gu-4Z53-4zImkviVdQ1U0zdbwNxTL2Iz9UfPw2A-7MdVtmDuJow$ ", ...)
          EOF

      # ==========================================================
      # CÃ“DIGO APLICATIVO - SEMGREP GENERAL
      # ==========================================================

      - name: Semgrep OSS AppSec scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude .git \
            --exclude all_scan_results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --json \
            --output all_scan_results/semgrep-results/semgrep.json \
            . || true

          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude .git \
            --exclude all_scan_results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --sarif \
            --output all_scan_results/sarif/semgrep.sarif \
            . || true

      - name: Semgrep precise AI AppSec scan
        run: |
          semgrep scan \
            --config precise-ai-security.yml \
            --exclude .git \
            --exclude all_scan_results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --json \
            --output all_scan_results/semgrep-ai-results/semgrep-ai.json \
            . || true

          semgrep scan \
            --config precise-ai-security.yml \
            --exclude .git \
            --exclude all_scan_results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --sarif \
            --output all_scan_results/sarif/semgrep-ai.sarif \
            . || true

      # ==========================================================
      # DEPENDENCIAS / SCA
      # ==========================================================

      - name: Python dependency scan - pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt \
              --format json \
              --output all_scan_results/pip-audit-results/pip-audit.json || true
          else
            echo '{"dependencies":[]}' > all_scan_results/pip-audit-results/pip-audit.json
          fi

      - name: Node dependency scan - npm audit
        run: |
          if [ -f package-lock.json ]; then
            npm audit --json > all_scan_results/npm-audit-results/npm-audit.json || true
          else
            echo '{}' > all_scan_results/npm-audit-results/npm-audit.json
          fi

      # ==========================================================
      # SECRETOS
      # ==========================================================

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================================
      # DOCKER / CONTENEDORES / IAC
      # ==========================================================

      - name: Trivy filesystem scan - SARIF
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: all_scan_results/sarif/trivy.sarif

      - name: Trivy filesystem scan - JSON
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: all_scan_results/trivy-results/trivy.json

      - name: Checkov Docker and IaC scan - JSON
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --quiet \
            --skip-path .git \
            --skip-path all_scan_results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output json \
            > all_scan_results/checkov-results/checkov.json || true

      - name: Checkov Docker and IaC scan - SARIF
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --quiet \
            --skip-path .git \
            --skip-path all_scan_results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output sarif \
            > all_scan_results/sarif/checkov.sarif || true

      # ==========================================================
      # CALIDAD DE DESARROLLO
      # ==========================================================

      - name: Ruff quality scan
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            ruff check . \
              --exclude .git \
              --exclude all_scan_results \
              --exclude node_modules \
              --exclude vendor \
              --exclude dist \
              --exclude build \
              --exclude .venv \
              --output-format json \
              > all_scan_results/ruff-quality-results/ruff.json || true
          else
            echo "[]" > all_scan_results/ruff-quality-results/ruff.json
          fi

      # ==========================================================
      # VALIDAR SARIF PARA EVITAR ERROR DE CARPETA / ARCHIVO
      # ==========================================================

      - name: Ensure SARIF files are valid
        run: |
          for file in semgrep.sarif semgrep-ai.sarif trivy.sarif checkov.sarif; do
            path="all_scan_results/sarif/$file"

            if [ -d "$path" ]; then
              rm -rf "$path"
            fi

            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi

            python -c "import json, pathlib; p=pathlib.Path('$path'); json.loads(p.read_text(errors='ignore'))" || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
          done

      # ==========================================================
      # UPLOAD SARIF
      # ==========================================================

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: all_scan_results/sarif/semgrep.sarif
          category: semgrep-code

      - name: Upload Semgrep AI SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: all_scan_results/sarif/semgrep-ai.sarif
          category: semgrep-ai

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: all_scan_results/sarif/trivy.sarif
          category: trivy

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: all_scan_results/sarif/checkov.sarif
          category: checkov

      # ==========================================================
      # REPORTE CENTRALIZADO
      # ==========================================================

      - name: Build centralized security report
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("all_scan_results")
          report_path = root / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"

          findings = []

          def normalize_severity(severity):
              severity = (severity or "UNKNOWN").upper()
              mapping = {
                  "ERROR": "HIGH",
                  "WARNING": "MEDIUM",
                  "WARN": "MEDIUM",
                  "MODERATE": "MEDIUM",
                  "INFORMATIONAL": "INFO",
                  "INFORMATIVE": "INFO"
              }
              allowed = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
              return mapping.get(severity, severity if severity in allowed else "UNKNOWN")

          def add(category, severity, tool, location, detail):
              findings.append({
                  "category": category,
                  "severity": normalize_severity(severity),
                  "tool": tool,
                  "location": str(location or "?"),
                  "detail": str(detail or "").replace("\n", " ")[:1200]
              })

          def read_json(path):
              try:
                  if path.exists():
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          return json.loads(text)
              except Exception as error:
                  add("Pipeline / Parser", "UNKNOWN", "Report parser", str(path), f"No se pudo leer JSON: {error}")
              return None

          def semgrep_category(check_id):
              check_id = (check_id or "").lower()
              if check_id.startswith("ai.") or "llm" in check_id or "rag" in check_id or "agent" in check_id:
                  return "AI / LLM / Agentic"
              if check_id.startswith("web.") or "flask" in check_id:
                  return "CÃ³digo aplicativo"
              if check_id.startswith("code.") or "subprocess" in check_id or "eval" in check_id:
                  return "CÃ³digo aplicativo"
              if "secret" in check_id:
                  return "Secretos"
              return "CÃ³digo aplicativo"

          for path, tool in [
              (root / "semgrep-results" / "semgrep.json", "Semgrep OSS"),
              (root / "semgrep-ai-results" / "semgrep-ai.json", "Semgrep AI AppSec")
          ]:
              data = read_json(path)
              if data:
                  for result in data.get("results", []) or []:
                      check_id = result.get("check_id", "")
                      extra = result.get("extra", {})
                      location = f"{result.get('path','?')}:{result.get('start',{}).get('line','?')}"
                      add(
                          semgrep_category(check_id),
                          extra.get("severity", "UNKNOWN"),
                          tool,
                          location,
                          f"{check_id} - {extra.get('message','')}"
                      )

          data = read_json(root / "pip-audit-results" / "pip-audit.json")
          if data:
              for dep in data.get("dependencies", []) or []:
                  for vuln in dep.get("vulns", []) or []:
                      add(
                          "Dependencias / SCA",
                          "HIGH",
                          "pip-audit",
                          dep.get("name", "?"),
                          f"{vuln.get('id','')} - {vuln.get('description','')}"
                      )

          data = read_json(root / "npm-audit-results" / "npm-audit.json")
          if data and isinstance(data, dict):
              for name, vuln in data.get("vulnerabilities", {}).items():
                  add(
                      "Dependencias / SCA",
                      vuln.get("severity", "UNKNOWN"),
                      "npm audit",
                      name,
                      vuln.get("title", "Dependency vulnerability")
                  )

          data = read_json(root / "trivy-results" / "trivy.json")
          if data:
              for result in data.get("Results", []) or []:
                  target = result.get("Target", "?")

                  for vuln in result.get("Vulnerabilities", []) or []:
                      add(
                          "Dependencias / SCA",
                          vuln.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{vuln.get('PkgName','')} {vuln.get('InstalledVersion','')} - {vuln.get('VulnerabilityID','')} - {vuln.get('Title','')}"
                      )

                  for secret in result.get("Secrets", []) or []:
                      add(
                          "Secretos",
                          secret.get("Severity", "HIGH"),
                          "Trivy",
                          target,
                          secret.get("Title", "Possible secret")
                      )

                  for misconfig in result.get("Misconfigurations", []) or []:
                      category = "Docker / Contenedores" if "dockerfile" in target.lower() else "IaC / Cloud / Config"
                      add(
                          category,
                          misconfig.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{misconfig.get('ID','')} - {misconfig.get('Title','')}"
                      )

          data = read_json(root / "checkov-results" / "checkov.json")
          if data:
              reports = data if isinstance(data, list) else [data]
              for report in reports:
                  for check in report.get("results", {}).get("failed_checks", []) or []:
                      file_path = check.get("file_path", "?")
                      category = "Docker / Contenedores" if "dockerfile" in file_path.lower() else "IaC / Cloud / Config"
                      line_range = check.get("file_line_range") or ["?"]
                      add(
                          category,
                          "HIGH",
                          "Checkov",
                          f"{file_path}:{line_range[0]}",
                          f"{check.get('check_id','')} - {check.get('check_name','')}"
                      )

          ruff = read_json(root / "ruff-quality-results" / "ruff.json")
          quality = ruff if isinstance(ruff, list) else []

          categories = [
              "AI / LLM / Agentic",
              "CÃ³digo aplicativo",
              "Dependencias / SCA",
              "Secretos",
              "Docker / Contenedores",
              "IaC / Cloud / Config",
              "Pipeline / Parser"
          ]

          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {category: {severity: 0 for severity in severities} for category in categories}

          for finding in findings:
              category = finding["category"]
              severity = finding["severity"] if finding["severity"] in severities else "UNKNOWN"
              table.setdefault(category, {s: 0 for s in severities})
              table[category][severity] += 1

          order = {
              "CRITICAL": 0,
              "HIGH": 1,
              "MEDIUM": 2,
              "LOW": 3,
              "INFO": 4,
              "UNKNOWN": 5
          }

          findings.sort(key=lambda item: order.get(item["severity"], 99))
          critical_high = [item for item in findings if item["severity"] in ["CRITICAL", "HIGH"]]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Vulnerabilidades totales       : {len(findings)}")
          lines.append(f"CrÃ­ticas + Altas              : {len(critical_high)}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORÃA")
          lines.append("-" * 90)
          lines.append(f"{'CategorÃ­a':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")

          for category in categories:
              lines.append(
                  f"{category:35} "
                  f"{table[category]['CRITICAL']:>8} "
                  f"{table[category]['HIGH']:>5} "
                  f"{table[category]['MEDIUM']:>7} "
                  f"{table[category]['LOW']:>5} "
                  f"{table[category]['INFO']:>5} "
                  f"{table[category]['UNKNOWN']:>8}"
              )

          lines.append("")
          lines.append("VULNERABILIDADES ORDENADAS POR CRITICIDAD")
          lines.append("=" * 90)

          for severity in severities:
              group = [item for item in findings if item["severity"] == severity]
              lines.append("")
              lines.append(f"{severity} ({len(group)})")
              lines.append("-" * 90)

              if not group:
                  lines.append("Sin hallazgos.")
              else:
                  for index, finding in enumerate(group, 1):
                      lines.append(f"{index}. [{finding['category']}]")
                      lines.append(f"   Herramienta : {finding['tool']}")
                      lines.append(f"   UbicaciÃ³n   : {finding['location']}")
                      lines.append(f"   Detalle     : {finding['detail']}")
                      lines.append("")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)

          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for index, item in enumerate(quality, 1):
                  lines.append(f"{index}. {item.get('code','?')}")
                  lines.append(f"   UbicaciÃ³n: {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle  : {item.get('message','')}")
                  lines.append("")

          report_path.write_text("\n".join(lines), encoding="utf-8")
          print(report_path.read_text(encoding="utf-8"))
