name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      fail_on:
        description: "Security gate: never, critical, high"
        required: false
        default: "never"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  dependency-policy:
    name: "Dependencies - Policy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning and resolvable versions
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          import json, pathlib, re, subprocess, sys, tempfile

          findings = []
          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(sev, rule, file_path, line, msg, kind="vulnerability"):
              findings.append({
                  "tool": "Dependency Policy",
                  "category": "Dependencias / Policy",
                  "severity": sev,
                  "rule": rule,
                  "file": str(file_path),
                  "line": int(line or 1),
                  "message": msg,
                  "kind": kind
              })

          skip_req = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact_req = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")
          any_pkg = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*([<>=!~]=?|===)?\s*([^;#\s]+)?")
          pinned = []

          req_files = sorted(set(pathlib.Path(".").glob("requirements*.txt")) | set(pathlib.Path(".").glob("**/requirements*.txt")))
          for req in req_files:
              if skip(req):
                  continue
              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue
                  clean = line.split(" #", 1)[0].strip()
                  m = exact_req.match(clean)
                  if not m:
                      p = any_pkg.match(clean)
                      if p:
                          op, ver = p.group(3), p.group(4)
                          if not op or not ver:
                              add("MEDIUM", "PYTHON_DEPENDENCY_WITHOUT_VERSION", req, lineno, f"Dependencia Python sin version declarada: {line}")
                          elif op != "==":
                              add("MEDIUM", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", req, lineno, f"Dependencia Python sin pin exacto ==: {line}", "hygiene")
                          else:
                              add("MEDIUM", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Dependencia Python con formato no validable: {line}", "hygiene")
                      else:
                          add("MEDIUM", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Linea de dependencia Python no validable: {line}", "hygiene")
                      continue
                  pinned.append((m.group(1), m.group(3), req, lineno, clean))

          for name, version, req, lineno, clean in pinned:
              with tempfile.TemporaryDirectory() as tmp:
                  cmd = [sys.executable, "-m", "pip", "download", "--no-deps", "--disable-pip-version-check", "-d", tmp, f"{name}=={version}"]
                  try:
                      proc = subprocess.run(cmd, text=True, capture_output=True, timeout=90)
                  except Exception as error:
                      add("INFO", "PYTHON_VERSION_VALIDATION_INCONCLUSIVE", req, lineno, f"No se pudo validar version Python: {clean} ({error})", "hygiene")
                      continue
                  out = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                  if proc.returncode == 0:
                      continue
                  if "no matching distribution found" in out or "could not find a version" in out:
                      add("HIGH", "PYTHON_PACKAGE_OR_VERSION_NOT_RESOLVABLE", req, lineno, f"Paquete o version Python no existe/no es resoluble: {clean}")
                  elif any(x in out for x in ["temporary failure", "connection", "timed out", "proxy", "ssl", "network"]):
                      add("INFO", "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE", req, lineno, f"No se pudo validar por red/proxy/SSL: {clean}", "hygiene")
                  else:
                      add("INFO", "PYTHON_VERSION_VALIDATION_INCONCLUSIVE", req, lineno, f"Validacion inconclusa de version Python: {clean}", "hygiene")

          exact_npm = re.compile(r"^\d+\.\d+\.\d+([-+][0-9A-Za-z.-]+)?$")
          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip(package_json):
                  continue
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for section in ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict):
                      continue
                  for dep, ver in deps.items():
                      ver = str(ver).strip()
                      if ver.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                          add("INFO", "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY", package_json, 1, f"Dependencia npm local/workspace no validada: {dep}@{ver}", "hygiene")
                      elif ver in {"", "*", "latest"}:
                          add("MEDIUM", "NPM_DEPENDENCY_WITHOUT_VERSION", package_json, 1, f"Dependencia npm sin version exacta: {dep}@{ver}")
                      elif not exact_npm.match(ver):
                          add("MEDIUM", "NPM_DEPENDENCY_NOT_EXACT_PIN", package_json, 1, f"Dependencia npm sin version exacta: {dep}@{ver}", "hygiene")
                      else:
                          try:
                              proc = subprocess.run(["npm", "view", f"{dep}@{ver}", "version", "--json"], text=True, capture_output=True, timeout=90)
                              out = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                              if proc.returncode != 0 and ("notarget" in out or "no matching version found" in out or "404" in out):
                                  add("HIGH", "NPM_PACKAGE_OR_VERSION_NOT_RESOLVABLE", package_json, 1, f"Paquete o version npm no existe/no es resoluble: {dep}@{ver}")
                          except Exception as error:
                              add("INFO", "NPM_VERSION_VALIDATION_INCONCLUSIVE", package_json, 1, f"No se pudo validar npm {dep}@{ver}: {error}", "hygiene")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool": "Dependency Policy", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          def level(sev):
              return "error" if str(sev).upper() in {"CRITICAL", "HIGH"} else ("warning" if str(sev).upper() == "MEDIUM" else "note")
          rules, results = {}, []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": f["message"]}, "defaultConfiguration": {"level": level(f["severity"])}})
              results.append({"ruleId": rid, "level": level(f["severity"]), "message": {"text": f["message"]}, "properties": {"kind": f.get("kind", "vulnerability"), "category": f.get("category", "Dependencias / Policy")}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": f["file"]}, "region": {"startLine": f["line"]}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Dependency Policy", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        shell: bash
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  code-ai-static:
    name: "AI/App Code - Precise Static Analyzer"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run precise AI/AppSec analyzer
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          import ast
          import json
          import pathlib
          import re

          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__", "coverage"}
          findings = []

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(file, line, sev, rule, cat, msg, snippet="", confidence="HIGH", fp_note=""):
              findings.append({
                  "tool": "AI/App Static Analyzer",
                  "file": str(file),
                  "line": int(line or 1),
                  "severity": sev,
                  "rule": rule,
                  "category": cat,
                  "message": msg,
                  "snippet": snippet[:500],
                  "confidence": confidence,
                  "fp_note": fp_note
              })

          def line_text(lines, line):
              return lines[int(line or 1) - 1].strip() if 1 <= int(line or 1) <= len(lines) else ""

          def call_name(node):
