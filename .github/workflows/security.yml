                              if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_onOYkVg$ ):
                                  names.append(https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-VSTc07A$ )
                          for kw in node.keywords:
                              if isinstance(kw.value, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_onOYkVg$ ):
                                  names.append(https://urldefense.com/v3/__http://kw.value.id__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_WU7b_2g$ )
                          if any(name in {"query", "user_query", "prompt", "msg", "message", "search_query", "input", "question"} for name in names):
                              add(py, line, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", f"Prompt injection: variable potencialmente controlada por usuario llega a {cname}().", src, "HIGH")

                      if cname in {"os.system", "os.popen", "https://urldefense.com/v3/__http://subprocess.run__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-yvFmDEw$ ", "subprocess.Popen", "subprocess.check_output", "https://urldefense.com/v3/__http://subprocess.call__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-NP9zngg$ "} and "shell=True" in src:
                          add(py, line, "HIGH", "CODE_COMMAND_INJECTION_SHELL_TRUE", "CÃ³digo aplicativo", f"Comando con shell=True detectado en {cname}. Revisar si algÃºn argumento depende de input de usuario.", src, "HIGH")

                      if cname == "time.sleep":
                          seconds = None
                          if node.args and isinstance(node.args[0], ast.Constant) and isinstance(node.args[0].value, (int, float)):
                              seconds = node.args[0].value
                          if seconds and seconds >= 30:
                              severity = "MEDIUM" if has_route else "LOW"
                              add(py, line, severity, "WEB_ROUTE_LONG_SLEEP_DOS", "CÃ³digo aplicativo", f"time.sleep({seconds}) detectado; si estÃ¡ en ruta HTTP bloquea workers y puede causar DoS.", src, "HIGH")

                      if cname.endswith(".lower") and isinstance(node.func, ast.Attribute) and isinstance(node.func.value, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_onOYkVg$ ):
                          var = https://urldefense.com/v3/__http://node.func.value.id__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-29fKiRsZg$ 
                          prefix = text[:text.find(src)] if src in text else ""
                          if var in request_vars and not request_vars[var]["default"] and not is_none_guarded(prefix, var):
                              add(py, line, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "CÃ³digo aplicativo", f"ParÃ¡metro de request '{var}' usado con .lower() sin default/check visible de None; si falta el parÃ¡metro puede causar 500/DoS.", src, "HIGH")

                  if isinstance(node, ast.ExceptHandler):
                      if node.type is None or call_name(node.type) in {"Exception", "BaseException"}:
                          add(py, line, "INFO", "CODE_BROAD_EXCEPTION_OBSERVABILITY", "CÃ³digo aplicativo", "Manejo amplio de excepciones. No es vulnerabilidad directa; puede ocultar errores de seguridad y dificultar trazabilidad.", src, "MEDIUM", "No contabilizar como vulnerabilidad explotable directa.")

              for idx, raw in enumerate(lines, 1):
                  text_line = raw.strip()
                  lower = text_line.lower()
                  if "qa.run(" in text_line or ".run(query" in text_line or ".run(user_query" in text_line:
                      add(py, idx, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", "Prompt injection: query/input llega a qa.run()/chain.run().", text_line, "HIGH")
                  if "request.args.get" in text_line and "msg" in text_line:
                      add(py, idx, "INFO", "WEB_REQUEST_MSG_ENTRYPOINT", "CÃ³digo aplicativo", "Entrada de usuario desde request.args.get('msg').", text_line, "HIGH")
                  if ("if '<script>' in" in text_line) or ('if "<script>" in' in text_line):
                      add(py, idx, "MEDIUM", "WEB_WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "CÃ³digo aplicativo", "MitigaciÃ³n XSS dÃ©bil: solo filtra literal <script>.", text_line, "HIGH")
                  if "innerhtml" in lower or ".html(" in lower:
                      add(py, idx, "MEDIUM", "WEB_DOM_XSS_SINK_REVIEW", "CÃ³digo aplicativo", "Sink HTML/DOM detectado. Revisar si recibe datos del usuario o del LLM sin sanitizaciÃ³n.", text_line, "MEDIUM")
                  if any(token in lower for token in ["dangerouslysetinnerhtml", "bypasssecuritytrusthtml"]):
                      add(py, idx, "HIGH", "WEB_UNSAFE_HTML_RENDERING", "CÃ³digo aplicativo", "Renderizado HTML inseguro detectado. Revisar XSS con salida de usuario/LLM.", text_line, "HIGH")

              if has_route and has_ai:
                  terms = ["OpenAIEmbeddings", "FAISS.from_documents", "save_local", "FAISS.load_local", "RetrievalQA.from_chain_type", "Chroma.from_documents"]
                  found = [term for term in terms if term in text]
                  if len(set(found)) >= 3:
                      add(py, 1, "MEDIUM", "AI_EXPENSIVE_RAG_REBUILT_PER_REQUEST", "AI / LLM / Agentic", "Posible DoS/costo: archivo combina rutas HTTP y reconstrucciÃ³n de embeddings/vectorstore/RAG. Revisar cache, rate limiting y lÃ­mites de costo.", "", "HIGH")

          def analyze_js(path):
              text = path.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              low_all = text.lower()
              has_ai = any(t in low_all for t in ["openai", "langchain", "llamaindex", "anthropic", "gemini", "chat.completions", "responses.create"])
              has_req = any(t in low_all for t in ["req.body", "req.query", "req.params", "request.body"])
              if has_ai and has_req:
                  add(path, 1, "HIGH", "AI_JS_HTTP_INPUT_TO_LLM_SURFACE", "AI / LLM / Agentic", "Superficie AI expuesta: input HTTP y llamadas LLM en el mismo archivo. Revisar prompt injection, auth, rate limiting y tool abuse.", "", "HIGH")
              for idx, line in enumerate(lines, 1):
                  low = line.lower()
                  if "eval(" in low or "new function(" in low:
                      add(path, idx, "HIGH", "JS_EVAL_RCE_REVIEW", "CÃ³digo aplicativo", "eval/new Function detectado. Riesgo crÃ­tico si recibe input de usuario o salida LLM.", line.strip(), "HIGH")
                  if "innerhtml" in low or ".html(" in low:
                      add(path, idx, "MEDIUM", "WEB_DOM_XSS_SINK_REVIEW", "CÃ³digo aplicativo", "Sink HTML/DOM detectado. Revisar si recibe datos del usuario o salida del LLM sin sanitizaciÃ³n.", line.strip(), "MEDIUM")
                  if "child_process" in low or "exec(" in low or "execsync(" in low:
                      add(path, idx, "HIGH", "JS_COMMAND_EXECUTION_REVIEW", "CÃ³digo aplicativo", "EjecuciÃ³n de comandos en JS detectada. Revisar si argumentos vienen de usuario o LLM.", line.strip(), "HIGH")
                  if "sk-" in line and ("openai" in low or "api" in low or "key" in low):
                      add(path, idx, "HIGH", "AI_HARDCODED_API_KEY", "Secretos", "Posible API key hardcodeada en cÃ³digo JS/TS.", line.strip(), "HIGH")

          for py in pathlib.Path(".").rglob("*.py"):
              if not skip(py):
                  analyze_python(py)
          for pattern in ["*.js", "*.ts", "*.jsx", "*.tsx"]:
              for js in pathlib.Path(".").rglob(pattern):
                  if not skip(js):
                      analyze_js(js)

          unique = {}
          for item in findings:
              unique[(item["file"], item["line"], item["rule"], item["message"])] = item
          findings = list(unique.values())

          pathlib.Path("ai_app_static_findings.json").write_text(json.dumps({"tool": "AI/App Static Analyzer", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          def level(sev):
              return "error" if str(sev).upper() in {"CRITICAL", "HIGH"} else ("warning" if str(sev).upper() == "MEDIUM" else "note")
          rules, results = {}, []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": f["message"]}, "defaultConfiguration": {"level": level(f["severity"])}})
              results.append({"ruleId": rid, "level": level(f["severity"]), "message": {"text": f["message"]}, "properties": {"kind": "vulnerability", "category": f["category"], "snippet": f["snippet"], "confidence": f["confidence"], "false_positive_note": f.get("fp_note", "")}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": f["file"]}, "region": {"startLine": f["line"]}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "AI/App Static Analyzer", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("ai_app_static.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"AI/App static analyzer findings: {len(findings)}")
          PY

      - name: Ensure AI/App static artifacts exist
        if: always()
        shell: bash
        run: |
          test -f ai_app_static_findings.json || echo '{"tool":"AI/App Static Analyzer","findings":[]}' > ai_app_static_findings.json
          test -f ai_app_static.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI/App Static Analyzer","rules":[]}},"results":[]}]}' > ai_app_static.sarif

      - name: Upload AI/App static SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai_app_static.sarif
          category: ai-app-static

      - name: Upload AI/App static artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-static-results
          path: |
            ai_app_static_findings.json
            ai_app_static.sarif
          retention-days: 30

  ruff:
    name: "Dev Quality - Ruff"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff as development-quality report only
        shell: bash
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          python3 - <<'PY'
          import json, pathlib
          try:
              data = json.loads(pathlib.Path("ruff_lint.json").read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []
          pathlib.Path("ruff_dev_quality_findings.json").write_text(json.dumps({"tool": "Ruff", "kind": "development_quality", "findings": data}, indent=2, ensure_ascii=False), encoding="utf-8")
          pathlib.Path("ruff_dev_quality.sarif").write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff Dev Quality","rules":[]}},"results":[]}]}', encoding="utf-8")
          PY
      - name: Upload Ruff dev-quality SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff_dev_quality.sarif
          category: ruff-dev-quality
      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-dev-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff_dev_quality_findings.json
            ruff_dev_quality.sarif
          retention-days: 30

  codeql:
    name: "SAST - CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true
      - name: Analyze and upload CodeQL SARIF
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: true
      - name: Normalize CodeQL artifacts
        if: always()
        shell: bash
        run: |
          mkdir -p codeql-results
          if ! find codeql-results -name "*.sarif" -type f | grep -q .; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL","rules":[]}},"results":[]}]}' > codeql-results/codeql_${{ matrix.language }}.sarif
          fi
          python3 - <<'PY'
          import json, pathlib
          findings = []
          for sarif in pathlib.Path("codeql-results").rglob("*.sarif"):
              try:
                  data = json.loads(sarif.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", "CodeQL")
                  for result in run.get("results", []) or []:
                      rid = result.get("ruleId", "")
                      lvl = result.get("level", "warning")
                      sev = "HIGH" if lvl == "error" else ("MEDIUM" if lvl == "warning" else "LOW")
                      msg = result.get("message", {}).get("text", "")
                      loc = "?"
                      try:
                          phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                          loc = f"{phys.get('artifactLocation', {}).get('uri', '?')}:{phys.get('region', {}).get('startLine', '?')}"
                      except Exception:
                          pass
                      findings.append({"tool": tool, "rule": rid, "severity": sev, "category": "CÃ³digo aplicativo", "location": loc, "message": msg})
          pathlib.Path("codeql_findings.json").write_text(json.dumps({"tool": "CodeQL", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-results
          path: |
            codeql-results
            codeql_findings.json
          retention-days: 30

  semgrep:
    name: "SAST - Semgrep OSS"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create high-signal app security rules
        shell: bash
        run: |
          mkdir -p .semgrep/app-security
          cat > .semgrep/app-security/app_rules.yml <<'YAML_RULES'
          rules:
            - id: web-python-flask-public-host
              languages: [python]
              severity: WARNING
              message: "Flask app is exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-O-ieCSQ$ . Confirm network controls, authentication and production WSGI deployment."
              pattern-either:
                - pattern: app.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-O-ieCSQ$ ", ...)
                - pattern: app.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-O-ieCSQ$ ", ...)
                - pattern: $APP.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-O-ieCSQ$ ", ...)
                - pattern: $APP.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2-O-ieCSQ$ ", ...)
            - id: web-python-route-long-sleep-dos
              languages: [python]
              severity: WARNING
              message: "Request handler sleeps for a long time. This can tie up workers and cause denial of service."
              patterns:
                - pattern: |
                    @app.route(...)
                    def $FUNC(...):
                        ...
                        time.sleep($SECONDS)
                        ...
                - metavariable-comparison:
                    metavariable: $SECONDS
                    comparison: $SECONDS >= 30
            - id: web-python-xss-blacklist-script-only
              languages: [python]
              severity: WARNING
              message: "Weak XSS mitigation: blacklist only checks literal <script>. Use contextual output encoding/sanitization."
              pattern-either:
                - pattern: |
                    if "<script>" in $VALUE:
                        ...
                - pattern: |
                    if '<script>' in $VALUE:
                        ...
          YAML_RULES
      - name: Run Semgrep official and custom rules
        shell: bash
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** \
            --sarif --output semgrep.sarif . || true
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** \
            --json --output semgrep.json . || true
      - name: Ensure Semgrep artifacts exist
        if: always()
        shell: bash
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
            .semgrep/app-security/app_rules.yml
          retention-days: 30

  ai-security:
    name: "AI Security - Semgrep LLM Rules"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create precise AI Semgrep rules
        shell: bash
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML_RULES'
          rules:
            - id: ai-python-retrievalqa-variable-run
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: variable input reaches RetrievalQA/LLM run(). Validate prompt injection and authorization controls."
              pattern-either:
                - pattern: $QA.run($QUERY)
                - pattern: $CHAIN.run($QUERY)
              pattern-not: $QA.run("...")
            - id: ai-python-retrievalqa-stuff-chain
              languages: [python]
              severity: WARNING
              message: "RAG chain_type='stuff' detected. Retrieved content is stuffed into prompt; review prompt injection from documents."
              pattern-either:
                - pattern: RetrievalQA.from_chain_type(..., chain_type="stuff", ...)
                - pattern: RetrievalQA.from_chain_type(..., chain_type='stuff', ...)
            - id: ai-python-keyword-blacklist-security-control
              languages: [python]
              severity: WARNING
              message: "Prompt Injection bypass: keyword blacklist appears to protect secrets/system rules."
              pattern-either:
                - pattern: |
                    sensitive_keywords = [...]
                - pattern: |
                    if any($WORD in $TEXT for $WORD in $WORDS):
                        ...
            - id: ai-python-prompt-triggered-env-flag
              languages: [python]
              severity: ERROR
              message: "Prompt Injection/backdoor: user-controlled text can toggle environment/security flag."
              pattern-either:
                - pattern: |
                    if "forget" in $INPUT and "rules" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if "new" in $INPUT and "operator" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if $A in $INPUT and $B in $INPUT:
                        os.environ[$KEY] = "yes"
            - id: ai-python-env-gate-sensitive-disclosure
              languages: [python]
              severity: ERROR
              message: "Sensitive disclosure/authorization gate controlled by mutable environment variable."
              pattern-either:
                - pattern: |
                    if os.environ[$KEY] != "yes":
                        ...
                - pattern: |
                    if os.getenv($KEY) != "yes":
                        ...
                - pattern: |
                    os.environ[$KEY] = "yes"
            - id: ai-python-document-loader-rag-prompt-injection
              languages: [python]
              severity: WARNING
              message: "Prompt Injection from documents: AI/RAG document loader detected. Validate origin, type, size and sandboxing."
              pattern-either:
                - pattern: PyPDFLoader($FILE)
                - pattern: UnstructuredFileLoader($FILE)
                - pattern: Docx2txtLoader($FILE)
                - pattern: CSVLoader($FILE)
                - pattern: TextLoader($FILE)
                - pattern: DirectoryLoader($FILE)
            - id: ai-python-local-vectorstore-persistence
              languages: [python]
              severity: INFO
              message: "Local vectorstore persistence detected. Contextual risk: poisoning/deserialization if storage is attacker-controlled or shared."
              pattern-either:
                - pattern: $VECTORSTORE.save_local(...)
                - pattern: FAISS.load_local(...)
                - pattern: $VECTORSTORE.load_local(...)
            - id: ai-python-flask-input-to-llm-taint
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: Flask request input flows to LLM/chain."
              mode: taint
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $MODEL.invoke($SINK, ...)
                - pattern: $CHAIN.invoke($SINK, ...)
                - pattern: $CHAIN.run($SINK, ...)
                - pattern: $QA.run($SINK)
                - pattern: $CLIENT.chat.completions.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.responses.create(..., input=$SINK, ...)
          YAML_RULES
      - name: Run precise AI Semgrep rules
        continue-on-error: true
        shell: bash
        run: |
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** --sarif --output semgrep_ai.sarif . || true
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --exclude tests/** --exclude test/** --exclude node_modules/** --exclude .venv/** --exclude venv/** --exclude dist/** --exclude build/** --json --output semgrep_ai.json . || true
