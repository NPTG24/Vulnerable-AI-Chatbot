name: Security Pipeline Fuerte Preciso

# Code-first, report-only, alta señal.
# Incluye SAST, AI/LLM, dependencias, secretos, Docker y Checkov.
# No analiza .github/workflows/** como código del producto para evitar ruido del propio pipeline.
# No usa hashFiles en job.if porque GitHub no lo permite en ese contexto.
# Guardar como: .github/workflows/security.yml

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  SEVERITY: "HIGH,CRITICAL"

jobs:
  policy:
    name: Policy — versiones y pinning útil
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Revisar estándares mínimos del repo
        shell: bash
        continue-on-error: true
        run: |
          mkdir -p security-results
          python3 - <<'PY'
          import json, pathlib, re
          findings=[]
          root=pathlib.Path('.')
          skip={'.git','.github','node_modules','.venv','venv','dist','build','coverage','__pycache__'}
          def ignored(p): return any(x in skip for x in https://urldefense.com/v3/__http://p.parts__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1eU6rJ-w$ )
          def add(sev,rule,file,msg,line=1): findings.append({"area":"policy","severity":sev,"rule":rule,"file":file,"line":line,"message":msg})

          # Python runtime policy
          py_versions=[]
          for f in ['.python-version','runtime.txt']:
            p=root/f
            if p.exists(): py_versions.append((f,p.read_text(errors='ignore').strip()))
          pyproject=root/'pyproject.toml'
          if pyproject.exists():
            txt=pyproject.read_text(errors='ignore')
            m=re.search(r'requires-python\s*=\s*["\']([^"\']+)',txt)
            if m: py_versions.append(('pyproject.toml',m.group(1)))
          if not py_versions:
            add('medium','python-version-missing','repo','No se declara versión de Python (.python-version, runtime.txt o requires-python).')

          # Requirements pinning
          req=root/'requirements.txt'
          if req.exists():
            for i,line in enumerate(req.read_text(errors='ignore').splitlines(),1):
              s=line.strip()
              if not s or s.startswith('#') or s.startswith('-r') or s.startswith('--'): continue
              if not re.search(r'==\s*[^\s]+',s):
                add('medium','python-dependency-not-pinned','requirements.txt',f'Dependencia sin pin exacto: {s}',i)
          else:
            add('low','requirements-missing','repo','No existe requirements.txt; se omite pip-audit.')

          # Node package policy
          pkg=root/'package.json'
          if pkg.exists():
            lock = any((root/x).exists() for x in ['package-lock.json','npm-shrinkwrap.json','pnpm-lock.yaml','yarn.lock'])
            if not lock: add('medium','node-lockfile-missing','package.json','Existe package.json pero no hay lockfile reproducible.')
            try:
              data=json.loads(pkg.read_text(errors='ignore'))
              for section in ['dependencies','devDependencies']:
                for name,ver in data.get(section,{}).items():
                  if isinstance(ver,str) and (ver.startswith('^') or ver.startswith('~') or ver in ['*','latest']):
                    add('medium','npm-dependency-floating','package.json',f'{section}: {name}@{ver} no está fijada exactamente.')
            except Exception as e:
              add('high','package-json-invalid','package.json',f'package.json inválido: {e}')

          # Docker policy
          for df in list(root.glob('Dockerfile')) + list(root.glob('**/Dockerfile')):
            if ignored(df): continue
            txt=df.read_text(errors='ignore')
            lines=txt.splitlines()
            if not re.search(r'^\s*USER\s+[^\s#]+',txt,re.M): add('high','docker-missing-nonroot-user',str(df),'Dockerfile sin USER no-root.')
            for i,l in enumerate(lines,1):
              if re.match(r'^\s*FROM\s+[^\s:]+\s*$',l): add('medium','docker-base-image-not-pinned',str(df),'Imagen base sin tag explícito.',i)
              if re.match(r'^\s*WORKDIR\s+[^/]',l): add('high','docker-workdir-relative',str(df),'WORKDIR debe ser absoluto.',i)
              if '--no-cache-dir' not in l and re.search(r'pip\s+install',l): add('low','docker-pip-cache',str(df),'pip install sin --no-cache-dir.',i)

          pathlib.Path('security-results/policy_findings.json').write_text(json.dumps({"findings":findings},indent=2),encoding='utf-8')
          print(f'Policy findings: {len(findings)}')
          for f in findings: print(f"[{f['severity']}] {f['rule']} {f['file']}:{f['line']} - {f['message']}")
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: policy-results
          path: security-results/policy_findings.json
          retention-days: 30

  codeql-python:
    name: CodeQL — Python producto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar Python
        id: detect
        shell: bash
        run: |
          if find . -path './.github' -prune -o -path './node_modules' -prune -o -name '*.py' -print -quit | grep -q .; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi
      - name: CodeQL config
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        run: |
          cat > codeql-config.yml <<'YAML'
          name: codeql-python-product
          paths-ignore:
            - .github/workflows/**
            - node_modules/**
            - dist/**
            - build/**
            - coverage/**
            - docs/**
            - '**/*.md'
          query-filters:
            - include:
                precision:
                  - high
                  - very-high
          YAML
      - uses: github/codeql-action/init@v4
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        with:
          languages: python
          queries: security-extended,security-and-quality
          config-file: codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        continue-on-error: true
        with:
          category: codeql-python-product
      - name: Sin Python
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  != 'true'
        run: echo "No hay archivos Python de producto."

  codeql-js:
    name: CodeQL — JS/TS producto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar JS/TS
        id: detect
        shell: bash
        run: |
          if find . -path './.github' -prune -o -path './node_modules' -prune -o \( -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' \) -print -quit | grep -q .; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi
      - name: CodeQL config
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        run: |
          cat > codeql-config.yml <<'YAML'
          name: codeql-js-product
          paths-ignore:
            - .github/workflows/**
            - node_modules/**
            - dist/**
            - build/**
            - coverage/**
            - docs/**
            - '**/*.md'
          query-filters:
            - include:
                precision:
                  - high
                  - very-high
          YAML
      - uses: github/codeql-action/init@v4
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
          config-file: codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        continue-on-error: true
        with:
          category: codeql-js-product
      - name: Sin JS/TS
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  != 'true'
        run: echo "No hay archivos JS/TS de producto."

  semgrep:
    name: Semgrep — código + AI/LLM alta señal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Reglas locales de alta señal
        shell: bash
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/high-signal.yml <<'YAML'
          rules:
            - id: python-subprocess-shell-true
              languages: [python]
              severity: ERROR
              message: "RCE/command injection: subprocess con shell=True."
              metadata: {area: code, confidence: high, cwe: CWE-78, owasp_llm: LLM05/LLM06}
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
            - id: python-os-command-exec
              languages: [python]
              severity: ERROR
              message: "RCE/command injection: os.system/os.popen."
              metadata: {area: code, confidence: high, cwe: CWE-78, owasp_llm: LLM05/LLM06}
              pattern-either:
                - pattern: os.system(...)
                - pattern: os.popen(...)
            - id: python-eval-exec
              languages: [python]
              severity: ERROR
              message: "Ejecución dinámica eval/exec; crítico si recibe input o salida LLM."
              metadata: {area: code, confidence: high, cwe: CWE-94, owasp_llm: LLM02/LLM05}
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)
            - id: python-unsafe-yaml-load
              languages: [python]
              severity: ERROR
              message: "Deserialización insegura: yaml.load sin SafeLoader."
              metadata: {area: code, confidence: high, cwe: CWE-502}
              patterns:
                - pattern: yaml.load(...)
                - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
                - pattern-not: yaml.load(..., Loader=SafeLoader, ...)
            - id: python-pickle-load
              languages: [python]
              severity: WARNING
              message: "pickle.load/loads sobre datos no confiables puede ser RCE."
              metadata: {area: code, confidence: medium, cwe: CWE-502}
              pattern-either:
                - pattern: pickle.load(...)
                - pattern: pickle.loads(...)
            - id: python-sql-formatting
              languages: [python]
              severity: WARNING
              message: "Posible SQL injection por query construida dinámicamente."
              metadata: {area: code, confidence: medium, cwe: CWE-89}
              pattern-either:
                - pattern: $CUR.execute("..." % ...)
                - pattern: $CUR.execute("...".format(...))
                - pattern: $CUR.execute(f"...{...}...")
            - id: flask-debug-true
              languages: [python]
              severity: ERROR
              message: "Flask debug=True expone debugger interactivo."
              metadata: {area: code, confidence: high, cwe: CWE-489}
              pattern: $APP.run(..., debug=True, ...)
            - id: flask-hardcoded-secret-key
              languages: [python]
              severity: ERROR
              message: "Flask SECRET_KEY hardcodeada."
              metadata: {area: secrets, confidence: high, cwe: CWE-798, owasp_llm: LLM02}
              pattern-either:
                - pattern: $APP.config['SECRET_KEY'] = "..."
                - pattern: $APP.secret_key = "..."
            - id: python-requests-verify-false
              languages: [python]
              severity: WARNING
              message: "TLS verification deshabilitada con verify=False."
              metadata: {area: code, confidence: high, cwe: CWE-295}
              pattern-either:
                - pattern: requests.get(..., verify=False, ...)
                - pattern: requests.post(..., verify=False, ...)
                - pattern: requests.request(..., verify=False, ...)
            - id: js-eval-new-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "Ejecución dinámica eval/new Function."
              metadata: {area: code, confidence: high, cwe: CWE-94, owasp_llm: LLM02/LLM05}
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)
            - id: node-child-process-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "Ejecución de comandos con child_process.exec/execSync."
              metadata: {area: code, confidence: high, cwe: CWE-78, owasp_llm: LLM05/LLM06}
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            # AI/LLM específicas: report-only, alta señal para PoC vulnerable.
            - id: ai-langchain-python-repl-tool
              languages: [python]
              severity: ERROR
              message: "LLM06 Excessive Agency: PythonREPL/REPL tool permite ejecución de código desde agente."
              metadata: {area: ai_llm, confidence: high, owasp_llm: LLM06}
              pattern-either:
                - pattern: PythonREPLTool(...)
                - pattern: PythonAstREPLTool(...)
            - id: ai-langchain-shell-tool
              languages: [python]
              severity: ERROR
              message: "LLM06 Excessive Agency: ShellTool o terminal expuesta a agente."
              metadata: {area: ai_llm, confidence: high, owasp_llm: LLM06}
              pattern-either:
                - pattern: ShellTool(...)
                - pattern: BashProcess(...)
            - id: ai-agent-dangerous-tool-registration
              languages: [python]
              severity: WARNING
              message: "LLM06: agente registra tools; revisar allowlist, aprobación humana y permisos mínimos."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM06}
              pattern-either:
                - pattern: initialize_agent(..., tools=$TOOLS, ...)
                - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                - pattern: Tool(..., func=$FUNC, ...)
                - pattern: StructuredTool.from_function($FUNC, ...)
            - id: ai-prompt-template-raw-user-input
              languages: [python]
              severity: WARNING
              message: "LLM01 Prompt Injection: PromptTemplate/ChatPromptTemplate usa input externo; revisar delimitación y política de instrucciones."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM01}
              pattern-either:
                - pattern: PromptTemplate.from_template(...)
                - pattern: ChatPromptTemplate.from_template(...)
                - pattern: ChatPromptTemplate.from_messages(...)
            - id: ai-system-message-variable
              languages: [python]
              severity: WARNING
              message: "LLM01/LLM07: system/developer message con variable; riesgo de inyección o fuga de prompt."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM01/LLM07}
              patterns:
                - pattern-either:
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(input|user|query|question|message|prompt|body|content).*
            - id: ai-hardcoded-system-prompt
              languages: [python, javascript, typescript]
              severity: INFO
              message: "LLM07: prompt de sistema hardcodeado; verificar que no se exponga por logs, API o UI."
              metadata: {area: ai_llm, confidence: low, owasp_llm: LLM07}
              pattern-regex: (?i)(system_prompt|systemPrompt|SYSTEM_PROMPT|developer_message)\s*=\s*["'`]
            - id: ai-openai-no-output-limit-python
              languages: [python]
              severity: WARNING
              message: "LLM10: llamada a modelo sin límite evidente de salida."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM10}
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
            - id: ai-rag-ingestion-without-metadata
              languages: [python]
              severity: WARNING
              message: "LLM03/LLM04/LLM08: RAG/vectorstore sin metadata/source/tenant evidente."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM03/LLM04/LLM08}
              patterns:
                - pattern-either:
                    - pattern: $DB.add_documents($DOCS, ...)
                    - pattern: $DB.add_texts($TEXTS, ...)
                    - pattern: $VS.from_documents($DOCS, ...)
                    - pattern: FAISS.from_texts($TEXTS, ...)
                    - pattern: FAISS.from_documents($DOCS, ...)
                - pattern-not-regex: (?i)(metadata|source|tenant|validate|trusted|sanitize)
            - id: ai-ssrf-url-fetch-tool
              languages: [python]
              severity: ERROR
              message: "LLM05 SSRF/Insecure Output Handling: tool permite fetch de URL potencialmente controlada."
              metadata: {area: ai_llm, confidence: high, owasp_llm: LLM05}
              pattern-either:
                - pattern: requests.get($URL, ...)
                - pattern: urllib.request.urlopen($URL, ...)
            - id: ai-sensitive-data-in-prompt-or-log
              languages: [python, javascript, typescript]
              severity: WARNING
              message: "LLM02: posible dato sensible en prompt/log/contexto enviado al modelo."
              metadata: {area: ai_llm, confidence: medium, owasp_llm: LLM02}
              pattern-regex: (?i)(api[_-]?key|secret|password|token|authorization|bearer|cookie|session).{0,80}(prompt|message|context|log|print|console\.log)
          YAML
      - name: Ejecutar Semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config .semgrep/local/high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --sarif --output semgrep.sarif . || true
          semgrep scan \
            --config .semgrep/local/high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --json --output semgrep.json . || true
      - name: Asegurar artifacts Semgrep
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: semgrep.sarif
          category: semgrep-product-ai
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  dependencies:
    name: Dependencias — pip/npm + Trivy vuln/secret
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar herramientas
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          curl -sfL https://urldefense.com/v3/__https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1aDweH0g$  | sh -s -- -b /usr/local/bin
      - name: pip-audit si hay requirements.txt
        continue-on-error: true
        run: |
          mkdir -p security-results
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt -f json -o security-results/pip-audit.json || true
          else
            echo '{"dependencies":[],"vulnerabilities":[],"skipped":"requirements.txt not found"}' > security-results/pip-audit.json
          fi
      - name: npm audit si hay package.json
        continue-on-error: true
        run: |
          if [ -f package.json ]; then
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
              npm audit --json > security-results/npm-audit.json || true
            else
              echo '{"skipped":"package.json exists but no npm lockfile"}' > security-results/npm-audit.json
            fi
          else
            echo '{"skipped":"package.json not found"}' > security-results/npm-audit.json
          fi
      - name: Trivy filesystem vuln/secrets/misconfig
        continue-on-error: true
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity ${{ env.SEVERITY }} \
            --ignore-unfixed \
            --skip-dirs .git \
            --skip-dirs .github/workflows \
            --skip-dirs node_modules \
            --skip-dirs .venv \
            --skip-dirs venv \
            --skip-dirs dist \
            --skip-dirs build \
            --format json \
            --output security-results/trivy-fs.json || true
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity ${{ env.SEVERITY }} \
            --ignore-unfixed \
            --skip-dirs .git \
            --skip-dirs .github/workflows \
            --skip-dirs node_modules \
            --skip-dirs .venv \
            --skip-dirs venv \
            --skip-dirs dist \
            --skip-dirs build \
            --format sarif \
            --output security-results/trivy-fs.sarif || true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: security-results/trivy-fs.sarif
          category: trivy-fs-product
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-results
          path: security-results/
          retention-days: 30

  dependency-review:
    name: Dependency Review — PR sin ruido en push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ejecutar solo en Pull Request
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          warn-only: true
          comment-summary-in-pr: always
      - name: No es PR
        if: github.event_name != 'pull_request'
        run: echo "Dependency Review solo aplica a pull_request; no se marca job como skipped."

  docker:
    name: Docker — Hadolint + Trivy imagen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar Dockerfile
        id: detect
        run: |
          if find . -path './.github' -prune -o -name 'Dockerfile' -print -quit | grep -q .; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi
      - name: Hadolint
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        continue-on-error: true
        run: |
          mkdir -p docker-results
          docker run --rm -i hadolint/hadolint:latest hadolint - --format json < Dockerfile > docker-results/hadolint.json || true
          docker run --rm -i hadolint/hadolint:latest hadolint - < Dockerfile || true
      - name: Build imagen local
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        continue-on-error: true
        run: docker build -t local/security-scan:latest .
      - name: Instalar Trivy
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        run: curl -sfL https://urldefense.com/v3/__https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1aDweH0g$  | sh -s -- -b /usr/local/bin
      - name: Trivy image
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  == 'true'
        continue-on-error: true
        run: |
          mkdir -p docker-results
          trivy image local/security-scan:latest \
            --severity ${{ env.SEVERITY }} \
            --ignore-unfixed \
            --format json \
            --output docker-results/trivy-image.json || true
      - name: Sin Dockerfile
        if: https://urldefense.com/v3/__http://steps.detect.outputs.run__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx1E-uCD9Q$  != 'true'
        run: |
          mkdir -p docker-results
          echo '{"skipped":"Dockerfile not found"}' > docker-results/docker.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-results
          path: docker-results/
          retention-days: 30


  checkov:
    name: Checkov — Docker/IaC alta señal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar Checkov
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install checkov
      - name: Ejecutar Checkov report-only
        continue-on-error: true
        run: |
          mkdir -p checkov-results
          checkov -d . \
            --framework dockerfile,docker_compose,terraform,kubernetes,secrets \
            --skip-path .github \
            --skip-path node_modules \
            --skip-path .venv \
            --skip-path venv \
            --skip-path dist \
            --skip-path build \
            --quiet \
            --compact \
            -o json > checkov-results/checkov.json || true
          test -s checkov-results/checkov.json || echo '{"results":{"failed_checks":[]}}' > checkov-results/checkov.json
      - name: Mostrar hallazgos Checkov útiles
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          p=pathlib.Path('checkov-results/checkov.json')
          data=json.loads(p.read_text(errors='ignore') or '{"results":{"failed_checks":[]}}')
          failed=[]
          if isinstance(data, list):
            for item in data: failed += item.get('results',{}).get('failed_checks',[]) or []
          else:
            failed = data.get('results',{}).get('failed_checks',[]) or []
          print(f"Checkov failed checks: {len(failed)}")
          for c in failed[:40]:
            fp=c.get('file_path') or c.get('file_abs_path') or ''
            if '.github/' in fp: continue
            print(f"- {c.get('check_id')} {fp}: {c.get('check_name')}")
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results/
          retention-days: 30

  report:
    name: Reporte final — hallazgos útiles
    runs-on: ubuntu-latest
    needs: [policy, codeql-python, codeql-js, semgrep, dependencies, dependency-review, docker, checkov]
    if: always()
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
      - name: Crear resumen legible
        shell: bash
        run: |
          python3 - <<'PY'
          import json, pathlib
          root=pathlib.Path('artifacts')
          rows=[]
          def sev_norm(s):
            s=(s or 'unknown').lower()
            return {'error':'high','warning':'medium','note':'low'}.get(s,s)
          def add(area,tool,sev,rule,file,line,msg):
            file=str(file or '')
            if '.github/workflows/' in file: return
            rows.append({"area":area,"tool":tool,"severity":sev_norm(sev),"rule":str(rule or ''),"file":file,"line":line or 1,"message":str(msg or '')[:500]})

          for p in root.rglob('policy_findings.json'):
            try:
              for f in json.loads(p.read_text()).get('findings',[]): add(f.get('area'),'policy',f.get('severity'),f.get('rule'),f.get('file'),f.get('line'),f.get('message'))
            except Exception: pass
          for p in root.rglob('semgrep.json'):
            try:
              data=json.loads(p.read_text())
              for r in data.get('results',[]):
                extra=r.get('extra',{})
                meta=extra.get('metadata',{}) or {}
                path=r.get('path','')
                add(meta.get('area','code'),'semgrep',extra.get('severity'),r.get('check_id'),path,r.get('start',{}).get('line'),extra.get('message'))
            except Exception: pass
          for p in root.rglob('pip-audit.json'):
            try:
              data=json.loads(p.read_text())
              for dep in data.get('dependencies',[]):
                for v in dep.get('vulns',[]): add('dependencies','pip-audit',v.get('fix_versions') and 'high' or 'medium',v.get('id'),'requirements.txt',1,f"{dep.get('name')} {dep.get('version')}: {v.get('description','')[:240]} fix={v.get('fix_versions')}")
              for v in data.get('vulnerabilities',[]): add('dependencies','pip-audit','high',v.get('id'),'requirements.txt',1,str(v)[:240])
            except Exception: pass
          for p in root.rglob('trivy-fs.json'):
            try:
              data=json.loads(p.read_text())
              for res in data.get('Results',[]):
                target=res.get('Target','')
                for v in res.get('Vulnerabilities',[]) or []: add('dependencies','trivy',v.get('Severity'),v.get('VulnerabilityID'),target,1,f"{v.get('PkgName')} {v.get('InstalledVersion')} -> {v.get('FixedVersion')}: {v.get('Title')}")
                for m in res.get('Misconfigurations',[]) or []: add('docker','trivy',m.get('Severity'),m.get('ID'),target,1,m.get('Message') or m.get('Title'))
                for s in res.get('Secrets',[]) or []: add('secrets','trivy',s.get('Severity'),s.get('RuleID'),target,s.get('StartLine'),s.get('Title'))
            except Exception: pass
          for p in root.rglob('trivy-image.json'):
            try:
              data=json.loads(p.read_text())
              for res in data.get('Results',[]):
                target=res.get('Target','image')
                for v in res.get('Vulnerabilities',[]) or []: add('docker_image','trivy',v.get('Severity'),v.get('VulnerabilityID'),target,1,f"{v.get('PkgName')} {v.get('InstalledVersion')} -> {v.get('FixedVersion')}: {v.get('Title')}")
            except Exception: pass
          for p in root.rglob('hadolint.json'):
            try:
              for h in json.loads(p.read_text() or '[]'):
                add('docker','hadolint',h.get('level'),h.get('code'),'Dockerfile',h.get('line'),h.get('message'))
            except Exception: pass

          for p in root.rglob('checkov.json'):
            try:
              data=json.loads(p.read_text(errors='ignore') or '{}')
              failed=[]
              if isinstance(data, list):
                for item in data: failed += item.get('results',{}).get('failed_checks',[]) or []
              else:
                failed=data.get('results',{}).get('failed_checks',[]) or []
              for c in failed:
                fp=c.get('file_path') or c.get('file_abs_path') or ''
                if '.github/' in str(fp): continue
                line=1
                rng=c.get('file_line_range') or []
                if isinstance(rng,list) and rng: line=rng[0]
                sev=(c.get('severity') or 'medium')
                check=(c.get('check_id') or '')
                name=(c.get('check_name') or '')
                guideline=(c.get('guideline') or '')
                area='docker' if 'docker' in (c.get('check_class') or '').lower() or 'Dockerfile' in str(fp) else 'iac'
                add(area,'checkov',sev,check,fp,line,(name + (' — '+guideline if guideline else '')).strip())
            except Exception: pass

          order={'critical':0,'high':1,'medium':2,'low':3,'info':4,'unknown':5}
          rows=sorted(rows,key=lambda r:(order.get(r['severity'],5),r['area'],r['file'],r['rule']))
          pathlib.Path('security-summary.json').write_text(json.dumps({"total":len(rows),"findings":rows},indent=2),encoding='utf-8')

          md=['# Security summary — hallazgos útiles','','> Report-only: no bloquea el pipeline. Excluye `.github/workflows/**` para evitar ruido del propio workflow.','']
          counts={}
          for r in rows: counts[r['severity']]=counts.get(r['severity'],0)+1
          md.append('## Conteo por severidad')
          for s in ['critical','high','medium','low','info','unknown']:
            if counts.get(s): md.append(f'- {s}: {counts[s]}')
          md.append('')
          md.append('## Hallazgos')
          for i,r in enumerate(rows[:120],1):
            md.append(f"{i}. **{r['severity']}** [{r['area']}] {r['tool']} / `{r['rule']}` — `{r['file']}:{r['line']}`")
            md.append(f"   - {r['message']}")
          if not rows: md.append('Sin hallazgos útiles en artifacts parseados.')
          pathlib.Path('https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx3JH95EAg$ ').write_text('\n'.join(md),encoding='utf-8')
          print('\n'.join(md))
          PY
      - name: Subir resumen
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-security-summary
          path: |
            https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!9-JzFr7NpBYGL8M-KHQFP8F2xdJQMqXO2hHKq2gjNYD-wa-ForV1UykQ7qJ98nyiq70AY55rFgyzQxmrlRharx3JH95EAg$ 
            security-summary.json
          retention-days: 30
