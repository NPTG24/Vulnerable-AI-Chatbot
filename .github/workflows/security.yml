                              add(py, line, "HIGH", "CODE_COMMAND_INJECTION_SHELL_TRUE", "CÃ³digo aplicativo", f"Comando con shell=True detectado en {cname}. Revisar si algÃºn argumento depende de input de usuario.", src, "HIGH")

                      if cname == "time.sleep":
                          seconds = None
                          if node.args and isinstance(node.args[0], ast.Constant) and isinstance(node.args[0].value, (int, float)):
                              seconds = node.args[0].value
                          if seconds and seconds >= 30:
                              sev = "MEDIUM" if has_route else "LOW"
                              add(py, line, sev, "WEB_ROUTE_LONG_SLEEP_DOS", "CÃ³digo aplicativo", f"time.sleep({seconds}) detectado; si estÃ¡ en ruta HTTP bloquea workers y puede causar DoS.", src, "HIGH")

                      if cname.endswith(".lower"):
