                  file_name = item.get("file") or item.get("path") or item.get("filename") or item.get("location", {}).get("path") if isinstance(item.get("location"), dict) else item.get("location") or "?:?"
                  line = item.get("line") or item.get("start_line") or item.get("lineNumber") or 1
                  detail = item.get("message") or item.get("description") or item.get("detail") or item.get("title") or "Hallazgo AI/LLM reportado por Dojigiri."
                  loc = f"{file_name}:{line}" if ":" not in str(file_name) else str(file_name)
                  add("AI / LLM / Agentic", sev, "Dojigiri", loc, detail, rule, str(path))
              tool_status.append({"artifact": str(path), "tool": "Dojigiri", "findings": count})

          for path, data in load_all("dojigiri.sarif"):
              count = 0
              for run in data.get("runs", []) if isinstance(data, dict) else []:
