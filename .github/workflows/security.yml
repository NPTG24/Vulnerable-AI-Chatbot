                          add(py, line, severity, "AI_PROVIDER_USAGE_COST_AND_DATA_BOUNDARY", "AI / LLM / Agentic", f"Uso de {cname} detectado. Revisar API key, lÃ­mites de costo, rate limiting, logging seguro y datos sensibles enviados al proveedor.", src, "MEDIUM")

                      if cname.endswith(".run") or cname.endswith(".invoke") or cname.endswith(".predict") or cname.endswith(".generate") or cname.endswith(".complete"):
