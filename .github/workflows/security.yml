name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Objetivo: detectar vulnerabilidades reales y reducir falsos positivos.
# Nota: se excluyen workflows/security.yml del análisis de código para que el pipeline no se analice a sí mismo.
env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"
  EXCLUDE_PATHS: ".git,.github,node_modules,dist,build,venv,.venv,__pycache__,security.yml,.github/workflows/security.yml"

jobs:
  dependency-policy:
    name: "Policy — Dependency Pinning"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning and resolvable versions
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re, shutil, subprocess, sys, tempfile, tomllib
          findings = []

          SKIP_DIRS = {'.git','.github','node_modules','dist','build','venv','.venv','__pycache__'}
          def skip_path(p): return any(part in SKIP_DIRS for part in str(p).replace('\\','/').split('/'))
          def add(sev, rule, file, line, msg): findings.append({'tool':'Dependency Policy','severity':sev,'rule':rule,'file':str(file),'line':int(line or 1),'message':msg})
          def level(sev): return 'error' if sev in {'critical','high'} else ('warning' if sev == 'medium' else 'note')

          # Python requirements*.txt
          skip_req = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact_req = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")
          pinned_py = []
          for req in sorted(pathlib.Path('.').glob('**/requirements*.txt')):
              if skip_path(req): continue
              for lineno, raw in enumerate(req.read_text(encoding='utf-8', errors='ignore').splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line): continue
                  clean = line.split(' #',1)[0].strip()
                  m = exact_req.match(clean)
                  if not m:
                      add('medium','UNPINNED_DEPENDENCY',req,lineno,f'Dependencia Python sin pin exacto ==: {line}')
                      continue
                  pinned_py.append((m.group(1), m.group(3), req, lineno, clean))
          for name, version, req, lineno, clean in pinned_py:
              with tempfile.TemporaryDirectory() as tmp:
                  cmd = [sys.executable,'-m','pip','download','--no-deps','--disable-pip-version-check','-d',tmp,f'{name}=={version}']
                  try: proc = subprocess.run(cmd, text=True, capture_output=True, timeout=75)
                  except subprocess.TimeoutExpired:
                      add('info','PYTHON_VERSION_VALIDATION_TIMEOUT',req,lineno,f'Timeout validando versión Python: {clean}')
                      continue
                  out = ((proc.stdout or '')+'\n'+(proc.stderr or '')).lower()
                  if proc.returncode == 0: continue
                  if 'no matching distribution found' in out or 'could not find a version' in out:
                      add('high','PYTHON_VERSION_NOT_RESOLVABLE',req,lineno,f'La versión Python declarada no parece existir: {clean}')
                  elif any(x in out for x in ['temporary failure','connection','timed out','proxy','ssl']):
                      add('info','PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE',req,lineno,f'No se pudo validar por red/proxy/SSL: {clean}')
                  else:
                      add('info','PYTHON_VERSION_VALIDATION_INCONCLUSIVE',req,lineno,f'Validación inconclusa: {clean}')

          # pyproject.toml: no agresivo, solo dependencias de project y poetry sin pin exacto
          pep508_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+).*$")
          for pyproject in sorted(pathlib.Path('.').glob('**/pyproject.toml')):
              if skip_path(pyproject): continue
              try: data = tomllib.loads(pyproject.read_text(encoding='utf-8', errors='ignore'))
              except Exception: continue
              candidates = []
              project = data.get('project', {}) if isinstance(data, dict) else {}
              if isinstance(project.get('dependencies'), list): candidates += project.get('dependencies', [])
              optional = project.get('optional-dependencies', {})
              if isinstance(optional, dict):
                  for deps in optional.values():
                      if isinstance(deps, list): candidates += deps
              poetry = data.get('tool', {}).get('poetry', {}).get('dependencies', {}) if isinstance(data, dict) else {}
              if isinstance(poetry, dict):
                  for n, spec in poetry.items():
                      if str(n).lower() == 'python': continue
                      if isinstance(spec, str): candidates.append(f'{n}{spec}' if spec.startswith('==') else f'{n} {spec}')
                      elif isinstance(spec, dict): candidates.append(f'{n}{spec.get("version","")}')
              for dep in candidates:
                  if not pep508_exact.match(str(dep)):
                      add('medium','PYPROJECT_NON_EXACT_DEPENDENCY',pyproject,1,f'Dependencia pyproject sin pin exacto ==: {dep}')

          # npm package.json
          exact_npm = re.compile(r"^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$")
          npm_available = shutil.which('npm') is not None
          for pkg in sorted(pathlib.Path('.').glob('**/package.json')):
              if skip_path(pkg): continue
              try: data = json.loads(pkg.read_text(encoding='utf-8', errors='ignore'))
              except Exception: continue
              for sec in ['dependencies','devDependencies','peerDependencies','optionalDependencies']:
                  deps = data.get(sec, {})
                  if not isinstance(deps, dict): continue
                  for dep, ver in deps.items():
                      ver = str(ver).strip()
                      if ver.startswith(('file:','git+','github:','workspace:','link:')):
                          add('info','NPM_LOCAL_OR_WORKSPACE_DEPENDENCY',pkg,1,f'Dependencia npm local/workspace no validada: {dep}@{ver}')
                          continue
                      if not exact_npm.match(ver):
                          add('medium','NPM_NON_EXACT_DEPENDENCY',pkg,1,f'Dependencia npm sin versión exacta: {dep}@{ver}')
                          continue
                      if not npm_available:
                          add('info','NPM_VALIDATION_UNAVAILABLE',pkg,1,f'npm no disponible para validar: {dep}@{ver}')
                          continue
                      try: proc = subprocess.run(['npm','view',f'{dep}@{ver}','version','--json'], text=True, capture_output=True, timeout=75)
                      except subprocess.TimeoutExpired:
                          add('info','NPM_VERSION_VALIDATION_TIMEOUT',pkg,1,f'Timeout validando versión npm: {dep}@{ver}')
                          continue
                      out = ((proc.stdout or '')+'\n'+(proc.stderr or '')).lower()
                      if proc.returncode == 0: continue
                      if 'notarget' in out or 'no matching version found' in out or '404' in out:
                          add('high','NPM_VERSION_NOT_RESOLVABLE',pkg,1,f'La versión npm declarada no parece existir: {dep}@{ver}')
                      elif any(x in out for x in ['network','timeout','proxy','econn','ssl']):
                          add('info','NPM_VERSION_VALIDATION_NETWORK_UNAVAILABLE',pkg,1,f'No se pudo validar por red/proxy/SSL: {dep}@{ver}')
                      else:
                          add('info','NPM_VERSION_VALIDATION_INCONCLUSIVE',pkg,1,f'Validación npm inconclusa: {dep}@{ver}')

          pathlib.Path('dependency_policy_findings.json').write_text(json.dumps({'tool':'Dependency Policy','findings':findings}, indent=2, ensure_ascii=False), encoding='utf-8')
          rules, results = {}, []
          for f in findings:
              rid=f['rule']; lvl=level(f['severity'])
              rules.setdefault(rid, {'id':rid,'name':rid,'shortDescription':{'text':rid},'fullDescription':{'text':f['message']},'defaultConfiguration':{'level':lvl}})
              results.append({'ruleId':rid,'level':lvl,'message':{'text':f['message']},'locations':[{'physicalLocation':{'artifactLocation':{'uri':f['file']},'region':{'startLine':f['line']}}}]})
          sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Dependency__;JSUlJQ!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf1146J2MjPQ$  Policy','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('dependency_policy.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          print(f'Dependency policy findings: {len(findings)}')
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  ruff:
    name: "Quality — Ruff development findings"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff as development quality only
        continue-on-error: true
        run: |
          # F403/F405 se ignoran para no contaminar vulnerabilidades con import * / nombres importados por wildcard.
          # Ruff NO se sube a Code Scanning como vulnerabilidad; queda solo en reporte de calidad.
          ruff check . --exclude .github --exclude security.yml --ignore F403,F405 --output-format=json > ruff_lint.json || true
          ruff check . --exclude .github --exclude security.yml --ignore F403,F405 --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
      - name: Ensure Ruff artifacts exist
        if: always()
        run: touch ruff_lint.json ruff_lint_full.txt ruff_format_diff.txt
      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
          retention-days: 30

  codeql:
    name: "SAST — CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4
      - name: Analyze with CodeQL
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}
      - name: Create CodeQL metadata
        if: always()
        run: |
          cat > codeql_${{ matrix.language }}_metadata.json <<JSON
          {"tool":"CodeQL","language":"${{ matrix.language }}","severity":"info","rule":"CODEQL_EXECUTION","message":"CodeQL fue ejecutado o intentado."}
          JSON
      - name: Upload CodeQL metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-metadata
          path: codeql_${{ matrix.language }}_metadata.json
          retention-days: 30

  sast-semgrep:
    name: "SAST — Semgrep high-signal"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run Semgrep high-signal rules
        continue-on-error: true
        run: |
          # Evita reglas demasiado ruidosas como p/security-audit completo.
          semgrep \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --exclude .github/workflows/** \
            --exclude security.yml \
            --exclude "**/security.yml" \
            --severity ERROR \
            --severity WARNING \
            --sarif --output semgrep.sarif . || true
          semgrep \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --exclude .github/workflows/** \
            --exclude security.yml \
            --exclude "**/security.yml" \
            --severity ERROR \
            --severity WARNING \
            --json --output semgrep.json . || true
      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-high-signal
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-general-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  ai-sast-semgrep:
    name: "AI SAST — Precise LLM / Agent / RAG flows"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create precise local AI rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_precise_rules.yml <<'YAML_RULES'
          rules:
            # ------------------------------------------------------------------
            # PYTHON: user input -> LLM/RAG prompt/query
            # Detecta flujos concretos request/input -> OpenAI/LangChain/LLM.
            # ------------------------------------------------------------------
            - id: ai-python-user-input-to-llm-call
              languages: [python]
              mode: taint
              severity: WARNING
              message: "AI Prompt Injection: entrada de usuario fluye directamente a una llamada LLM/RAG sin plantilla defensiva ni validación fuerte."
              metadata:
                category: security
                cwe: "CWE-20"
                owasp_llm: "LLM01 Prompt Injection"
                confidence: HIGH
                technology: [ai, llm, langchain, openai]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.get_json(...)
                - pattern: input(...)
                - pattern: flask.request.args.get(...)
                - pattern: flask.request.form.get(...)
              pattern-sinks:
                - pattern: $CHAIN.run(...)
                - pattern: $CHAIN.invoke(...)
                - pattern: $LLM($DATA)
                - pattern: $CLIENT.chat.completions.create(..., messages=$DATA, ...)
                - pattern: $CLIENT.responses.create(..., input=$DATA, ...)
                - pattern: openai.ChatCompletion.create(..., messages=$DATA, ...)
                - pattern: OpenAI(...).invoke($DATA)
                - pattern: RetrievalQA.from_chain_type(...).run($DATA)
              pattern-sanitizers:
                - pattern: secure_prompt_template(...)
                - pattern: validate_prompt(...)
                - pattern: sanitize_prompt(...)
                - pattern: guardrails.validate(...)

            - id: ai-python-user-input-changes-security-policy-state
              languages: [python]
              mode: taint
              severity: ERROR
              message: "AI Policy Bypass: entrada de usuario controla estado/política de seguridad del chatbot mediante variable global, os.environ, session o config."
              metadata:
                category: security
                cwe: "CWE-287"
                owasp_llm: "LLM01 Prompt Injection / LLM06 Excessive Agency"
                confidence: HIGH
                technology: [ai, chatbot, flask]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.get_json(...)
                - pattern: input(...)
              pattern-sinks:
                - pattern: os.environ[$KEY] = $VALUE
                - pattern: app.config[$KEY] = $VALUE
                - pattern: session[$KEY] = $VALUE
                - pattern: globals()[$KEY] = $VALUE

            - id: ai-python-llm-output-to-code-execution
              languages: [python]
              mode: taint
              severity: ERROR
              message: "AI RCE: salida de LLM/agente fluye a ejecución dinámica o comandos del sistema."
              metadata:
                category: security
                cwe: "CWE-94"
                owasp_llm: "LLM05 Improper Output Handling / LLM06 Excessive Agency"
                confidence: HIGH
                technology: [ai, agent, rce]
              pattern-sources:
                - pattern: $CHAIN.run(...)
                - pattern: $CHAIN.invoke(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: openai.ChatCompletion.create(...)
                - pattern: $AGENT.run(...)
                - pattern: $AGENT.invoke(...)
              pattern-sinks:
                - pattern: eval($X)
                - pattern: exec($X)
                - pattern: subprocess.run($X, shell=True, ...)
                - pattern: subprocess.Popen($X, shell=True, ...)
                - pattern: os.system($X)
                - pattern: os.popen($X)

            - id: ai-python-user-input-to-agent-shell
              languages: [python]
              mode: taint
              severity: ERROR
              message: "Agentic AI Command Injection: entrada externa llega a tool/agente con shell o comandos del sistema."
              metadata:
                category: security
                cwe: "CWE-78"
                owasp_llm: "LLM06 Excessive Agency"
                confidence: HIGH
                technology: [ai, agent, command-injection]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.get_json(...)
                - pattern: input(...)
              pattern-sinks:
                - pattern: subprocess.run($CMD, shell=True, ...)
                - pattern: subprocess.Popen($CMD, shell=True, ...)
                - pattern: os.system($CMD)
                - pattern: os.popen($CMD)
                - pattern: $TOOL.run($CMD)

            - id: ai-python-faiss-load-local-without-dangerous-deserialization-guard
              languages: [python]
              severity: WARNING
              message: "AI/RAG Supply Chain: FAISS.load_local usado. Revisar origen del índice y evitar deserialización peligrosa o rutas manipulables."
              metadata:
                category: security
                cwe: "CWE-502"
                owasp_llm: "LLM03 Supply Chain / LLM04 Data and Model Poisoning"
                confidence: MEDIUM
                technology: [ai, rag, faiss, langchain]
              patterns:
                - pattern: FAISS.load_local($PATH, $EMB, ...)
                - pattern-not: FAISS.load_local($PATH, $EMB, allow_dangerous_deserialization=False, ...)

            - id: ai-python-rag-from-external-document-to-llm
              languages: [python]
              severity: WARNING
              message: "AI/RAG Indirect Prompt Injection: documento externo cargado en retriever usado por LLM sin controles evidentes de fuente/metadata/sanitización."
              metadata:
                category: security
                cwe: "CWE-20"
                owasp_llm: "LLM01 Prompt Injection / LLM04 Data and Model Poisoning"
                confidence: MEDIUM
                technology: [ai, rag, langchain]
              patterns:
                - pattern-either:
                    - pattern: |
                        $LOADER = PyPDFLoader($PATH)
                        ...
                        $DOCS = $LOADER.load(...)
                        ...
                        $VS = FAISS.from_documents($DOCS, ...)
                        ...
                        $QA = RetrievalQA.from_chain_type(..., retriever=$VS.as_retriever(...), ...)
                    - pattern: |
                        $DOCS = $LOADER.load(...)
                        ...
                        $VS = $VECTORSTORE.from_documents($DOCS, ...)
                        ...
                        $QA = RetrievalQA.from_chain_type(..., retriever=$VS.as_retriever(...), ...)
                - pattern-not-regex: "(?i)(metadata|source_validation|validate_source|sanitize|tenant|trusted)"

            - id: ai-python-weak-llm-xss-filter
              languages: [python]
              severity: WARNING
              message: "AI Output Handling: filtro XSS débil sobre salida LLM; buscar solo '<script>' no controla HTML, SVG, eventos, encoding ni mayúsculas."
              metadata:
                category: security
                cwe: "CWE-79"
                owasp_llm: "LLM05 Improper Output Handling"
                confidence: HIGH
                technology: [ai, xss, flask]
              patterns:
                - pattern-either:
                    - pattern: |
                        if '<script>' in $RESULT:
                          ...
                    - pattern: |
                        if "<script>" in $RESULT:
                          ...
                - pattern-inside: |
                    $RESULT = $LLM_CALL
                    ...

            # ------------------------------------------------------------------
            # JS/TS: user input -> LLM call and LLM output -> dangerous sinks
            # ------------------------------------------------------------------
            - id: ai-js-user-input-to-llm-call
              languages: [javascript, typescript]
              mode: taint
              severity: WARNING
              message: "AI Prompt Injection: entrada HTTP/usuario fluye directamente a una llamada LLM sin validación fuerte."
              metadata:
                category: security
                cwe: "CWE-20"
                owasp_llm: "LLM01 Prompt Injection"
                confidence: HIGH
                technology: [ai, llm, node, openai]
              pattern-sources:
                - pattern: req.query.$X
                - pattern: req.body.$X
                - pattern: request.query.$X
                - pattern: request.body.$X
                - pattern: $REQ.params.$X
              pattern-sinks:
                - pattern: $CLIENT.chat.completions.create({messages: $DATA, ...})
                - pattern: $CLIENT.responses.create({input: $DATA, ...})
                - pattern: $MODEL.invoke($DATA)
                - pattern: $CHAIN.call($DATA)
                - pattern: $CHAIN.invoke($DATA)
              pattern-sanitizers:
                - pattern: sanitizePrompt(...)
                - pattern: validatePrompt(...)
                - pattern: guardrails.validate(...)

            - id: ai-js-llm-output-to-code-execution
              languages: [javascript, typescript]
              mode: taint
              severity: ERROR
              message: "AI RCE: salida de LLM/agente fluye a eval, Function o child_process."
              metadata:
                category: security
                cwe: "CWE-94"
                owasp_llm: "LLM05 Improper Output Handling / LLM06 Excessive Agency"
                confidence: HIGH
                technology: [ai, agent, rce, node]
              pattern-sources:
                - pattern: await $CLIENT.chat.completions.create(...)
                - pattern: await $CLIENT.responses.create(...)
                - pattern: await $MODEL.invoke(...)
                - pattern: await $CHAIN.call(...)
                - pattern: await $AGENT.invoke(...)
              pattern-sinks:
                - pattern: eval($X)
                - pattern: new Function($X)
                - pattern: child_process.exec($X, ...)
                - pattern: exec($X, ...)
