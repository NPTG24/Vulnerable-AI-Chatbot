name: Security Pipeline

# Pipeline para repositorio GitHub con solo código fuente.
# Promptfoo queda SOLO como Code Scan: no requiere promptfoo.yml ni OPENAI_API_KEY.
# El redteam fue eliminado porque necesita un target/modelo y por eso fallaba.
# Ningún scanner intermedio detiene el pipeline. El único verdict está al final.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Policy — Dependency Pinning"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency pinning
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          req_files = sorted({*pathlib.Path(".").glob("requirements*.txt"), *pathlib.Path(".").glob("**/requirements*.txt")})
          skip = re.compile(r"^\s*($|\#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact = re.compile(r"^[A-Za-z0-9_.-]+(\[[A-Za-z0-9_,.-]+\])?\s*==\s*[A-Za-z0-9_.!+*-]+.*$")
          findings = []
          for req in req_files:
              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip.match(line):
                      continue
                  clean = line.split(" #", 1)[0].strip()
                  if not exact.match(clean):
                      findings.append({"tool":"Dependency Pinning Policy","severity":"medium","rule":"UNPINNED_DEPENDENCY","file":str(req),"line":lineno,"message":f"Dependencia sin pin exacto: {line}"})
          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Upload dependency policy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: dependency_policy_findings.json
          retention-days: 30

  ruff:
    name: "Lint — Ruff"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        continue-on-error: true
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff check . --output-format=github || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          touch ruff_lint.json ruff_lint_full.txt ruff_format_diff.txt

      - name: Upload Ruff reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
          retention-days: 30

  sast-semgrep:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        continue-on-error: true
        run: |
          semgrep --config p/python --config p/security-audit --config p/owasp-top-ten --sarif --output semgrep.sarif . || true
          semgrep --config p/python --config p/security-audit --config p/owasp-top-ten --json --output semgrep.json . || true
          if [ ! -f semgrep.sarif ]; then echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif; fi
          if [ ! -f semgrep.json ]; then echo '{"results":[]}' > semgrep.json; fi

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  ai-sast-semgrep:
    name: "AI SAST — OWASP LLM and Agents"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create OWASP LLM and Agent rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/owasp_llm_agents.yml <<'YAML'
          rules:
            - id: owasp-llm01-python-user-input-in-prompt
              languages: [python]
              severity: WARNING
              message: "OWASP LLM01: posible prompt injection. Input de usuario usado en construcción de prompt."
              patterns:
                - pattern-either:
                    - pattern: $PROMPT = f"...{$USER}..."
                    - pattern: $PROMPT = "...".format($USER)
                    - pattern: $PROMPT = "..." + $USER
                    - pattern: $PROMPT += $USER
                - metavariable-regex:
                    metavariable: $USER
                    regex: (?i).*(user|input|query|question|request|message|prompt|text|content|body|data|payload).*
              metadata:
                owasp_llm: LLM01 Prompt Injection

            - id: owasp-llm01-js-user-input-in-prompt
              languages: [javascript, typescript]
              severity: WARNING
              message: "OWASP LLM01: posible prompt injection. Input de usuario usado en prompt."
              pattern-either:
                - pattern: const $PROMPT = `...${$USER}...`
                - pattern: let $PROMPT = `...${$USER}...`
                - pattern: var $PROMPT = `...${$USER}...`
                - pattern: $PROMPT += $USER
                - pattern: $PROMPT = $PROMPT + $USER
              metadata:
                owasp_llm: LLM01 Prompt Injection

            - id: owasp-llm02-sensitive-data-in-prompt-python
              languages: [python]
              severity: WARNING
              message: "OWASP LLM02: posible envío de información sensible al prompt o modelo."
              pattern-either:
                - pattern: $CLIENT.chat.completions.create(..., messages=[..., {"role": $ROLE, "content": $SECRET}, ...], ...)
                - pattern: $MODEL.invoke($SECRET)
                - pattern: $CHAIN.run($SECRET)
              metadata:
                owasp_llm: LLM02 Sensitive Information Disclosure

            - id: owasp-llm03-ai-supply-chain-python
              languages: [python]
              severity: INFO
              message: "OWASP LLM03: dependencia o framework AI/LLM detectado. Revisar versión, origen y CVEs."
              pattern-either:
                - pattern: import langchain
                - pattern: import llama_index
                - pattern: import openai
                - pattern: import transformers
                - pattern: import sentence_transformers
                - pattern: import autogen
                - pattern: import crewai
              metadata:
                owasp_llm: LLM03 Supply Chain

            - id: owasp-llm04-rag-poisoning-python
              languages: [python]
              severity: WARNING
              message: "OWASP LLM04/LLM08: posible RAG poisoning o debilidad vectorial."
              pattern-either:
                - pattern: $DB.add_documents($DOCS, ...)
                - pattern: $DB.add_texts($TEXTS, ...)
                - pattern: $INDEX.insert($DOCS, ...)
                - pattern: $VECTORSTORE.add_documents($DOCS, ...)
                - pattern: $VECTORSTORE.from_documents($DOCS, ...)
              metadata:
                owasp_llm: LLM04 Data and Model Poisoning / LLM08 Vector and Embedding Weaknesses

            - id: owasp-llm05-python-output-sql
              languages: [python]
              severity: WARNING
              message: "OWASP LLM05: posible insecure output handling. Contenido variable usado en SQL."
              pattern-either:
                - pattern: $CUR.execute(f"...{$X}...")
                - pattern: $CUR.execute("...".format($X))
                - pattern: $CUR.execute("..." + $X)
              metadata:
                owasp_llm: LLM05 Improper Output Handling

            - id: owasp-llm05-js-output-html
              languages: [javascript, typescript]
              severity: WARNING
              message: "OWASP LLM05: posible insecure output handling. Contenido variable renderizado como HTML."
              pattern-either:
                - pattern: dangerouslySetInnerHTML={{__html: $HTML}}
                - pattern: $EL.innerHTML = $HTML
              metadata:
                owasp_llm: LLM05 Improper Output Handling

            - id: owasp-llm05-dangerous-eval-exec-python
              languages: [python]
              severity: ERROR
              message: "OWASP LLM05/LLM06: uso de eval/exec. Riesgo si procesa input o salida de LLM."
              pattern-either:
                - pattern: eval($X)
                - pattern: exec($X)
              metadata:
                owasp_llm: LLM05 Improper Output Handling / LLM06 Excessive Agency

            - id: owasp-llm06-python-dangerous-shell
              languages: [python]
              severity: ERROR
              message: "OWASP LLM06: agente/tool con ejecución de comandos del sistema."
              pattern-either:
                - pattern: subprocess.run($CMD, shell=True, ...)
                - pattern: subprocess.Popen($CMD, shell=True, ...)
                - pattern: os.system($CMD)
                - pattern: os.popen($CMD)
              metadata:
                owasp_llm: LLM06 Excessive Agency

            - id: owasp-llm06-js-dangerous-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "OWASP LLM06: agente/tool con ejecución de comandos del sistema."
              pattern-either:
                - pattern: child_process.exec($CMD, ...)
                - pattern: child_process.execSync($CMD, ...)
                - pattern: exec($CMD, ...)
                - pattern: execSync($CMD, ...)
              metadata:
                owasp_llm: LLM06 Excessive Agency

            - id: owasp-llm07-system-prompt-python
              languages: [python]
              severity: INFO
              message: "OWASP LLM07: system prompt hardcodeado. Revisar fuga de instrucciones internas."
              pattern-either:
                - pattern: '{"role": "system", "content": "..."}'
                - pattern: '{"role": "system", "content": $CONTENT}'
              metadata:
                owasp_llm: LLM07 System Prompt Leakage

            - id: owasp-llm10-unbounded-consumption-python
              languages: [python]
              severity: WARNING
              message: "OWASP LLM10: llamada a LLM sin límites evidentes. Revisar max_tokens, timeout y rate limit."
              pattern-either:
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: openai.ChatCompletion.create(...)
              metadata:
                owasp_llm: LLM10 Unbounded Consumption

            - id: owasp-llm10-unbounded-consumption-js
              languages: [javascript, typescript]
              severity: WARNING
              message: "OWASP LLM10: llamada a LLM sin límites evidentes. Revisar max_tokens, timeout y rate limit."
              pattern-either:
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
              metadata:
                owasp_llm: LLM10 Unbounded Consumption
          YAML

      - name: Run Semgrep AI rules
        continue-on-error: true
        run: |
          semgrep --config p/ai-best-practices --config .semgrep/ai-security --sarif --output semgrep_ai.sarif . || true
          semgrep --config p/ai-best-practices --config .semgrep/ai-security --json --output semgrep_ai.json . || true
          if [ ! -f semgrep_ai.sarif ]; then echo '{"version":"2.1.0","runs":[]}' > semgrep_ai.sarif; fi
          if [ ! -f semgrep_ai.json ]; then echo '{"results":[]}' > semgrep_ai.json; fi

      - name: Upload Semgrep AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai.sarif
          category: semgrep-ai-owasp-llm-agents

      - name: Upload Semgrep AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ai-results
          path: |
            semgrep_ai.sarif
            semgrep_ai.json
          retention-days: 30

  ai-code-scan-promptfoo:
    name: "AI Code Scan — Promptfoo"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Promptfoo API key
        id: promptfoo_config
        env:
          PROMPTFOO_API_KEY_VALUE: ${{ secrets.PROMPTFOO_API_KEY }}
        run: |
          if [ -z "$PROMPTFOO_API_KEY_VALUE" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Promptfoo Code Scan
        if: steps.promptfoo_config.outputs.enabled == 'true'
        continue-on-error: true
        uses: promptfoo/code-scan-action@v1
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: low
          enable-fork-prs: false
          sarif-output-path: promptfoo_code_scan.sarif
          guidance: |
            Reporta en español.
            Revisa código fuente asociado a OWASP LLM Top 10, agentes, tools, RAG, MCP, prompt injection, system prompt leakage, PII exposure, data exfiltration, RAG poisoning, memory poisoning, excessive agency, insecure output handling y tool abuse.
            Reporta hallazgos LOW, MEDIUM, HIGH y CRITICAL.

      - name: Create Promptfoo metadata and empty SARIF when skipped
        if: always()
        run: |
          cat > promptfoo_code_scan_metadata.json <<JSON
          {
            "tool": "Promptfoo Code Scan",
            "event": "${{ github.event_name }}",
            "enabled": "${{ steps.promptfoo_config.outputs.enabled }}",
            "note": "If enabled=false, configure PROMPTFOO_API_KEY. This job does not require promptfoo.yml."
          }
          JSON

          if [ ! -f promptfoo_code_scan.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > promptfoo_code_scan.sarif
          fi

      - name: Upload Promptfoo SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: promptfoo_code_scan.sarif
          category: promptfoo-code-scan

      - name: Upload Promptfoo Code Scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-code-scan-results
          path: |
            promptfoo_code_scan.sarif
            promptfoo_code_scan_metadata.json
          retention-days: 30

  sca-dependencies:
    name: "SCA — Trivy + pip-audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          elif [ -f pyproject.toml ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . || true
          fi

      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          if [ ! -f pip_audit_results.json ]; then echo '[]' > pip_audit_results.json; fi
          if [ ! -f pip_audit_osv.json ]; then echo '{"dependencies":[]}' > pip_audit_osv.json; fi

      - name: Upload pip-audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
          retention-days: 30

      - name: Run Trivy SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy_results.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: false

      - name: Ensure Trivy SARIF exists
        if: always()
        run: |
          if [ ! -f trivy_results.sarif ]; then echo '{"version":"2.1.0","runs":[]}' > trivy_results.sarif; fi

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy_results.sarif
          retention-days: 30

  secret-scan:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks through Docker
        continue-on-error: true
        run: |
          docker run --rm             -v "$PWD:/repo"             zricethezav/gitleaks:v8.30.1             detect             --source /repo             --report-format json             --report-path /repo/gitleaks_report.json             --exit-code 0             --verbose || true

      - name: Ensure Gitleaks report exists
        if: always()
        run: |
          if [ ! -f gitleaks_report.json ]; then echo "[]" > gitleaks_report.json; fi

      - name: Upload Gitleaks artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
          retention-days: 30

  iac-checkov:
    name: "IaC — Checkov"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          soft_fail: true
          output_format: "sarif,json"
          output_file_path: "checkov_results.sarif,checkov_results.json"
          download_external_modules: false

      - name: Ensure Checkov reports exist
        if: always()
        run: |
          if [ ! -f checkov_results.sarif ]; then echo '{"version":"2.1.0","runs":[]}' > checkov_results.sarif; fi
          if [ ! -f checkov_results.json ]; then echo "{}" > checkov_results.json; fi

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_results.sarif
          category: checkov-iac

      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            checkov_results.sarif
            checkov_results.json
          retention-days: 30

  dast-zap:
    name: "DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.run_dast == 'true'

    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate DAST target URL
        id: validate_url
        env:
          DAST_TARGET_URL_VALUE: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$DAST_TARGET_URL_VALUE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OWASP ZAP Baseline Scan
        if: steps.validate_url.outputs.skip != 'true'
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          report_html: zap_report.html
          report_json: zap_report.json
          cmd_options: "-l HIGH"
          fail_action: false
          allow_issue_writing: false

      - name: Ensure ZAP artifacts exist
        if: always()
        run: |
          if [ ! -f zap_report.html ]; then echo "<html><body><h1>ZAP skipped or no report generated</h1></body></html>" > zap_report.html; fi
          if [ ! -f zap_report.json ]; then echo '{"site":[]}' > zap_report.json; fi
          echo '{"version":"2.1.0","runs":[]}' > zap_results.sarif

      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_report.json
            zap_results.sarif
          retention-days: 30

  security-report:
    name: "Security Report — Centralized Verdict"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - ruff
      - sast-semgrep
      - ai-sast-semgrep
      - ai-code-scan-promptfoo
      - sca-dependencies
      - secret-scan
      - iac-checkov
      - dast-zap
    if: always()

    permissions:
      contents: read

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results/

      - name: Generate centralized security report
        run: |
          python3 - <<'PY'
          import json, pathlib
          from html import escape

          root = pathlib.Path("all_scan_results")
          out = pathlib.Path("security_reports")
          out.mkdir(exist_ok=True)

          severity_order = ["critical", "high", "medium", "low", "info", "unknown"]
          grouped = {s: [] for s in severity_order}

          def norm(v):
              v = str(v or "").lower().strip()
              return {"error":"high","warning":"medium","note":"low","none":"info","critical":"critical","high":"high","medium":"medium","moderate":"medium","low":"low","info":"info","informational":"info"}.get(v, "unknown")

          def add(tool, sev, rule, msg, file="", line=""):
              s = norm(sev)
              grouped.setdefault(s, []).append({"tool":tool or "Unknown","severity":s,"rule":rule or "unknown","message":str(msg or ""),"file":str(file or ""),"line":str(line or "")})

          def parse_sarif(path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  return
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", path.stem)
                  rules = {}
                  for r in run.get("tool", {}).get("driver", {}).get("rules", []):
                      rid = r.get("id", "unknown")
                      rules[rid] = r.get("defaultConfiguration", {}).get("level", "")
                  for res in run.get("results", []):
                      rid = res.get("ruleId", "unknown")
                      level = res.get("level") or rules.get(rid) or "unknown"
                      msg = res.get("message", {}).get("text", "")
                      file = ""
                      line = ""
                      locs = res.get("locations", [])
                      if locs:
                          p = locs[0].get("physicalLocation", {})
                          file = p.get("artifactLocation", {}).get("uri", "")
                          line = p.get("region", {}).get("startLine", "")
                      add(tool, level, rid, msg, file, line)

          def parse_dep(path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore"))
                  for i in data.get("findings", []):
                      add(i.get("tool"), i.get("severity"), i.get("rule"), i.get("message"), i.get("file"), i.get("line"))
              except Exception:
                  pass

          def parse_ruff(path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore") or "[]")
                  for i in data:
                      loc = i.get("location", {})
                      add("Ruff", "low", i.get("code", "RUFF"), i.get("message", ""), i.get("filename", ""), loc.get("row", ""))
              except Exception:
                  pass

          def parse_gitleaks(path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore") or "[]")
                  for i in data:
                      add("Gitleaks", "high", i.get("RuleID", "SECRET"), i.get("Description", "Posible secreto expuesto"), i.get("File", ""), i.get("StartLine", ""))
              except Exception:
                  pass

          def parse_pip(path):
              try:
                  data = json.loads(path.read_text(encoding="utf-8", errors="ignore"))
                  deps = data.get("dependencies", []) if isinstance(data, dict) else data
                  for pkg in deps:
                      if isinstance(pkg, dict):
                          for v in pkg.get("vulns", []):
                              add("pip-audit", v.get("severity", "unknown"), v.get("id", "PYTHON_VULN"), f"{pkg.get('name','?')} {pkg.get('version','')}: {v.get('description', v.get('fix_versions',''))}")
              except Exception:
                  pass

          for p in root.rglob("*.sarif"):
              parse_sarif(p)
          for p in root.rglob("dependency_policy_findings.json"):
              parse_dep(p)
          for p in root.rglob("ruff_lint.json"):
              parse_ruff(p)
          for p in root.rglob("ruff_format_diff.txt"):
              if p.read_text(encoding="utf-8", errors="ignore").strip():
                  add("Ruff Format", "low", "RUFF_FORMAT", "Existen diferencias de formato detectadas por Ruff.", str(p), "")
          for p in root.rglob("gitleaks_report.json"):
              parse_gitleaks(p)
          for p in root.rglob("pip_audit_osv.json"):
              parse_pip(p)

          counts = {s: len(grouped.get(s, [])) for s in severity_order}
          total = sum(counts.values())
          names = {"critical":"Críticos","high":"Altos","medium":"Medios","low":"Bajos","info":"Informativos","unknown":"Desconocidos"}

          lines = ["REPORTE CENTRALIZADO DE SEGURIDAD", "="*80, "", "RESUMEN EJECUTIVO", "-"*80,
                   f"Total de hallazgos : {total}",
                   f"Críticos           : {counts['critical']}",
                   f"Altos              : {counts['high']}",
                   f"Medios             : {counts['medium']}",
                   f"Bajos              : {counts['low']}",
                   f"Informativos       : {counts['info']}",
                   f"Desconocidos       : {counts['unknown']}", ""]
          for s in severity_order:
              lines += ["", f"HALLAZGOS {names[s].upper()} ({len(grouped[s])})", "-"*80]
              if not grouped[s]:
                  lines.append("Sin hallazgos.")
              for n, i in enumerate(grouped[s], 1):
                  lines += [f"{n}. Herramienta : {i['tool']}", f"   Regla       : {i['rule']}", f"   Archivo     : {i['file']}", f"   Línea       : {i['line']}", f"   Descripción : {i['message']}", ""]
          (out / "security_report_es.txt").write_text("\n".join(lines), encoding="utf-8")
          (out / "security_report_es.json").write_text(json.dumps({"summary":counts,"total":total,"findings":grouped}, indent=2, ensure_ascii=False), encoding="utf-8")

          html = ["<!doctype html><html><head><meta charset='utf-8'><title>Reporte centralizado de seguridad</title>",
                  "<style>body{font-family:Arial;margin:24px}table{border-collapse:collapse;width:100%;margin-bottom:32px}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f4f4f4}</style></head><body>",
                  "<h1>Reporte centralizado de seguridad</h1><h2>Resumen ejecutivo</h2><ul>"]
          for s in severity_order:
              html.append(f"<li>{escape(names[s])}: {counts[s]}</li>")
          html.append("</ul>")
          for s in severity_order:
              html.append(f"<h2>Hallazgos {escape(names[s])} ({counts[s]})</h2><table><tr><th>Herramienta</th><th>Regla</th><th>Archivo</th><th>Línea</th><th>Descripción</th></tr>")
              for i in grouped[s]:
                  html.append(f"<tr><td>{escape(i['tool'])}</td><td>{escape(i['rule'])}</td><td>{escape(i['file'])}</td><td>{escape(str(i['line']))}</td><td>{escape(i['message'])}</td></tr>")
              html.append("</table>")
          html.append("</body></html>")
          (out / "security_report_es.html").write_text("\n".join(html), encoding="utf-8")
          print("\n".join(lines))
          PY

      - name: Add centralized report to job summary
        if: always()
        run: |
          python3 - <<'PY'
          import os, pathlib
          report = pathlib.Path("security_reports/security_report_es.txt")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              s.write("## Reporte centralizado de seguridad\n\n```text\n")
              s.write(report.read_text(encoding="utf-8", errors="ignore")[:120000] if report.exists() else "No se encontró el reporte.")
              s.write("\n```\n")
          PY

      - name: Upload centralized security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports/
          retention-days: 30

      - name: Final verdict
        run: |
          python3 - <<'PY'
          import json, os, sys
          data = json.load(open("security_reports/security_report_es.json", encoding="utf-8"))
          summary = data.get("summary", {})
          threshold = "${{ github.event.inputs.fail_on }}" or os.environ.get("DEFAULT_FAIL_ON", "never")
          threshold = threshold.lower()
          order = {"critical":5,"high":4,"medium":3,"low":2,"info":1,"unknown":0,"never":99}
          if threshold == "never":
              print("Final verdict configured as never fail.")
              sys.exit(0)
          blocking = sum(int(c) for sev, c in summary.items() if order.get(sev, 0) >= order.get(threshold, 99))
          if blocking:
              print(f"Security Report failed: {blocking} finding(s) at or above threshold '{threshold}'.")
              sys.exit(1)
          print("Security Report passed.")
          PY
