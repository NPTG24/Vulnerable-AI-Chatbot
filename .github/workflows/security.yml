name: Security Pipeline

# ==============================================================================
# SECURITY PIPELINE
# ==============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
      fail_on:
        description: "Security gate: never, critical, high"
        required: false
        default: "never"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Dependencies â€” Policy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning, resolvable versions and generate SARIF
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import shutil
          import subprocess
          import sys
          import tempfile
          import tomllib

          findings = []
          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(severity, rule, file_path, line, message, kind="vulnerability"):
              findings.append({
                  "tool": "Dependency Policy",
                  "severity": severity,
                  "rule": rule,
                  "file": str(file_path),
                  "line": int(line or 1),
                  "message": message,
                  "kind": kind
              })

          def level(severity):
              sev = str(severity or "").lower()
              if sev in {"critical", "high"}:
                  return "error"
              if sev == "medium":
                  return "warning"
              return "note"

          req_files = sorted(set(pathlib.Path(".").glob("requirements*.txt")) | set(pathlib.Path(".").glob("**/requirements*.txt")))
          skip_req = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact_req = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")
          any_pkg = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*([<>=!~]=?|===)?\s*([^;#\s]+)?")
          pinned_python = []

          for req in req_files:
              if skip(req):
                  continue
              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue

                  clean = line.split(" #", 1)[0].strip()
                  match = exact_req.match(clean)

                  if not match:
                      parsed = any_pkg.match(clean)
                      if parsed:
                          operator = parsed.group(3)
                          version = parsed.group(4)
                          if not operator or not version:
                              add("medium", "PYTHON_DEPENDENCY_WITHOUT_VERSION", req, lineno, f"Dependencia Python sin versiĂłn declarada: {line}", "vulnerability")
                          elif operator != "==":
                              add("medium", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", req, lineno, f"Dependencia Python sin pin exacto ==: {line}", "hygiene")
                          else:
                              add("medium", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Dependencia Python con formato no validable: {line}", "hygiene")
                      else:
                          add("medium", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"LĂ­nea de dependencia Python no validable: {line}", "hygiene")
                      continue

                  pinned_python.append((match.group(1), match.group(3), req, lineno, clean))

          for name, version, req, lineno, clean in pinned_python:
              with tempfile.TemporaryDirectory() as tmpdir:
                  cmd = [sys.executable, "-m", "pip", "download", "--no-deps", "--disable-pip-version-check", "-d", tmpdir, f"{name}=={version}"]
                  try:
                      proc = subprocess.run(cmd, text=True, capture_output=True, timeout=90)
                  except subprocess.TimeoutExpired:
                      add("info", "PYTHON_VERSION_VALIDATION_TIMEOUT", req, lineno, f"Timeout validando versiĂłn Python: {clean}", "hygiene")
                      continue

                  output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                  if proc.returncode == 0:
                      continue
                  if "no matching distribution found" in output or "could not find a version" in output:
                      add("high", "PYTHON_PACKAGE_OR_VERSION_NOT_RESOLVABLE", req, lineno, f"Paquete o versiĂłn Python no existe/no es resoluble en el Ă­ndice configurado: {clean}", "vulnerability")
                  elif any(x in output for x in ["temporary failure", "connection", "timed out", "proxy", "ssl", "network"]):
                      add("info", "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE", req, lineno, f"No se pudo validar por red/proxy/SSL: {clean}", "hygiene")
                  else:
                      add("info", "PYTHON_VERSION_VALIDATION_INCONCLUSIVE", req, lineno, f"ValidaciĂłn inconclusa de versiĂłn Python: {clean}", "hygiene")

          pep508_exact = re.compile(r"^\s*[A-Za-z0-9_.-]+(\[[A-Za-z0-9_,.-]+\])?\s*==\s*[A-Za-z0-9_.!+*-]+.*$")

          for pyproject in sorted(pathlib.Path(".").glob("**/pyproject.toml")):
              if skip(pyproject):
                  continue
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              candidates = []
              project = data.get("project", {}) if isinstance(data, dict) else {}
              if isinstance(project.get("dependencies"), list):
                  candidates.extend(project["dependencies"])

              optional = project.get("optional-dependencies", {})
              if isinstance(optional, dict):
                  for deps in optional.values():
                      if isinstance(deps, list):
                          candidates.extend(deps)

              poetry_deps = data.get("tool", {}).get("poetry", {}).get("dependencies", {}) if isinstance(data, dict) else {}
              if isinstance(poetry_deps, dict):
                  for dep_name, dep_spec in poetry_deps.items():
                      if str(dep_name).lower() == "python":
                          continue
                      version = dep_spec if isinstance(dep_spec, str) else str(dep_spec.get("version", "") if isinstance(dep_spec, dict) else "")
                      candidates.append(f"{dep_name}{version}" if str(version).startswith("==") else f"{dep_name} {version}")

              for dep in candidates:
                  dep = str(dep)
                  if "==" not in dep:
                      add("medium", "PYPROJECT_DEPENDENCY_NOT_EXACT_PIN", pyproject, 1, f"Dependencia pyproject sin pin exacto ==: {dep}", "hygiene")
                  elif not pep508_exact.match(dep):
                      add("medium", "PYPROJECT_DEPENDENCY_INVALID_FORMAT", pyproject, 1, f"Dependencia pyproject con formato no validable: {dep}", "hygiene")

          exact_npm = re.compile(r"^\d+\.\d+\.\d+([-+][0-9A-Za-z.-]+)?$")
          npm_available = shutil.which("npm") is not None

          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip(package_json):
                  continue
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              for section in ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict):
                      continue
                  for dep_name, dep_version in deps.items():
                      version = str(dep_version).strip()
                      if version.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                          add("info", "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY", package_json, 1, f"Dependencia npm local/workspace no validada contra registry: {dep_name}@{version}", "hygiene")
                          continue
                      if version in {"", "*", "latest"}:
                          add("medium", "NPM_DEPENDENCY_WITHOUT_VERSION", package_json, 1, f"Dependencia npm sin versiĂłn exacta: {dep_name}@{version}", "vulnerability")
                          continue
                      if not exact_npm.match(version):
                          add("medium", "NPM_DEPENDENCY_NOT_EXACT_PIN", package_json, 1, f"Dependencia npm sin versiĂłn exacta: {dep_name}@{version}", "hygiene")
                          continue
                      if not npm_available:
                          add("info", "NPM_VALIDATION_UNAVAILABLE", package_json, 1, f"npm no disponible para validar versiĂłn: {dep_name}@{version}", "hygiene")
                          continue
                      try:
                          proc = subprocess.run(["npm", "view", f"{dep_name}@{version}", "version", "--json"], text=True, capture_output=True, timeout=90)
                      except subprocess.TimeoutExpired:
                          add("info", "NPM_VERSION_VALIDATION_TIMEOUT", package_json, 1, f"Timeout validando npm: {dep_name}@{version}", "hygiene")
                          continue
                      output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                      if proc.returncode != 0 and ("notarget" in output or "no matching version found" in output or "404" in output):
                          add("high", "NPM_PACKAGE_OR_VERSION_NOT_RESOLVABLE", package_json, 1, f"Paquete o versiĂłn npm no existe/no es resoluble: {dep_name}@{version}", "vulnerability")
                      elif proc.returncode != 0 and any(x in output for x in ["network", "timeout", "proxy", "econn", "ssl"]):
                          add("info", "NPM_VERSION_VALIDATION_NETWORK_UNAVAILABLE", package_json, 1, f"No se pudo validar npm por red/proxy/SSL: {dep_name}@{version}", "hygiene")
                      elif proc.returncode != 0:
                          add("info", "NPM_VERSION_VALIDATION_INCONCLUSIVE", package_json, 1, f"ValidaciĂłn npm inconclusa: {dep_name}@{version}", "hygiene")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool": "Dependency Policy", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []

          for item in findings:
              rid = item["rule"]
              lvl = level(item["severity"])
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": item["message"]},
                  "defaultConfiguration": {"level": lvl}
              })
              results.append({
                  "ruleId": rid,
                  "level": lvl,
                  "message": {"text": item["message"]},
                  "properties": {"kind": item.get("kind", "vulnerability")},
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": item["file"]},
                          "region": {"startLine": item["line"]}
                      }
                  }]
              })

          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Dependency Policy", "informationUri": "https://urldefense.com/v3/__https://docs.github.com/actions__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIMlIOQK2w$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  ruff:
    name: "Dev Quality â€” Ruff"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff as development-quality report only
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          python3 - <<'PY'
          import json
          import pathlib
          try:
              data = json.loads(pathlib.Path("ruff_lint.json").read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []
          pathlib.Path("ruff_dev_quality_findings.json").write_text(json.dumps({"tool": "Ruff", "kind": "development_quality", "findings": data}, indent=2, ensure_ascii=False), encoding="utf-8")
          pathlib.Path("ruff_dev_quality.sarif").write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff Dev Quality","rules":[]}},"results":[]}]}', encoding="utf-8")
          PY

      - name: Upload Ruff dev-quality SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff_dev_quality.sarif
          category: ruff-dev-quality

      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-dev-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff_dev_quality_findings.json
            ruff_dev_quality.sarif
          retention-days: 30

  codeql:
    name: "SAST â€” CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Analyze and upload CodeQL SARIF
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: true

      - name: Normalize CodeQL artifacts
        if: always()
        run: |
          mkdir -p codeql-results
          if ! find codeql-results -name "*.sarif" -type f | grep -q .; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL","rules":[]}},"results":[]}]}' > codeql-results/codeql_${{ matrix.language }}.sarif
          fi
          python3 - <<'PY'
          import json
          import pathlib

          out = pathlib.Path("codeql_findings.json")
          findings = []
          for sarif in pathlib.Path("codeql-results").rglob("*.sarif"):
              try:
                  data = json.loads(sarif.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", "CodeQL")
                  rule_map = {}
                  for rule in run.get("tool", {}).get("driver", {}).get("rules", []) or []:
                      rid = rule.get("id", "")
                      rule_map[rid] = rule
                  for result in run.get("results", []) or []:
                      rid = result.get("ruleId", "")
                      level = result.get("level", "warning")
                      severity = "HIGH" if level == "error" else ("MEDIUM" if level == "warning" else "LOW")
                      msg = result.get("message", {}).get("text", "")
                      loc = "?"
                      try:
                          phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "?")
                          line = phys.get("region", {}).get("startLine", "?")
                          loc = f"{uri}:{line}"
                      except Exception:
                          pass
                      findings.append({"tool": tool, "rule": rid, "severity": severity, "location": loc, "message": msg})
          out.write_text(json.dumps({"tool": "CodeQL", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-results
          path: |
            codeql-results
            codeql_findings.json
          retention-days: 30

  semgrep:
    name: "SAST â€” Semgrep OSS"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create high-signal app security rules
        run: |
          mkdir -p .semgrep/app-security
          cat > .semgrep/app-security/app_rules.yml <<'YAML_RULES'
          rules:
            - id: web-python-flask-missing-auth-route
              languages: [python]
              severity: INFO
              message: "Flask route detected. Confirm authentication/authorization if it exposes sensitive actions."
              metadata:
                category: security
                technology: [flask, auth]
                confidence: MEDIUM
              pattern: |
                @app.route(...)
                def $FUNC(...):
                    ...

            - id: web-python-flask-public-host
              languages: [python]
              severity: WARNING
              message: "Flask app is exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIN2u5CwhQ$ . Confirm network controls, authentication and production WSGI deployment."
              metadata:
                category: security
                technology: [flask]
                confidence: HIGH
              pattern-either:
                - pattern: app.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIN2u5CwhQ$ ", ...)
                - pattern: app.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIN2u5CwhQ$ ", ...)
                - pattern: $APP.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIN2u5CwhQ$ ", ...)
                - pattern: $APP.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIN2u5CwhQ$ ", ...)

            - id: web-python-request-param-none-dos
              languages: [python]
              severity: WARNING
              message: "Request parameter is used without visible None check. Missing parameter can cause 500 errors and simple DoS."
              metadata:
                category: security
                technology: [flask, input-validation, dos]
                confidence: HIGH
              pattern-either:
                - pattern: |
                    $X = request.args.get(...)
                    ...
                    $X.lower()
                - pattern: |
                    $X = request.form.get(...)
                    ...
                    $X.lower()

            - id: web-python-route-long-sleep-dos
              languages: [python]
              severity: WARNING
              message: "Request handler sleeps for a long time. This can tie up workers and cause denial of service."
              metadata:
                category: security
                technology: [flask, dos]
                confidence: HIGH
              patterns:
                - pattern: |
                    @app.route(...)
                    def $FUNC(...):
                        ...
                        time.sleep($SECONDS)
                        ...
                - metavariable-comparison:
                    metavariable: $SECONDS
                    comparison: $SECONDS >= 30

            - id: web-python-xss-blacklist-script-only
              languages: [python]
              severity: WARNING
              message: "Weak XSS mitigation: blacklist only checks literal <script>. Use contextual output encoding/sanitization."
              metadata:
                category: security
                technology: [xss, output-encoding]
                confidence: HIGH
              pattern-either:
                - pattern: |
                    if "<script>" in $VALUE:
                        ...
                - pattern: |
                    if '<script>' in $VALUE:
                        ...

            - id: code-python-subprocess-shell-true
              languages: [python]
              severity: WARNING
              message: "subprocess with shell=True detected. Review for command injection if input is attacker-controlled."
              metadata:
                category: security
                technology: [command-injection]
                confidence: HIGH
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)

            - id: code-python-broad-exception-hides-security-error
              languages: [python]
              severity: INFO
              message: "Broad exception handling may hide security-relevant errors and reduce observability."
              metadata:
                category: security
                technology: [error-handling]
                confidence: MEDIUM
              pattern-either:
                - pattern: |
                    except Exception as $ERR:
                        ...
                - pattern: |
                    except:
                        ...
          YAML_RULES

      - name: Run Semgrep official and custom rules
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --sarif --output semgrep.sarif . || true

          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --json --output semgrep.json . || true

      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
            .semgrep/app-security/app_rules.yml
          retention-days: 30

  ai-security:
    name: "AI Security â€” Precise LLM Vulns"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create precise AI Semgrep rules
        run: |
