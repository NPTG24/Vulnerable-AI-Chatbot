          for c in categories:
              lines.append(f"{c:35} {table[c]['CRITICAL']:>8} {table[c]['HIGH']:>5} {table[c]['MEDIUM']:>7} {table[c]['LOW']:>5} {table[c]['INFO']:>5} {table[c]['UNKNOWN']:>8}")

          lines.append("")
