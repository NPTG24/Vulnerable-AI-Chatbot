  codeql:
    name: "SAST — CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Analyze and upload CodeQL SARIF
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: true

      - name: Normalize CodeQL artifacts
        if: always()
        run: |
          mkdir -p codeql-results
          if ! find codeql-results -name "*.sarif" -type f | grep -q .; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL","rules":[]}},"results":[]}]}' > codeql-results/codeql_${{ matrix.language }}.sarif
          fi
          python3 - <<'PY'
          import json
          import pathlib
          findings = []
          for sarif in pathlib.Path("codeql-results").rglob("*.sarif"):
              try:
                  data = json.loads(sarif.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", "CodeQL")
                  for result in run.get("results", []) or []:
                      rid = result.get("ruleId", "")
                      level = result.get("level", "warning")
                      severity = "HIGH" if level == "error" else ("MEDIUM" if level == "warning" else "LOW")
                      msg = result.get("message", {}).get("text", "")
                      loc = "?"
                      try:
                          phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "?")
                          line = phys.get("region", {}).get("startLine", "?")
                          loc = f"{uri}:{line}"
                      except Exception:
                          pass
                      findings.append({"tool": tool, "rule": rid, "severity": severity, "category": "Código aplicativo", "location": loc, "message": msg})
          pathlib.Path("codeql_findings.json").write_text(json.dumps({"tool": "CodeQL", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-results
          path: |
            codeql-results
            codeql_findings.json
          retention-days: 30

  semgrep:
    name: "SAST — Semgrep OSS"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create high-signal app security rules
        run: |
          mkdir -p .semgrep/app-security
          cat > .semgrep/app-security/app_rules.yml <<'YAML_RULES'
          rules:
            - id: web-python-flask-public-host
              languages: [python]
              severity: WARNING
              message: "Flask app is exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEzi25RlA$ . Confirm network controls, authentication and production WSGI deployment."
              pattern-either:
                - pattern: app.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEzi25RlA$ ", ...)
                - pattern: app.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEzi25RlA$ ", ...)
                - pattern: $APP.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEzi25RlA$ ", ...)
                - pattern: $APP.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!4BMj2Kk6oeIOXEMENMirgb3cIF1YrI7ogYcXK5gu4I0-0VyyZFcH9j_ZHtFtnCOy6_ai07hXM72_vY_-5-w3gAEzi25RlA$ ", ...)

            - id: web-python-route-long-sleep-dos
              languages: [python]
              severity: WARNING
              message: "Request handler sleeps for a long time. This can tie up workers and cause denial of service."
              patterns:
                - pattern: |
                    @app.route(...)
                    def $FUNC(...):
                        ...
                        time.sleep($SECONDS)
                        ...
                - metavariable-comparison:
                    metavariable: $SECONDS
                    comparison: $SECONDS >= 30

            - id: web-python-xss-blacklist-script-only
              languages: [python]
              severity: WARNING
              message: "Weak XSS mitigation: blacklist only checks literal <script>. Use contextual output encoding/sanitization."
              pattern-either:
                - pattern: |
                    if "<script>" in $VALUE:
                        ...
                - pattern: |
                    if '<script>' in $VALUE:
                        ...
          YAML_RULES

      - name: Run Semgrep official and custom rules
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --sarif --output semgrep.sarif . || true

          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --json --output semgrep.json . || true

      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
