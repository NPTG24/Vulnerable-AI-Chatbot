  centralized-report:
    name: "Report - Centralized Security Summary"
    runs-on: ubuntu-latest
    needs:
      - dependency-sca-policy
      - code-ai-static
      - ruff
      - codeql
      - semgrep
      - ai-security
      - dojigiri-ai-security
      - sca
      - secret-scan
      - docker-security
      - iac-checkov
    if: always()
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results
      - name: Build centralized report
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re

          root = pathlib.Path("all_scan_results")
          outdir = pathlib.Path("central-security-report")
          outdir.mkdir(exist_ok=True)
          findings = []
          quality = []
          tool_status = []

          def norm(sev):
              sev = str(sev or "UNKNOWN").upper()
              return {"ERROR": "HIGH", "WARNING": "MEDIUM", "WARN": "MEDIUM", "NOTE": "LOW", "STYLE": "LOW"}.get(sev, sev)

          def force_dependency_severity(cat, sev):
              sev = norm(sev)
              if str(cat or "") == "Dependencias / SCA":
                  order = {"CRITICAL": 4, "HIGH": 3, "MEDIUM": 2, "LOW": 1, "INFO": 0, "UNKNOWN": 0}
                  return sev if order.get(sev, 0) >= 3 else "HIGH"
              return sev

          def is_excluded_workflow(value):
              value = str(value or "").replace("\\", "/")
              return ".github/workflows/security.yml" in value or ".github/workflows/" in value

          def add(cat, sev, tool, loc, detail, rule="", source="", fp_note=""):
              if is_excluded_workflow(loc) or is_excluded_workflow(detail) or is_excluded_workflow(source):
                  return
              item = {
                  "category": cat,
                  "severity": force_dependency_severity(cat, sev),
                  "tool": tool,
                  "location": loc or "?:?",
                  "detail": str(detail or "").replace("\n", " ")[:3000],
                  "rule": rule or "",
                  "source": source or "",
                  "fp_note": fp_note or "",
                  "tools": [tool],
                  "sources": [source] if source else []
              }
              findings.append(item)
          def load_all(name):
              matched = False
              for path in root.rglob(name):
                  matched = True
                  try:
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          yield path, json.loads(text)
                  except Exception as error:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", f"{path}:1", f"No se pudo leer JSON: {error}", "PARSER_ERROR", str(path))
              if not matched:
                  tool_status.append({"artifact": name, "status": "missing"})

