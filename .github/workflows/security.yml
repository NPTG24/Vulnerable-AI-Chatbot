name: Security Pipeline

# ==============================================================================
# SECURITY PIPELINE
# ==============================================================================


on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Policy — Dependency Pinning"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning, real package versions and generate SARIF
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import shutil
          import subprocess
          import sys
          import tempfile
          import tomllib

          findings = []

          def add(severity, rule, file_path, line, message):
              findings.append({
                  "tool": "Dependency Policy",
                  "severity": severity,
                  "rule": rule,
                  "file": str(file_path),
                  "line": int(line or 1),
                  "message": message,
              })

          def severity_to_level(severity):
              value = str(severity or "").lower()
              if value in {"critical", "high"}:
                  return "error"
              if value == "medium":
                  return "warning"
              return "note"

          # ------------------------------------------------------------------
          # Python requirements*.txt
          # ------------------------------------------------------------------
          req_files = sorted({
              *pathlib.Path(".").glob("requirements*.txt"),
              *pathlib.Path(".").glob("**/requirements*.txt"),
          })

          skip_req = re.compile(
              r"^\s*($|\#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)",
              re.IGNORECASE,
          )

          exact_req = re.compile(
              r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$"
          )

          pinned_python = []

          for req in req_files:
              if any(part in {".git", ".github", "node_modules", ".venv", "venv"} for part in str(req).replace("\\", "/").split("/")):
                  continue

              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue

                  clean = line.split(" #", 1)[0].strip()
                  match = exact_req.match(clean)

                  if not match:
                      add(
                          "medium",
                          "UNPINNED_DEPENDENCY",
                          req,
                          lineno,
                          f"Dependencia Python sin pin exacto o formato no validable: {line}",
                      )
                      continue

                  name = match.group(1)
                  version = match.group(3)
                  pinned_python.append((name, version, req, lineno, clean))

          # Verificación de existencia real de versión Python usando el índice configurado por pip.
          # Si el entorno no tiene salida a Internet o usa repos privados bloqueados, se reporta como INFO.
          for name, version, req, lineno, clean in pinned_python:
              with tempfile.TemporaryDirectory() as tmpdir:
                  cmd = [
                      sys.executable,
                      "-m",
                      "pip",
                      "download",
                      "--no-deps",
                      "--disable-pip-version-check",
                      "-d",
                      tmpdir,
                      f"{name}=={version}",
                  ]

                  try:
                      proc = subprocess.run(
                          cmd,
                          text=True,
                          capture_output=True,
                          timeout=90,
                      )
                  except subprocess.TimeoutExpired:
                      add(
                          "info",
                          "PYTHON_VERSION_VALIDATION_TIMEOUT",
                          req,
                          lineno,
                          f"No se pudo validar si la versión existe por timeout del índice Python: {clean}",
                      )
                      continue

                  output = (proc.stdout or "") + "\n" + (proc.stderr or "")
                  lower = output.lower()

                  if proc.returncode == 0:
                      continue

                  if "no matching distribution found" in lower or "could not find a version" in lower:
                      add(
                          "high",
                          "PYTHON_VERSION_NOT_RESOLVABLE",
                          req,
                          lineno,
                          f"La versión declarada no parece existir o no está disponible en el índice Python configurado: {clean}",
                      )
                  elif "temporary failure" in lower or "connection" in lower or "timed out" in lower or "proxy" in lower or "ssl" in lower:
                      add(
                          "info",
                          "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE",
                          req,
                          lineno,
                          f"No se pudo validar la versión por restricción de red/proxy/SSL del entorno: {clean}",
                      )
                  else:
                      add(
                          "info",
                          "PYTHON_VERSION_VALIDATION_INCONCLUSIVE",
                          req,
                          lineno,
                          f"No se pudo confirmar la versión en el índice Python configurado: {clean}",
                      )

          # ------------------------------------------------------------------
          # pyproject.toml básico: dependencies con == exacto.
          # ------------------------------------------------------------------
          pyprojects = sorted(pathlib.Path(".").glob("**/pyproject.toml"))
          pep508_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+).*$")

          for pyproject in pyprojects:
              if any(part in {".git", ".github", "node_modules", ".venv", "venv"} for part in str(pyproject).replace("\\", "/").split("/")):
                  continue

              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              candidates = []
              project = data.get("project", {}) if isinstance(data, dict) else {}
              if isinstance(project.get("dependencies"), list):
                  candidates.extend(project.get("dependencies", []))

              optional = project.get("optional-dependencies", {})
              if isinstance(optional, dict):
                  for deps in optional.values():
                      if isinstance(deps, list):
                          candidates.extend(deps)

              poetry_deps = data.get("tool", {}).get("poetry", {}).get("dependencies", {}) if isinstance(data, dict) else {}
              if isinstance(poetry_deps, dict):
                  for dep_name, dep_spec in poetry_deps.items():
                      if str(dep_name).lower() == "python":
                          continue
                      if isinstance(dep_spec, str):
                          if dep_spec.startswith("=="):
                              candidates.append(f"{dep_name}{dep_spec}")
                          else:
                              add(
                                  "medium",
                                  "PYPROJECT_NON_EXACT_DEPENDENCY",
                                  pyproject,
                                  1,
                                  f"Dependencia Poetry sin versión exacta ==: {dep_name} {dep_spec}",
                              )
                      elif isinstance(dep_spec, dict):
                          version = str(dep_spec.get("version", ""))
                          if version.startswith("=="):
                              candidates.append(f"{dep_name}{version}")
                          else:
                              add(
                                  "medium",
                                  "PYPROJECT_NON_EXACT_DEPENDENCY",
                                  pyproject,
                                  1,
                                  f"Dependencia Poetry sin versión exacta ==: {dep_name} {version}",
                              )

              for dep in candidates:
                  match = pep508_exact.match(str(dep))
                  if not match:
                      add(
                          "medium",
                          "PYPROJECT_NON_EXACT_DEPENDENCY",
                          pyproject,
                          1,
                          f"Dependencia pyproject sin versión exacta == o no validable: {dep}",
                      )

          # ------------------------------------------------------------------
          # Node package.json: versiones reales mediante npm view.
          # ------------------------------------------------------------------
          package_json_files = sorted(pathlib.Path(".").glob("**/package.json"))
          npm_available = shutil.which("npm") is not None
          exact_npm = re.compile(r"^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$")
          npm_sections = ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]

          for package_json in package_json_files:
              if any(part in {".git", ".github", "node_modules", "dist", "build"} for part in str(package_json).replace("\\", "/").split("/")):
                  continue

              try:
                  pkg_data = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              for section in npm_sections:
                  deps = pkg_data.get(section, {})
                  if not isinstance(deps, dict):
                      continue

                  for dep_name, dep_version in deps.items():
                      version = str(dep_version).strip()

                      if version.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                          add(
                              "info",
                              "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY",
                              package_json,
                              1,
                              f"Dependencia npm local/workspace no validada contra registry: {dep_name}@{version}",
                          )
                          continue

                      if not exact_npm.match(version):
                          add(
                              "medium",
                              "NPM_NON_EXACT_DEPENDENCY",
                              package_json,
                              1,
                              f"Dependencia npm sin versión exacta o no validable: {dep_name}@{version}",
                          )
                          continue

                      if not npm_available:
                          add(
                              "info",
                              "NPM_VALIDATION_UNAVAILABLE",
                              package_json,
                              1,
                              f"npm no está disponible para validar si existe la versión: {dep_name}@{version}",
                          )
                          continue

                      try:
                          proc = subprocess.run(
                              ["npm", "view", f"{dep_name}@{version}", "version", "--json"],
                              text=True,
                              capture_output=True,
                              timeout=90,
                          )
                      except subprocess.TimeoutExpired:
                          add(
                              "info",
                              "NPM_VERSION_VALIDATION_TIMEOUT",
                              package_json,
                              1,
                              f"No se pudo validar por timeout si la versión npm existe: {dep_name}@{version}",
                          )
                          continue

                      output = (proc.stdout or "") + "\n" + (proc.stderr or "")
                      lower = output.lower()

                      if proc.returncode == 0:
                          continue

                      if "notarget" in lower or "no matching version found" in lower or "404" in lower:
                          add(
                              "high",
                              "NPM_VERSION_NOT_RESOLVABLE",
                              package_json,
                              1,
                              f"La versión npm declarada no parece existir o no está disponible en el registry configurado: {dep_name}@{version}",
                          )
                      elif "network" in lower or "timeout" in lower or "proxy" in lower or "econn" in lower or "ssl" in lower:
                          add(
                              "info",
                              "NPM_VERSION_VALIDATION_NETWORK_UNAVAILABLE",
                              package_json,
                              1,
                              f"No se pudo validar la versión npm por restricción de red/proxy/SSL: {dep_name}@{version}",
                          )
                      else:
                          add(
                              "info",
                              "NPM_VERSION_VALIDATION_INCONCLUSIVE",
                              package_json,
                              1,
                              f"No se pudo confirmar la versión npm en el registry configurado: {dep_name}@{version}",
                          )

          pathlib.Path("dependency_policy_findings.json").write_text(
              json.dumps(
                  {
                      "tool": "Dependency Policy",
                      "findings": findings,
                  },
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          rule_metadata = {
              "UNPINNED_DEPENDENCY": "Dependency without exact == pin",
              "PYTHON_VERSION_NOT_RESOLVABLE": "Pinned Python package version is not resolvable",
              "PYTHON_VERSION_VALIDATION_TIMEOUT": "Python package version validation timeout",
              "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE": "Python package version validation blocked by network",
              "PYTHON_VERSION_VALIDATION_INCONCLUSIVE": "Python package version validation inconclusive",
              "PYPROJECT_NON_EXACT_DEPENDENCY": "pyproject dependency without exact == pin",
              "NPM_NON_EXACT_DEPENDENCY": "npm dependency without exact version",
              "NPM_VERSION_NOT_RESOLVABLE": "Pinned npm package version is not resolvable",
              "NPM_VERSION_VALIDATION_TIMEOUT": "npm package version validation timeout",
              "NPM_VERSION_VALIDATION_NETWORK_UNAVAILABLE": "npm package version validation blocked by network",
              "NPM_VERSION_VALIDATION_INCONCLUSIVE": "npm package version validation inconclusive",
              "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY": "npm local/workspace dependency not validated against registry",
              "NPM_VALIDATION_UNAVAILABLE": "npm not available for package version validation",
          }

          rules = []
          used_rules = set()
          results = []

          for item in findings:
              rule_id = item["rule"]
              used_rules.add(rule_id)
              results.append({
                  "ruleId": rule_id,
                  "level": severity_to_level(item["severity"]),
                  "message": {"text": item["message"]},
                  "locations": [
                      {
                          "physicalLocation": {
                              "artifactLocation": {"uri": item["file"]},
                              "region": {"startLine": item["line"]},
                          }
                      }
                  ],
              })

          for rule_id in sorted(used_rules):
              rules.append({
                  "id": rule_id,
                  "name": rule_id,
                  "shortDescription": {"text": rule_metadata.get(rule_id, rule_id)},
                  "fullDescription": {"text": rule_metadata.get(rule_id, rule_id)},
                  "defaultConfiguration": {"level": "warning"},
              })

          sarif = {
              "version": "2.1.0",
              "$schema": "https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json__;!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSExEpFpJQ$ ",
              "runs": [
                  {
                      "tool": {
                          "driver": {
                              "name": "Dependency Policy",
                              "informationUri": "https://urldefense.com/v3/__https://docs.github.com/actions__;!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSGVotvaJg$ ",
                              "rules": rules,
                          }
                      },
                      "results": results,
                  }
              ],
          }

          pathlib.Path("dependency_policy.sarif").write_text(
              json.dumps(sarif, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  ruff:
    name: "Lint — Ruff"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        continue-on-error: true
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff check . --output-format=github || true
          ruff check . --output-format=sarif > ruff.sarif || true
          ruff format . --check --diff > ruff_format_diff.txt || true

      - name: Ensure Ruff artifacts exist
        if: always()
        run: |
          touch ruff_lint.json ruff_lint_full.txt ruff_format_diff.txt
          if [ ! -s ruff.sarif ]; then echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff","rules":[]}},"results":[]}]}' > ruff.sarif; fi

      - name: Upload Ruff SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff.sarif
          category: ruff

      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff.sarif
          retention-days: 30

  codeql:
    name: "SAST — CodeQL"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4
      - name: Analyze with CodeQL
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}
      - name: Create CodeQL metadata
        if: always()
        run: |
          cat > codeql_${{ matrix.language }}_metadata.json <<JSON
          {"tool":"CodeQL","language":"${{ matrix.language }}","severity":"info","rule":"CODEQL_EXECUTION","message":"CodeQL fue ejecutado o intentado."}
          JSON
      - name: Upload CodeQL metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-metadata
          path: codeql_${{ matrix.language }}_metadata.json
          retention-days: 30

  sast-semgrep:
    name: "SAST — Semgrep General Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Run Semgrep general security rules
        continue-on-error: true
        run: |
          semgrep --config p/python --config p/javascript --config p/typescript --config p/security-audit --config p/owasp-top-ten --config p/secrets --config p/dockerfile --config p/yaml --exclude .github/workflows/** --sarif --output semgrep.sarif . || true
          semgrep --config p/python --config p/javascript --config p/typescript --config p/security-audit --config p/owasp-top-ten --config p/secrets --config p/dockerfile --config p/yaml --exclude .github/workflows/** --json --output semgrep.json . || true
      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json
      - name: Upload Semgrep SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-general-security
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-general-results
          path: |
            semgrep.sarif
            semgrep.json
          retention-days: 30

  ai-sast-semgrep:
    name: "AI SAST — OWASP LLM Agentic Secure Code"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
      - name: Create local AI Semgrep rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML'
          rules:
            - id: ai-llm01-python-user-input-in-prompt
              languages: [python]
              severity: WARNING
              message: "OWASP LLM01 Prompt Injection: input de usuario usado en construcción de prompt."
              metadata: {category: security, owasp_llm: LLM01 Prompt Injection, technology: [ai, llm, prompt-injection]}
              patterns:
                - pattern-either:
                    - pattern: $PROMPT = f"...{$USER}..."
                    - pattern: $PROMPT = "...".format($USER)
                    - pattern: $PROMPT = "..." + $USER
                    - pattern: $PROMPT += $USER
                - metavariable-regex:
                    metavariable: $USER
                    regex: (?i).*(user|input|query|question|request|message|prompt|text|content|body|data|payload).*
            - id: ai-llm01-js-user-input-in-prompt
              languages: [javascript, typescript]
              severity: WARNING
              message: "OWASP LLM01 Prompt Injection: input de usuario usado en prompt."
              metadata: {category: security, owasp_llm: LLM01 Prompt Injection, technology: [ai, llm, prompt-injection]}
              pattern-either:
                - pattern: const $PROMPT = `...${$USER}...`
                - pattern: let $PROMPT = `...${$USER}...`
                - pattern: var $PROMPT = `...${$USER}...`
                - pattern: $PROMPT += $USER
                - pattern: $PROMPT = $PROMPT + $USER
            - id: ai-llm03-python-ai-framework-detected
              languages: [python]
              severity: INFO
              message: "OWASP LLM03 Supply Chain: framework AI/LLM detectado. Revisar versión, origen, permisos y CVEs."
              metadata: {category: security, owasp_llm: LLM03 Supply Chain, technology: [ai, llm, supply-chain]}
              pattern-either:
                - pattern: import openai
                - pattern: import anthropic
                - pattern: import google.generativeai
                - pattern: import langchain
                - pattern: import llama_index
                - pattern: import transformers
                - pattern: import autogen
                - pattern: import crewai
                - pattern: import semantic_kernel
            - id: ai-llm04-rag-poisoning-python
              languages: [python]
              severity: WARNING
              message: "OWASP LLM04/LLM08: posible RAG poisoning o debilidad vectorial. Validar origen, sanitización, tenant y metadata."
              metadata: {category: security, owasp_llm: LLM04/LLM08, technology: [ai, llm, rag, vector-db]}
              pattern-either:
                - pattern: $DB.add_documents($DOCS, ...)
                - pattern: $DB.add_texts($TEXTS, ...)
                - pattern: $INDEX.insert($DOCS, ...)
                - pattern: $VECTORSTORE.add_documents($DOCS, ...)
                - pattern: $VECTORSTORE.from_documents($DOCS, ...)
                - pattern: $LOADER.load(...)
            - id: ai-llm05-dangerous-eval-exec-python
              languages: [python]
              severity: ERROR
              message: "OWASP LLM05/LLM06: uso de eval/exec. Riesgo de ejecución arbitraria."
              metadata: {category: security, owasp_llm: LLM05/LLM06, technology: [ai, llm, agent, rce]}
              pattern-either:
                - pattern: eval($X)
                - pattern: exec($X)
            - id: ai-llm05-dangerous-eval-exec-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "OWASP LLM05/LLM06: ejecución dinámica de código. Riesgo crítico."
              metadata: {category: security, owasp_llm: LLM05/LLM06, technology: [ai, llm, agent, rce]}
              pattern-either:
                - pattern: eval($X)
                - pattern: new Function($X)
            - id: ai-llm06-python-agent-shell-tool
              languages: [python]
              severity: ERROR
              message: "OWASP LLM06 Excessive Agency: agente/tool con ejecución de comandos del sistema."
              metadata: {category: security, owasp_llm: LLM06 Excessive Agency, technology: [ai, llm, agent, command-injection]}
              pattern-either:
                - pattern: subprocess.run($CMD, shell=True, ...)
                - pattern: subprocess.Popen($CMD, shell=True, ...)
                - pattern: os.system($CMD)
                - pattern: os.popen($CMD)
            - id: ai-agent-python-broad-tool-permissions
              languages: [python]
              severity: WARNING
              message: "Agentic AI: tool/agente detectado. Revisar permisos, allowlist, auditoría y aprobación humana."
              metadata: {category: security, owasp_agentic: Tool Abuse / Excessive Agency, technology: [ai, agent, tools]}
              pattern-either:
                - pattern: Tool(..., func=$FUNC, ...)
                - pattern: StructuredTool.from_function($FUNC, ...)
                - pattern: initialize_agent(..., tools=$TOOLS, ...)
                - pattern: create_openai_functions_agent(..., tools=$TOOLS, ...)
                - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                - pattern: Crew(..., agents=$AGENTS, ...)
            - id: ai-llm07-python-system-prompt-hardcoded
              languages: [python]
              severity: INFO
              message: "OWASP LLM07 System Prompt Leakage: system prompt hardcodeado."
              metadata: {category: security, owasp_llm: LLM07 System Prompt Leakage, technology: [ai, llm, prompt-leakage]}
              pattern-either:
                - pattern: '{"role": "system", "content": "..."}'
                - pattern: '{"role": "system", "content": $CONTENT}'
            - id: ai-llm10-python-unbounded-consumption
              languages: [python]
              severity: WARNING
              message: "OWASP LLM10: llamada LLM sin límites evidentes. Revisar max_tokens, timeout, rate limit y budget."
              metadata: {category: security, owasp_llm: LLM10 Unbounded Consumption, technology: [ai, llm, dos, cost]}
              pattern-either:
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: openai.ChatCompletion.create(...)
                - pattern: $MODEL.invoke(...)
          YAML
      - name: Run local AI Semgrep rules
        continue-on-error: true
        run: |
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --sarif --output semgrep_ai.sarif . || true
          semgrep --config .semgrep/ai-security --exclude .github/workflows/** --json --output semgrep_ai.json . || true
      - name: Rename AI Semgrep tool in SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path('semgrep_ai.sarif')
          if not p.exists():
              p.write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}', encoding='utf-8')
              raise SystemExit(0)
          try:
              data = json.loads(p.read_text(encoding='utf-8', errors='ignore'))
          except Exception:
              data = {'version':'2.1.0','runs':[]}
          if not data.get('runs'):
              data['runs'] = [{'tool': {'driver': {'name': 'AI Security', 'rules': []}}, 'results': []}]
          for run in data.get('runs', []):
              driver = run.setdefault('tool', {}).setdefault('driver', {})
              driver['name'] = 'AI Security'
              driver['informationUri'] = 'https://urldefense.com/v3/__https://owasp.org/www-project-top-10-for-large-language-model-applications/__;!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSHnn6m1zg$ '
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure AI Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep_ai.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}' > semgrep_ai.sarif
          test -f semgrep_ai.json || echo '{"results":[]}' > semgrep_ai.json
      - name: Upload AI Security SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai.sarif
          category: ai-security
      - name: Upload AI Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ai-results
          path: |
            semgrep_ai.sarif
            semgrep_ai.json
          retention-days: 30

  ai-policy-compliance:
    name: "AI Compliance — LLM Agentic Policies"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run AI compliance static policies and generate SARIF
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          include_ext = {'.py','.js','.ts','.tsx','.jsx','.json','.yaml','.yml','.toml'}
          skip_dirs = {'.git','.github','node_modules','.venv','venv','dist','build','__pycache__','.mypy_cache','.pytest_cache'}
          findings = []
          def add(severity, rule, file_path, line, message):
              findings.append({'tool':'AI Policy Compliance','severity':severity,'rule':rule,'file':str(file_path),'line':int(line or 1),'message':message})
          def should_skip_file(file_path):
              normalized = str(file_path).replace('\\','/')
              for segment in normalized.split('/'):
                  if segment in skip_dirs:
                      return True
              return False
          checks = [
              ('high','AGENT_SHELL_TOOL',re.compile(r'(subprocess|os\.system|child_process|execSync|exec\(|shell=True)', re.I),'Agente o código con capacidad de shell/comandos. Requiere allowlist, validación y aprobación humana.'),
              ('medium','SYSTEM_PROMPT_HARDCODED',re.compile(r'(role\s*[:=]\s*[\'\"]system[\'\"]|system_prompt|developer_message)', re.I),'System/developer prompt detectado. Revisar fuga de instrucciones internas y logging.'),
              ('medium','TOOL_CALLING_OR_AGENT',re.compile(r'(tools\s*[:=]|tool_choice|function_call|AgentExecutor|initialize_agent|StructuredTool|Crew\(|AutoGen|autogen|crewai)', re.I),'Tool calling o agente detectado. Revisar permisos, allowlist, auditoría y acciones destructivas.'),
              ('medium','RAG_VECTORSTORE',re.compile(r'(vectorstore|add_documents|add_texts|from_documents|embedding|retriever|similarity_search|pinecone|chroma|faiss)', re.I),'RAG/vectorstore detectado. Revisar poisoning, aislamiento por tenant, metadata y sanitización.'),
              ('medium','LLM_CALL_LIMITS',re.compile(r'(chat\.completions\.create|responses\.create|ChatCompletion\.create|model\.invoke|llm\.invoke)', re.I),'Llamada LLM detectada. Verificar max_tokens, timeout, rate limit, budget y retries.'),
              ('medium','PROMPT_LOGGING',re.compile(r'(print\(.{0,80}(prompt|message|response)|console\.log\(.{0,80}(prompt|message|response)|logger\..{0,80}(prompt|message|response))', re.I),'Posible logging de prompts/respuestas. Revisar exposición de datos sensibles.'),
              ('high','UNSAFE_DYNAMIC_CODE',re.compile(r'(eval\(|exec\(|new Function\()', re.I),'Ejecución dinámica de código. Riesgo alto si procesa input externo o salida de LLM.'),
          ]
          for fp in pathlib.Path('.').rglob('*'):
              if not fp.is_file() or should_skip_file(fp) or fp.suffix.lower() not in include_ext:
                  continue
              try:
                  lines = fp.read_text(encoding='utf-8', errors='ignore').splitlines()
              except Exception:
                  continue
              text = '\n'.join(lines)
              lower = text.lower()
              for severity, rule, regex, message in checks:
                  for ln, line_text in enumerate(lines, 1):
                      if regex.search(line_text):
                          add(severity, rule, fp, ln, message)
              if re.search(r'(chat\.completions\.create|responses\.create|ChatCompletion\.create|model\.invoke|llm\.invoke)', text, re.I):
                  if 'max_tokens' not in lower and 'timeout' not in lower and 'rate_limit' not in lower and 'ratelimit' not in lower:
                      add('medium','LLM_NO_OBVIOUS_LIMITS',fp,1,'Archivo contiene llamadas LLM sin señales evidentes de max_tokens, timeout o rate limiting.')
              if re.search(r'(tools\s*[:=]|tool_choice|function_call|AgentExecutor|initialize_agent|StructuredTool)', text, re.I):
                  if 'allowlist' not in lower and 'approval' not in lower and 'human' not in lower and 'confirm' not in lower:
                      add('high','AGENT_NO_OBVIOUS_APPROVAL_OR_ALLOWLIST',fp,1,'Archivo contiene tools/agente sin señales evidentes de allowlist o aprobación humana.')
              if re.search(r'(add_documents|add_texts|from_documents|vectorstore|retriever)', text, re.I):
                  if 'sanitize' not in lower and 'metadata' not in lower and 'tenant' not in lower and 'source' not in lower:
                      add('medium','RAG_NO_OBVIOUS_SOURCE_VALIDATION',fp,1,'Archivo contiene RAG/vectorstore sin señales evidentes de sanitización, metadata, tenant o validación de fuente.')
          pathlib.Path('ai_policy_findings.json').write_text(json.dumps({'tool':'AI Policy Compliance','findings':findings}, indent=2, ensure_ascii=False), encoding='utf-8')
          level_map = {'critical':'error','high':'error','medium':'warning','low':'note','info':'note','unknown':'note'}
          rules, results = {}, []
          for f in findings:
              rid = f['rule']
              level = level_map.get(str(f['severity']).lower(), 'warning')
              if rid not in rules:
                  rules[rid] = {'id':rid,'name':rid,'shortDescription':{'text':rid},'fullDescription':{'text':f['message']},'defaultConfiguration':{'level':level}}
              results.append({'ruleId':rid,'level':level,'message':{'text':f['message']},'locations':[{'physicalLocation':{'artifactLocation':{'uri':f['file']},'region':{'startLine':f['line']}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'AI__;JSUlJQ!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSHVLD2abQ$  Policy Compliance','informationUri':'https://urldefense.com/v3/__https://owasp.org/www-project-top-10-for-large-language-model-applications/','rules':list(rules.values())*7D*7D,'results':results__;JSU!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSHVAgrFqw$ }]}
          pathlib.Path('ai_policy.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          print(f"AI policy findings: {len(findings)}")
          PY
      - name: Ensure AI policy artifacts exist
        if: always()
        run: |
          test -f ai_policy_findings.json || echo '{"tool":"AI Policy Compliance","findings":[]}' > ai_policy_findings.json
          test -f ai_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Policy Compliance","rules":[]}},"results":[]}]}' > ai_policy.sarif
      - name: Upload AI Policy SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai_policy.sarif
          category: ai-policy-compliance
      - name: Upload AI policy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-policy-compliance-results
          path: |
            ai_policy_findings.json
            ai_policy.sarif
          retention-days: 30

  sca-dependencies:
    name: "SCA — Trivy + pip-audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; elif [ -f pyproject.toml ]; then pip install -e ".[dev]" 2>/dev/null || pip install -e . || true; fi
      - name: Run pip-audit and generate SARIF
        continue-on-error: true
        run: |
          pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path('pip_audit_osv.json')
          if not src.exists(): src.write_text('{"dependencies":[]}', encoding='utf-8')
          try: data = json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: data = {'dependencies': []}
          deps = data.get('dependencies', []) if isinstance(data, dict) else data
          rules, results = {}, []
          def level(sev):
              sev = str(sev or '').upper()
              return 'error' if sev in {'CRITICAL','HIGH'} else ('warning' if sev == 'MEDIUM' else 'note')
          for dep in deps:
              if not isinstance(dep, dict): continue
              pkg, ver = dep.get('name','unknown'), dep.get('version','')
              for v in dep.get('vulns', []):
                  vid, sev = v.get('id','PYTHON_VULN'), v.get('severity','UNKNOWN')
                  msg = f'{pkg} {ver}: {vid} severity={sev}'
                  if vid not in rules: rules[vid] = {'id':vid,'name':vid,'shortDescription':{'text':vid},'fullDescription':{'text':msg},'defaultConfiguration':{'level':level(sev)}}
                  results.append({'ruleId':vid,'level':level(sev),'message':{'text':msg},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'python-dependencies'}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'pip-audit','informationUri':'https:/*pypi.org/project/pip-audit/','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJS8lJSUl!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSHm-3NcRg$ }
          pathlib.Path('pip_audit.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure pip-audit artifacts exist
        if: always()
        run: |
          test -f pip_audit_results.json || echo '[]' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
      - name: Upload pip-audit SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit
      - name: Upload pip-audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
          retention-days: 30
      - name: Run Trivy SARIF
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy_results.sarif
          severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
          exit-code: "0"
          ignore-unfixed: false
      - name: Ensure Trivy artifact exists
        if: always()
        run: |
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif
      - name: Upload Trivy SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca
      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy_results.sarif
          retention-days: 30

  secret-scan:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks through Docker
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect --source /repo --report-format json --report-path /repo/gitleaks_report.json --exit-code 0 --verbose || true
      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path('gitleaks_report.json')
          if not src.exists(): src.write_text('[]', encoding='utf-8')
          try: data = json.loads(src.read_text(encoding='utf-8', errors='ignore') or '[]')
          except Exception: data = []
          rules, results = {}, []
          for item in data:
              rid = item.get('RuleID') or item.get('Description') or 'SECRET'
              desc = item.get('Description') or 'Posible secreto expuesto'
              file = item.get('File') or 'unknown'
              line = int(item.get('StartLine') or 1)
              if rid not in rules: rules[rid] = {'id':rid,'name':rid,'shortDescription':{'text':desc},'fullDescription':{'text':desc},'defaultConfiguration':{'level':'error'}}
              results.append({'ruleId':rid,'level':'error','message':{'text':desc},'locations':[{'physicalLocation':{'artifactLocation':{'uri':file},'region':{'startLine':line}}}]})
          sarif = {'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Gitleaks','informationUri':'https:/*github.com/gitleaks/gitleaks','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJS8lJSUl!!P110LumUDw!_WtczPAjSbjFnYqHSpu2A389TMJqJ8BNGQcv96If3e7l30FOuQCr7YVIhajoRP2UL31hKgL-AYvgDgtmEIUSqSGjQt5KCg$ }
          pathlib.Path('gitleaks.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure Gitleaks artifacts exist
        if: always()
        run: |
          test -f gitleaks_report.json || echo '[]' > gitleaks_report.json
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif
      - name: Upload Gitleaks SARIF to Code Scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

