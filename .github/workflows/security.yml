name: Security Pipeline NPTG24

"on":
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  PIP_NO_CACHE_DIR: "off"
  PIP_DISABLE_PIP_VERSION_CHECK: "on"

jobs:
  checkout:
    name: Checkout repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  setup-python:
    name: Set up Python
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

  appsec-code:
    name: Code AppSec Semgrep
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare result folders
        run: |
          rm -rf security-results
          mkdir -p security-results/reports
          mkdir -p security-results/sarif

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create precise AI and code rules
        run: |
          cat > ai-code-rules.yml <<'EOF'
          rules:
            - id: ai.flask-request-to-llm
              mode: taint
              message: User-controlled Flask request data reaches an LLM or AI chain. Review prompt injection, data leakage and tool-use controls.
              severity: ERROR
              languages: [python]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.json
                - pattern: request.get_json(...)
                - pattern: https://urldefense.com/v3/__http://request.data__;!!P110LumUDw!-RrbWxklkp8SA70biE5CVeBad2aIc4N77gJxNx-lJiH3R9ceG_vtvL7eezP8IZlBsnkc58f8s6z4JruW3YwA7P26-TlfwQ$ 
                - pattern: request.values.get(...)
              pattern-sinks:
                - pattern: $LLM.invoke(...)
                - pattern: $LLM.predict(...)
                - pattern: $LLM.generate(...)
                - pattern: $CHAIN.invoke(...)
                - pattern: $CHAIN.run(...)
                - pattern: $AGENT.invoke(...)
                - pattern: $AGENT.run(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)

            - id: ai.flask-request-to-retrievalqa
              mode: taint
              message: User-controlled Flask request data reaches a retrieval/RAG chain. Validate authorization, tenant isolation, prompt injection defenses and source filtering.
              severity: ERROR
              languages: [python]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.json
                - pattern: request.get_json(...)
                - pattern: request.values.get(...)
              pattern-sinks:
                - pattern: RetrievalQA.from_chain_type(...).run(...)
                - pattern: $QA.run(...)
                - pattern: $QA.invoke(...)
                - pattern: $RETRIEVER.get_relevant_documents(...)
                - pattern: $VECTORSTORE.similarity_search(...)

            - id: ai.agent-with-dangerous-tool
              message: AI agent is configured with a tool that may perform code execution, shell, HTTP or filesystem actions.
              severity: ERROR
              languages: [python]
              pattern-either:
                - pattern: PythonREPLTool(...)
                - pattern: ShellTool(...)
                - pattern: RequestsGetTool(...)
                - pattern: RequestsPostTool(...)
                - pattern: Tool(..., func=eval, ...)
                - pattern: Tool(..., func=exec, ...)
                - pattern: Tool(..., func=os.system, ...)
                - pattern: StructuredTool(..., func=eval, ...)
                - pattern: StructuredTool(..., func=exec, ...)
                - pattern: StructuredTool(..., func=os.system, ...)

            - id: ai.keyword-filter-as-security-boundary
              message: Keyword filtering is being used as a security control. This is bypassable in AI applications and should not protect secrets or authorization.
              severity: WARNING
              languages: [python]
              patterns:
                - pattern-either:
                    - pattern: |
                        if any($WORD in $INPUT for $WORD in $WORDS):
                            ...
                    - pattern: |
                        if $WORD in $INPUT:
                            ...
                - metavariable-regex:
                    metavariable: $WORD
                    regex: (?i).*(secret|password|credential|token|key|owner|admin|system|ignore|bypass).*

            - id: ai.env-secret-returned
              message: Secret-like environment variable appears to be returned to the user or included in a response.
              severity: ERROR
              languages: [python]
              pattern-either:
                - pattern: return os.environ[$KEY]
                - pattern: return os.getenv($KEY)
                - pattern: jsonify(..., os.environ[$KEY], ...)
                - pattern: jsonify(..., os.getenv($KEY), ...)
                - pattern: render_template(..., $X=os.environ[$KEY], ...)
                - pattern: render_template(..., $X=os.getenv($KEY), ...)
              metavariable-regex:
                metavariable: $KEY
                regex: (?i).*(secret|password|credential|token|key|api|private).*

            - id: code.flask-upload-saved-directly
              mode: taint
              message: Uploaded file is saved using user-controlled filename or path. Check extension allowlist, secure_filename, path traversal and malware controls.
              severity: ERROR
              languages: [python]
              pattern-sources:
                - pattern: request.files[$X]
                - pattern: request.files.get(...)
              pattern-sinks:
                - pattern: $FILE.save(...)
                - pattern: open($FILE, ...)
                - pattern: Path($FILE)

            - id: code.request-to-subprocess-shell
              mode: taint
              message: User-controlled request data reaches subprocess shell execution. Possible command injection.
              severity: ERROR
              languages: [python]
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.json
                - pattern: request.get_json(...)
                - pattern: request.values.get(...)
              pattern-sinks:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: os.system(...)

            - id: code.subprocess-shell-true
              message: subprocess with shell=True detected. Review for command injection if any part of the command is attacker-controlled.
              severity: WARNING
              languages: [python]
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: web.flask-debug-enabled
              message: Flask debug mode enabled.
              severity: ERROR
              languages: [python]
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: web.flask-public-host
              message: Flask app exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-RrbWxklkp8SA70biE5CVeBad2aIc4N77gJxNx-lJiH3R9ceG_vtvL7eezP8IZlBsnkc58f8s6z4JruW3YwA7P1fzS-PYA$ . Confirm intended exposure, authentication and network controls.
              severity: WARNING
              languages: [python]
              pattern-either:
                - pattern: app.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-RrbWxklkp8SA70biE5CVeBad2aIc4N77gJxNx-lJiH3R9ceG_vtvL7eezP8IZlBsnkc58f8s6z4JruW3YwA7P1fzS-PYA$ ", ...)
                - pattern: $APP.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!-RrbWxklkp8SA70biE5CVeBad2aIc4N77gJxNx-lJiH3R9ceG_vtvL7eezP8IZlBsnkc58f8s6z4JruW3YwA7P1fzS-PYA$ ", ...)

            - id: code.eval-exec-dynamic-code
              message: Dynamic code execution detected.
              severity: ERROR
              languages: [python]
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)
                - pattern: compile(...)
          EOF

      - name: Run Semgrep general security
        id: semgrep_general
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude .git \
            --exclude security-results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --json \
            --output security-results/reports/semgrep.json \
            . || true

          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/java \
            --config p/golang \
            --config p/php \
            --exclude .git \
            --exclude security-results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --sarif \
            --output security-results/sarif/semgrep.sarif \
            . || true

      - name: Run Semgrep AI and custom code rules
        id: semgrep_ai
        run: |
          semgrep scan \
            --config ai-code-rules.yml \
            --exclude .git \
            --exclude security-results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --json \
            --output security-results/reports/semgrep-ai.json \
            . || true

          semgrep scan \
            --config ai-code-rules.yml \
            --exclude .git \
            --exclude security-results \
            --exclude node_modules \
            --exclude vendor \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --sarif \
            --output security-results/sarif/semgrep-ai.sarif \
            . || true

      - name: Ensure Semgrep SARIF files exist
        run: |
          for file in semgrep.sarif semgrep-ai.sarif; do
            path="security-results/sarif/$file"
            if [ -d "$path" ]; then
              rm -rf "$path"
            fi
            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi
          done

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/semgrep.sarif
          category: semgrep-general

      - name: Upload Semgrep AI SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/semgrep-ai.sarif
          category: semgrep-ai-code

      - name: Upload Semgrep artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: security-results

  dependencies-sca:
    name: Dependencies SCA
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare result folders
        run: |
          rm -rf security-results
          mkdir -p security-results/reports
          mkdir -p security-results/sarif

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependency scanners
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Python dependency scan
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt \
              --format json \
              --output security-results/reports/pip-audit.json || true
          else
            echo '{"dependencies":[]}' > security-results/reports/pip-audit.json
          fi

      - name: Node dependency scan
        run: |
          if [ -f package-lock.json ]; then
            npm audit --json > security-results/reports/npm-audit.json || true
          else
            echo '{}' > security-results/reports/npm-audit.json
          fi

      - name: Upload dependency artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-results
          path: security-results

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-iac:
    name: Docker and IaC
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare result folders
        run: |
          rm -rf security-results
          mkdir -p security-results/reports
          mkdir -p security-results/sarif

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: security-results/sarif/trivy.sarif

      - name: Trivy JSON
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: security-results/reports/trivy.json

      - name: Set up Python for Checkov
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Checkov Docker and IaC JSON
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --quiet \
            --skip-path .git \
            --skip-path security-results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output json \
            > security-results/reports/checkov.json || true

      - name: Checkov Docker and IaC SARIF
        run: |
          checkov -d . \
            --framework dockerfile,github_actions,terraform,kubernetes,secrets \
            --compact \
            --quiet \
            --skip-path .git \
            --skip-path security-results \
            --skip-path node_modules \
            --skip-path vendor \
            --skip-path dist \
            --skip-path build \
            --skip-check CKV_DOCKER_9 \
            --output sarif \
            > security-results/sarif/checkov.sarif || true

      - name: Ensure IaC SARIF files exist
        run: |
          for file in trivy.sarif checkov.sarif; do
            path="security-results/sarif/$file"
            if [ -d "$path" ]; then
              rm -rf "$path"
            fi
            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi
          done

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/trivy.sarif
          category: trivy

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: security-results/sarif/checkov.sarif
          category: checkov

      - name: Upload Docker and IaC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-iac-results
          path: security-results

  quality:
    name: Code quality Ruff
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare result folders
        run: |
          rm -rf security-results
          mkdir -p security-results/reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff quality scan
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            ruff check . \
              --exclude .git \
              --exclude security-results \
              --exclude node_modules \
              --exclude vendor \
              --exclude dist \
              --exclude build \
              --exclude .venv \
              --output-format json \
              > security-results/reports/ruff.json || true
          else
            echo "[]" > security-results/reports/ruff.json
          fi

      - name: Upload Ruff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-results
          path: security-results

  centralized-report:
    name: Centralized security report
    runs-on: ubuntu-latest
    needs: [appsec-code, dependencies-sca, docker-iac, quality]
    if: always()
    continue-on-error: true
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Build centralized report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("all_scan_results")
          out_dir = Path("centralized-security-report")
          out_dir.mkdir(parents=True, exist_ok=True)
          out = out_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"

          findings = []

          def normalize_sev(sev):
              sev = (sev or "UNKNOWN").upper()
              mapping = {
                  "ERROR": "HIGH",
                  "WARNING": "MEDIUM",
                  "WARN": "MEDIUM",
                  "MODERATE": "MEDIUM",
                  "INFORMATIONAL": "INFO",
                  "INFORMATIVE": "INFO"
              }
              allowed = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
              return mapping.get(sev, sev if sev in allowed else "UNKNOWN")

          def add(category, severity, tool, location, detail):
              findings.append({
                  "category": category,
                  "severity": normalize_sev(severity),
                  "tool": tool,
                  "location": str(location or "?"),
                  "detail": str(detail or "").replace("\n", " ")[:1200]
              })

          def read_json(name):
              for path in root.rglob(name):
                  try:
                      txt = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if txt:
                          return json.loads(txt)
                  except Exception as exc:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", str(path), f"No se pudo leer JSON: {exc}")
              return None

          def semgrep_category(check_id):
              cid = (check_id or "").lower()
              if cid.startswith("ai.") or "llm" in cid or "rag" in cid or "agent" in cid:
                  return "AI / LLM / Agentic"
              if cid.startswith("web.") or "flask" in cid or "redirect" in cid:
                  return "Codigo aplicativo"
              if cid.startswith("code."):
                  return "Codigo aplicativo"
              if "secret" in cid:
                  return "Secretos"
              return "Codigo aplicativo"

          for filename, tool in [
              ("semgrep.json", "Semgrep OSS"),
              ("semgrep-ai.json", "Semgrep AI AppSec")
          ]:
              data = read_json(filename)
              if data:
                  for result in data.get("results", []) or []:
                      check_id = result.get("check_id", "")
                      extra = result.get("extra", {})
                      location = f"{result.get('path','?')}:{result.get('start',{}).get('line','?')}"
                      add(
                          semgrep_category(check_id),
                          extra.get("severity", "UNKNOWN"),
                          tool,
                          location,
                          f"{check_id} - {extra.get('message','')}"
                      )

          data = read_json("pip-audit.json")
          if data:
              for dep in data.get("dependencies", []) or []:
                  for vuln in dep.get("vulns", []) or []:
                      add(
                          "Dependencias / SCA",
                          "HIGH",
                          "pip-audit",
                          dep.get("name", "?"),
                          f"{vuln.get('id','')} - {vuln.get('description','')}"
                      )

          data = read_json("npm-audit.json")
          if data and isinstance(data, dict):
              for name, vuln in data.get("vulnerabilities", {}).items():
                  add(
                      "Dependencias / SCA",
                      vuln.get("severity", "UNKNOWN"),
                      "npm audit",
                      name,
                      vuln.get("title", "Dependency vulnerability")
                  )

          data = read_json("trivy.json")
          if data:
              for result in data.get("Results", []) or []:
                  target = result.get("Target", "?")

                  for vuln in result.get("Vulnerabilities", []) or []:
                      add(
                          "Dependencias / SCA",
                          vuln.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{vuln.get('PkgName','')} {vuln.get('InstalledVersion','')} - {vuln.get('VulnerabilityID','')} - {vuln.get('Title','')}"
                      )

                  for secret in result.get("Secrets", []) or []:
                      add(
                          "Secretos",
                          secret.get("Severity", "HIGH"),
                          "Trivy",
                          target,
                          secret.get("Title", "Possible secret")
                      )

                  for misconf in result.get("Misconfigurations", []) or []:
                      category = "Docker / Contenedores" if "dockerfile" in target.lower() else "IaC / Cloud / Config"
                      add(
                          category,
                          misconf.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{misconf.get('ID','')} - {misconf.get('Title','')}"
                      )

          data = read_json("checkov.json")
          if data:
              reports = data if isinstance(data, list) else [data]
              for report in reports:
                  failed = report.get("results", {}).get("failed_checks", []) or []
                  for check in failed:
                      file_path = check.get("file_path", "?")
                      category = "Docker / Contenedores" if "dockerfile" in file_path.lower() else "IaC / Cloud / Config"
                      line_range = check.get("file_line_range") or ["?"]
                      add(
                          category,
                          "HIGH",
                          "Checkov",
                          f"{file_path}:{line_range[0]}",
                          f"{check.get('check_id','')} - {check.get('check_name','')}"
                      )

          ruff = read_json("ruff.json")
          quality = ruff if isinstance(ruff, list) else []

          categories = [
              "AI / LLM / Agentic",
              "Codigo aplicativo",
              "Dependencias / SCA",
              "Secretos",
              "Docker / Contenedores",
              "IaC / Cloud / Config",
              "Pipeline / Parser"
          ]

          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {category: {severity: 0 for severity in severities} for category in categories}

          for finding in findings:
              category = finding["category"]
              severity = finding["severity"] if finding["severity"] in severities else "UNKNOWN"
              table.setdefault(category, {s: 0 for s in severities})
              table[category][severity] += 1

          order = {
              "CRITICAL": 0,
              "HIGH": 1,
              "MEDIUM": 2,
              "LOW": 3,
              "INFO": 4,
              "UNKNOWN": 5
          }

          findings.sort(key=lambda item: order.get(item["severity"], 99))
          critical_high = [item for item in findings if item["severity"] in ["CRITICAL", "HIGH"]]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Vulnerabilidades totales       : {len(findings)}")
          lines.append(f"Criticas + Altas              : {len(critical_high)}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORIA")
          lines.append("-" * 90)
          lines.append(f"{'Categoria':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")

          for category in categories:
              lines.append(
                  f"{category:35} "
                  f"{table[category]['CRITICAL']:>8} "
                  f"{table[category]['HIGH']:>5} "
                  f"{table[category]['MEDIUM']:>7} "
                  f"{table[category]['LOW']:>5} "
                  f"{table[category]['INFO']:>5} "
                  f"{table[category]['UNKNOWN']:>8}"
              )

          lines.append("")
          lines.append("VULNERABILIDADES ORDENADAS POR CRITICIDAD")
          lines.append("=" * 90)

          for severity in severities:
              group = [item for item in findings if item["severity"] == severity]
              lines.append("")
              lines.append(f"{severity} ({len(group)})")
              lines.append("-" * 90)

              if not group:
                  lines.append("Sin hallazgos.")
              else:
                  for index, finding in enumerate(group, 1):
                      lines.append(f"{index}. [{finding['category']}]")
                      lines.append(f"   Herramienta : {finding['tool']}")
                      lines.append(f"   Ubicacion   : {finding['location']}")
                      lines.append(f"   Detalle     : {finding['detail']}")
                      lines.append("")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)

          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for index, item in enumerate(quality, 1):
                  lines.append(f"{index}. {item.get('code','?')}")
                  lines.append(f"   Ubicacion: {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle  : {item.get('message','')}")
                  lines.append("")

          out.write_text("\n".join(lines), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
          PY

      - name: Upload centralized report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: centralized-security-report
          path: centralized-security-report
