  docker-security:
    name: "Docker — Hadolint + Dockle"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfiles
        continue-on-error: true
        run: |
          echo "[]" > hadolint_results.json
          : > hadolint_results.txt
          dockerfiles="$(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -not -path './.git/*' -not -path './node_modules/*')"
          if [ -n "$dockerfiles" ]; then
            for file in $dockerfiles; do
              echo "Scanning $file" >> hadolint_results.txt
              docker run --rm -i hadolint/hadolint:latest hadolint --format json - < "$file" > "hadolint_tmp.json" || true
              python3 - "$file" <<'PY'
          import json, pathlib, sys
          dockerfile = sys.argv[1]
          out = pathlib.Path("hadolint_results.json")
          tmp = pathlib.Path("hadolint_tmp.json")
          try:
              current = json.loads(out.read_text(encoding="utf-8"))
          except Exception:
              current = []
          try:
              data = json.loads(tmp.read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []
          if isinstance(data, dict):
              data = [data]
          for item in data:
              if isinstance(item, dict):
                  item["file"] = dockerfile
                  current.append(item)
          out.write_text(json.dumps(current, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
            done
          fi

      - name: Convert Hadolint to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path("hadolint_results.json")
          try:
              data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = []
          rules = {}
          results = []
          level_map = {"error": "error", "warning": "warning", "info": "note", "style": "note"}
          for item in data if isinstance(data, list) else []:
              rid = item.get("code") or item.get("rule") or "HADOLINT"
              msg = item.get("message") or item.get("description") or "Dockerfile issue"
              file = item.get("file") or item.get("filename") or "Dockerfile"
              line = int(item.get("line") or item.get("lineNumber") or 1)
              level = level_map.get(str(item.get("level") or "").lower(), "warning")
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": msg}, "defaultConfiguration": {"level": level}})
              results.append({"ruleId": rid, "level": level, "message": {"text": msg}, "properties": {"kind": "vulnerability"}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": file}, "region": {"startLine": line}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Hadolint", "informationUri": "https://urldefense.com/v3/__https://github.com/hadolint/hadolint__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo2x-7akMw$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("hadolint.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Run Dockle if Dockerfile exists
        continue-on-error: true
        run: |
          echo "[]" > dockle_results.json
          if [ -f Dockerfile ]; then
            docker build -t local-security-scan:latest . || true
            if docker image inspect local-security-scan:latest >/dev/null 2>&1; then
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock goodwithtech/dockle:latest \
                --format json \
                --exit-code 0 \
                local-security-scan:latest > dockle_results.json || true
            fi
          fi

      - name: Ensure Docker tool artifacts exist
        if: always()
        run: |
          test -f hadolint_results.json || echo '[]' > hadolint_results.json
          test -f hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          test -f dockle_results.json || echo '[]' > dockle_results.json

      - name: Upload Hadolint SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint-docker

      - name: Upload Docker security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            hadolint_results.json
            hadolint_results.txt
            hadolint.sarif
            dockle_results.json
          retention-days: 30

