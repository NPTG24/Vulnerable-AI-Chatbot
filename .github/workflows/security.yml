name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      run_scorecard:
        description: "Run repository hygiene audit"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

# Objetivo:
# - No bloquea push ni PR.
# - Evita falsos positivos por revisar el propio workflow.
# - No usa apt-get ni URLs embebidas para evitar problemas con proxy/WAF empresarial.
# - Genera artifacts y resumen final aunque alguna herramienta falle.

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  EXCLUDES: ".git,.github,node_modules,dist,build,coverage,.venv,venv,__pycache__"

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        shell: bash
        run: |
          set +e
          test -f requirements.txt -o -f pyproject.toml -o -f Pipfile -o -f https://urldefense.com/v3/__http://setup.py__;!!P110LumUDw!7syoxJHRWC7aMbCY-bXBnXZN-g1C2yVRtCY3fL74th_UAqzmy4df4sfOBdENOnJqBtIx1FBZxeJ1KO27J7BQUW-YIGwSOw$  && echo "has_python=true" >> "$GITHUB_OUTPUT" || echo "has_python=false" >> "$GITHUB_OUTPUT"
          test -f package.json -o -f package-lock.json -o -f yarn.lock -o -f pnpm-lock.yaml && echo "has_node=true" >> "$GITHUB_OUTPUT" || echo "has_node=false" >> "$GITHUB_OUTPUT"
          test -f Dockerfile -o -f docker-compose.yml -o -f compose.yml && echo "has_docker=true" >> "$GITHUB_OUTPUT" || echo "has_docker=false" >> "$GITHUB_OUTPUT"

  policy:
    name: Policy â€” versiones y pinning
    runs-on: ubuntu-latest
    needs: detect
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Revisar estÃ¡ndares mÃ­nimos sin bloquear
        shell: python
        run: |
          import json, pathlib, re
          reports = pathlib.Path("reports")
          reports.mkdir(exist_ok=True)
          skip = {".git", ".github", "node_modules", "dist", "build", "coverage", ".venv", "venv", "__pycache__"}
          findings = []
          def ignored(p):
              return any(part in skip for part in https://urldefense.com/v3/__http://p.parts__;!!P110LumUDw!7syoxJHRWC7aMbCY-bXBnXZN-g1C2yVRtCY3fL74th_UAqzmy4df4sfOBdENOnJqBtIx1FBZxeJ1KO27J7BQUW_WbU5Z7A$ )
          def add(sev, rule, path, msg):
              findings.append({"severity": sev, "rule": rule, "file": str(path), "message": msg})
          for p in pathlib.Path(".").rglob("requirements*.txt"):
              if ignored(p):
                  continue
              for n, line in enumerate(p.read_text(errors="ignore").splitlines(), 1):
                  s = line.strip()
                  if not s or s.startswith("#") or s.startswith("-"):
                      continue
                  if any(x in s for x in [">=", "<=", "~=", ">", "<"]) and "==" not in s:
                      add("medium", "python-dependency-not-exactly-pinned", p, f"L{n}: preferir pin exacto con == para builds reproducibles")
                  elif re.match(r"^[A-Za-z0-9_.-]+$", s):
                      add("high", "python-dependency-unpinned", p, f"L{n}: dependencia sin versiÃ³n")
          for p in pathlib.Path(".").rglob("package.json"):
              if ignored(p):
                  continue
              try:
                  data = json.loads(p.read_text(errors="ignore"))
              except Exception:
                  add("medium", "package-json-invalid", p, "No se pudo parsear package.json")
                  continue
              engines = data.get("engines", {}) if isinstance(data, dict) else {}
              if not engines.get("node"):
                  add("medium", "node-engine-missing", p, "Falta engines.node")
              for section in ["dependencies", "devDependencies"]:
                  deps = data.get(section, {}) if isinstance(data, dict) else {}
                  if isinstance(deps, dict):
                      for name, version in deps.items():
                          version = str(version)
                          if version.startswith(("^", "~", "*")) or version in ["latest", ""]:
                              add("medium", "npm-dependency-not-pinned", p, f"{name}: versiÃ³n flexible {version}")
          if pathlib.Path("package.json").exists() and not any(pathlib.Path(x).exists() for x in ["package-lock.json", "npm-shrinkwrap.json", "yarn.lock", "pnpm-lock.yaml"]):
              add("high", "node-lockfile-missing", "package.json", "Falta lockfile")
          pathlib.Path("reports/policy.json").write_text(json.dumps({"findings": findings}, indent=2), encoding="utf-8")
          print(json.dumps({"policy_findings": len(findings)}, indent=2))
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: policy-results
          path: reports/policy.json
          if-no-files-found: ignore

  codeql:
    name: CodeQL â€” cÃ³digo real
    runs-on: ubuntu-latest
    needs: detect
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@v4
        continue-on-error: true
      - uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: codeql-${{ matrix.language }}

  semgrep:
    name: Semgrep â€” SAST y AI alta seÃ±al
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Instalar Semgrep
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip
          python -m pip install semgrep
          mkdir -p reports
        continue-on-error: true
      - name: Crear reglas locales AI y cÃ³digo
        shell: bash
        run: |
          mkdir -p rules reports
          cat > rules/high-signal.yml <<'YAML'
          rules:
            - id: python-shell-true
              languages: [python]
              severity: ERROR
              message: "Command injection: subprocess con shell=True."
              metadata:
                cwe: "CWE-78"
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
            - id: python-os-system
              languages: [python]
              severity: ERROR
              message: "EjecuciÃ³n de comandos con os.system/os.popen."
              metadata:
                cwe: "CWE-78"
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: os.system(...)
                - pattern: os.popen(...)
            - id: python-eval-exec
              languages: [python]
              severity: ERROR
              message: "eval/exec puede transformar input o salida LLM en RCE."
              metadata:
                cwe: "CWE-94"
                owasp_llm: "LLM02 Insecure Output Handling"
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)
            - id: python-flask-debug
              languages: [python]
              severity: ERROR
              message: "Flask debug=True expone debugger interactivo."
              metadata:
                cwe: "CWE-489"
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)
            - id: python-yaml-load-unsafe
              languages: [python]
              severity: ERROR
              message: "yaml.load sin SafeLoader."
              metadata:
                cwe: "CWE-502"
              patterns:
                - pattern: yaml.load(...)
                - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
                - pattern-not: yaml.load(..., Loader=SafeLoader, ...)
            - id: python-pickle-load
              languages: [python]
              severity: WARNING
              message: "pickle sobre datos no confiables puede causar ejecuciÃ³n de cÃ³digo."
              metadata:
                cwe: "CWE-502"
              pattern-either:
                - pattern: pickle.load(...)
                - pattern: pickle.loads(...)
            - id: python-requests-verify-false
              languages: [python]
              severity: WARNING
              message: "TLS verification deshabilitada con verify=False."
              metadata:
                cwe: "CWE-295"
              pattern-either:
                - pattern: requests.get(..., verify=False, ...)
                - pattern: requests.post(..., verify=False, ...)
                - pattern: requests.put(..., verify=False, ...)
                - pattern: requests.delete(..., verify=False, ...)
                - pattern: requests.request(..., verify=False, ...)
            - id: python-sql-formatting
              languages: [python]
              severity: WARNING
              message: "Posible SQL injection por query construida dinÃ¡micamente."
              metadata:
                cwe: "CWE-89"
              pattern-either:
                - pattern: $CUR.execute("..." % ...)
                - pattern: $CUR.execute("...".format(...))
                - pattern: $CUR.execute(f"...{...}...")
            - id: js-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "eval/new Function permite ejecuciÃ³n dinÃ¡mica."
              metadata:
                cwe: "CWE-94"
                owasp_llm: "LLM02 Insecure Output Handling"
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)
            - id: node-child-process-exec
              languages: [javascript, typescript]
              severity: ERROR
              message: "child_process exec/execSync puede permitir command injection."
              metadata:
                cwe: "CWE-78"
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)
            - id: ai-system-prompt-hardcoded
              languages: [python, javascript, typescript]
              severity: WARNING
              message: "System prompt hardcodeado. Revisar exposiciÃ³n, logging y fuga de instrucciones."
              metadata:
                owasp_llm: "LLM07 System Prompt Leakage"
              pattern-regex: "(?i)(system_prompt|systemMessage|developer_message|developerMessage)"
            - id: ai-openai-without-output-limit-python
              languages: [python]
              severity: WARNING
              message: "Llamada LLM sin lÃ­mite evidente de salida."
              metadata:
                owasp_llm: "LLM10 Unbounded Consumption"
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
            - id: ai-langchain-agent-tools
              languages: [python]
              severity: WARNING
              message: "Agente LangChain con tools. Revisar allowlist, permisos y aprobaciÃ³n humana."
              metadata:
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: initialize_agent(..., tools=$TOOLS, ...)
                - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                - pattern: Tool(..., func=$FUNC, ...)
                - pattern: StructuredTool.from_function($FUNC, ...)
            - id: ai-vectorstore-ingestion
              languages: [python]
              severity: WARNING
              message: "RAG/vectorstore: revisar validaciÃ³n de fuente, tenant y metadata."
              metadata:
                owasp_llm: "LLM04 Data and Model Poisoning"
              pattern-either:
                - pattern: $DB.add_documents(...)
                - pattern: $DB.add_texts(...)
                - pattern: $STORE.from_documents(...)
          YAML
      - name: Ejecutar Semgrep
        shell: bash
        run: |
          set +e
          semgrep scan --config p/python --config p/javascript --config p/typescript --config p/nodejs --config p/owasp-top-ten --config rules/high-signal.yml --exclude .github/workflows --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude .venv --exclude venv --json --output reports/semgrep.json .
          semgrep scan --config p/python --config p/javascript --config p/typescript --config p/nodejs --config p/owasp-top-ten --config rules/high-signal.yml --exclude .github/workflows --exclude node_modules --exclude dist --exclude build --exclude coverage --exclude .venv --exclude venv --sarif --output reports/semgrep.sarif .
          test -f reports/semgrep.json || echo '{"results":[]}' > reports/semgrep.json
          test -f reports/semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > reports/semgrep.sarif
          exit 0
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: reports/semgrep.sarif
          category: semgrep-high-signal
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: reports/semgrep.*
          if-no-files-found: ignore

  python-security:
    name: Python â€” Bandit Ruff pip-audit
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Ejecutar herramientas Python
        shell: bash
        run: |
          set +e
          mkdir -p reports
          python -m pip install --upgrade pip
          python -m pip install bandit ruff pip-audit
          bandit -r . -x .git,.github,node_modules,dist,build,coverage,.venv,venv -f json -o reports/bandit.json || true
          ruff check . --select S,B --exclude .github --exclude node_modules --exclude dist --exclude build --output-format json > reports/ruff-security.json || true
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt -f json -o reports/pip-audit.json || true; else echo '{"dependencies":[]}' > reports/pip-audit.json; fi
          exit 0
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-results
          path: reports/*.json
          if-no-files-found: ignore

  node-security:
    name: Node â€” npm audit
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Ejecutar npm audit sin bloquear
        shell: bash
        run: |
          set +e
          mkdir -p reports
          if [ -f package-lock.json ]; then npm ci --ignore-scripts || npm install --package-lock-only --ignore-scripts || true; fi
          npm audit --json > reports/npm-audit.json || true
          exit 0
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-security-results
          path: reports/npm-audit.json
          if-no-files-found: ignore

  docker-security:
    name: Docker â€” Hadolint Checkov Trivy
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_docker == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile
          format: json
          output-file: reports/hadolint.json
          failure-threshold: error
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkov Docker/IaC sin workflows
        shell: bash
        run: |
          set +e
          mkdir -p reports
          python -m pip install --upgrade pip
          python -m pip install checkov
          checkov -d . --skip-path .github --skip-path node_modules --skip-path dist --skip-path build --skip-path coverage --quiet -o json > reports/checkov.json || true
          exit 0
        continue-on-error: true
      - name: Trivy filesystem y misconfig
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: reports/trivy-fs.json
      - name: Asegurar artifacts Docker
        shell: bash
        if: always()
        run: |
          mkdir -p reports
          test -f reports/hadolint.json || echo '[]' > reports/hadolint.json
          test -f reports/checkov.json || echo '{}' > reports/checkov.json
          test -f reports/trivy-fs.json || echo '{}' > reports/trivy-fs.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-security-results
          path: reports/*.json
          if-no-files-found: ignore

  secrets:
    name: Secretos â€” Gitleaks y fallback local
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Secret scan fallback sin dependencias externas
        shell: bash
        run: |
          set +e
          mkdir -p reports
          python3 - <<'PY'
          import json, pathlib, re
          skip={'.git','.github','node_modules','dist','build','coverage','.venv','venv','__pycache__'}
          pats=[
            ('generic-api-key', re.compile(r'(?i)(api[_-]?key|secret|token|password)\s*[=:]\s*["\'][A-Za-z0-9_\-]{20,}["\']')),
            ('private-key', re.compile(r'BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY')),
            ('jwt', re.compile(r'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}')),
          ]
          out=[]
          for p in pathlib.Path('.').rglob('*'):
            if not p.is_file() or any(x in https://urldefense.com/v3/__http://p.parts__;!!P110LumUDw!7syoxJHRWC7aMbCY-bXBnXZN-g1C2yVRtCY3fL74th_UAqzmy4df4sfOBdENOnJqBtIx1FBZxeJ1KO27J7BQUW_WbU5Z7A$  for x in skip):
              continue
            try:
              text=p.read_text(errors='ignore')
            except Exception:
              continue
            for i,line in enumerate(text.splitlines(),1):
              for name,pat in pats:
                if pat.search(line):
                  out.append({'rule':name,'file':str(p),'line':i})
          pathlib.Path('reports/secrets-fallback.json').write_text(json.dumps({'findings':out},indent=2))
          PY
          exit 0
        continue-on-error: true
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-results
          path: reports/*.json
          if-no-files-found: ignore

  dependency-review:
    name: Dependency Review â€” solo PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: critical
          warn-only: true
          comment-summary-in-pr: always

  scorecard:
    name: Scorecard â€” higiene repo separada
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_scorecard == 'true'
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        continue-on-error: true
        with:
          results_file: reports/scorecard.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: reports/scorecard.sarif
          category: openssf-scorecard
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scorecard-results
          path: reports/scorecard.sarif
          if-no-files-found: ignore

  final-report:
    name: Reporte final â€” no bloqueante
    runs-on: ubuntu-latest
    needs: [detect, policy, codeql, semgrep, python-security, node-security, docker-security, secrets, dependency-review, scorecard]
    if: always()
    continue-on-error: true
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
      - name: Crear resumen ejecutivo
        shell: bash
        run: |
          set +e
          mkdir -p reports
          SUMMARY="reports/https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!7syoxJHRWC7aMbCY-bXBnXZN-g1C2yVRtCY3fL74th_UAqzmy4df4sfOBdENOnJqBtIx1FBZxeJ1KO27J7BQUW8Dj0PdzQ$ "
          echo "# Security Pipeline â€” resumen" > "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "Modo: report-only, no bloqueante." >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "## Jobs" >> "$SUMMARY"
          echo "- Policy: ${{ needs.policy.result }}" >> "$SUMMARY"
          echo "- CodeQL: ${{ needs.codeql.result }}" >> "$SUMMARY"
          echo "- Semgrep: ${{ needs.semgrep.result }}" >> "$SUMMARY"
          echo "- Python: ${{ needs.python-security.result }}" >> "$SUMMARY"
          echo "- Node: ${{ needs.node-security.result }}" >> "$SUMMARY"
          echo "- Docker: ${{ needs.docker-security.result }}" >> "$SUMMARY"
          echo "- Secretos: ${{ needs.secrets.result }}" >> "$SUMMARY"
          echo "- Dependency Review: ${{ needs.dependency-review.result }}" >> "$SUMMARY"
          echo "- Scorecard: ${{ needs.scorecard.result }}" >> "$SUMMARY"
          echo "" >> "$SUMMARY"
          echo "## Artifacts" >> "$SUMMARY"
          find artifacts -type f | sort >> "$SUMMARY" 2>/dev/null || true
          cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-security-summary
          path: reports/https://urldefense.com/v3/__http://security-summary.md__;!!P110LumUDw!7syoxJHRWC7aMbCY-bXBnXZN-g1C2yVRtCY3fL74th_UAqzmy4df4sfOBdENOnJqBtIx1FBZxeJ1KO27J7BQUW8Dj0PdzQ$ 
          if-no-files-found: ignore
