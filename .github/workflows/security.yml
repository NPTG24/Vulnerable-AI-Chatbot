  sca:
    name: "SCA â€” pip-audit + Trivy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit against project files
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          fi
          python3 - <<'PY'
          import json
          import pathlib
          src = pathlib.Path("pip_audit_osv.json")
          try:
              data = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = {"dependencies": []}
          deps = data.get("dependencies", []) if isinstance(data, dict) else data
          rules = {}
          results = []
          def level(sev):
              s = str(sev or "").upper()
              if s in {"CRITICAL", "HIGH"}:
                  return "error"
              if s == "MEDIUM":
                  return "warning"
              return "note"
          for dep in deps:
              if not isinstance(dep, dict):
                  continue
              pkg = dep.get("name", "unknown")
              ver = dep.get("version", "")
              for vuln in dep.get("vulns", []):
                  vid = vuln.get("id", "PYTHON_VULN")
                  sev = vuln.get("severity", "UNKNOWN")
                  msg = f"{pkg} {ver}: {vid} severity={sev}"
                  rules.setdefault(vid, {"id": vid, "name": vid, "shortDescription": {"text": vid}, "fullDescription": {"text": msg}, "defaultConfiguration": {"level": level(sev)}})
                  results.append({"ruleId": vid, "level": level(sev), "message": {"text": msg}, "properties": {"kind": "vulnerability"}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "python-dependencies"}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "pip-audit", "informationUri": "https://urldefense.com/v3/__https://pypi.org/project/pip-audit/__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIMFqdRlRg$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("pip_audit.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Run Trivy filesystem JSON and SARIF
        continue-on-error: true
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -v "$PWD:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format json \
            --output /repo/trivy_results.json \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            /repo || true

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -v "$PWD:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format sarif \
            --output /repo/trivy_results.sarif \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            /repo || true

      - name: Ensure SCA artifacts exist
        if: always()
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
          test -f trivy_results.json || echo '{"Results":[]}' > trivy_results.json
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif

      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            trivy_results.json
            trivy_results.sarif
          retention-days: 30

  secret-scan:
    name: "Secrets â€” Gitleaks"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks without failing job
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks_report.json \
            --exit-code 0 \
            --redact \
            --verbose || true

      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          p = pathlib.Path("gitleaks_report.json")
          try:
              data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = []
          rules = {}
          results = []
          for item in data:
              rid = item.get("RuleID") or item.get("Description") or "SECRET"
              desc = item.get("Description") or "Possible exposed secret"
              file = item.get("File") or "unknown"
              line = int(item.get("StartLine") or 1)
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": desc}, "fullDescription": {"text": desc}, "defaultConfiguration": {"level": "error"}})
              results.append({"ruleId": rid, "level": "error", "message": {"text": desc}, "properties": {"kind": "vulnerability"}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": file}, "region": {"startLine": line}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Gitleaks", "informationUri": "https://urldefense.com/v3/__https://github.com/gitleaks/gitleaks__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuINebU2O1g$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("gitleaks.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure Gitleaks artifacts exist
        if: always()
        run: |
          test -f gitleaks_report.json || echo '[]' > gitleaks_report.json
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

  docker-security:
    name: "Docker â€” Hadolint + Dockle"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint on Dockerfiles
        continue-on-error: true
        run: |
          echo "[]" > hadolint_results.json
          : > hadolint_results.txt

          dockerfiles="$(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -not -path './.git/*' -not -path './node_modules/*')"

          if [ -n "$dockerfiles" ]; then
            for file in $dockerfiles; do
              echo "Scanning $file" >> hadolint_results.txt
              docker run --rm -i hadolint/hadolint:latest hadolint --format json - < "$file" > "hadolint_tmp.json" || true
              python3 - "$file" <<'PY'
          import json
          import pathlib
          import sys

          dockerfile = sys.argv[1]
          out = pathlib.Path("hadolint_results.json")
          tmp = pathlib.Path("hadolint_tmp.json")

          try:
              current = json.loads(out.read_text(encoding="utf-8"))
          except Exception:
              current = []

          try:
              data = json.loads(tmp.read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []

          if isinstance(data, dict):
              data = [data]

          for item in data:
              if isinstance(item, dict):
                  item["file"] = dockerfile
                  current.append(item)

          out.write_text(json.dumps(current, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
            done
          fi

      - name: Convert Hadolint to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          p = pathlib.Path("hadolint_results.json")
          try:
              data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = []

          rules = {}
          results = []

          level_map = {
              "error": "error",
              "warning": "warning",
              "info": "note",
              "style": "note"
          }

          for item in data if isinstance(data, list) else []:
              rid = item.get("code") or item.get("rule") or "HADOLINT"
              msg = item.get("message") or item.get("description") or "Dockerfile issue"
              file = item.get("file") or item.get("filename") or "Dockerfile"
              line = int(item.get("line") or item.get("lineNumber") or 1)
              level = level_map.get(str(item.get("level") or "").lower(), "warning")
              rules.setdefault(rid, {"id": rid, "name": rid, "shortDescription": {"text": rid}, "fullDescription": {"text": msg}, "defaultConfiguration": {"level": level}})
              results.append({"ruleId": rid, "level": level, "message": {"text": msg}, "properties": {"kind": "vulnerability"}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": file}, "region": {"startLine": line}}}]})

          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Hadolint", "informationUri": "https://urldefense.com/v3/__https://github.com/hadolint/hadolint__;!!P110LumUDw!9713lur_CnzEr5RpblzqW9z1mBWYH7qRNhb5tTeO07grfICImFhQtR4ue2UEWNKS8UwpxGPH7NtS7OPbrl8DuIMMxucJqQ$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("hadolint.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Run Dockle if Dockerfile exists
        continue-on-error: true
        run: |
          echo "[]" > dockle_results.json
          if [ -f Dockerfile ]; then
            docker build -t local-security-scan:latest . || true
            if docker image inspect local-security-scan:latest >/dev/null 2>&1; then
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock goodwithtech/dockle:latest \
                --format json \
                --exit-code 0 \
                local-security-scan:latest > dockle_results.json || true
            fi
          fi

      - name: Ensure Docker tool artifacts exist
        if: always()
        run: |
          test -f hadolint_results.json || echo '[]' > hadolint_results.json
          test -f hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          test -f dockle_results.json || echo '[]' > dockle_results.json

      - name: Upload Hadolint SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint-docker

      - name: Upload Docker security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            hadolint_results.json
            hadolint_results.txt
            hadolint.sarif
            dockle_results.json
          retention-days: 30

  iac-checkov:
    name: "IaC â€” Checkov full framework"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov full IaC scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: all
          soft_fail: true
          output_format: sarif,json
          output_file_path: checkov_results
          download_external_modules: false
          quiet: true

      - name: Normalize Checkov artifacts
        if: always()
        run: |
          if [ -d checkov_results ]; then
            find checkov_results -name "*.sarif" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.sarif
            find checkov_results -name "*.json" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.json
          fi
          test -f checkov_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}' > checkov_results.sarif
          test -f checkov_results.json || echo '{"results":{"failed_checks":[]}}' > checkov_results.json

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_results.sarif
          category: checkov-iac

      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            checkov_results.sarif
            checkov_results.json
          retention-days: 30

  centralized-report:
    name: "Report â€” Centralized Security Summary"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - ruff
      - codeql
      - semgrep
      - ai-security
      - sca
      - secret-scan
      - docker-security
      - iac-checkov
    if: always()
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Build centralized report
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path("all_scan_results")
          output_dir = pathlib.Path("central-security-report")
          output_dir.mkdir(exist_ok=True)
          report = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"
          report_json = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.json"

          findings = []
          quality = []

          def norm_sev(sev):
              sev = str(sev or "UNKNOWN").upper()
              mapping = {"ERROR": "HIGH", "WARNING": "MEDIUM", "WARN": "MEDIUM", "MODERATE": "MEDIUM", "INFORMATIONAL": "INFO", "INFORMATIVE": "INFO", "NOTE": "LOW", "STYLE": "LOW"}
              return mapping.get(sev, sev if sev in {"CRITICAL","HIGH","MEDIUM","LOW","INFO","UNKNOWN"} else "UNKNOWN")

          def add(category, severity, tool, location, detail, rule="", source_file=""):
              findings.append({
                  "category": category,
                  "severity": norm_sev(severity),
                  "tool": tool,
                  "rule": rule or "",
                  "location": location or "?",
                  "detail": str(detail or "").replace("\n", " ")[:3000],
                  "source_file": source_file or ""
              })

          def load_all(pattern):
              results = []
              for path in root.rglob(pattern):
                  try:
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          results.append((path, json.loads(text)))
                  except Exception as error:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", str(path), f"No se pudo leer JSON: {error}", "PARSER_ERROR", str(path))
              return results

          def parse_sarif_files(pattern, category, default_tool):
              for src_path, data in load_all(pattern):
                  for run in data.get("runs", []) if isinstance(data, dict) else []:
                      driver = run.get("tool", {}).get("driver", {})
                      tool = driver.get("name", default_tool)
                      rule_map = {}
                      for rule in driver.get("rules", []) or []:
                          rule_map[rule.get("id", "")] = rule
                      for result in run.get("results", []) or []:
                          rid = result.get("ruleId", "")
                          msg = result.get("message", {}).get("text", "")
                          level = result.get("level", "warning")
                          loc = "?"
                          try:
                              phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                              uri = phys.get("artifactLocation", {}).get("uri", "?")
                              line = phys.get("region", {}).get("startLine", "?")
                              loc = f"{uri}:{line}"
                          except Exception:
                              pass
                          add(category, level, tool, loc, msg, rid, str(src_path))

          # CodeQL SARIF completo
          parse_sarif_files("*.sarif", "CodeQL / SARIF", "SARIF")

          # Semgrep JSON oficial completo
          for src_path, data in load_all("semgrep.json"):
              for item in data.get("results", []) if isinstance(data, dict) else []:
                  extra = item.get("extra", {})
                  check_id = item.get("check_id", "")
                  add("CĂłdigo aplicativo", extra.get("severity", "UNKNOWN"), "Semgrep OSS", f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}", extra.get("message", ""), check_id, str(src_path))

          # AI JSON completo
          for src_path, data in load_all("semgrep_ai.json"):
              for item in data.get("results", []) if isinstance(data, dict) else []:
                  extra = item.get("extra", {})
                  check_id = item.get("check_id", "")
                  add("AI / LLM / Agentic", extra.get("severity", "UNKNOWN"), "AI Security Precise", f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}", extra.get("message", ""), check_id, str(src_path))

          # pip-audit completo
          for src_path, data in load_all("pip_audit_osv.json"):
              deps = data.get("dependencies", []) if isinstance(data, dict) else data
              if isinstance(deps, list):
                  for dep in deps:
                      if not isinstance(dep, dict):
                          continue
                      for vuln in dep.get("vulns", []) or []:
                          add("Dependencias / SCA", vuln.get("severity", "HIGH"), "pip-audit", dep.get("name", "?"), f"{dep.get('name','?')} {dep.get('version','')}: {vuln.get('id','')} - {vuln.get('description','')}", vuln.get("id", ""), str(src_path))

          # Trivy JSON completo
          for src_path, data in load_all("trivy_results.json"):
              for result in data.get("Results", []) if isinstance(data, dict) else []:
                  target = result.get("Target", "?")
                  for vuln in result.get("Vulnerabilities", []) or []:
                      add("Dependencias / SCA", vuln.get("Severity", "UNKNOWN"), "Trivy", target, f"{vuln.get('PkgName','')} {vuln.get('InstalledVersion','')} - {vuln.get('VulnerabilityID','')} - {vuln.get('Title','')}", vuln.get("VulnerabilityID", ""), str(src_path))
                  for secret in result.get("Secrets", []) or []:
                      add("Secretos", secret.get("Severity", "HIGH"), "Trivy", target, secret.get("Title", "Possible secret"), secret.get("RuleID", ""), str(src_path))
                  for misconf in result.get("Misconfigurations", []) or []:
                      cat = "Docker / Contenedores" if "dockerfile" in str(target).lower() else "IaC / Cloud / Config"
                      add(cat, misconf.get("Severity", "UNKNOWN"), "Trivy", target, f"{misconf.get('ID','')} - {misconf.get('Title','')}", misconf.get("ID", ""), str(src_path))

          # Gitleaks completo
          for src_path, data in load_all("gitleaks_report.json"):
              if isinstance(data, list):
                  for item in data:
                      add("Secretos", "HIGH", "Gitleaks", f"{item.get('File','?')}:{item.get('StartLine','?')}", item.get("Description", "Possible exposed secret"), item.get("RuleID", ""), str(src_path))

          # Dependency Policy completo
          for src_path, data in load_all("dependency_policy_findings.json"):
              for item in data.get("findings", []) if isinstance(data, dict) else []:
                  add("Dependencias / Policy", item.get("severity", "UNKNOWN"), "Dependency Policy", f"{item.get('file','?')}:{item.get('line','?')}", item.get("message", ""), item.get("rule", ""), str(src_path))

          # Checkov JSON completo
          for src_path, data in load_all("checkov_results.json"):
              reports = data if isinstance(data, list) else [data]
              for rep in reports:
                  if not isinstance(rep, dict):
                      continue
                  for check in rep.get("results", {}).get("failed_checks", []) or []:
                      file_path = check.get("file_path", "?")
                      cat = "Docker / Contenedores" if "dockerfile" in str(file_path).lower() else "IaC / Cloud / Config"
                      line_range = check.get("file_line_range") or ["?"]
                      add(cat, "HIGH", "Checkov", f"{file_path}:{line_range[0]}", check.get("check_name", ""), check.get("check_id", ""), str(src_path))

          # Hadolint completo
          for src_path, data in load_all("hadolint_results.json"):
              if isinstance(data, list):
                  for item in data:
                      add("Docker / Contenedores", item.get("level", "warning"), "Hadolint", f"{item.get('file', item.get('filename', 'Dockerfile'))}:{item.get('line', item.get('lineNumber', '?'))}", item.get("message", item.get("description", "")), item.get("code", ""), str(src_path))

          # Dockle completo
          for src_path, data in load_all("dockle_results.json"):
              details = []
              if isinstance(data, dict):
                  details = data.get("details", []) or data.get("Details", []) or []
              elif isinstance(data, list):
                  details = data
              for item in details:
                  if not isinstance(item, dict):
                      continue
                  code = item.get("code") or item.get("Code") or item.get("checkpoint") or "DOCKLE"
                  level = item.get("level") or item.get("Level") or "WARN"
                  msg = item.get("title") or item.get("message") or item.get("Title") or str(item)
                  add("Docker / Contenedores", level, "Dockle", "container-image", msg, code, str(src_path))

          # Ruff completo
          for src_path, data in load_all("ruff_dev_quality_findings.json"):
              if isinstance(data, dict):
                  for item in data.get("findings", []) or []:
                      item["_source_file"] = str(src_path)
                      quality.append(item)

          categories = sorted(set([f["category"] for f in findings]) | {"AI / LLM / Agentic", "CĂłdigo aplicativo", "CodeQL / SARIF", "Dependencias / SCA", "Dependencias / Policy", "Secretos", "Docker / Contenedores", "IaC / Cloud / Config", "Pipeline / Parser"})
          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {c: {s: 0 for s in severities} for c in categories}
          for f in findings:
              sev = f["severity"] if f["severity"] in severities else "UNKNOWN"
              table[f["category"]][sev] += 1

          order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "INFO": 4, "UNKNOWN": 5}
          findings.sort(key=lambda x: (order.get(x["severity"], 99), x["category"], x["tool"], x["location"]))
          critical_high = [f for f in findings if f["severity"] in {"CRITICAL", "HIGH"}]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Hallazgos totales             : {len(findings)}")
          lines.append(f"CrĂ­ticas + Altas              : {len(critical_high)}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORĂŤA")
          lines.append("-" * 90)
          lines.append(f"{'CategorĂ­a':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")
          for cat in categories:
              lines.append(f"{cat:35} {table[cat]['CRITICAL']:>8} {table[cat]['HIGH']:>5} {table[cat]['MEDIUM']:>7} {table[cat]['LOW']:>5} {table[cat]['INFO']:>5} {table[cat]['UNKNOWN']:>8}")

          lines.append("")
          lines.append("TODOS LOS HALLAZGOS ORDENADOS POR CRITICIDAD")
          lines.append("=" * 90)
          if not findings:
              lines.append("Sin hallazgos.")
          else:
              for idx, f in enumerate(findings, 1):
                  lines.append("")
                  lines.append(f"{idx}. [{f['severity']}] [{f['category']}] {f['rule']}")
                  lines.append(f"   Herramienta : {f['tool']}")
                  lines.append(f"   UbicaciĂłn   : {f['location']}")
                  lines.append(f"   Detalle     : {f['detail']}")
                  lines.append(f"   Fuente      : {f['source_file']}")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)
          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for idx, item in enumerate(quality, 1):
                  lines.append("")
                  lines.append(f"{idx}. {item.get('code','?')}")
                  lines.append(f"   UbicaciĂłn: {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle  : {item.get('message','')}")
                  lines.append(f"   Fuente   : {item.get('_source_file','')}")

          report = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"
          report_json = output_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.json"
          report.write_text("\n".join(lines), encoding="utf-8")
          report_json.write_text(json.dumps({"findings": findings, "quality": quality}, indent=2, ensure_ascii=False), encoding="utf-8")
          print(report.read_text(encoding="utf-8"))
          PY

      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-security-report
          path: central-security-report
          retention-days: 30
