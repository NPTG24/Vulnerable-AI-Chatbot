              "IaC / Cloud / Config",
              "Pipeline / Parser"
          ]

          severities = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {category: {severity: 0 for severity in severities} for category in categories}

          for finding in findings:
              category = finding["category"]
              severity = finding["severity"] if finding["severity"] in severities else "UNKNOWN"
              table.setdefault(category, {s: 0 for s in severities})
              table[category][severity] += 1

          order = {
              "CRITICAL": 0,
              "HIGH": 1,
              "MEDIUM": 2,
              "LOW": 3,
              "INFO": 4,
              "UNKNOWN": 5
          }

          findings.sort(key=lambda item: order.get(item["severity"], 99))
          critical_high = [item for item in findings if item["severity"] in ["CRITICAL", "HIGH"]]

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Vulnerabilidades totales       : {len(findings)}")
          lines.append(f"CrÃ­ticas + Altas              : {len(critical_high)}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORÃA")
          lines.append("-" * 90)
          lines.append(f"{'CategorÃ­a':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")

          for category in categories:
              lines.append(
                  f"{category:35} "
                  f"{table[category]['CRITICAL']:>8} "
                  f"{table[category]['HIGH']:>5} "
                  f"{table[category]['MEDIUM']:>7} "
                  f"{table[category]['LOW']:>5} "
                  f"{table[category]['INFO']:>5} "
                  f"{table[category]['UNKNOWN']:>8}"
              )

          lines.append("")
          lines.append("VULNERABILIDADES ORDENADAS POR CRITICIDAD")
          lines.append("=" * 90)

          for severity in severities:
              group = [item for item in findings if item["severity"] == severity]
              lines.append("")
              lines.append(f"{severity} ({len(group)})")
              lines.append("-" * 90)

              if not group:
                  lines.append("Sin hallazgos.")
              else:
                  for index, finding in enumerate(group, 1):
                      lines.append(f"{index}. [{finding['category']}]")
                      lines.append(f"   Herramienta : {finding['tool']}")
                      lines.append(f"   UbicaciÃ³n   : {finding['location']}")
                      lines.append(f"   Detalle     : {finding['detail']}")
                      lines.append("")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)

          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for index, item in enumerate(quality, 1):
                  lines.append(f"{index}. {item.get('code','?')}")
                  lines.append(f"   UbicaciÃ³n: {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle  : {item.get('message','')}")
                  lines.append("")

          out.write_text("\n".join(lines), encoding="utf-8")
          print(out.read_text(encoding="utf-8"))
