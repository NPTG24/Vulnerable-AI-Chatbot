                          add(py, line, "HIGH", "AI_PROMPT_TRIGGERED_SECURITY_FLAG_BYPASS", "AI / LLM / Agentic", "Prompt injection/backdoor: condiciÃ³n textual permite activar comportamiento sensible o cambiar flags de seguridad.", src, "HIGH")
                      if "os.environ" in cond and "yes" in cond and any(token in cond for token in ["secret", "owner", "reveal", "token", "key"]):
