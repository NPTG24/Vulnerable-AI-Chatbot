  pip-audit:
    name: "Dependencies — pip-audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python manifests
        id: python_manifest
        run: |
          if ls requirements*.txt >/dev/null 2>&1 || [ -f pyproject.toml ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-python@v5
        if: steps.python_manifest.outputs.found == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        if: steps.python_manifest.outputs.found == 'true'
        continue-on-error: true
        run: pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          if [ "${{ steps.python_manifest.outputs.found }}" != "true" ]; then
            echo '{"dependencies":[]}' > pip_audit_results.json
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          fi

          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("pip_audit_results.json")
          if not src.exists(): src.write_text('{"dependencies":[]}', encoding="utf-8")
          try: data = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception: data = {"dependencies":[]}
          deps = data.get("dependencies", []) if isinstance(data, dict) else data
          rules, results = {}, []
          def level(sev):
              s = str(sev or "").upper()
              return "error" if s in {"CRITICAL","HIGH"} else "warning" if s == "MEDIUM" else "note"
          for dep in deps:
              if not isinstance(dep, dict): continue
              name, version = dep.get("name","unknown"), dep.get("version","")
              for vuln in dep.get("vulns", []):
                  vid, sev = vuln.get("id","PYTHON_VULN"), vuln.get("severity","UNKNOWN")
                  msg = f"{name} {version}: {vid} severity={sev}"
                  rules.setdefault(vid, {"id":vid,"name":vid,"shortDescription":{"text":vid},"fullDescription":{"text":msg},"defaultConfiguration":{"level":level(sev)}})
                  results.append({"ruleId":vid,"level":level(sev),"message":{"text":msg},"locations":[{"physicalLocation":{"artifactLocation":{"uri":"python-dependencies"}}}]})
          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22pip-audit*22,*22informationUri*22:*22https:/*pypi.org/project/pip-audit/*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results*7D*5D__;JSUlJSUlJSUlJSUlJSUlJSUlLyUlJSUlJSUlJQ!!P110LumUDw!-angy8qEZgx4aFANs6ifHwXyPt5ImjLgnZZK6o3o8BwG8qu82ltd2Z9djtvSGakg3agqMCGECeWCrjLqcy1sV9zMn5wH8w$ }
          pathlib.Path("pip_audit.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure artifacts
        if: always()
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif

      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: |
            pip_audit_results.json
            pip_audit.sarif
          retention-days: 30

  secrets:
    name: "Secrets — Gitleaks + Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks_report.json \
            --exit-code 0 \
            --redact \
            --verbose || true

      - name: Convert Gitleaks JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("gitleaks_report.json")
          if not src.exists(): src.write_text("[]", encoding="utf-8")
          try: data = json.loads(src.read_text(encoding="utf-8", errors="ignore") or "[]")
          except Exception: data = []
          rules, results = {}, []
          for item in data:
              rid = item.get("RuleID") or item.get("Description") or "SECRET"
              desc = item.get("Description") or "Posible secreto expuesto"
              file = item.get("File") or "unknown"
              line = int(item.get("StartLine") or 1)
              rules.setdefault(rid, {"id":rid,"name":rid,"shortDescription":{"text":desc},"fullDescription":{"text":desc},"defaultConfiguration":{"level":"error"}})
              results.append({"ruleId":rid,"level":"error","message":{"text":desc},"locations":[{"physicalLocation":{"artifactLocation":{"uri":file},"region":{"startLine":line}}}]})
          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22Gitleaks*22,*22informationUri*22:*22https:/*github.com/gitleaks/gitleaks*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results*7D*5D__;JSUlJSUlJSUlJSUlJSUlJSUlLyUlJSUlJSUlJQ!!P110LumUDw!-angy8qEZgx4aFANs6ifHwXyPt5ImjLgnZZK6o3o8BwG8qu82ltd2Z9djtvSGakg3agqMCGECeWCrjLqcy1sV9xlPk5vsg$ }
          pathlib.Path("gitleaks.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure artifacts
        if: always()
        run: |
          test -f gitleaks_report.json || echo '[]' > gitleaks_report.json
          test -f gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-results
          path: |
            gitleaks_report.json
            gitleaks.sarif
          retention-days: 30

  docker-security:
    name: "Docker — Dockerfile + Image Vulns"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfiles
        run: |
          if find . -name 'Dockerfile*' -type f | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            find . -name 'Dockerfile*' -type f > dockerfiles.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            touch dockerfiles.txt
          fi

      - name: Run Hadolint
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" hadolint/hadolint:2.12.0-debian sh -c \
            'cd /repo && while read f; do hadolint --format sarif "$f"; done < dockerfiles.txt' \
            > hadolint.sarif || true

      - name: Run Trivy filesystem
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy_fs.sarif
          scanners: "vuln,secret,misconfig"
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: "0"

      - name: Build Docker image for scanning
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        run: docker build -t local-security-scan:${{ github.sha }} . || true

      - name: Run Trivy image scan
        if: steps.dockerfiles.outputs.found == 'true'
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: local-security-scan:${{ github.sha }}
          format: sarif
          output: trivy_image.sarif
          scanners: "vuln,secret,misconfig"
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: "0"

      - name: Ensure Docker artifacts
        if: always()
        run: |
          test -f hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          test -f trivy_fs.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy FS","rules":[]}},"results":[]}]}' > trivy_fs.sarif
          test -f trivy_image.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image.sarif
          test -f dockerfiles.txt || touch dockerfiles.txt

      - name: Upload Trivy filesystem SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_image.sarif
          category: trivy-docker-image

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-security-results
          path: |
            hadolint.sarif
            trivy_fs.sarif
            trivy_image.sarif
            dockerfiles.txt
          retention-days: 30

  base-supply-chain:
    name: "Base — OpenSSF Scorecard"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
