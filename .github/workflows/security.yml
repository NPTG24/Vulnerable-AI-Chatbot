  docker-security:
    name: "Docker — Hadolint high-signal + Dockle"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Discover Dockerfiles
        id: dockerfiles
        run: |
          find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './node_modules/*' > dockerfiles.txt || true
          count=$(wc -l < dockerfiles.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          cat dockerfiles.txt
      - name: Hadolint Dockerfile scan
        continue-on-error: true
        run: |
          mkdir -p docker_security
          echo '[]' > docker_security/hadolint.json
          if [ -s dockerfiles.txt ]; then
            : > docker_security/hadolint_all.jsonl
            while IFS= read -r file; do
              docker run --rm -i hadolint/hadolint:v2.12.0 hadolint \
                --format json \
                --failure-threshold error \
                - < "$file" >> docker_security/hadolint_all.jsonl || true
            done < dockerfiles.txt
            python3 - <<'PY'
            import json, pathlib
            items=[]
            p=pathlib.Path('docker_security/hadolint_all.jsonl')
            for line in p.read_text(encoding='utf-8', errors='ignore').splitlines():
                line=line.strip()
                if not line: continue
                try: data=json.loads(line)
                except Exception: continue
                if isinstance(data,list): items.extend(data)
            pathlib.Path('docker_security/hadolint.json').write_text(json.dumps(items, indent=2), encoding='utf-8')
            rules={}; results=[]
            for item in items:
                code=item.get('code','HADOLINT'); msg=item.get('message','Hadolint finding'); line=item.get('line',1)
                level='error' if str(item.get('level','')).lower() in {'error'} else 'warning'
                rules.setdefault(code,{'id':code,'name':code,'shortDescription':{'text':msg},'fullDescription':{'text':msg},'defaultConfiguration':{'level':level}})
                results.append({'ruleId':code,'level':level,'message':{'text':msg},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'Dockerfile'},'region':{'startLine':line}}}]})
            sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Hadolint','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJSUlJSU!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf1171Z88KKw$ }
            pathlib.Path('docker_security/hadolint.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
            PY
          fi
          test -f docker_security/hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > docker_security/hadolint.sarif
      - name: Build Docker images for Dockle when Dockerfile exists
        if: steps.dockerfiles.outputs.count != '0'
        continue-on-error: true
        run: |
          mkdir -p docker_security/images
          i=0
          while IFS= read -r file; do
            dir=$(dirname "$file")
            tag="local/security-scan:$i"
            docker build -t "$tag" -f "$file" "$dir" || true
            echo "$tag" >> docker_security/images.txt
            i=$((i+1))
          done < dockerfiles.txt
      - name: Dockle image scan
        if: steps.dockerfiles.outputs.count != '0'
        continue-on-error: true
        run: |
          mkdir -p docker_security/dockle
          : > docker_security/dockle_all.jsonl
          if [ -f docker_security/images.txt ]; then
            while IFS= read -r image; do
              docker run --rm -v /var/run/docker.sock:/var/run/docker.sock goodwithtech/dockle:v0.4.15 \
                --exit-code 0 \
                --exit-level fatal \
                --format json "$image" >> docker_security/dockle_all.jsonl || true
            done < docker_security/images.txt
          fi
          python3 - <<'PY'
          import json, pathlib
          findings=[]
          p=pathlib.Path('docker_security/dockle_all.jsonl')
          if p.exists():
              for line in p.read_text(encoding='utf-8', errors='ignore').splitlines():
                  line=line.strip()
                  if not line: continue
                  try: data=json.loads(line)
                  except Exception: continue
                  details=data.get('details') or data.get('Details') or []
                  if isinstance(details,list): findings.extend(details)
          pathlib.Path('docker_security/dockle.json').write_text(json.dumps(findings, indent=2), encoding='utf-8')
          rules={}; results=[]
          for item in findings:
              code=item.get('code') or item.get('Code') or 'DOCKLE'
              level_raw=str(item.get('level') or item.get('Level') or '').lower()
              level='error' if level_raw in {'fatal','warn'} else 'note'
              msg=item.get('title') or item.get('Title') or item.get('message') or code
              rules.setdefault(code,{'id':code,'name':code,'shortDescription':{'text':msg},'fullDescription':{'text':msg},'defaultConfiguration':{'level':level}})
              results.append({'ruleId':code,'level':level,'message':{'text':msg},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'docker-image'}}}]})
          sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Dockle','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJSUlJSU!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf115X1-rGwA$ }
          pathlib.Path('docker_security/dockle.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
          PY
      - name: Ensure Docker artifacts exist
        if: always()
        run: |
          mkdir -p docker_security
          test -f dockerfiles.txt || touch dockerfiles.txt
          test -f docker_security/hadolint.json || echo '[]' > docker_security/hadolint.json
          test -f docker_security/hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > docker_security/hadolint.sarif
          test -f docker_security/dockle.json || echo '[]' > docker_security/dockle.json
          test -f docker_security/dockle.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dockle","rules":[]}},"results":[]}]}' > docker_security/dockle.sarif
      - name: Upload Hadolint SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: docker_security/hadolint.sarif
          category: hadolint
      - name: Upload Dockle SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: docker_security/dockle.sarif
          category: dockle
      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            dockerfiles.txt
            docker_security/
          retention-days: 30

  dast-zap:
    name: "DAST — OWASP ZAP Baseline"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.run_dast == 'true'
    permissions:
      contents: read
      security-events: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Validate DAST target URL
        id: validate_url
        env:
          DAST_TARGET_URL_VALUE: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$DAST_TARGET_URL_VALUE" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi
      - name: Run OWASP ZAP Baseline Scan
        if: steps.validate_url.outputs.skip != 'true'
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ secrets.DAST_TARGET_URL }}
          report_html: zap_report.html
          report_json: zap_report.json
          cmd_options: "-l HIGH"
          fail_action: false
          allow_issue_writing: false
      - name: Convert ZAP JSON to SARIF
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          src=pathlib.Path('zap_report.json')
          if not src.exists(): src.write_text('{"site":[]}', encoding='utf-8')
          try: zap=json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: zap={'site':[]}
          def clean(v): return re.sub(r'\s+',' ',re.sub(r'<[^>]+>',' ',str(v or ''))).strip()
          rules={}; results=[]; level_map={'3':'error','2':'warning','1':'note','0':'note'}
          for site in zap.get('site',[]):
              for alert in site.get('alerts',[]):
                  rid='ZAP-'+str(alert.get('pluginid','unknown')); level=level_map.get(str(alert.get('riskcode','1')),'note'); name=clean(alert.get('alert','Unknown ZAP alert'))
                  rules.setdefault(rid,{'id':rid,'name':name,'shortDescription':{'text':name},'fullDescription':{'text':clean(alert.get('desc',''))},'defaultConfiguration':{'level':level}})
                  for inst in alert.get('instances') or [{}]:
                      uri=inst.get('uri') or site.get('@name') or 'unknown'
                      results.append({'ruleId':rid,'level':level,'message':{'text':f'{name} | URL: {uri}'},'locations':[{'physicalLocation':{'artifactLocation':{'uri':uri}}}]})
          sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'OWASP__;JSUlJQ!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf115jbN-wzw$  ZAP','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('zap_results.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Ensure ZAP artifacts exist
        if: always()
        run: |
          test -f zap_report.html || echo '<html><body><h1>ZAP skipped or no report generated</h1></body></html>' > zap_report.html
          test -f zap_report.json || echo '{"site":[]}' > zap_report.json
          test -f zap_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"OWASP ZAP","rules":[]}},"results":[]}]}' > zap_results.sarif
      - name: Upload ZAP SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap_results.sarif
          category: zap-dast
      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_report.html
            zap_report.json
            zap_results.sarif
          retention-days: 30

  security-report:
    name: "Security Report — Centralized Verdict"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - ruff
      - codeql
      - sast-semgrep
      - ai-sast-semgrep
      - sca-dependencies
      - secret-scan
      - iac-checkov
      - docker-security
      - dast-zap
    if: always()
    permissions:
      contents: read
    steps:
      - name: Create report directory
        run: mkdir -p all_scan_results security_reports
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results/
      - name: Generate clean centralized report
        run: |
          python3 - <<'PY'
          import json, pathlib, re, os
          from html import escape
          root=pathlib.Path('all_scan_results'); out=pathlib.Path('security_reports'); out.mkdir(exist_ok=True)
          order=['critical','high','medium','low','info','unknown']
          buckets={
            'ai':{s:[] for s in order}, 'appsec':{s:[] for s in order}, 'dependencies':{s:[] for s in order},
            'secrets':{s:[] for s in order}, 'docker':{s:[] for s in order}, 'iac':{s:[] for s in order},
            'dast':{s:[] for s in order}, 'quality':{s:[] for s in order}, 'info':{s:[] for s in order}
          }
          names={'ai':'AI / LLM / Agentic','appsec':'Código aplicativo','dependencies':'Dependencias / SCA','secrets':'Secretos','docker':'Docker / Contenedores','iac':'IaC / Cloud / Config','dast':'DAST','quality':'Calidad de desarrollo','info':'Ejecución / Metadata'}
          sev_names={'critical':'CRITICAL','high':'HIGH','medium':'MEDIUM','low':'LOW','info':'INFO','unknown':'UNKNOWN'}
          def norm(v):
              v=str(v or '').lower().strip()
              return {'error':'high','warning':'medium','note':'low','none':'info','critical':'critical','high':'high','medium':'medium','moderate':'medium','low':'low','info':'info','informational':'info'}.get(v,'unknown')
          def classify(tool, rule, file):
              t=(tool or '').lower(); r=(rule or '').lower(); f=(file or '').lower()
              if 'ruff' in t: return 'quality'
              if 'ai security' in t or r.startswith('ai-') or 'llm' in r: return 'ai'
              if 'pip-audit' in t or 'trivy' in t or 'dependency' in t or 'npm' in t: return 'dependencies'
              if 'gitleaks' in t or 'secret' in t or 'secret' in r: return 'secrets'
              if 'hadolint' in t or 'dockle' in t or 'docker' in r or 'dockerfile' in f: return 'docker'
              if 'checkov' in t: return 'iac'
              if 'zap' in t: return 'dast'
              if 'codeql' in t or 'semgrep' in t: return 'appsec'
              return 'info'
          def add(tool, sev, rule, msg, file='', line=''):
              file=str(file or '')
              if file.endswith('security.yml') or file.startswith('.github/workflows/'): return
              s=norm(sev); cat=classify(tool,rule,file)
              item={'tool':tool or 'Unknown','severity':s,'rule':rule or 'unknown','message':str(msg or '').strip(),'file':file,'line':str(line or '')}
              buckets[cat][s].append(item)
          def parse_sarif(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for run in data.get('runs',[]):
                  tool=run.get('tool',{}).get('driver',{}).get('name',p.stem)
                  rules={r.get('id','unknown'):r for r in run.get('tool',{}).get('driver',{}).get('rules',[])}
                  for res in run.get('results',[]):
                      rid=res.get('ruleId','unknown'); rule_meta=rules.get(rid,{})
                      level=res.get('level') or rule_meta.get('defaultConfiguration',{}).get('level') or 'unknown'
                      msg=res.get('message',{}).get('text') or rule_meta.get('fullDescription',{}).get('text') or ''
                      file=''; line=''
                      locs=res.get('locations',[])
                      if locs:
                          phys=locs[0].get('physicalLocation',{})
                          file=phys.get('artifactLocation',{}).get('uri','')
                          line=phys.get('region',{}).get('startLine','')
                      add(tool,level,rid,msg,file,line)
          def parse_json_findings(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for item in data.get('findings',[]): add(item.get('tool'),item.get('severity'),item.get('rule'),item.get('message'),item.get('file'),item.get('line'))
          def parse_ruff(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
              except Exception: return
              for item in data:
                  loc=item.get('location',{})
                  add('Ruff Quality','low',item.get('code','RUFF'),item.get('message',''),item.get('filename',''),loc.get('row',''))
          for p in root.rglob('*.sarif'): parse_sarif(p)
          for p in root.rglob('*findings.json'): parse_json_findings(p)
          for p in root.rglob('ruff_lint.json'): parse_ruff(p)
          for p in root.rglob('ruff_format_diff.txt'):
              try:
                  if p.read_text(encoding='utf-8', errors='ignore').strip(): add('Ruff Format','low','RUFF_FORMAT','Existen diferencias de formato detectadas por Ruff.',str(p),'')
              except Exception: pass
          vuln_cats=['ai','appsec','dependencies','secrets','docker','iac','dast']
          summary={cat:{s:len(buckets[cat][s]) for s in order} for cat in buckets}
          total_vulns=sum(summary[c][s] for c in vuln_cats for s in order)
          critical_high=sum(summary[c][s] for c in vuln_cats for s in ['critical','high'])
          lines=[]
          lines += ['REPORTE CENTRALIZADO DE SEGURIDAD', '='*90, '']
          lines += ['RESUMEN EJECUTIVO', '-'*90, f'Vulnerabilidades totales       : {total_vulns}', f'Críticas + Altas              : {critical_high}', f'Hallazgos de calidad Ruff     : {sum(summary["quality"].values())}', '']
          lines += ['RESUMEN POR CATEGORÍA', '-'*90, 'Categoría                          CRITICAL  HIGH  MEDIUM  LOW  INFO  UNKNOWN']
          for cat in vuln_cats+['quality']:
              c=summary[cat]
              lines.append(f'{names[cat]:34} {c["critical"]:8} {c["high"]:5} {c["medium"]:7} {c["low"]:4} {c["info"]:5} {c["unknown"]:8}')
          lines.append('')
          lines += ['VULNERABILIDADES ORDENADAS POR CRITICIDAD', '='*90]
          for sev in order:
              if sev == 'info': continue
              items=[]
              for cat in vuln_cats:
                  for item in buckets[cat][sev]:
                      item=dict(item); item['category']=names[cat]; items.append(item)
              lines += ['', f'{sev_names[sev]} ({len(items)})', '-'*90]
              if not items: lines.append('Sin hallazgos.')
              for i,item in enumerate(items,1):
                  loc=f'{item["file"]}:{item["line"]}' if item['line'] else item['file']
                  lines += [f'{i}. [{item["category"]}] {item["rule"]}', f'   Herramienta : {item["tool"]}', f'   Ubicación   : {loc}', f'   Detalle     : {item["message"]}', '']
          lines += ['', 'CALIDAD DE DESARROLLO / RUFF (NO CUENTA COMO VULNERABILIDAD)', '='*90]
          q=[]
          for sev in order: q += buckets['quality'][sev]
          if not q: lines.append('Sin hallazgos de calidad.')
          for i,item in enumerate(q,1):
              loc=f'{item["file"]}:{item["line"]}' if item['line'] else item['file']
              lines += [f'{i}. {item["rule"]}', f'   Ubicación: {loc}', f'   Detalle  : {item["message"]}', '']
          (out/'security_report_es.txt').write_text('\n'.join(lines), encoding='utf-8')
          (out/'security_report_es.json').write_text(json.dumps({'summary':summary,'buckets':buckets}, indent=2, ensure_ascii=False), encoding='utf-8')
          html=['<!doctype html><html><head><meta charset="utf-8"><title>Reporte de seguridad</title><style>body{font-family:Arial,sans-serif;margin:24px;color:#222}h1{margin-bottom:4px}.card{border:1px solid #ddd;border-radius:8px;padding:16px;margin:12px 0;background:#fafafa}table{border-collapse:collapse;width:100%;margin:12px 0 28px 0}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f1f1f1}.sev{font-weight:bold}.critical{color:#8b0000}.high{color:#b00020}.medium{color:#9a6700}.low{color:#0969da}.muted{color:#666}</style></head><body>']
          html += [f'<h1>Reporte centralizado de seguridad</h1><p class="muted">Ordenado por criticidad real. Ruff queda separado como calidad de desarrollo.</p><div class="card"><b>Vulnerabilidades totales:</b> {total_vulns}<br><b>Críticas + Altas:</b> {critical_high}<br><b>Hallazgos Ruff:</b> {sum(summary["quality"].values())}</div>']
          html.append('<h2>Resumen por categoría</h2><table><tr><th>Categoría</th><th>Critical</th><th>High</th><th>Medium</th><th>Low</th><th>Info</th><th>Unknown</th></tr>')
          for cat in vuln_cats+['quality']:
              c=summary[cat]; html.append(f'<tr><td>{escape(names[cat])}</td><td>{c["critical"]}</td><td>{c["high"]}</td><td>{c["medium"]}</td><td>{c["low"]}</td><td>{c["info"]}</td><td>{c["unknown"]}</td></tr>')
          html.append('</table><h2>Vulnerabilidades por criticidad</h2>')
          for sev in order:
              if sev=='info': continue
              items=[]
              for cat in vuln_cats:
                  for item in buckets[cat][sev]: item=dict(item, category=names[cat]); items.append(item)
              html.append(f'<h3 class="{sev}">{sev_names[sev]} ({len(items)})</h3><table><tr><th>Categoría</th><th>Herramienta</th><th>Regla</th><th>Ubicación</th><th>Detalle</th></tr>')
              for item in items:
                  loc=f'{item["file"]}:{item["line"]}' if item['line'] else item['file']
                  html.append(f'<tr><td>{escape(item["category"])}</td><td>{escape(item["tool"])}</td><td>{escape(item["rule"])}</td><td>{escape(loc)}</td><td>{escape(item["message"])}</td></tr>')
              html.append('</table>')
          html.append('<h2>Calidad de desarrollo / Ruff</h2><table><tr><th>Regla</th><th>Ubicación</th><th>Detalle</th></tr>')
          for item in q:
              loc=f'{item["file"]}:{item["line"]}' if item['line'] else item['file']
              html.append(f'<tr><td>{escape(item["rule"])}</td><td>{escape(loc)}</td><td>{escape(item["message"])}</td></tr>')
          html.append('</table></body></html>')
          (out/'security_report_es.html').write_text('\n'.join(html), encoding='utf-8')
          print('\n'.join(lines))
          PY
      - name: Add report to job summary
        if: always()
        run: |
          python3 - <<'PY'
          import os, pathlib
          report=pathlib.Path('security_reports/security_report_es.txt')
          with open(os.environ['GITHUB_STEP_SUMMARY'],'a',encoding='utf-8') as s:
              s.write('## Reporte centralizado de seguridad\n\n```text\n')
              s.write(report.read_text(encoding='utf-8', errors='ignore')[:120000] if report.exists() else 'No se generó reporte.')
              s.write('\n```\n')
          PY
      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports/
          retention-days: 30
      - name: Final verdict
        run: |
          python3 - <<'PY'
          import json, os, sys
          path='security_reports/security_report_es.json'
          if not os.path.exists(path): sys.exit(0)
          data=json.load(open(path,encoding='utf-8'))
          summary=data.get('summary',{})
          threshold='${{ github.event.inputs.fail_on }}' or os.environ.get('DEFAULT_FAIL_ON','never')
          threshold=threshold.lower()
          if threshold=='never':
              print('Final verdict configured as never fail.')
              sys.exit(0)
          order={'critical':5,'high':4,'medium':3,'low':2,'info':1,'unknown':0}
          vuln_cats=['ai','appsec','dependencies','secrets','docker','iac','dast']
          blocking=0
          for cat in vuln_cats:
              for sev,count in summary.get(cat,{}).items():
                  if order.get(sev,0) >= order.get(threshold,99): blocking += int(count)
          if blocking:
              print(f'Security Report failed: {blocking} vulnerability finding(s) at or above {threshold}.')
              sys.exit(1)
          print('Security Report passed.')
          PY
