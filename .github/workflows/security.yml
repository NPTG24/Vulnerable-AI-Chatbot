                  "Rotar credenciales y eliminar el secreto del historial cuando corresponda.",
                  "Usar un gestor de secretos y controles preventivos en pre-commit o CI."
              ]
          }

          tool_priority = {
              "CodeQL": 100,
              "Semgrep AI": 95,
              "Semgrep OSS": 90,
              "AI/App Static Analyzer": 85,
              "Trivy": 80,
              "Gitleaks": 78,
              "Checkov": 70,
              "Hadolint": 65,
              "Dependency Policy": 60,
              "pip-audit": 60,
              "Report parser": 10
          }

          severity_rank = {"CRITICAL": 5, "HIGH": 4, "MEDIUM": 3, "LOW": 2, "INFO": 1, "UNKNOWN": 0}

          def split_loc(loc):
              loc = str(loc or "?:?")
              if ":" not in loc:
                  return loc, 1
              file_part, line_part = loc.rsplit(":", 1)
              try:
                  return file_part, int(line_part)
              except Exception:
                  return file_part, 1

          def normalize_rule_family(rule, detail, category):
              text_rule = f"{rule} {detail}".lower()
              if "prompt injection" in text_rule or "llm" in text_rule or " rag" in text_rule or "retrievalqa" in text_rule:
                  return "AI_PROMPT_OR_RAG_RISK"
              if "xss" in text_rule or "<script>" in text_rule or "innerhtml" in text_rule or "html" in text_rule:
                  return "WEB_XSS_RISK"
              if "shell=true" in text_rule or "command" in text_rule or "subprocess" in text_rule or "exec" in text_rule:
                  return "COMMAND_EXECUTION_RISK"
              if "secret" in text_rule or "credential" in text_rule or "token" in text_rule:
                  return "SECRET_EXPOSURE"
              if category == "Dependencias / SCA":
                  return str(rule or "DEPENDENCY").upper()
              if category == "Docker / Contenedores":
                  return str(rule or "DOCKER_SECURITY_RISK").upper()
              if category == "IaC / Cloud / Config":
                  return str(rule or "IAC_SECURITY_RISK").upper()
              return str(rule or "GENERIC").lower().split(".")[-1].replace("-", "_")

          def detail_score(item):
              score = len(item.get("detail", ""))
              score += tool_priority.get(item.get("tool", ""), 0) * 10
              score += severity_rank.get(item.get("severity", "UNKNOWN"), 0) * 100
              if item.get("location", "?:?") != "?:?":
                  score += 150
              if "Recomendacion:" in item.get("detail", ""):
                  score += 80
              return score

          def same_package_dependency(a, b):
              da = str(a.get("detail", "")).lower()
              db = str(b.get("detail", "")).lower()
              ids_a = set(re.findall(r"(CVE-\d{4}-\d+|GHSA-[a-z0-9-]+|PYSEC-\d{4}-\d+)", da, flags=re.I))
              ids_b = set(re.findall(r"(CVE-\d{4}-\d+|GHSA-[a-z0-9-]+|PYSEC-\d{4}-\d+)", db, flags=re.I))
              if ids_a and ids_b:
                  return bool(ids_a & ids_b)
              return False

          def should_merge(a, b):
              file_a, line_a = split_loc(a.get("location"))
              file_b, line_b = split_loc(b.get("location"))
              if file_a != file_b:
                  return False

              cat_a = a.get("category")
              cat_b = b.get("category")
              if cat_a != cat_b:
                  return False

              rule_a = normalize_rule_family(a.get("rule"), a.get("detail"), cat_a)
              rule_b = normalize_rule_family(b.get("rule"), b.get("detail"), cat_b)

              if cat_a == "Dependencias / SCA":
                  if same_package_dependency(a, b):
                      return True
                  return rule_a == rule_b and int(line_a or 1) == int(line_b or 1)

              if cat_a == "Secretos":
                  return rule_a == rule_b and int(line_a or 1) == int(line_b or 1)

              if cat_a in {"Docker / Contenedores", "IaC / Cloud / Config"}:
                  tools_pair = {str(a.get("tool", "")), str(b.get("tool", ""))}
                  same_or_near_line = abs(int(line_a or 1) - int(line_b or 1)) <= 1

                  # Trivy y Checkov suelen reportar la misma mala configuracion con reglas distintas.
                  # Para evitar duplicados, si apuntan al mismo archivo y linea cercana, se fusionan.
                  if tools_pair == {"Trivy", "Checkov"} and same_or_near_line:
                      return True

                  # Entre otras herramientas Docker/IaC, fusionar solo misma regla/familia y misma linea.
                  return rule_a == rule_b and int(line_a or 1) == int(line_b or 1)

              return rule_a == rule_b and abs(int(line_a or 1) - int(line_b or 1)) <= 1

          deduped = []
          for item in findings:
              item.setdefault("tools", [item.get("tool")])
              item.setdefault("sources", [item.get("source")] if item.get("source") else [])
              merged = False

              for existing in deduped:
                  if should_merge(item, existing):
                      existing_tools = set(existing.get("tools", [existing.get("tool")]))
                      if item.get("tool"):
                          existing_tools.add(item.get("tool"))
                      existing["tools"] = sorted(existing_tools)

                      existing_sources = set(existing.get("sources", []))
                      if item.get("source"):
                          existing_sources.add(item.get("source"))
                      existing["sources"] = sorted(existing_sources)

                      if detail_score(item) > detail_score(existing):
                          keep_tools = existing["tools"]
                          keep_sources = existing["sources"]
                          item["tools"] = keep_tools
                          item["sources"] = keep_sources
                          existing.update(item)

                      merged = True
