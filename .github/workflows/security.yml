      - name: Run OSV Scanner CLI
        continue-on-error: true
        run: |
          if command -v osv-scanner >/dev/null 2>&1; then
            osv-scanner scan source -r . --format sarif --output osv_results.sarif || true
            osv-scanner scan source -r . --format json --output osv_results.json || true
          else
