name: Security Pipeline - NPTG24

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  PIP_NO_CACHE_DIR: "off"
  PIP_DISABLE_PIP_VERSION_CHECK: "on"

jobs:
  checkout:
    name: Checkout repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  setup-python:
    name: Set up Python
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip

  code-appsec:
    name: Code AppSec - Semgrep
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Prepare Code AppSec artifacts
        run: |
          rm -rf code-appsec-results
          mkdir -p code-appsec-results/reports
          mkdir -p code-appsec-results/sarif

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create precise AI AppSec rules
        run: |
          cat > precise-ai-appsec.yml <<'EOF'
          rules:
            - id: ai.flask-request-to-llm
              mode: taint
              message: User-controlled Flask request data reaches an LLM or AI chain. Review prompt injection, authorization, tool-use and data leakage controls.
              severity: ERROR
              languages:
                - python
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
                - pattern: https://urldefense.com/v3/__http://request.data__;!!P110LumUDw!9yXr9KJOhuX6cjz835GZUE_STcyP9Q82gyNz-uzoD1hX-deAzb2laQzH9L_BbpfoBx_HO-x5aaIR79WteUe69JS2eVbDMA$ 
              pattern-sinks:
                - pattern: $LLM.invoke(...)
                - pattern: $LLM.predict(...)
                - pattern: $LLM.generate(...)
                - pattern: $CHAIN.invoke(...)
                - pattern: $CHAIN.run(...)
                - pattern: $AGENT.invoke(...)
                - pattern: $AGENT.run(...)
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: $CLIENT.responses.create(...)

            - id: ai.flask-request-to-rag
              mode: taint
              message: User-controlled Flask request data reaches a RAG or retrieval chain. Validate authorization, tenant isolation, prompt injection defenses and source filtering.
              severity: ERROR
              languages:
                - python
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $QA.run(...)
                - pattern: $QA.invoke(...)
                - pattern: RetrievalQA.from_chain_type(...).run(...)
                - pattern: $RETRIEVER.get_relevant_documents(...)
                - pattern: $VECTORSTORE.similarity_search(...)

            - id: ai.agent-dangerous-tooling
              message: AI agent/tool execution detected with a potentially dangerous tool. Review whether the model can trigger shell, code execution, HTTP, filesystem, database or privileged actions.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: PythonREPLTool(...)
                - pattern: ShellTool(...)
                - pattern: RequestsGetTool(...)
                - pattern: RequestsPostTool(...)
                - pattern: Tool(..., func=eval, ...)
                - pattern: Tool(..., func=exec, ...)
                - pattern: Tool(..., func=os.system, ...)
                - pattern: StructuredTool(..., func=eval, ...)
                - pattern: StructuredTool(..., func=exec, ...)
                - pattern: StructuredTool(..., func=os.system, ...)

            - id: ai.secret-env-returned-to-user
              message: Secret-like environment variable appears to be returned to the user, rendered in a template or serialized in a response.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - patterns:
                    - pattern: return os.environ[$KEY]
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"
                - patterns:
                    - pattern: return os.getenv($KEY)
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"
                - patterns:
                    - pattern: jsonify(..., os.environ[$KEY], ...)
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"
                - patterns:
                    - pattern: jsonify(..., os.getenv($KEY), ...)
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"
                - patterns:
                    - pattern: render_template(..., $X=os.environ[$KEY], ...)
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"
                - patterns:
                    - pattern: render_template(..., $X=os.getenv($KEY), ...)
                    - metavariable-regex:
                        metavariable: $KEY
                        regex: "(?i).*(secret|password|credential|token|key|api|private).*"

            - id: ai.keyword-filter-security-boundary
              message: Keyword filtering appears to be used as a security boundary. This is bypassable in AI/LLM applications and should not protect secrets or authorization.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: |
                    if any($WORD in $INPUT for $WORD in $WORDS):
                        ...
                - pattern: |
                    if $WORD in $INPUT:
                        ...

            - id: ai.document-loader-from-upload
              mode: taint
              message: Uploaded file reaches a document loader. Validate type, size, extension, sandboxing and malicious document handling.
              severity: ERROR
              languages:
                - python
              pattern-sources:
                - pattern: request.files[$X]
                - pattern: request.files.get(...)
              pattern-sinks:
                - pattern: PyPDFLoader(...)
                - pattern: UnstructuredFileLoader(...)
                - pattern: Docx2txtLoader(...)
                - pattern: CSVLoader(...)
                - pattern: TextLoader(...)
                - pattern: DirectoryLoader(...)

            - id: ai.embedding-or-vectorstore-sensitive-data
              message: Embeddings or vector storage detected. Review whether secrets, PII or tenant data can be embedded or retrieved across authorization boundaries.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: OpenAIEmbeddings(...)
                - pattern: HuggingFaceEmbeddings(...)
                - pattern: SentenceTransformerEmbeddings(...)
                - pattern: FAISS.from_documents(...)
                - pattern: Chroma.from_documents(...)
                - pattern: $VECTORSTORE.add_documents(...)
                - pattern: $VECTORSTORE.similarity_search(...)

            - id: code.request-to-subprocess-shell
              mode: taint
              message: User-controlled request data reaches subprocess shell execution. Possible command injection.
              severity: ERROR
              languages:
                - python
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: os.system(...)

            - id: code.flask-upload-saved-directly
              mode: taint
              message: Uploaded file is saved or opened using user-controlled input. Check secure_filename, extension allowlist, path traversal and malware controls.
              severity: ERROR
              languages:
                - python
              pattern-sources:
                - pattern: request.files[$X]
                - pattern: request.files.get(...)
              pattern-sinks:
                - pattern: $FILE.save(...)
                - pattern: open($FILE, ...)
                - pattern: Path($FILE)

            - id: web.flask-debug-enabled
              message: Flask debug mode enabled.
              severity: ERROR
              languages:
                - python
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: web.flask-public-host
              message: Flask app exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9yXr9KJOhuX6cjz835GZUE_STcyP9Q82gyNz-uzoD1hX-deAzb2laQzH9L_BbpfoBx_HO-x5aaIR79WteUe69JSe0UoX3Q$ . Confirm intended exposure, authentication and network controls.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: app.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9yXr9KJOhuX6cjz835GZUE_STcyP9Q82gyNz-uzoD1hX-deAzb2laQzH9L_BbpfoBx_HO-x5aaIR79WteUe69JSe0UoX3Q$ ", ...)
                - pattern: $APP.run(..., host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9yXr9KJOhuX6cjz835GZUE_STcyP9Q82gyNz-uzoD1hX-deAzb2laQzH9L_BbpfoBx_HO-x5aaIR79WteUe69JSe0UoX3Q$ ", ...)

            - id: code.subprocess-shell-true
              message: subprocess with shell=True detected. Review for command injection if any command part is attacker-controlled.
              severity: WARNING
              languages:
                - python
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
          EOF

      - name: Run Semgrep OSS AppSec
        run: |
          semgrep scan             --config p/security-audit             --config p/owasp-top-ten             --config p/secrets             --config p/python             --config p/javascript             --config p/typescript             --config p/java             --config p/golang             --config p/php             --exclude .git             --exclude code-appsec-results             --exclude all_scan_results             --exclude node_modules             --exclude vendor             --exclude dist             --exclude build             --exclude .venv             --json             --output code-appsec-results/reports/semgrep.json             . || true

          semgrep scan             --config p/security-audit             --config p/owasp-top-ten             --config p/secrets             --config p/python             --config p/javascript             --config p/typescript             --config p/java             --config p/golang             --config p/php             --exclude .git             --exclude code-appsec-results             --exclude all_scan_results             --exclude node_modules             --exclude vendor             --exclude dist             --exclude build             --exclude .venv             --sarif             --output code-appsec-results/sarif/semgrep.sarif             . || true

      - name: Run precise AI AppSec rules
        run: |
          semgrep scan             --config precise-ai-appsec.yml             --exclude .git             --exclude code-appsec-results             --exclude all_scan_results             --exclude node_modules             --exclude vendor             --exclude dist             --exclude build             --exclude .venv             --json             --output code-appsec-results/reports/semgrep-ai.json             . || true

          semgrep scan             --config precise-ai-appsec.yml             --exclude .git             --exclude code-appsec-results             --exclude all_scan_results             --exclude node_modules             --exclude vendor             --exclude dist             --exclude build             --exclude .venv             --sarif             --output code-appsec-results/sarif/semgrep-ai.sarif             . || true

      - name: Ensure Semgrep SARIF artifacts exist
        run: |
          for file in semgrep.sarif semgrep-ai.sarif; do
            path="code-appsec-results/sarif/$file"
            if [ -d "$path" ]; then
              rm -rf "$path"
            fi
            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi
          done

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: code-appsec-results/sarif/semgrep.sarif
          category: semgrep-general

      - name: Upload Semgrep AI SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: code-appsec-results/sarif/semgrep-ai.sarif
          category: semgrep-ai-appsec

      - name: Upload Code AppSec artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-appsec-results
          path: code-appsec-results

  dependencies-sca:
    name: Dependencies SCA
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare dependency artifacts
        run: |
          rm -rf dependency-results
          mkdir -p dependency-results/reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Python dependency scan
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt               --format json               --output dependency-results/reports/pip-audit.json || true
          else
            echo '{"dependencies":[]}' > dependency-results/reports/pip-audit.json
          fi

      - name: Node dependency scan
        run: |
          if [ -f package-lock.json ]; then
            npm audit --json > dependency-results/reports/npm-audit.json || true
          else
            echo '{}' > dependency-results/reports/npm-audit.json
          fi

      - name: Upload dependency artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-results
          path: dependency-results

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  docker-iac:
    name: Docker and IaC
    runs-on: ubuntu-latest
    needs: checkout
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Docker and IaC artifacts
        run: |
          rm -rf docker-iac-results
          mkdir -p docker-iac-results/reports
          mkdir -p docker-iac-results/sarif

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: docker-iac-results/sarif/trivy.sarif

      - name: Trivy JSON
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: docker-iac-results/reports/trivy.json

      - name: Set up Python for Checkov
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Checkov JSON
        run: |
          checkov -d .             --framework dockerfile,github_actions,terraform,kubernetes,secrets             --compact             --quiet             --skip-path .git             --skip-path docker-iac-results             --skip-path all_scan_results             --skip-path node_modules             --skip-path vendor             --skip-path dist             --skip-path build             --skip-check CKV_DOCKER_9             --output json             > docker-iac-results/reports/checkov.json || true

      - name: Checkov SARIF
        run: |
          checkov -d .             --framework dockerfile,github_actions,terraform,kubernetes,secrets             --compact             --quiet             --skip-path .git             --skip-path docker-iac-results             --skip-path all_scan_results             --skip-path node_modules             --skip-path vendor             --skip-path dist             --skip-path build             --skip-check CKV_DOCKER_9             --output sarif             > docker-iac-results/sarif/checkov.sarif || true

      - name: Ensure Checkov and Trivy SARIF artifacts exist
        run: |
          for file in trivy.sarif checkov.sarif; do
            path="docker-iac-results/sarif/$file"
            if [ -d "$path" ]; then
              rm -rf "$path"
            fi
            if [ ! -f "$path" ] || [ ! -s "$path" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"empty","rules":[]}},"results":[]}]}' > "$path"
            fi
          done

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: docker-iac-results/sarif/trivy.sarif
          category: trivy

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: docker-iac-results/sarif/checkov.sarif
          category: checkov

      - name: Upload Docker and IaC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-iac-results
          path: docker-iac-results

  quality:
    name: Code quality Ruff
    runs-on: ubuntu-latest
    needs: setup-python
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Ruff artifacts
        run: |
          rm -rf ruff-results
          mkdir -p ruff-results/reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff quality scan
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            ruff check .               --exclude .git               --exclude ruff-results               --exclude all_scan_results               --exclude node_modules               --exclude vendor               --exclude dist               --exclude build               --exclude .venv               --output-format json               > ruff-results/reports/ruff.json || true
          else
            echo "[]" > ruff-results/reports/ruff.json
          fi

      - name: Upload Ruff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-results
          path: ruff-results

  centralized-report:
    name: Centralized security report
    runs-on: ubuntu-latest
    needs:
      - code-appsec
      - dependencies-sca
      - docker-iac
      - quality
    if: always()
    continue-on-error: true
    steps:
      - name: Download all scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Build centralized report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("all_scan_results")
          out_dir = Path("centralized-security-report")
          out_dir.mkdir(parents=True, exist_ok=True)
          out = out_dir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt"

          findings = []

          def normalize_sev(sev):
              sev = (sev or "UNKNOWN").upper()
              mapping = {
                  "ERROR": "HIGH",
                  "WARNING": "MEDIUM",
                  "WARN": "MEDIUM",
                  "MODERATE": "MEDIUM",
                  "INFORMATIONAL": "INFO",
                  "INFORMATIVE": "INFO"
              }
              allowed = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
              return mapping.get(sev, sev if sev in allowed else "UNKNOWN")

          def add(category, severity, tool, location, detail):
              findings.append({
                  "category": category,
                  "severity": normalize_sev(severity),
                  "tool": tool,
                  "location": str(location or "?"),
                  "detail": str(detail or "").replace("\n", " ")[:1200]
              })

          def read_json(name):
              for path in root.rglob(name):
                  try:
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          return json.loads(text)
                  except Exception as error:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", str(path), f"No se pudo leer JSON: {error}")
              return None

          def semgrep_category(check_id):
              check_id = (check_id or "").lower()
              if check_id.startswith("ai.") or "llm" in check_id or "rag" in check_id or "agent" in check_id or "embedding" in check_id:
                  return "AI / LLM / Agentic"
              if check_id.startswith("web.") or "flask" in check_id or "redirect" in check_id:
                  return "CÃ³digo aplicativo"
              if check_id.startswith("code.") or "subprocess" in check_id or "eval" in check_id:
                  return "CÃ³digo aplicativo"
              if "secret" in check_id:
                  return "Secretos"
              return "CÃ³digo aplicativo"

          for filename, tool in [
              ("semgrep.json", "Semgrep OSS"),
              ("semgrep-ai.json", "Semgrep AI AppSec")
          ]:
              data = read_json(filename)
              if data:
                  for result in data.get("results", []) or []:
                      check_id = result.get("check_id", "")
                      extra = result.get("extra", {})
                      add(
                          semgrep_category(check_id),
                          extra.get("severity", "UNKNOWN"),
                          tool,
                          f"{result.get('path','?')}:{result.get('start',{}).get('line','?')}",
                          f"{check_id} - {extra.get('message','')}"
                      )

          data = read_json("pip-audit.json")
          if data:
              for dep in data.get("dependencies", []) or []:
                  for vuln in dep.get("vulns", []) or []:
                      add(
                          "Dependencias / SCA",
                          "HIGH",
                          "pip-audit",
                          dep.get("name", "?"),
                          f"{vuln.get('id','')} - {vuln.get('description','')}"
                      )

          data = read_json("npm-audit.json")
          if data and isinstance(data, dict):
              for name, vuln in data.get("vulnerabilities", {}).items():
                  add(
                      "Dependencias / SCA",
                      vuln.get("severity", "UNKNOWN"),
                      "npm audit",
                      name,
                      vuln.get("title", "Dependency vulnerability")
                  )

          data = read_json("trivy.json")
          if data:
              for result in data.get("Results", []) or []:
                  target = result.get("Target", "?")

                  for vuln in result.get("Vulnerabilities", []) or []:
                      add(
                          "Dependencias / SCA",
                          vuln.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{vuln.get('PkgName','')} {vuln.get('InstalledVersion','')} - {vuln.get('VulnerabilityID','')} - {vuln.get('Title','')}"
                      )

                  for secret in result.get("Secrets", []) or []:
                      add(
                          "Secretos",
                          secret.get("Severity", "HIGH"),
                          "Trivy",
                          target,
                          secret.get("Title", "Possible secret")
                      )

                  for misconf in result.get("Misconfigurations", []) or []:
                      category = "Docker / Contenedores" if "dockerfile" in target.lower() else "IaC / Cloud / Config"
                      add(
                          category,
                          misconf.get("Severity", "UNKNOWN"),
                          "Trivy",
                          target,
                          f"{misconf.get('ID','')} - {misconf.get('Title','')}"
                      )

          data = read_json("checkov.json")
          if data:
              reports = data if isinstance(data, list) else [data]
              for report in reports:
                  for check in report.get("results", {}).get("failed_checks", []) or []:
                      file_path = check.get("file_path", "?")
                      category = "Docker / Contenedores" if "dockerfile" in file_path.lower() else "IaC / Cloud / Config"
                      line_range = check.get("file_line_range") or ["?"]
                      add(
                          category,
                          "HIGH",
                          "Checkov",
                          f"{file_path}:{line_range[0]}",
                          f"{check.get('check_id','')} - {check.get('check_name','')}"
                      )

          ruff = read_json("ruff.json")
          quality = ruff if isinstance(ruff, list) else []

          categories = [
              "AI / LLM / Agentic",
              "CÃ³digo aplicativo",
              "Dependencias / SCA",
              "Secretos",
