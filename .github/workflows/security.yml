                              if first == "https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ " or host_kw == "https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ ":
                                  add(py, line, "MEDIUM", "WEB_FLASK_PUBLIC_HOST", "Código aplicativo", "Flask expuesto en https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ . Confirmar autenticación, firewall/proxy y WSGI productivo.", source_line(lines, line))

