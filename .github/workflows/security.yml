                      routes[https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-29thjJzDA$ ] = node

              has_ai = any(token in text for token in ["RetrievalQA", "FAISS", "PyPDFLoader", "OpenAI", "ChatOpenAI", "LlamaIndex", "llama_index", "CrewAI", "autogen", "Haystack", "Chroma", "Pinecone", "OpenAIEmbeddings", "AgentExecutor"])
              has_request = any(token in text for token in ["request.args", "request.form", "request.json", "request.get_json"])
              has_route = bool(routes)

              if has_route and has_request and has_ai:
                  add(py, 1, "HIGH", "AI_FLASK_RAG_ATTACK_SURFACE", "AI / LLM / Agentic", "Superficie AI/RAG expuesta por Flask: rutas HTTP + input de usuario + LLM/RAG en el mismo archivo. Revisar prompt injection, auth, rate limiting, aislamiento de datos y costos.", "", "HIGH")

