                  found = [term for term in expensive_terms if term in text]
                  if len(set(found)) >= 3:
                      add(py, 1, "MEDIUM", "AI_EXPENSIVE_RAG_REBUILT_PER_REQUEST", "AI / LLM / Agentic", "Posible DoS/costo: archivo combina rutas HTTP y reconstrucciÃ³n de embeddings/vectorstore/RAG. Revisar cache, rate limiting y lÃ­mites de costo.", "", "HIGH")

          def analyze_js(path):
              text = path.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()
              joined = text.lower()
              has_ai = any(x in joined for x in ["openai", "langchain", "llamaindex", "anthropic", "gemini", "chat.completions", "responses.create"])
              has_request = any(x in joined for x in ["req.body", "req.query", "req.params", "request.body"])
              if has_ai and has_request:
                  add(path, 1, "HIGH", "AI_JS_HTTP_INPUT_TO_LLM_SURFACE", "AI / LLM / Agentic", "Superficie AI expuesta: input HTTP y llamadas LLM en el mismo archivo. Revisar prompt injection, auth, rate limiting y tool abuse.", "", "HIGH")
