  sca-dependencies:
    name: "SCA — Trivy fs + pip-audit + npm audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        continue-on-error: true
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit
        continue-on-error: true
        run: |
          pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          python3 - <<'PY'
          import json, pathlib
          src=pathlib.Path('pip_audit_osv.json')
          if not src.exists(): src.write_text('{"dependencies":[]}', encoding='utf-8')
          try: data=json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: data={'dependencies':[]}
          deps=data.get('dependencies',[]) if isinstance(data,dict) else data
          rules={}; results=[]
          def lvl(sev):
              s=str(sev or '').upper()
              return 'error' if s in {'CRITICAL','HIGH'} else ('warning' if s=='MEDIUM' else 'note')
          for dep in deps:
              if not isinstance(dep,dict): continue
              pkg,ver=dep.get('name','unknown'),dep.get('version','')
              for v in dep.get('vulns',[]):
                  vid=v.get('id','PYTHON_VULN'); sev=v.get('severity','UNKNOWN'); msg=f'{pkg} {ver}: {vid} severity={sev}'
                  rules.setdefault(vid,{'id':vid,'name':vid,'shortDescription':{'text':vid},'fullDescription':{'text':msg},'defaultConfiguration':{'level':lvl(sev)}})
                  results.append({'ruleId':vid,'level':lvl(sev),'message':{'text':msg},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'python-dependencies'}}}]})
          sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'pip-audit','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJSUlJSU!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf114jDig1pg$ }
          pathlib.Path('pip_audit.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
      - name: Run npm audit when lockfile exists
        continue-on-error: true
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm audit --json > npm_audit.json || true
          else
            echo '{"auditReportVersion":2,"vulnerabilities":{}}' > npm_audit.json
          fi
      - name: Run Trivy fs without trivy-action
        continue-on-error: true
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/repo" aquasec/trivy:0.58.2 fs \
            --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/.github \
            --skip-dirs /repo/node_modules \
            --skip-files /repo/security.yml \
            --format sarif \
            --output /repo/trivy_results.sarif \
            --exit-code 0 /repo || true
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/repo" aquasec/trivy:0.58.2 fs \
            --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/.github \
            --skip-dirs /repo/node_modules \
            --skip-files /repo/security.yml \
            --format json \
            --output /repo/trivy_results.json \
            --exit-code 0 /repo || true
      - name: Ensure SCA artifacts exist
        if: always()
        run: |
          test -f pip_audit_results.json || echo '[]' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
          test -f npm_audit.json || echo '{"auditReportVersion":2,"vulnerabilities":{}}' > npm_audit.json
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif
          test -f trivy_results.json || echo '{}' > trivy_results.json
      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-fs
      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            npm_audit.json
            trivy_results.sarif
            trivy_results.json
          retention-days: 30

