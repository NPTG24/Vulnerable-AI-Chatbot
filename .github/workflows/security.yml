  code-ai-static:
    name: "AI/App Code - Static Analyzer"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run precise Python AI/AppSec analyzer
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import ast
          import json
          import pathlib

          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}
          findings = []

          AI_CALL_NAMES = {
              "OpenAI",
              "ChatOpenAI",
              "OpenAIEmbeddings",
              "HuggingFaceEmbeddings",
              "RetrievalQA.from_chain_type",
              "ConversationalRetrievalChain.from_llm",
              "FAISS.from_documents",
              "Chroma.from_documents",
              "FAISS.load_local",
              "PyPDFLoader",
              "UnstructuredFileLoader",
              "Docx2txtLoader",
              "CSVLoader",
              "TextLoader",
              "DirectoryLoader",
          }

          DANGEROUS_AGENT_TOOLS = {
              "PythonREPLTool",
              "ShellTool",
              "RequestsGetTool",
              "RequestsPostTool",
          }

          USER_INPUT_NAMES = {
              "query",
              "user_query",
              "prompt",
              "message",
              "msg",
              "input",
              "question",
              "search_query",
              "text",
          }

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(file, line, severity, rule, category, message, snippet="", confidence="HIGH"):
              findings.append({
                  "tool": "AI/App Static Analyzer",
                  "file": str(file),
                  "line": int(line or 1),
                  "severity": severity,
                  "rule": rule,
                  "category": category,
                  "message": message,
                  "snippet": snippet[:400],
                  "confidence": confidence,
              })

          def call_name(node):
              if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQOIP-Kgg$ ):
                  return call_name(node.func)
              if isinstance(node, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ):
                  return https://urldefense.com/v3/__http://node.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQosDaKGQ$ 
              if isinstance(node, ast.Attribute):
                  base = call_name(node.value)
                  return f"{base}.{node.attr}" if base else node.attr
              if isinstance(node, ast.Subscript):
                  return call_name(node.value)
              return ""

          def const_str(node):
              return node.value if isinstance(node, ast.Constant) and isinstance(node.value, str) else None

          def source_line(lines, line):
              if 1 <= int(line or 1) <= len(lines):
                  return lines[int(line or 1) - 1].strip()
              return ""

          def contains_name(node, names):
              for child in ast.walk(node):
                  if isinstance(child, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and https://urldefense.com/v3/__http://child.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQ4fYK7Hw$  in names:
                      return True
              return False

          def contains_request(node):
              for child in ast.walk(node):
                  name = call_name(child)
                  if name == "request" or name.startswith("request."):
                      return True
              return False

          def contains_env_set_yes(node):
              for child in ast.walk(node):
                  if isinstance(child, ast.Assign):
                      for target in child.targets:
                          if isinstance(target, ast.Subscript) and call_name(target.value) == "os.environ":
                              if isinstance(child.value, ast.Constant) and str(child.value.value).lower() == "yes":
                                  return True
              return False

          def env_key_from_subscript(node):
              if isinstance(node, ast.Subscript) and call_name(node.value) == "os.environ":
                  return const_str(node.slice)
              return None

          def literals_in(node):
              values = []
              for child in ast.walk(node):
                  value = const_str(child)
                  if value:
                      values.append(value.lower())
              return values

          def is_route_function(node):
              for dec in node.decorator_list:
                  if isinstance(dec, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQOIP-Kgg$ ) and ".route" in call_name(dec):
                      return True
              return False

          def function_calls(node):
              calls = []
              for child in ast.walk(node):
                  if isinstance(child, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQOIP-Kgg$ ):
                      name = call_name(child)
                      if name:
                          calls.append((name, child))
              return calls

          def is_ai_call(name):
              if name in AI_CALL_NAMES:
                  return True
              if any(name.endswith("." + x) for x in AI_CALL_NAMES):
                  return True
              if name.endswith(".as_retriever"):
                  return True
              if name.endswith(".similarity_search"):
                  return True
              if name.endswith(".add_documents"):
                  return True
              if name.endswith(".save_local"):
                  return True
              if name.endswith(".load_local"):
                  return True
              return False

          def call_has_arg_name(call, names):
              for arg in call.args:
                  if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$  in names:
                      return https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$ 
                  if contains_name(arg, names):
                      return "<derived>"
              for kw in call.keywords:
                  if isinstance(kw.value, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and https://urldefense.com/v3/__http://kw.value.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsS0ZKp5Uw$  in names:
                      return https://urldefense.com/v3/__http://kw.value.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsS0ZKp5Uw$ 
                  if contains_name(kw.value, names):
                      return "<derived>"
              return ""

          def has_chain_type_stuff(call):
              for kw in call.keywords:
                  if kw.arg == "chain_type" and const_str(kw.value) == "stuff":
                      return True
              return False

          def build_call_graph(function_defs):
              graph = {name: set() for name in function_defs}
              for fname, fnode in function_defs.items():
                  for cname, _ in function_calls(fnode):
                      if cname in function_defs:
                          graph[fname].add(cname)
              return graph

          def reachable_from_routes(route_functions, graph):
              seen = set(route_functions)
              stack = list(route_functions)
              while stack:
                  current = stack.pop()
                  for nxt in graph.get(current, set()):
                      if nxt not in seen:
                          seen.add(nxt)
                          stack.append(nxt)
              return seen

          for py in pathlib.Path(".").rglob("*.py"):
              if skip(py):
                  continue

              text = py.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()

              try:
                  tree = ast.parse(text)
              except SyntaxError as error:
                  add(py, error.lineno or 1, "MEDIUM", "PYTHON_SYNTAX_ERROR", "Código aplicativo", f"No se pudo analizar por SyntaxError: {error}", "", "HIGH")
                  continue

              function_defs = {https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsTimtNRvA$ : node for node in ast.walk(tree) if isinstance(node, ast.FunctionDef)}
              route_functions = {name for name, node in function_defs.items() if is_route_function(node)}
              graph = build_call_graph(function_defs)
              route_reachable = reachable_from_routes(route_functions, graph)

              # Variables originadas en request dentro de cada función.
              tainted_by_func = {}
              for fname, fnode in function_defs.items():
                  tainted = set()
                  for node in ast.walk(fnode):
                      if isinstance(node, ast.Assign):
                          if contains_request(node.value):
                              for target in node.targets:
                                  if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ):
                                      tainted.add(https://urldefense.com/v3/__http://target.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsSH45_U2A$ )

                          # Propagación simple: a = b.lower(), re.sub(..., b), etc.
                          value_names = {https://urldefense.com/v3/__http://child.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQ4fYK7Hw$  for child in ast.walk(node.value) if isinstance(child, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ )}
                          if value_names & tainted:
                              for target in node.targets:
                                  if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ):
                                      tainted.add(https://urldefense.com/v3/__http://target.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsSH45_U2A$ )

                  # Si la función es llamada desde una route con args tainted, sus parámetros son tainted.
                  for route in route_functions:
                      rnode = function_defs[route]
                      route_tainted = tainted_by_func.get(route, set()) | tainted
                      for call in [c for _, c in function_calls(rnode)]:
                          called = call_name(call)
                          if called == fname:
                              for idx, arg in enumerate(call.args):
                                  if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and (https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$  in route_tainted or https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$  in USER_INPUT_NAMES):
                                      if idx < len(fnode.args.args):
                                          tainted.add(fnode.args.args[idx].arg)

                  tainted_by_func[fname] = tainted

              # Segunda pasada para propagar llamadas route -> función después de calcular taint inicial.
              for fname, fnode in function_defs.items():
                  tainted = set(tainted_by_func.get(fname, set()))
                  for route in route_functions:
                      rnode = function_defs[route]
                      route_tainted = tainted_by_func.get(route, set())
                      for _, call in function_calls(rnode):
                          if call_name(call) == fname:
                              for idx, arg in enumerate(call.args):
                                  if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and (https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$  in route_tainted or https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsT-OJLlUA$  in USER_INPUT_NAMES):
                                      if idx < len(fnode.args.args):
                                          tainted.add(fnode.args.args[idx].arg)
                  tainted_by_func[fname] = tainted

              # Hallazgos por función.
              for fname, fnode in function_defs.items():
                  tainted = tainted_by_func.get(fname, set())
                  is_reachable = fname in route_reachable
                  reach = " Alcanzable desde una ruta Flask." if is_reachable else ""

                  # Rutas sin auth: INFO para no meter falsos positivos duros.
                  if fname in route_functions:
                      add(py, fnode.lineno, "INFO", "WEB_FLASK_ROUTE_AUTH_REVIEW", "Código aplicativo", f"Ruta Flask detectada en {fname}(). Confirmar autenticación/autorización si expone acciones o datos sensibles.", source_line(lines, fnode.lineno), "MEDIUM")

                  for node in ast.walk(fnode):
                      line = getattr(node, "lineno", fnode.lineno)

                      if isinstance(node, ast.Assign):
                          # sensitive_keywords = [...]
                          for target in node.targets:
                              if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ) and "sensitive" in target.id.lower() and isinstance(node.value, (ast.List, ast.Tuple)):
                                  words = [str(getattr(elt, "value", "")).lower() for elt in node.value.elts if isinstance(elt, ast.Constant)]
                                  if any(w in {"secret", "secrets", "password", "passwords", "credential", "credentials", "key", "keys", "token"} for w in words):
                                      add(py, line, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Prompt injection / bypass: blacklist de keywords sensibles usada como control de seguridad. Es evadible con encoding, separación, idioma o reformulación." + reach, source_line(lines, line), "HIGH")

                          # os.environ["reveal_secret"] = ...
                          for target in node.targets:
                              key = env_key_from_subscript(target)
                              if key and any(k in key.lower() for k in ["secret", "owner", "token", "key", "password", "reveal"]):
                                  add(py, line, "MEDIUM", "MUTABLE_SECURITY_STATE_IN_ENV", "AI / LLM / Agentic", f"Estado de seguridad/sensibilidad guardado en os.environ['{key}']. Si cambia por flujo de usuario puede generar bypass." + reach, source_line(lines, line), "HIGH")

                      if isinstance(node, ast.If):
                          lits = literals_in(node.test)
                          if contains_env_set_yes(node) and len(set(lits)) >= 2:
                              add(py, line, "HIGH", "PROMPT_TRIGGERED_SECURITY_FLAG_BYPASS", "AI / LLM / Agentic", "Prompt injection/backdoor: condición basada en texto puede activar flags de seguridad con os.environ = 'yes'." + reach, source_line(lines, line), "HIGH")

                          if any(x in lits for x in ["script", "<script>"]):
                              add(py, line, "MEDIUM", "WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "Código aplicativo", "Mitigación XSS débil: solo bloquea literal '<script>'. No reemplaza sanitización/encoding contextual.", source_line(lines, line), "HIGH")

                          # if os.environ[...] != "yes"
                          for child in ast.walk(node.test):
                              key = env_key_from_subscript(child)
                              if key and any(k in key.lower() for k in ["secret", "owner", "token", "key", "password", "reveal"]):
                                  add(py, line, "HIGH", "AI_ENV_FLAG_AUTHORIZATION_GATE", "AI / LLM / Agentic", f"Gate de autorización/divulgación sensible depende de os.environ['{key}']; revisar bypass por estado mutable." + reach, source_line(lines, line), "HIGH")
                                  break

                      if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQOIP-Kgg$ ):
                          cname = call_name(node)

                          if cname in DANGEROUS_AGENT_TOOLS or any(cname.endswith("." + x) for x in DANGEROUS_AGENT_TOOLS):
                              add(py, line, "HIGH", "AI_AGENT_DANGEROUS_TOOL", "AI / LLM / Agentic", f"Agente/herramienta peligrosa detectada: {cname}. El modelo podría gatillar shell, HTTP o ejecución de código." + reach, source_line(lines, line), "HIGH")

                          if cname == "RetrievalQA.from_chain_type" or cname.endswith(".RetrievalQA.from_chain_type"):
                              add(py, line, "MEDIUM", "AI_RAG_RETRIEVALQA_CHAIN", "AI / LLM / Agentic", "Uso de RetrievalQA/RAG detectado. Revisar prompt injection, autorización sobre documentos, aislamiento por tenant y filtrado de fuentes." + reach, source_line(lines, line), "HIGH")
                              if has_chain_type_stuff(node):
                                  add(py, line, "MEDIUM", "AI_RAG_STUFF_CHAIN_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", "RAG chain_type='stuff': contenido recuperado se inserta directo en el prompt; riesgo de prompt injection desde documentos." + reach, source_line(lines, line), "HIGH")

                          if cname.endswith(".run") or cname.endswith(".invoke") or cname.endswith(".predict") or cname.endswith(".generate"):
                              tainted_arg = call_has_arg_name(node, tainted | USER_INPUT_NAMES)
                              if tainted_arg:
                                  add(py, line, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", f"Prompt injection: input potencialmente controlado por usuario ({tainted_arg}) llega a {cname}()." + reach, source_line(lines, line), "HIGH")

                          if cname in {"PyPDFLoader", "UnstructuredFileLoader", "Docx2txtLoader", "CSVLoader", "TextLoader", "DirectoryLoader"}:
                              add(py, line, "MEDIUM", "AI_DOCUMENT_LOADER_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", f"Loader de documento {cname} detectado. Validar origen, tipo, tamaño, sandboxing y prompt injection desde documentos." + reach, source_line(lines, line), "HIGH")

                          if cname in {"FAISS.from_documents", "Chroma.from_documents"}:
                              add(py, line, "MEDIUM", "AI_VECTORSTORE_FROM_DOCUMENTS", "AI / LLM / Agentic", "Vectorstore desde documentos detectado. Revisar data poisoning, PII, secretos embebidos y autorización de recuperación." + reach, source_line(lines, line), "HIGH")

                          if cname.endswith(".save_local") or cname.endswith(".load_local") or cname == "FAISS.load_local":
                              add(py, line, "MEDIUM", "AI_LOCAL_VECTORSTORE_PERSISTENCE", "AI / LLM / Agentic", "Persistencia/carga local de vectorstore detectada. Revisar poisoning, manipulación local, aislamiento y deserialización insegura." + reach, source_line(lines, line), "HIGH")

                          if cname in {"OpenAI", "OpenAIEmbeddings", "ChatOpenAI"}:
                              sev = "MEDIUM" if is_reachable else "INFO"
                              add(py, line, sev, "AI_PROVIDER_USAGE_COST_AND_DATA_BOUNDARY", "AI / LLM / Agentic", f"Uso de {cname} detectado. Revisar API key, límites de costo, rate limiting, logging seguro y datos sensibles enviados al proveedor." + reach, source_line(lines, line), "MEDIUM")

                          if cname == "time.sleep":
                              seconds = None
                              if node.args and isinstance(node.args[0], ast.Constant) and isinstance(node.args[0].value, (int, float)):
                                  seconds = node.args[0].value
                              if seconds and seconds >= 30:
                                  add(py, line, "MEDIUM", "WEB_ROUTE_LONG_SLEEP_DOS", "Código aplicativo", f"time.sleep({seconds}) detectado; si está en ruta HTTP bloquea workers y puede causar DoS." + reach, source_line(lines, line), "HIGH")

                          if cname.endswith(".run"):
                              first = const_str(node.args[0]) if node.args else None
                              host_kw = None
                              for kw in node.keywords:
                                  if kw.arg == "host":
                                      host_kw = const_str(kw.value)
                              if first == "https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsRY3h0UoA$ " or host_kw == "https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsRY3h0UoA$ ":
                                  add(py, line, "MEDIUM", "WEB_FLASK_PUBLIC_HOST", "Código aplicativo", "Flask expuesto en https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsRY3h0UoA$ . Confirmar autenticación, firewall/proxy y WSGI productivo.", source_line(lines, line), "HIGH")

                          if cname == "re.sub":
                              tainted_arg = call_has_arg_name(node, tainted | USER_INPUT_NAMES)
                              if tainted_arg:
                                  add(py, line, "INFO", "INPUT_SANITIZATION_REGEX_REVIEW", "Código aplicativo", f"Sanitización con regex sobre input ({tainted_arg}). Confirmar allowlist suficiente para el contexto y que no genere bypass lógico.", source_line(lines, line), "MEDIUM")

                          # .lower() sobre request sin None check
                          if cname.endswith(".lower") and isinstance(node.func, ast.Attribute) and isinstance(node.func.value, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQTjvP3GA$ ):
                              base = https://urldefense.com/v3/__http://node.func.value.id__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsRU1zNq_Q$ 
                              if base in tainted:
                                  add(py, line, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "Código aplicativo", f"Parámetro de request '{base}' usado con .lower() sin check visible de None; puede causar 500/DoS si falta el parámetro.", source_line(lines, line), "HIGH")

                  # Cost/DoS: operaciones caras dentro de flujo reachable desde ruta.
                  if is_reachable:
                      expensive = []
                      for _, call in function_calls(fnode):
                          cname = call_name(call)
                          if cname in {"OpenAIEmbeddings", "FAISS.from_documents", "RetrievalQA.from_chain_type"} or cname.endswith(".save_local") or cname == "FAISS.load_local":
                              expensive.append(cname)
                      if len(set(expensive)) >= 3:
                          add(py, fnode.lineno, "MEDIUM", "AI_EXPENSIVE_RAG_REBUILT_PER_REQUEST", "AI / LLM / Agentic", f"Posible DoS/costo: flujo alcanzable desde ruta reconstruye RAG/embeddings/vectorstore por request ({', '.join(sorted(set(expensive)))}).", source_line(lines, fnode.lineno), "HIGH")

          pathlib.Path("ai_app_static_findings.json").write_text(json.dumps({"tool": "AI/App Static Analyzer", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []

          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": f["message"]},
                  "defaultConfiguration": {"level": level(f["severity"])}
              })
              results.append({
                  "ruleId": rid,
                  "level": level(f["severity"]),
                  "message": {"text": f["message"]},
                  "properties": {
                      "kind": "vulnerability",
                      "category": f["category"],
                      "confidence": f["confidence"],
                      "snippet": f["snippet"],
                  },
                  "locations": [{
                      "physicalLocation": {
                          "artifactLocation": {"uri": f["file"]},
                          "region": {"startLine": f["line"]}
                      }
                  }]
              })

          sarif = {
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "AI/App Static Analyzer", "rules": list(rules.values())}},
                  "results": results
              }]
          }

          pathlib.Path("ai_app_static.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"AI/App static analyzer findings: {len(findings)}")
          PY

      - name: Ensure AI/App static artifacts exist
        if: always()
        run: |
          test -f ai_app_static_findings.json || echo '{"tool":"AI/App Static Analyzer","findings":[]}' > ai_app_static_findings.json
          test -f ai_app_static.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI/App Static Analyzer","rules":[]}},"results":[]}]}' > ai_app_static.sarif

      - name: Upload AI/App static SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai_app_static.sarif
          category: ai-app-static

      - name: Upload AI/App static artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-static-results
          path: |
            ai_app_static_findings.json
            ai_app_static.sarif
          retention-days: 30

  ai-security:
    name: "AI Security — Semgrep LLM Rules"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create precise AI Semgrep rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML_RULES'
          rules:
            - id: ai-python-retrievalqa-variable-run
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: variable input reaches RetrievalQA/LLM run(). Validate prompt injection and authorization controls."
              metadata:
                category: security
                technology: [ai, llm, rag, langchain]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: $QA.run($QUERY)
                - pattern: $CHAIN.run($QUERY)
              pattern-not: $QA.run("...")

            - id: ai-python-retrievalqa-stuff-chain
              languages: [python]
              severity: WARNING
              message: "RAG chain_type='stuff' detected. Retrieved content is stuffed into prompt; review prompt injection from documents."
              metadata:
                category: security
                technology: [ai, rag, langchain]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: RetrievalQA.from_chain_type(..., chain_type="stuff", ...)
                - pattern: RetrievalQA.from_chain_type(..., chain_type='stuff', ...)

            - id: ai-python-keyword-blacklist-security-control
              languages: [python]
              severity: WARNING
              message: "Prompt Injection bypass: keyword blacklist appears to protect secrets/system rules."
              metadata:
                category: security
                technology: [ai, prompt-injection]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: |
                    sensitive_keywords = [...]
                - pattern: |
                    if any($WORD in $TEXT for $WORD in $WORDS):
                        ...

            - id: ai-python-prompt-triggered-env-flag
              languages: [python]
              severity: ERROR
              message: "Prompt Injection/backdoor: user-controlled text can toggle environment/security flag."
              metadata:
                category: security
                technology: [ai, prompt-injection, backdoor]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: |
                    if "forget" in $INPUT and "rules" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if "new" in $INPUT and "operator" in $INPUT:
                        os.environ[$KEY] = "yes"
                - pattern: |
                    if $A in $INPUT and $B in $INPUT:
                        os.environ[$KEY] = "yes"

            - id: ai-python-env-gate-sensitive-disclosure
              languages: [python]
              severity: ERROR
              message: "Sensitive disclosure/authorization gate controlled by mutable environment variable."
              metadata:
                category: security
                technology: [ai, secrets, authorization]
                owasp_llm: LLM02 Sensitive Information Disclosure
                confidence: HIGH
              pattern-either:
                - pattern: |
                    if os.environ[$KEY] != "yes":
                        ...
                - pattern: |
                    if os.getenv($KEY) != "yes":
                        ...
                - pattern: |
                    os.environ[$KEY] = "yes"

            - id: ai-python-document-loader-rag-prompt-injection
              languages: [python]
              severity: WARNING
              message: "Prompt Injection from documents: AI/RAG document loader detected. Validate origin, type, size and sandboxing."
              metadata:
                category: security
                technology: [ai, rag, document-loader]
                owasp_llm: LLM03 Supply Chain / LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: PyPDFLoader($FILE)
                - pattern: UnstructuredFileLoader($FILE)
                - pattern: Docx2txtLoader($FILE)
                - pattern: CSVLoader($FILE)
                - pattern: TextLoader($FILE)
                - pattern: DirectoryLoader($FILE)

            - id: ai-python-local-vectorstore-persistence
              languages: [python]
              severity: WARNING
              message: "Local vectorstore persistence detected. Review poisoning, tenant isolation, sensitive embeddings and unsafe deserialization."
              metadata:
                category: security
                technology: [ai, rag, vectorstore]
                owasp_llm: LLM03 Supply Chain / LLM02 Sensitive Information Disclosure
                confidence: HIGH
              pattern-either:
                - pattern: $VECTORSTORE.save_local(...)
                - pattern: FAISS.load_local(...)
                - pattern: $VECTORSTORE.load_local(...)

            - id: ai-python-flask-input-to-llm-taint
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: Flask request input flows to LLM/chain."
              metadata:
                category: security
                technology: [ai, llm, flask]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $MODEL.invoke($SINK, ...)
                - pattern: $CHAIN.invoke($SINK, ...)
                - pattern: $CHAIN.run($SINK, ...)
                - pattern: $QA.run($SINK)
                - pattern: $CLIENT.chat.completions.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.responses.create(..., input=$SINK, ...)

            - id: ai-js-user-input-direct-to-openai-prompt
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI Prompt Injection: req/user input flows directly into LLM prompt/messages."
              metadata:
                category: security
                technology: [ai, llm, openai, express]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: req.body.$FIELD
                - pattern: req.query.$FIELD
                - pattern: req.params.$FIELD
                - pattern: request.body.$FIELD
              pattern-sinks:
                - pattern: $CLIENT.chat.completions.create({..., messages: $SINK, ...})
                - pattern: openai.chat.completions.create({..., messages: $SINK, ...})
                - pattern: $CLIENT.responses.create({..., input: $SINK, ...})
          YAML_RULES

      - name: Run precise AI Semgrep rules
        continue-on-error: true
        run: |
          semgrep --config .semgrep/ai-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --sarif --output semgrep_ai.sarif . || true

          semgrep --config .semgrep/ai-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --json --output semgrep_ai.json . || true

      - name: Normalize AI SARIF metadata
        if: always()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          p = pathlib.Path("semgrep_ai.sarif")
          if not p.exists():
              p.write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}', encoding="utf-8")
          try:
              data = json.loads(p.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = {"version": "2.1.0", "runs": []}
          if not data.get("runs"):
              data["runs"] = [{"tool": {"driver": {"name": "AI Security", "rules": []}}, "results": []}]
          for run in data.get("runs", []):
              driver = run.setdefault("tool", {}).setdefault("driver", {})
              driver["name"] = "AI Security - Semgrep LLM Rules"
              driver["informationUri"] = "https://urldefense.com/v3/__https://owasp.org/www-project-top-10-for-large-language-model-applications/__;!!P110LumUDw!7ft0jWiuRTs-a4fV3Y65nWdEB6UKZ2i9Maq0DTHEvOIOuC1cJhmeuHt76_YQz26YTBXER8fs6fnDx-P3h29uLsQFDzNDzA$ "
              for result in run.get("results", []):
                  result.setdefault("properties", {})["kind"] = "vulnerability"
                  result.setdefault("properties", {})["category"] = "AI / LLM / Agentic"
          p.write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure AI artifacts exist
        if: always()
        run: |
          test -f semgrep_ai.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Security","rules":[]}},"results":[]}]}' > semgrep_ai.sarif
          test -f semgrep_ai.json || echo '{"results":[]}' > semgrep_ai.json

      - name: Upload AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai.sarif
          category: ai-security-precise

      - name: Upload AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-security-results
          path: |
            semgrep_ai.sarif
            semgrep_ai.json
            .semgrep/ai-security/ai_rules.yml
          retention-days: 30

# IMPORTANTE:
# En el job `centralized-report`, verifica que el bloque `needs:` incluya:
#
# needs:
#   - dependency-policy
#   - code-ai-static
#   - ruff
#   - codeql
#   - semgrep
#   - ai-security
#   - sca
#   - secret-scan
#   - docker-security
#   - iac-checkov
#
# Y que el parser del reporte lea `ai_app_static_findings.json`.
# Si estás usando el último pipeline que te pasé, esto ya estaba agregado.
