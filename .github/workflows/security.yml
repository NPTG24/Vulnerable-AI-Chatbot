  sca:
    name: "SCA — pip-audit + Trivy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit against project files
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit -r requirements.txt --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
            pip-audit --format json --output pip_audit_osv.json --progress-spinner off --vulnerability-service osv || true
          fi
          python3 - <<'PY'
          import json
          import pathlib
          src = pathlib.Path("pip_audit_osv.json")
          try:
              data = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception:
              data = {"dependencies": []}
          deps = data.get("dependencies", []) if isinstance(data, dict) else data
          rules = {}
          results = []
          def level(sev):
              s = str(sev or "").upper()
              if s in {"CRITICAL", "HIGH"}:
                  return "error"
              if s == "MEDIUM":
                  return "warning"
              return "note"
          for dep in deps:
              if not isinstance(dep, dict):
                  continue
              pkg = dep.get("name", "unknown")
              ver = dep.get("version", "")
              for vuln in dep.get("vulns", []):
                  vid = vuln.get("id", "PYTHON_VULN")
                  sev = vuln.get("severity", "UNKNOWN")
                  msg = f"{pkg} {ver}: {vid} severity={sev}"
                  rules.setdefault(vid, {"id": vid, "name": vid, "shortDescription": {"text": vid}, "fullDescription": {"text": msg}, "defaultConfiguration": {"level": level(sev)}})
                  results.append({"ruleId": vid, "level": level(sev), "message": {"text": msg}, "properties": {"kind": "vulnerability"}, "locations": [{"physicalLocation": {"artifactLocation": {"uri": "python-dependencies"}}}]})
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "pip-audit", "informationUri": "https://urldefense.com/v3/__https://pypi.org/project/pip-audit/__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo2j6YzmTQ$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("pip_audit.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Run Trivy filesystem JSON and SARIF
        continue-on-error: true
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -v "$PWD:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format json \
            --output /repo/trivy_results.json \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            /repo || true

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -v "$PWD:/repo" \
            aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format sarif \
            --output /repo/trivy_results.sarif \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL \
            --skip-dirs /repo/.git \
            --skip-dirs /repo/node_modules \
            /repo || true

      - name: Ensure SCA artifacts exist
        if: always()
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit_osv.json || echo '{"dependencies":[]}' > pip_audit_osv.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif
          test -f trivy_results.json || echo '{"Results":[]}' > trivy_results.json
          test -f trivy_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy","rules":[]}},"results":[]}]}' > trivy_results.sarif

      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy_results.sarif
          category: trivy-sca

      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_results.json
            pip_audit_osv.json
            pip_audit.sarif
            trivy_results.json
            trivy_results.sarif
          retention-days: 30

