name: Security Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      fail_on:
        description: "Final report failure threshold"
        required: false
        default: "never"
        type: choice
        options: ["critical", "high", "medium", "low", "never"]
      run_dast:
        description: "Run ZAP DAST if DAST_TARGET_URL exists"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

# No bloquea por defecto. Todo genera reportes y SARIF.
env:
  PYTHON_VERSION: "3.12"
  FAIL_ON: ${{ github.event.inputs.fail_on || 'never' }}
  SEMGREP_SEND_METRICS: "off"

jobs:
  codeql:
    name: "SAST — CodeQL deep scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: codeql-${{ matrix.language }}

  semgrep-security:
    name: "SAST — Semgrep high-signal security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Run Semgrep high-signal rules
        continue-on-error: true
        run: |
          semgrep ci \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --config p/dockerfile \
            --severity ERROR \
            --severity WARNING \
            --exclude .git \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --exclude venv \
            --sarif --output semgrep_security.sarif || true
          semgrep ci \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/secrets \
            --config p/dockerfile \
            --severity ERROR \
            --severity WARNING \
            --exclude .git \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .venv \
            --exclude venv \
            --json --output semgrep_security.json || true
          test -s semgrep_security.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep_security.sarif
          test -s semgrep_security.json || echo '{"results":[]}' > semgrep_security.json
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: semgrep_security.sarif
          category: semgrep-security
      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-security-results
          path: |
            semgrep_security.sarif
            semgrep_security.json
          retention-days: 30

  ai-code-security:
    name: "AI SAST — vulnerable LLM code flows"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Create precise AI security rules
        run: |
          mkdir -p .semgrep/ai
          cat > .semgrep/ai/ai_high_signal.yml <<'YAML_RULES'
          rules:
            - id: ai.prompt-injection.untrusted-http-to-llm-python
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: entrada HTTP/controlada por usuario llega directo a una llamada LLM sin sanitización/guardrail evidente."
              metadata:
                category: security
                technology: [ai, llm, prompt-injection]
                owasp_llm: LLM01 Prompt Injection
              mode: taint
              pattern-sources:
                - pattern: request.$ANY
                - pattern: flask.request.$ANY
                - pattern: $REQ.json
                - pattern: $REQ.form
                - pattern: $REQ.args
                - pattern: input(...)
              pattern-sanitizers:
                - pattern: sanitize_prompt(...)
                - pattern: validate_prompt(...)
                - pattern: prompt_guard(...)
                - pattern: guardrails(...)
                - pattern: $GUARD.validate(...)
              pattern-sinks:
                - pattern: openai.ChatCompletion.create(..., messages=$X, ...)
                - pattern: $CLIENT.chat.completions.create(..., messages=$X, ...)
                - pattern: $CLIENT.responses.create(..., input=$X, ...)
                - pattern: $MODEL.invoke($X, ...)
                - pattern: $CHAIN.invoke($X, ...)

            - id: ai.prompt-injection.untrusted-http-to-llm-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI Prompt Injection: entrada HTTP/controlada por usuario llega directo a una llamada LLM sin sanitización/guardrail evidente."
              metadata:
                category: security
                technology: [ai, llm, prompt-injection]
                owasp_llm: LLM01 Prompt Injection
              mode: taint
              pattern-sources:
                - pattern: req.body
                - pattern: req.query
                - pattern: req.params
                - pattern: request.body
                - pattern: request.query
              pattern-sanitizers:
                - pattern: sanitizePrompt(...)
                - pattern: validatePrompt(...)
                - pattern: promptGuard(...)
                - pattern: guardrails(...)
              pattern-sinks:
                - pattern: openai.chat.completions.create({..., messages: $X, ...})
                - pattern: client.chat.completions.create({..., messages: $X, ...})
                - pattern: openai.responses.create({..., input: $X, ...})
                - pattern: model.invoke($X, ...)
                - pattern: chain.invoke($X, ...)

            - id: ai.rce.llm-output-to-eval-python
              languages: [python]
              severity: ERROR
              message: "AI RCE: salida/respuesta de LLM llega a eval/exec. Vulnerabilidad crítica en chatbot/agente."
              metadata:
                category: security
                technology: [ai, llm, rce]
                owasp_llm: LLM05 Improper Output Handling
              mode: taint
              pattern-sources:
                - pattern: $CLIENT.chat.completions.create(...)
                - pattern: openai.ChatCompletion.create(...)
                - pattern: $CLIENT.responses.create(...)
                - pattern: $MODEL.invoke(...)
                - pattern: $CHAIN.invoke(...)
              pattern-sinks:
                - pattern: eval($X)
                - pattern: exec($X)
                - pattern: compile($X, ...)

            - id: ai.rce.llm-output-to-eval-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI RCE: salida/respuesta de LLM llega a eval/new Function. Vulnerabilidad crítica en chatbot/agente."
              metadata:
                category: security
                technology: [ai, llm, rce]
                owasp_llm: LLM05 Improper Output Handling
              mode: taint
              pattern-sources:
                - pattern: openai.chat.completions.create(...)
                - pattern: client.chat.completions.create(...)
                - pattern: openai.responses.create(...)
                - pattern: model.invoke(...)
                - pattern: chain.invoke(...)
              pattern-sinks:
                - pattern: eval($X)
                - pattern: new Function($X)

            - id: ai.agent.command-execution-python
              languages: [python]
              severity: ERROR
              message: "AI Agent Excessive Agency: tool/agente ejecuta comandos del sistema. Revisar allowlist estricta y aprobación humana."
              metadata:
                category: security
                technology: [ai, agent, command-injection]
                owasp_llm: LLM06 Excessive Agency
              patterns:
                - pattern-either:
                    - pattern: Tool(..., func=$FUNC, ...)
                    - pattern: StructuredTool.from_function($FUNC, ...)
                    - pattern: initialize_agent(..., tools=$TOOLS, ...)
                    - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                    - pattern: Crew(..., agents=$AGENTS, ...)
                - pattern-inside: |
                    ...
                    def $FUNC(...):
                      ...
                      subprocess.$CALL(...)
                      ...
                - metavariable-regex:
                    metavariable: $CALL
                    regex: (run|Popen|call|check_output)

            - id: ai.agent.shell-true-python
              languages: [python]
              severity: ERROR
              message: "AI/Agent command injection: uso de shell=True en código que puede ser usado como tool/agente."
              metadata:
                category: security
                technology: [ai, agent, command-injection]
              pattern-either:
                - pattern: subprocess.run($CMD, shell=True, ...)
                - pattern: subprocess.Popen($CMD, shell=True, ...)
                - pattern: subprocess.call($CMD, shell=True, ...)
                - pattern: os.system($CMD)

            - id: ai.rag.untrusted-upload-to-vectorstore-python
              languages: [python]
              severity: WARNING
              message: "AI RAG Poisoning: documento/upload externo insertado en vectorstore sin validación de fuente/metadata visible."
              metadata:
                category: security
                technology: [ai, llm, rag, vector-db]
                owasp_llm: LLM04 Data and Model Poisoning
              mode: taint
              pattern-sources:
                - pattern: request.files
                - pattern: $REQ.files
                - pattern: UploadFile(...)
                - pattern: file.read(...)
              pattern-sanitizers:
                - pattern: validate_source(...)
                - pattern: verify_document(...)
                - pattern: sanitize_document(...)
                - pattern: add_metadata(...)
              pattern-sinks:
                - pattern: $DB.add_documents($X, ...)
                - pattern: $DB.add_texts($X, ...)
                - pattern: $VECTORSTORE.add_documents($X, ...)
                - pattern: $VECTORSTORE.from_documents($X, ...)
                - pattern: $INDEX.insert($X, ...)

            - id: ai.llm-call.no-timeout-or-token-limit-python
              languages: [python]
              severity: WARNING
              message: "AI DoS/Cost: llamada LLM sin timeout ni max_tokens/max_output_tokens visibles en la misma llamada."
              metadata:
                category: security
                technology: [ai, llm, dos, cost]
                owasp_llm: LLM10 Unbounded Consumption
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: openai.ChatCompletion.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., timeout=$T, ...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., timeout=$T, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
                - pattern-not: openai.ChatCompletion.create(..., request_timeout=$T, ...)
                - pattern-not: openai.ChatCompletion.create(..., max_tokens=$M, ...)

            - id: ai.llm-call.no-timeout-or-token-limit-js
              languages: [javascript, typescript]
              severity: WARNING
              message: "AI DoS/Cost: llamada LLM sin límite de tokens ni timeout/AbortController visible."
              metadata:
                category: security
                technology: [ai, llm, dos, cost]
                owasp_llm: LLM10 Unbounded Consumption
              patterns:
                - pattern-either:
                    - pattern: openai.chat.completions.create({...})
                    - pattern: client.chat.completions.create({...})
                    - pattern: openai.responses.create({...})
                - pattern-not: openai.chat.completions.create({... max_tokens: $M, ...})
                - pattern-not: client.chat.completions.create({... max_tokens: $M, ...})
                - pattern-not: openai.responses.create({... max_output_tokens: $M, ...})
                - pattern-not: openai.$ANY.create({... signal: $S, ...})
          YAML_RULES
      - name: Run AI high-signal rules
        continue-on-error: true
        run: |
          semgrep scan --config .semgrep/ai --exclude .git --exclude node_modules --exclude dist --exclude build --exclude .venv --exclude venv --sarif --output ai_security.sarif . || true
          semgrep scan --config .semgrep/ai --exclude .git --exclude node_modules --exclude dist --exclude build --exclude .venv --exclude venv --json --output ai_security.json . || true
          test -s ai_security.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Semgrep","rules":[]}},"results":[]}]}' > ai_security.sarif
          test -s ai_security.json || echo '{"results":[]}' > ai_security.json
      - name: Upload AI SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ai_security.sarif
          category: ai-code-security
      - name: Upload AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-security-results
          path: |
            ai_security.sarif
            ai_security.json
          retention-days: 30

  secrets:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks through Docker
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 0 \
            --no-banner || true
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks.json \
            --exit-code 0 \
            --no-banner || true
          test -s gitleaks.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Gitleaks","rules":[]}},"results":[]}]}' > gitleaks.sarif
          test -s gitleaks.json || echo '[]' > gitleaks.json
      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - name: Upload Gitleaks artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: |
            gitleaks.sarif
            gitleaks.json
          retention-days: 30

  sca:
    name: "SCA — pip-audit, npm audit, Trivy fs"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Python dependency audit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          if ls requirements*.txt >/dev/null 2>&1; then
            for f in requirements*.txt; do
              pip-audit -r "$f" --format sarif --output "pip_audit_${f}.sarif" --progress-spinner off || true
              pip-audit -r "$f" --format json --output "pip_audit_${f}.json" --progress-spinner off || true
            done
          else
            pip-audit --format sarif --output pip_audit_environment.sarif --progress-spinner off || true
            pip-audit --format json --output pip_audit_environment.json --progress-spinner off || true
          fi
          python3 - <<'PY'
          import pathlib, json
          for p in pathlib.Path('.').glob('pip_audit_*.sarif'):
              if not p.stat().st_size:
                  p.write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}', encoding='utf-8')
          if not list(pathlib.Path('.').glob('pip_audit_*.sarif')):
              pathlib.Path('pip_audit_empty.sarif').write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}', encoding='utf-8')
          PY
      - name: Node dependency audit
        continue-on-error: true
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm audit --audit-level=moderate --json > npm_audit.json || true
          else
            echo '{"metadata":{"note":"No package-lock.json or npm-shrinkwrap.json found; npm audit skipped to avoid noisy/invalid results."},"vulnerabilities":{}}' > npm_audit.json
          fi
          python3 - <<'PY'
          import json, pathlib
          p=pathlib.Path('npm_audit.json')
          try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '{}')
          except Exception: data={}
          rules={}; results=[]
          vulns=data.get('vulnerabilities', {}) if isinstance(data, dict) else {}
          level_map={'critical':'error','high':'error','moderate':'warning','medium':'warning','low':'note','info':'note'}
          for name,v in vulns.items():
              sev=str(v.get('severity','unknown')).lower(); via=v.get('via',[])
              rid='npm-audit-'+name
              msg=f"{name}: severity={sev}; via={via}"
              rules[rid]={'id':rid,'name':rid,'shortDescription':{'text':rid},'fullDescription':{'text':msg},'defaultConfiguration':{'level':level_map.get(sev,'warning')}}
              results.append({'ruleId':rid,'level':level_map.get(sev,'warning'),'message':{'text':msg},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'package-lock.json'}}}]})
          sarif={'version':'2.1.0','runs':[{'tool':{'driver':{'name':'npm audit','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('npm_audit.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
          PY
      - name: Trivy filesystem scan through Docker
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.53.0 fs /repo \
            --scanners vuln,secret,misconfig,license \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output /repo/trivy_fs.sarif || true
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.53.0 fs /repo \
            --scanners vuln,secret,misconfig,license \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output /repo/trivy_fs.json || true
          test -s trivy_fs.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy FS","rules":[]}},"results":[]}]}' > trivy_fs.sarif
          test -s trivy_fs.json || echo '{}' > trivy_fs.json
      - name: Upload SCA SARIF files
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy_fs.sarif
          category: trivy-fs
      - name: Upload npm audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: npm_audit.sarif
          category: npm-audit
      - name: Upload first pip-audit SARIF
        if: always()
        continue-on-error: true
        run: |
          first="$(ls pip_audit_*.sarif 2>/dev/null | head -n 1 || true)"
          cp "${first:-/dev/null}" pip_audit_upload.sarif 2>/dev/null || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit_upload.sarif
      - name: Upload pip-audit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: pip_audit_upload.sarif
          category: pip-audit
      - name: Upload SCA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-results
          path: |
            pip_audit_*.sarif
            pip_audit_*.json
            npm_audit.json
            npm_audit.sarif
            trivy_fs.sarif
            trivy_fs.json
          retention-days: 30

  iac-checkov:
    name: "IaC — Checkov full framework scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Checkov with full potential, quiet high-signal
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" bridgecrew/checkov:3.2.458 \
            -d /repo \
            --framework all \
            --quiet \
            --compact \
            --skip-path /repo/.git \
            --skip-path /repo/node_modules \
            --skip-path /repo/dist \
            --skip-path /repo/build \
            --skip-path /repo/.venv \
            --skip-path /repo/venv \
            --download-external-modules false \
            --soft-fail \
            -o sarif --output-file-path /repo/checkov.sarif \
            -o json --output-file-path /repo/checkov.json || true
          python3 - <<'PY'
          import pathlib, shutil, json, os
          def fix(path, empty):
              p=pathlib.Path(path)
              if p.is_dir():
                  candidates=list(p.rglob('*.sarif')) if path.endswith('.sarif') else list(p.rglob('*.json'))
                  if candidates:
                      shutil.copyfile(candidates[0], p.with_suffix(p.suffix+'.tmp'))
                      shutil.rmtree(p)
                      p.with_suffix(p.suffix+'.tmp').rename(p)
                  else:
                      shutil.rmtree(p)
                      p.write_text(empty, encoding='utf-8')
              elif (not p.exists()) or p.stat().st_size == 0:
                  p.write_text(empty, encoding='utf-8')
          fix('checkov.sarif', '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}')
          fix('checkov.json', '{}')
          PY
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: checkov.sarif
          category: checkov-full-iac
      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-full-results
          path: |
            checkov.sarif
            checkov.json
          retention-days: 30

  docker-security:
    name: "Docker — Hadolint, Checkov Dockerfile, Trivy image, Dockle"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Discover Dockerfiles
        run: |
          find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -not -path './build/*' \
            > dockerfiles.txt
          cat dockerfiles.txt
      - name: Hadolint Dockerfile scan
        continue-on-error: true
        run: |
          echo '[]' > hadolint.json
          if [ -s dockerfiles.txt ]; then
            : > hadolint_all.txt
            while IFS= read -r df; do
              docker run --rm -i hadolint/hadolint:v2.12.0 hadolint --failure-threshold error - < "$df" >> hadolint_all.txt || true
            done < dockerfiles.txt
          else
            echo "No Dockerfile found" > hadolint_all.txt
          fi
          python3 - <<'PY'
          import json, pathlib
          txt=pathlib.Path('hadolint_all.txt').read_text(encoding='utf-8', errors='ignore') if pathlib.Path('hadolint_all.txt').exists() else ''
          results=[]; rules={}
          for i,line in enumerate(txt.splitlines(),1):
              if not line.strip() or 'No Dockerfile found' in line: continue
              rid='Hadolint'
              rules[rid]={'id':rid,'name':rid,'shortDescription':{'text':'Hadolint Dockerfile issue'},'defaultConfiguration':{'level':'warning'}}
              results.append({'ruleId':rid,'level':'warning','message':{'text':line},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'Dockerfile'},'region':{'startLine':1}}}]})
          sarif={'version':'2.1.0','runs':[{'tool':{'driver':{'name':'Hadolint','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('hadolint.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
          PY
      - name: Checkov Dockerfile focused scan
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" bridgecrew/checkov:3.2.458 \
            -d /repo \
            --framework dockerfile \
            --quiet \
            --compact \
            --soft-fail \
            -o sarif --output-file-path /repo/checkov_docker.sarif \
            -o json --output-file-path /repo/checkov_docker.json || true
          python3 - <<'PY'
          import pathlib, shutil
          def fix(path, empty):
              p=pathlib.Path(path)
              if p.is_dir():
                  candidates=list(p.rglob('*.sarif')) if path.endswith('.sarif') else list(p.rglob('*.json'))
                  if candidates:
                      tmp=p.with_name(p.name+'.tmp')
                      shutil.copyfile(candidates[0], tmp)
                      shutil.rmtree(p)
                      tmp.rename(p)
                  else:
                      shutil.rmtree(p); p.write_text(empty, encoding='utf-8')
              elif not p.exists() or p.stat().st_size == 0:
                  p.write_text(empty, encoding='utf-8')
          fix('checkov_docker.sarif', '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov Docker","rules":[]}},"results":[]}]}')
          fix('checkov_docker.json', '{}')
          PY
      - name: Build Docker images for image scanners
        continue-on-error: true
        run: |
          : > docker_images.txt
          if [ -s dockerfiles.txt ]; then
            n=0
            while IFS= read -r df; do
              n=$((n+1))
              context="$(dirname "$df")"
              image="local/security-scan:${n}"
              docker build -f "$df" -t "$image" "$context" && echo "$image" >> docker_images.txt || true
            done < dockerfiles.txt
          fi
          cat docker_images.txt
      - name: Trivy image scan without trivy-action
        continue-on-error: true
        run: |
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image.sarif
          echo '{}' > trivy_image.json
          if [ -s docker_images.txt ]; then
            first="$(head -n 1 docker_images.txt)"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:0.53.0 image "$first" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format sarif \
              --output /repo/trivy_image.sarif || true
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" aquasec/trivy:0.53.0 image "$first" \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --format json \
              --output /repo/trivy_image.json || true
          fi
      - name: Dockle image scan, fatal/warn only
        continue-on-error: true
        run: |
          echo '[]' > dockle.json
          if [ -s docker_images.txt ]; then
            first="$(head -n 1 docker_images.txt)"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" goodwithtech/dockle:v0.4.15 \
              --exit-code 0 \
              --exit-level WARN \
              --format json \
              --output /repo/dockle.json \
              "$first" || true
          fi
          python3 - <<'PY'
          import json, pathlib
          p=pathlib.Path('dockle.json')
          try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore') or '[]')
          except Exception: data=[]
          details=[]
          if isinstance(data, dict): details=data.get('details') or data.get('summary') or []
          elif isinstance(data, list): details=data
          rules={}; results=[]
          for i,item in enumerate(details,1):
              if not isinstance(item, dict): continue
              level=str(item.get('level') or item.get('Level') or '').upper()
              if level not in {'FATAL','WARN'}: continue
              code=item.get('code') or item.get('Code') or 'DOCKLE'
              msg=item.get('title') or item.get('Title') or item.get('alerts') or str(item)
              sarif_level='error' if level=='FATAL' else 'warning'
              rules[code]={'id':code,'name':code,'shortDescription':{'text':str(msg)},'defaultConfiguration':{'level':sarif_level}}
              results.append({'ruleId':code,'level':sarif_level,'message':{'text':str(msg)},'locations':[{'physicalLocation':{'artifactLocation':{'uri':'Docker image'}}}]})
          sarif={'version':'2.1.0','runs':[{'tool':{'driver':{'name':'Dockle','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('dockle.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
          PY
      - name: Ensure Docker artifacts exist
        if: always()
        run: |
          test -f dockerfiles.txt || touch dockerfiles.txt
          test -f docker_images.txt || touch docker_images.txt
          [ ! -d checkov_docker.sarif ] || rm -rf checkov_docker.sarif
          [ ! -d checkov_docker.json ] || rm -rf checkov_docker.json
          test -s hadolint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          test -s checkov_docker.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov Docker","rules":[]}},"results":[]}]}' > checkov_docker.sarif
          test -s checkov_docker.json || echo '{}' > checkov_docker.json
          test -s trivy_image.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Trivy Image","rules":[]}},"results":[]}]}' > trivy_image.sarif
          test -s dockle.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dockle","rules":[]}},"results":[]}]}' > dockle.sarif
      - name: Upload Docker SARIF files
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: checkov_docker.sarif
          category: checkov-docker
      - name: Upload Hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: hadolint.sarif
          category: hadolint
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy_image.sarif
          category: trivy-image
      - name: Upload Dockle SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: dockle.sarif
          category: dockle
      - name: Upload Docker artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            dockerfiles.txt
            docker_images.txt
            hadolint.sarif
            hadolint_all.txt
            checkov_docker.sarif
            checkov_docker.json
            trivy_image.sarif
            trivy_image.json
            dockle.sarif
            dockle.json
          retention-days: 30

  dast-zap:
    name: "DAST — OWASP ZAP Baseline optional"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_dast == 'true'
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run ZAP only if DAST_TARGET_URL exists
        continue-on-error: true
        env:
          TARGET: ${{ secrets.DAST_TARGET_URL }}
        run: |
          if [ -z "$TARGET" ]; then
            echo '{"site":[]}' > zap_report.json
            echo '<html><body>ZAP skipped: DAST_TARGET_URL not configured.</body></html>' > zap_report.html
            exit 0
          fi
          docker run --rm -v "$PWD:/zap/wrk/:rw" https://urldefense.com/v3/__http://ghcr.io/zaproxy/zaproxy:stable__;!!P110LumUDw!8la8Nj3ZFldE_WSpFIaKlcvjjVtRg1xu1YrC5dXYmUN6c7-EYKX9Go4HMp3V1zfl_xE2sAqi2bhFTC64SQepr-N7P2HeRA$  https://urldefense.com/v3/__http://zap-baseline.py__;!!P110LumUDw!8la8Nj3ZFldE_WSpFIaKlcvjjVtRg1xu1YrC5dXYmUN6c7-EYKX9Go4HMp3V1zfl_xE2sAqi2bhFTC64SQepr-MhUbkMMQ$  \
            -t "$TARGET" \
            -J zap_report.json \
            -r zap_report.html \
            -I || true
      - name: Convert ZAP JSON to SARIF
        if: always()
        run: |
          python3 - <<'PY'
          import json, pathlib, re
          src=pathlib.Path('zap_report.json')
          if not src.exists(): src.write_text('{"site":[]}', encoding='utf-8')
          try: data=json.loads(src.read_text(encoding='utf-8', errors='ignore'))
          except Exception: data={'site':[]}
          def clean(x): return re.sub(r'\s+',' ', re.sub(r'<[^>]+>',' ', str(x or ''))).strip()
          rules={}; results=[]; level_map={'3':'error','2':'warning','1':'note','0':'note'}
          for site in data.get('site',[]):
              for a in site.get('alerts',[]):
                  rid='ZAP-'+str(a.get('pluginid','unknown'))
                  level=level_map.get(str(a.get('riskcode','1')),'note')
                  name=clean(a.get('alert','ZAP alert'))
                  rules[rid]={'id':rid,'name':name,'shortDescription':{'text':name},'fullDescription':{'text':clean(a.get('desc',''))},'defaultConfiguration':{'level':level}}
                  for inst in a.get('instances') or [{}]:
                      uri=inst.get('uri') or site.get('@name') or 'unknown'
                      results.append({'ruleId':rid,'level':level,'message':{'text':name+' | '+uri},'locations':[{'physicalLocation':{'artifactLocation':{'uri':uri}}}]})
          sarif={'version':'2.1.0','runs':[{'tool':{'driver':{'name':'OWASP ZAP','rules':list(rules.values())}},'results':results}]}
          pathlib.Path('zap.sarif').write_text(json.dumps(sarif, indent=2), encoding='utf-8')
          PY
      - name: Upload ZAP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: zap.sarif
          category: zap-dast
      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-results
          path: |
            zap_report.json
            zap_report.html
            zap.sarif
          retention-days: 30

  centralized-report:
    name: "Security Report — centralized non-blocking verdict"
    runs-on: ubuntu-latest
    needs:
      - codeql
      - semgrep-security
      - ai-code-security
      - secrets
      - sca
      - iac-checkov
      - docker-security
      - dast-zap
    if: always()
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: all_scan_results
      - name: Generate centralized report
        run: |
          mkdir -p security_reports
          python3 - <<'PY'
          import json, pathlib
          from html import escape
          root=pathlib.Path('all_scan_results')
          out=pathlib.Path('security_reports'); out.mkdir(exist_ok=True)
          order=['critical','high','medium','low','info','unknown']
          grouped={x:[] for x in order}
          def norm(v):
              v=str(v or '').lower()
              return {'error':'high','warning':'medium','note':'low','none':'info','critical':'critical','high':'high','medium':'medium','moderate':'medium','low':'low','info':'info','informational':'info'}.get(v,'unknown')
          def add(tool, sev, rule, msg, file='', line=''):
              s=norm(sev)
              grouped[s].append({'tool':str(tool or 'Unknown'),'severity':s,'rule':str(rule or 'unknown'),'message':str(msg or '').strip(),'file':str(file or ''),'line':str(line or '')})
          def parse_sarif(p):
              try: data=json.loads(p.read_text(encoding='utf-8', errors='ignore'))
              except Exception: return
              for run in data.get('runs',[]):
                  tool=run.get('tool',{}).get('driver',{}).get('name',p.stem)
                  rules={r.get('id','unknown'):r.get('defaultConfiguration',{}).get('level','') for r in run.get('tool',{}).get('driver',{}).get('rules',[])}
                  for res in run.get('results',[]):
                      rid=res.get('ruleId','unknown')
                      level=res.get('level') or rules.get(rid) or 'unknown'
                      msg=res.get('message',{}).get('text','')
                      file=''; line=''
                      locs=res.get('locations') or []
                      if locs:
                          phys=locs[0].get('physicalLocation',{})
                          file=phys.get('artifactLocation',{}).get('uri','')
                          line=phys.get('region',{}).get('startLine','')
                      add(tool,level,rid,msg,file,line)
          for p in root.rglob('*.sarif'):
              parse_sarif(p)
          counts={s:len(grouped[s]) for s in order}
          total=sum(counts.values())
          names={'critical':'Críticos','high':'Altos','medium':'Medios','low':'Bajos','info':'Informativos','unknown':'Desconocidos'}
          lines=['REPORTE CENTRALIZADO DE SEGURIDAD','='*80,'',f'Total: {total}',f'Críticos: {counts["critical"]}',f'Altos: {counts["high"]}',f'Medios: {counts["medium"]}',f'Bajos: {counts["low"]}',f'Informativos: {counts["info"]}',f'Desconocidos: {counts["unknown"]}','']
          for sev in order:
              lines += ['', f'HALLAZGOS {names[sev].upper()} ({counts[sev]})', '-'*80]
              if not grouped[sev]: lines.append('Sin hallazgos.')
              for i,item in enumerate(grouped[sev],1):
                  lines += [f'{i}. Herramienta : {item["tool"]}', f'   Regla       : {item["rule"]}', f'   Archivo     : {item["file"]}', f'   Línea       : {item["line"]}', f'   Descripción : {item["message"]}', '']
          (out/'security_report_es.txt').write_text('\n'.join(lines), encoding='utf-8')
          (out/'security_report_es.json').write_text(json.dumps({'summary':counts,'total':total,'findings':grouped}, indent=2, ensure_ascii=False), encoding='utf-8')
          html=['<!doctype html><html><head><meta charset="utf-8"><title>Security Report</title><style>body{font-family:Arial;margin:24px}table{border-collapse:collapse;width:100%;margin-bottom:28px}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#f5f5f5}</style></head><body><h1>Reporte centralizado de seguridad</h1><ul>']
          for sev in order: html.append(f'<li>{escape(names[sev])}: {counts[sev]}</li>')
          html.append('</ul>')
          for sev in order:
              html.append(f'<h2>{escape(names[sev])} ({counts[sev]})</h2><table><tr><th>Tool</th><th>Rule</th><th>File</th><th>Line</th><th>Message</th></tr>')
              for item in grouped[sev]: html.append(f'<tr><td>{escape(item["tool"])}</td><td>{escape(item["rule"])}</td><td>{escape(item["file"])}</td><td>{escape(item["line"])}</td><td>{escape(item["message"])}</td></tr>')
              html.append('</table>')
          html.append('</body></html>')
          (out/'security_report_es.html').write_text('\n'.join(html), encoding='utf-8')
          print('\n'.join(lines))
          PY
      - name: Add summary
        if: always()
        run: |
          echo '## Reporte centralizado de seguridad' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat security_reports/security_report_es.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: centralized-security-report
          path: security_reports
          retention-days: 30
      - name: Final verdict
        run: |
          python3 - <<'PY'
          import json, os, sys
          data=json.load(open('security_reports/security_report_es.json', encoding='utf-8'))
          summary=data.get('summary',{})
          threshold=os.environ.get('FAIL_ON','never').lower()
          if threshold == 'never':
              print('Configured as non-blocking: never fail.')
              sys.exit(0)
          order={'critical':5,'high':4,'medium':3,'low':2,'info':1,'unknown':0}
          blocking=sum(int(c) for sev,c in summary.items() if order.get(sev,0) >= order.get(threshold,99))
          if blocking:
              print(f'Failing because {blocking} findings are at or above {threshold}.')
              sys.exit(1)
          print('Passed threshold.')
          PY
