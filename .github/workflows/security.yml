                          add(py, line, sev, "AI_DOCUMENT_LOADER_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", f"Loader de documento {cname} detectado. Validar origen, tipo, tamaÃ±o, sandboxing y prompt injection desde documentos.", src, "MEDIUM", "Si el documento es fijo y confiable, puede quedar como riesgo contextual.")

