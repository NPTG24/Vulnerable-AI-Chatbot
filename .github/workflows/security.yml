          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://urldefense.com/v3/__https://aquasecurity.github.io/trivy-repo/deb__;!!P110LumUDw!6JwmZwQ1WcCu9JVcooxlmJ4kHn51hbGxWtk7l3B-7QoMUssJesndmc5oSAgRIj5j14fA4l0EjIKn19HORKVjJ6r6f6HXpg$  generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
