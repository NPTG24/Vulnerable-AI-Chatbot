                              parent_func = None
                              for fname, fnode in function_defs.items():
                                  if fnode.lineno <= line <= getattr(fnode, "end_lineno", line):
                                      parent_func = fname
                                      break
                              sev = "MEDIUM" if parent_func in route_functions else "LOW"
                              add(py, line, sev, "WEB_ROUTE_LONG_SLEEP_DOS", "Código aplicativo", f"time.sleep({seconds}) detectado en función {parent_func or '?'}; si está en ruta HTTP puede bloquear workers y causar DoS.", source_line(lines, line))

