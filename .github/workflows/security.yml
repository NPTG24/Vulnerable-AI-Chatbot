  centralized-report:
    name: "Report - Centralized Security Summary"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - code-ai-static
      - ruff
      - codeql
      - semgrep
      - ai-security
      - sca
      - secret-scan
      - docker-security
      - iac-checkov
    if: always()
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results
      - name: Build centralized report
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path("all_scan_results")
          outdir = pathlib.Path("central-security-report")
          outdir.mkdir(exist_ok=True)
          findings = []
          quality = []
          tool_status = []

          def norm(sev):
              sev = str(sev or "UNKNOWN").upper()
              return {"ERROR": "HIGH", "WARNING": "MEDIUM", "WARN": "MEDIUM", "NOTE": "LOW", "STYLE": "LOW"}.get(sev, sev)

          def add(cat, sev, tool, loc, detail, rule="", source="", fp_note=""):
              findings.append({"category": cat, "severity": norm(sev), "tool": tool, "location": loc or "?:?", "detail": str(detail or "").replace("\n", " ")[:3000], "rule": rule or "", "source": source or "", "fp_note": fp_note or ""})

          def load_all(name):
              matched = False
              for path in root.rglob(name):
                  matched = True
                  try:
                      text = path.read_text(encoding="utf-8", errors="ignore").strip()
                      if text:
                          yield path, json.loads(text)
                  except Exception as error:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", f"{path}:1", f"No se pudo leer JSON: {error}", "PARSER_ERROR", str(path))
              if not matched:
                  tool_status.append({"artifact": name, "status": "missing"})

          for path, data in load_all("ai_app_static_findings.json"):
              count = 0
              for item in data.get("findings", []):
                  count += 1
                  add(item.get("category", "AI / LLM / Agentic"), item.get("severity", "UNKNOWN"), item.get("tool", "AI/App Static Analyzer"), f"{item.get('file','?')}:{item.get('line','?')}", item.get("message", ""), item.get("rule", ""), str(path), item.get("fp_note", ""))
              tool_status.append({"artifact": str(path), "tool": "AI/App Static Analyzer", "findings": count})

          for path, data in load_all("semgrep_ai.json"):
              count = 0
              for item in data.get("results", []):
                  count += 1
                  extra = item.get("extra", {})
                  add("AI / LLM / Agentic", extra.get("severity", "UNKNOWN"), "Semgrep AI", f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}", extra.get("message", ""), item.get("check_id", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "Semgrep AI", "findings": count})

          for path, data in load_all("semgrep.json"):
              count = 0
              for item in data.get("results", []):
                  count += 1
                  extra = item.get("extra", {})
                  add("Codigo aplicativo", extra.get("severity", "UNKNOWN"), "Semgrep OSS", f"{item.get('path','?')}:{item.get('start',{}).get('line','?')}", extra.get("message", ""), item.get("check_id", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "Semgrep OSS", "findings": count})

          for path, data in load_all("codeql_findings.json"):
              count = 0
              for item in data.get("findings", []):
                  count += 1
                  add(item.get("category", "Codigo aplicativo"), item.get("severity", "UNKNOWN"), item.get("tool", "CodeQL"), item.get("location", "?:?"), item.get("message", ""), item.get("rule", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "CodeQL", "findings": count})

          for path, data in load_all("dependency_policy_findings.json"):
              count = 0
              for item in data.get("findings", []):
                  count += 1
                  add(item.get("category", "Dependencias / Policy"), item.get("severity", "UNKNOWN"), "Dependency Policy", f"{item.get('file','?')}:{item.get('line','?')}", item.get("message", ""), item.get("rule", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "Dependency Policy", "findings": count})

          for path, data in load_all("pip_audit_osv.json"):
              count = 0
              deps = data.get("dependencies", []) if isinstance(data, dict) else []
              for dep in deps:
                  for vuln in dep.get("vulns", []) or []:
                      count += 1
                      add("Dependencias / SCA", vuln.get("severity", "HIGH"), "pip-audit", f"{dep.get('name','?')}:?", f"{dep.get('name','?')} {dep.get('version','')}: {vuln.get('id','')} - {vuln.get('description','')}", vuln.get("id", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "pip-audit", "findings": count})

          for path, data in load_all("trivy_results.json"):
              count = 0
              for result in data.get("Results", []) if isinstance(data, dict) else []:
                  target = result.get("Target", "?")
                  for vuln in result.get("Vulnerabilities", []) or []:
                      count += 1
                      add("Dependencias / SCA", vuln.get("Severity", "UNKNOWN"), "Trivy", f"{target}:?", f"{vuln.get('PkgName','')} {vuln.get('InstalledVersion','')} - {vuln.get('VulnerabilityID','')} - {vuln.get('Title','')}", vuln.get("VulnerabilityID", ""), str(path))
                  for secret in result.get("Secrets", []) or []:
                      count += 1
                      add("Secretos", secret.get("Severity", "HIGH"), "Trivy", f"{target}:?", secret.get("Title", "Possible secret"), secret.get("RuleID", ""), str(path))
                  for misconf in result.get("Misconfigurations", []) or []:
                      count += 1
                      cat = "Docker / Contenedores" if "dockerfile" in str(target).lower() else "IaC / Cloud / Config"
                      add(cat, misconf.get("Severity", "UNKNOWN"), "Trivy", f"{target}:?", f"{misconf.get('ID','')} - {misconf.get('Title','')}", misconf.get("ID", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "Trivy", "findings": count})

          for path, data in load_all("gitleaks_report.json"):
              count = 0
              if isinstance(data, list):
                  for item in data:
                      count += 1
                      add("Secretos", "HIGH", "Gitleaks", f"{item.get('File','?')}:{item.get('StartLine','?')}", item.get("Description", "Possible exposed secret"), item.get("RuleID", ""), str(path))
              tool_status.append({"artifact": str(path), "tool": "Gitleaks", "findings": count})

          for path, data in load_all("checkov_results.json"):
              count = 0
              reports = data if isinstance(data, list) else [data]
              for report in reports:
                  if not isinstance(report, dict):
                      continue
                  failed = report.get("results", {}).get("failed_checks", []) if isinstance(report.get("results", {}), dict) else []
                  for check in failed:
                      count += 1
                      fp = check.get("file_path", "?")
                      cat = "Docker / Contenedores" if "dockerfile" in str(fp).lower() else "IaC / Cloud / Config"
                      lr = check.get("file_line_range") or ["?"]
                      add(cat, "HIGH", "Checkov", f"{fp}:{lr[0]}", check.get("check_name", ""), check.get("check_id", ""), str(path), "Muchos checks Checkov son hardening; validar contexto antes de tratarlos como vulnerabilidad explotable.")
              tool_status.append({"artifact": str(path), "tool": "Checkov", "findings": count})

          for path, data in load_all("hadolint_results.json"):
              count = 0
              if isinstance(data, list):
                  for item in data:
                      count += 1
                      add("Docker / Contenedores", item.get("level", "warning"), "Hadolint", f"{item.get('file', item.get('filename','Dockerfile'))}:{item.get('line', item.get('lineNumber','?'))}", item.get("message", item.get("description", "")), item.get("code", ""), str(path), "Hadolint suele ser hardening/calidad Docker; priorizar segun exposicion.")
              tool_status.append({"artifact": str(path), "tool": "Hadolint", "findings": count})

          for path, data in load_all("ruff_dev_quality_findings.json"):
              count = 0
              for item in data.get("findings", []) if isinstance(data, dict) else []:
                  count += 1
                  quality.append(item)
              tool_status.append({"artifact": str(path), "tool": "Ruff", "findings": count, "type": "quality"})

          cats = sorted(set([item["category"] for item in findings]) | {"AI / LLM / Agentic", "Codigo aplicativo", "Dependencias / SCA", "Dependencias / Policy", "Secretos", "Docker / Contenedores", "IaC / Cloud / Config", "Pipeline / Parser"})
          sevs = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO", "UNKNOWN"]
          table = {cat: {sev: 0 for sev in sevs} for cat in cats}
          for item in findings:
              sev = item["severity"] if item["severity"] in sevs else "UNKNOWN"
              table[item["category"]][sev] += 1

          order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "INFO": 4, "UNKNOWN": 5}
          findings.sort(key=lambda item: (order.get(item["severity"], 99), item["category"], item["tool"], item["location"]))

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("=" * 90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-" * 90)
          lines.append(f"Hallazgos totales             : {len(findings)}")
          lines.append(f"Criticas + Altas              : {len([item for item in findings if item['severity'] in {'CRITICAL','HIGH'}])}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("ESTADO POR HERRAMIENTA / ARTEFACTO")
          lines.append("-" * 90)
          for st in tool_status:
              lines.append(f"- {st.get('tool', st.get('artifact'))}: {st.get('findings', st.get('status'))} | {st.get('artifact','')}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORIA")
          lines.append("-" * 90)
          lines.append(f"{'Categoria':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")
          for cat in cats:
              lines.append(f"{cat:35} {table[cat]['CRITICAL']:>8} {table[cat]['HIGH']:>5} {table[cat]['MEDIUM']:>7} {table[cat]['LOW']:>5} {table[cat]['INFO']:>5} {table[cat]['UNKNOWN']:>8}")
          lines.append("")
          lines.append("TODOS LOS HALLAZGOS ORDENADOS POR CRITICIDAD")
          lines.append("=" * 90)
          if not findings:
              lines.append("Sin hallazgos.")
          else:
              for i, item in enumerate(findings, 1):
                  lines.append("")
                  lines.append(f"{i}. [{item['severity']}] [{item['category']}] {item['rule']}")
                  lines.append(f"   Herramienta : {item['tool']}")
                  lines.append(f"   Linea/Error : {item['location']}")
                  lines.append(f"   Detalle     : {item['detail']}")
                  if item.get("fp_note"):
                      lines.append(f"   Nota FP     : {item['fp_note']}")
                  lines.append(f"   Fuente      : {item['source']}")

          lines.append("")
          lines.append("CALIDAD DE DESARROLLO / RUFF")
          lines.append("=" * 90)
          if not quality:
              lines.append("Sin hallazgos.")
          else:
              for i, item in enumerate(quality, 1):
                  lines.append("")
                  lines.append(f"{i}. {item.get('code','?')}")
                  lines.append(f"   Linea/Error : {item.get('filename','?')}:{item.get('location',{}).get('row','?')}")
                  lines.append(f"   Detalle     : {item.get('message','')}")

          (outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt").write_text("\n".join(lines), encoding="utf-8")
          (outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.json").write_text(json.dumps({"findings": findings, "quality": quality, "tool_status": tool_status}, indent=2, ensure_ascii=False), encoding="utf-8")
          print((outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt").read_text(encoding="utf-8"))
          PY
      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-security-report
          path: central-security-report
          retention-days: 30
