name: Security Pipeline

# ==============================================================================
# SECURITY PIPELINE — REPORT ONLY / HIGH SIGNAL / LOW FALSE POSITIVES
# ==============================================================================
#
# Objetivo:
# - No bloquear nada por ahora.
# - Generar reporte final centralizado con resumen.
# - Mantener foco en hallazgos reales: dependencias, secretos, CodeQL, Docker,
#   IaC, SCA, AI/agentic code y Endor Labs opcional.
#
# Guardar como:
# .github/workflows/security.yml
#
# Secrets opcionales:
# - DAST_TARGET_URL
# - ENDOR_NAMESPACE
# - ENDOR_API_CREDENTIALS_KEY
# - ENDOR_API_CREDENTIALS_SECRET
#
# ==============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      run_endor:
        description: "Run Endor Labs scan if secrets are configured"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  TRIVY_SEVERITY: "HIGH,CRITICAL"

jobs:
  dependency-review:
    name: "SCA — Dependency Review PR"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: true

      - name: Dependency Review metadata
        if: always()
        run: |
          mkdir -p dependency_review
          echo '{"tool":"Dependency Review","status":"executed_or_attempted","mode":"report_only"}' > dependency_review/metadata.json

      - name: Upload Dependency Review metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-review-results
          path: dependency_review/
          retention-days: 30

  dependency-policy:
    name: "Policy — Dependency Pinning"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency pinning and generate SARIF
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re, tomllib

          findings = []
          SKIP_DIRS = {".git",".github","node_modules",".venv","venv","env","dist","build","coverage","__pycache__",".tox"}

          def skip_path(p):
              return any(x in SKIP_DIRS for x in str(p).replace("\\","/").split("/"))

          def add(sev, rule, file, line, msg):
              findings.append({"tool":"Dependency Policy","severity":sev,"rule":rule,"file":str(file),"line":int(line or 1),"message":msg})

          def level(sev):
              sev = str(sev).lower()
              return "error" if sev in {"critical","high"} else "warning" if sev == "medium" else "note"

          req_skip = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          req_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")

          for req in sorted(pathlib.Path(".").glob("**/requirements*.txt")):
              if skip_path(req): continue
              for n, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if req_skip.match(line): continue
                  clean = line.split(" #",1)[0].strip()
                  if "\\" in clean: clean = clean.split("\\",1)[0].strip()
                  if not req_exact.match(clean):
                      add("medium","PYTHON_UNPINNED_DEPENDENCY",req,n,f"Dependencia Python sin pin exacto ==: {line}")

          pep508_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+).*$")

          for pyproject in sorted(pathlib.Path(".").glob("**/pyproject.toml")):
              if skip_path(pyproject): continue
              has_lock = any(pyproject.with_name(x).exists() for x in ["poetry.lock","pdm.lock","uv.lock"])
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              deps = []
              project = data.get("project", {}) if isinstance(data, dict) else {}
              if isinstance(project.get("dependencies"), list):
                  deps.extend(project["dependencies"])
              optional = project.get("optional-dependencies", {})
              if isinstance(optional, dict):
                  for values in optional.values():
                      if isinstance(values, list): deps.extend(values)

              for dep in deps:
                  dep = str(dep)
                  if dep.strip().startswith(("git+","file:","http://","https://")):
                      add("info","PYPROJECT_EXTERNAL_DEPENDENCY",pyproject,1,f"Dependencia externa no validada por pinning: {dep}")
                  elif not pep508_exact.match(dep):
                      add("info" if has_lock else "medium","PYPROJECT_NON_EXACT_DEPENDENCY",pyproject,1,f"Dependencia pyproject sin versión exacta ==: {dep}")

              poetry = data.get("tool", {}).get("poetry", {}).get("dependencies", {}) if isinstance(data, dict) else {}
              if isinstance(poetry, dict):
                  for name, spec in poetry.items():
                      if str(name).lower() == "python": continue
                      version = spec if isinstance(spec, str) else spec.get("version","") if isinstance(spec, dict) else ""
                      if str(version).startswith(("git+","file:","http://","https://")):
                          add("info","POETRY_EXTERNAL_DEPENDENCY",pyproject,1,f"Dependencia Poetry externa: {name} {version}")
                      elif not str(version).startswith("=="):
                          add("info" if has_lock else "medium","POETRY_NON_EXACT_DEPENDENCY",pyproject,1,f"Dependencia Poetry sin versión exacta ==: {name} {version}")

          npm_exact = re.compile(r"^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$")
          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip_path(package_json): continue
              has_lock = any(package_json.with_name(x).exists() for x in ["package-lock.json","yarn.lock","pnpm-lock.yaml"])
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue

              for section in ["dependencies","devDependencies","peerDependencies","optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict): continue
                  for name, version in deps.items():
                      version = str(version).strip()
                      if version.startswith(("file:","git+","github:","workspace:","link:")):
                          add("info","NPM_LOCAL_OR_WORKSPACE_DEPENDENCY",package_json,1,f"Dependencia npm local/workspace: {name}@{version}")
                      elif not npm_exact.match(version):
                          add("info" if has_lock else "medium","NPM_NON_EXACT_DEPENDENCY",package_json,1,f"Dependencia npm sin versión exacta: {name}@{version}")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool":"Dependency Policy","findings":findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules, results = {}, []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id":rid,"name":rid,"shortDescription":{"text":rid},"fullDescription":{"text":rid},"defaultConfiguration":{"level":level(f["severity"])}})
              results.append({"ruleId":rid,"level":level(f["severity"]),"message":{"text":f["message"]},"locations":[{"physicalLocation":{"artifactLocation":{"uri":f["file"]},"region":{"startLine":f["line"]}}}]})

          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22Dependency__;JSUlJSUlJSUlJSUlJSU!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afVxLmzfSQ$  Policy","informationUri":"https://urldefense.com/v3/__https://docs.github.com/actions*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results__;JSUlJSUlJQ!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afVtjD1aGA$ }]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure artifacts
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  codeql:
    name: "SAST — CodeQL"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4

      - name: Analyze with CodeQL
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

      - name: Upload CodeQL metadata
        if: always()
        run: |
          mkdir -p codeql_metadata
          echo '{"tool":"CodeQL","language":"${{ matrix.language }}","status":"executed_or_attempted"}' > codeql_metadata/codeql_${{ matrix.language }}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-${{ matrix.language }}-metadata
          path: codeql_metadata/
          retention-days: 30

  semgrep-security:
    name: "SAST — Semgrep High-Signal"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        continue-on-error: true
        run: pip install semgrep

      - name: Create high-signal local rules
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/security-high-signal.yml <<'YAML'
          rules:
            - id: python-dangerous-subprocess-shell-true
              languages: [python]
              severity: ERROR
              message: "Uso de subprocess con shell=True. Riesgo de command injection."
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)

            - id: python-dangerous-eval-exec
              languages: [python]
              severity: ERROR
              message: "Uso de eval/exec. Riesgo de ejecución arbitraria."
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: js-dangerous-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "Uso de eval/new Function. Riesgo de ejecución arbitraria."
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: node-dangerous-child-process
              languages: [javascript, typescript]
              severity: ERROR
              message: "Ejecución de comandos con child_process. Revisar input externo y allowlist."
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)
          YAML

      - name: Run Semgrep high-signal
        continue-on-error: true
        run: |
          semgrep scan \
            --config .semgrep/local/security-high-signal.yml \
            --config p/secrets \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --sarif --output semgrep_security.sarif . || true

          semgrep scan \
            --config .semgrep/local/security-high-signal.yml \
            --config p/secrets \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --json --output semgrep_security.json . || true

      - name: Ensure artifacts
        if: always()
        run: |
          test -f semgrep_security.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' > semgrep_security.sarif
          test -f semgrep_security.json || echo '{"results":[]}' > semgrep_security.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_security.sarif
          category: semgrep-security-high-signal

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-security-results
          path: |
            semgrep_security.sarif
            semgrep_security.json
          retention-days: 30

  ai-agentic-security:
    name: "AI Security — Agentic Code Guardrails"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        continue-on-error: true
        run: pip install semgrep

      - name: Create AI/agentic rules
        run: |
          mkdir -p .semgrep/ai-agentic
          cat > .semgrep/ai-agentic/rules.yml <<'YAML'
          rules:
            - id: ai-agent-shell-execution-python
              languages: [python]
              severity: ERROR
              message: "Agentic AI: ejecución de shell/comandos. Requiere allowlist, sanitización y aprobación humana."
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: os.system(...)
                - pattern: os.popen(...)

            - id: ai-agent-shell-execution-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "Agentic AI: ejecución de comandos en Node.js. Requiere allowlist, sanitización y aprobación humana."
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            - id: ai-unsafe-dynamic-code-python
              languages: [python]
              severity: ERROR
              message: "AI/LLM: eval/exec puede convertir salida de modelo o input externo en RCE."
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: ai-unsafe-dynamic-code-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI/LLM: eval/new Function puede convertir salida de modelo o input externo en RCE."
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: ai-system-message-uses-user-controlled-value-python
              languages: [python]
              severity: WARNING
              message: "LLM01: posible input externo dentro de mensaje system/developer."
              patterns:
                - pattern-either:
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(input|user|query|question|request|message|payload|body|content).*

            - id: ai-openai-call-without-basic-limits-python
              languages: [python]
              severity: WARNING
              message: "LLM10: llamada LLM sin señales locales de max_tokens/max_output_tokens/timeout."
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., timeout=$T, ...)

            - id: ai-agent-tools-without-obvious-approval-python
              languages: [python]
              severity: WARNING
              message: "Agentic AI: tools/agente sin señal evidente de allowlist/aprobación humana."
              patterns:
                - pattern-either:
                    - pattern: initialize_agent(..., tools=$TOOLS, ...)
                    - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                    - pattern: Tool(..., func=$FUNC, ...)
                    - pattern: StructuredTool.from_function($FUNC, ...)
                - pattern-not-regex: (?i)(allowlist|whitelist|approval|human|confirm|denylist|permissions)
          YAML

      - name: Run AI/agentic rules
        continue-on-error: true
        run: |
          semgrep scan \
            --config .semgrep/ai-agentic \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --sarif --output semgrep_ai_agentic.sarif . || true

          semgrep scan \
            --config .semgrep/ai-agentic \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --json --output semgrep_ai_agentic.json . || true

      - name: Ensure artifacts
        if: always()
        run: |
          test -f semgrep_ai_agentic.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Agentic Security","rules":[]}},"results":[]}]}' > semgrep_ai_agentic.sarif
          test -f semgrep_ai_agentic.json || echo '{"results":[]}' > semgrep_ai_agentic.json

      - name: Upload AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai_agentic.sarif
          category: ai-agentic-security

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-agentic-security-results
          path: |
            semgrep_ai_agentic.sarif
            semgrep_ai_agentic.json
          retention-days: 30

  endor-labs:
    name: "AI/SCA — Endor Labs"
    runs-on: ubuntu-latest
    if: github.event.inputs.run_endor != 'false'
    permissions:
      contents: read
      id-token: write
      pull-requests: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate Endor Labs secrets
        id: endor_secrets
        env:
          ENDOR_NAMESPACE_VALUE: ${{ secrets.ENDOR_NAMESPACE }}
          ENDOR_API_KEY_VALUE: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_SECRET_VALUE: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
        run: |
          if [ -z "$ENDOR_NAMESPACE_VALUE" ] || [ -z "$ENDOR_API_KEY_VALUE" ] || [ -z "$ENDOR_API_SECRET_VALUE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Endor Labs scan
        if: steps.endor_secrets.outputs.skip != 'true'
        continue-on-error: true
        uses: endorlabs/github-action@v1
        with:
          namespace: ${{ secrets.ENDOR_NAMESPACE }}
          api_key: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          api_secret: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          enable_github_action_token: false
          scan_dependencies: true
          scan_secrets: true
          scan_git_logs: false
          pr: ${{ github.event_name == 'pull_request' }}

      - name: Create Endor metadata
        if: always()
        run: |
          mkdir -p endor_results
          echo '{"tool":"Endor Labs","status":"executed_if_configured","mode":"report_only"}' > endor_results/endor_metadata.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endor-labs-results
          path: endor_results/
          retention-days: 30

  osv-dependencies:
    name: "SCA — OSV Scanner"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV Scanner
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format sarif
            --output osv_results.sarif
            ./

      - name: Ensure OSV artifact exists
        if: always()
        run: |
          test -f osv_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"OSV Scanner","rules":[]}},"results":[]}]}' > osv_results.sarif

      - name: Upload OSV SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv_results.sarif
          category: osv-scanner

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osv-results
          path: osv_results.sarif
          retention-days: 30

  pip-audit:
    name: "SCA — pip-audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Detect Python manifests
        id: python_manifest
        run: |
          if ls requirements*.txt >/dev/null 2>&1 || [ -f pyproject.toml ]; then echo "found=true" >> "$GITHUB_OUTPUT"; else echo "found=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-python@v5
        if: steps.python_manifest.outputs.found == 'true'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        if: steps.python_manifest.outputs.found == 'true'
        continue-on-error: true
        run: pip install pip-audit

      - name: Run pip-audit
        continue-on-error: true
        run: |
          if [ "${{ steps.python_manifest.outputs.found }}" != "true" ]; then
            echo '{"dependencies":[]}' > pip_audit_results.json
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json --output pip_audit_results.json --progress-spinner off || true
          else
            pip-audit --format json --output pip_audit_results.json --progress-spinner off || true
          fi

          python3 - <<'PY'
          import json, pathlib
          src = pathlib.Path("pip_audit_results.json")
          if not src.exists(): src.write_text('{"dependencies":[]}', encoding="utf-8")
          try: data = json.loads(src.read_text(encoding="utf-8", errors="ignore"))
          except Exception: data = {"dependencies":[]}
          deps = data.get("dependencies", []) if isinstance(data, dict) else data
          rules, results = {}, []
          def level(sev):
              s = str(sev or "").upper()
              return "error" if s in {"CRITICAL","HIGH"} else "warning" if s == "MEDIUM" else "note"
          for dep in deps:
              if not isinstance(dep, dict): continue
              name, version = dep.get("name","unknown"), dep.get("version","")
              for vuln in dep.get("vulns", []):
                  vid, sev = vuln.get("id","PYTHON_VULN"), vuln.get("severity","UNKNOWN")
                  msg = f"{name} {version}: {vid} severity={sev}"
                  rules.setdefault(vid, {"id":vid,"name":vid,"shortDescription":{"text":vid},"fullDescription":{"text":msg},"defaultConfiguration":{"level":level(sev)}})
                  results.append({"ruleId":vid,"level":level(sev),"message":{"text":msg},"locations":[{"physicalLocation":{"artifactLocation":{"uri":"python-dependencies"}}}]})
          sarif = {"version":"2.1.0","$schema":"https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json*22,*22runs*22:*5B*7B*22tool*22:*7B*22driver*22:*7B*22name*22:*22pip-audit*22,*22informationUri*22:*22https:/*pypi.org/project/pip-audit/*22,*22rules*22:list(rules.values())*7D*7D,*22results*22:results*7D*5D__;JSUlJSUlJSUlJSUlJSUlJSUlLyUlJSUlJSUlJQ!!P110LumUDw!6aKgqIT2qy24_AaV4kuINXc7Ddj0SYWUnLAw2hQz2ce-pKwbjKF7F9bhUuKmzxjC96bG0zerC_eBWht8dfs5afXpx-XWQw$ }
          pathlib.Path("pip_audit.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Ensure artifacts
        if: always()
        run: |
          test -f pip_audit_results.json || echo '{"dependencies":[]}' > pip_audit_results.json
          test -f pip_audit.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"pip-audit","rules":[]}},"results":[]}]}' > pip_audit.sarif

      - name: Upload pip-audit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: pip_audit.sarif
          category: pip-audit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: |
            pip_audit_results.json
            pip_audit.sarif
          retention-days: 30

  trivy-filesystem:
