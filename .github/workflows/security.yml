          sarif={'version':'2.1.0','$schema':'https://urldefense.com/v3/__https://json.schemastore.org/sarif-2.1.0.json','runs':*5B*7B'tool':*7B'driver':*7B'name':'Gitleaks','rules':list(rules.values())*7D*7D,'results':results*7D*5D__;JSUlJSUlJSU!!P110LumUDw!7z75A6Clz8GDFwcBaC91yltmELprZlyk-jA9eOd2XdBI1MOy_2zQd84uGXRb8uYdKurmt6eQPYbC_8zOsHwf114KdkbT_g$ }
          pathlib.Path('gitleaks.sarif').write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding='utf-8')
          PY
