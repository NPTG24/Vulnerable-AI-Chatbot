              # dataflow simple: request var -> lower() without None check
              for node in ast.walk(tree):
                  if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1nzt4ITQ$ ):
                      cname = call_name(node)
                      if cname.endswith(".lower"):
                          if isinstance(node.func, ast.Attribute) and isinstance(node.func.value, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ):
                              base = https://urldefense.com/v3/__http://node.func.value.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo2AKT6STw$ 
                              if base in tainted_names:
                                  add(py, node.lineno, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "Código aplicativo", f"Parámetro de request '{base}' usado con .lower() sin check visible de None; puede causar 500/DoS si falta el parámetro.", source_line(lines, node.lineno))

          pathlib.Path("ai_app_static_findings.json").write_text(json.dumps({"tool": "AI/App Static Analyzer", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []
          def level(sev):
              sev = str(sev).upper()
              if sev in {"CRITICAL", "HIGH"}:
                  return "error"
              if sev == "MEDIUM":
                  return "warning"
              return "note"

          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": f["message"]},
                  "defaultConfiguration": {"level": level(f["severity"])}
              })
              results.append({
                  "ruleId": rid,
                  "level": level(f["severity"]),
                  "message": {"text": f["message"]},
                  "properties": {"kind": "vulnerability", "category": f["category"]},
                  "locations": [{"physicalLocation": {"artifactLocation": {"uri": f["file"]}, "region": {"startLine": f["line"]}}}]
              })

          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "AI/App Static Analyzer", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("ai_app_static.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"AI/App static analyzer findings: {len(findings)}")
          PY

      - name: Ensure AI/App static artifacts exist
        if: always()
        run: |
          test -f ai_app_static_findings.json || echo '{"tool":"AI/App Static Analyzer","findings":[]}' > ai_app_static_findings.json
          test -f ai_app_static.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI/App Static Analyzer","rules":[]}},"results":[]}]}' > ai_app_static.sarif

      - name: Upload AI/App static SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ai_app_static.sarif
          category: ai-app-static

      - name: Upload AI/App static artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-app-static-results
          path: |
            ai_app_static_findings.json
            ai_app_static.sarif
          retention-days: 30

  ruff:
    name: "Dev Quality — Ruff"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff as development-quality report only
        run: |
          ruff check . --output-format=json > ruff_lint.json || true
          ruff check . --output-format=full > ruff_lint_full.txt || true
          ruff format . --check --diff > ruff_format_diff.txt || true
          python3 - <<'PY'
          import json
          import pathlib
          try:
              data = json.loads(pathlib.Path("ruff_lint.json").read_text(encoding="utf-8") or "[]")
          except Exception:
              data = []
          pathlib.Path("ruff_dev_quality_findings.json").write_text(json.dumps({"tool": "Ruff", "kind": "development_quality", "findings": data}, indent=2, ensure_ascii=False), encoding="utf-8")
          pathlib.Path("ruff_dev_quality.sarif").write_text('{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Ruff Dev Quality","rules":[]}},"results":[]}]}', encoding="utf-8")
          PY

      - name: Upload Ruff dev-quality SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ruff_dev_quality.sarif
          category: ruff-dev-quality

      - name: Upload Ruff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-dev-quality-results
          path: |
            ruff_lint.json
            ruff_lint_full.txt
            ruff_format_diff.txt
            ruff_dev_quality_findings.json
            ruff_dev_quality.sarif
          retention-days: 30

  codeql:
    name: "SAST — CodeQL (${{ matrix.language }})"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Analyze and upload CodeQL SARIF
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results
          upload: true

      - name: Normalize CodeQL artifacts
        if: always()
        run: |
          mkdir -p codeql-results
          if ! find codeql-results -name "*.sarif" -type f | grep -q .; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL","rules":[]}},"results":[]}]}' > codeql-results/codeql_${{ matrix.language }}.sarif
          fi
          python3 - <<'PY'
          import json
          import pathlib

          out = pathlib.Path("codeql_findings.json")
          findings = []
          for sarif in pathlib.Path("codeql-results").rglob("*.sarif"):
              try:
                  data = json.loads(sarif.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for run in data.get("runs", []):
                  tool = run.get("tool", {}).get("driver", {}).get("name", "CodeQL")
                  for result in run.get("results", []) or []:
                      rid = result.get("ruleId", "")
                      level = result.get("level", "warning")
                      severity = "HIGH" if level == "error" else ("MEDIUM" if level == "warning" else "LOW")
                      msg = result.get("message", {}).get("text", "")
                      loc = "?"
                      try:
                          phys = result.get("locations", [{}])[0].get("physicalLocation", {})
                          uri = phys.get("artifactLocation", {}).get("uri", "?")
                          line = phys.get("region", {}).get("startLine", "?")
                          loc = f"{uri}:{line}"
                      except Exception:
                          pass
                      findings.append({"tool": tool, "rule": rid, "severity": severity, "category": "Código aplicativo", "location": loc, "message": msg})
          out.write_text(json.dumps({"tool": "CodeQL", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Upload CodeQL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}-results
          path: |
            codeql-results
            codeql_findings.json
          retention-days: 30

  semgrep:
    name: "SAST — Semgrep OSS"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create high-signal app security rules
        run: |
          mkdir -p .semgrep/app-security
          cat > .semgrep/app-security/app_rules.yml <<'YAML_RULES'
          rules:
            - id: web-python-flask-missing-auth-route
              languages: [python]
              severity: INFO
              message: "Flask route detected. Confirm authentication/authorization if it exposes sensitive actions."
              metadata:
                category: security
                technology: [flask, auth]
                confidence: MEDIUM
              pattern: |
                @app.route(...)
                def $FUNC(...):
                    ...

            - id: web-python-flask-public-host
              languages: [python]
              severity: WARNING
              message: "Flask app is exposed on https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ . Confirm network controls, authentication and production WSGI deployment."
              metadata:
                category: security
                technology: [flask]
                confidence: HIGH
              pattern-either:
                - pattern: app.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ ", ...)
                - pattern: app.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ ", ...)
                - pattern: $APP.run("https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ ", ...)
                - pattern: $APP.run(host="https://urldefense.com/v3/__http://0.0.0.0__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo37CPGY-g$ ", ...)

            - id: web-python-request-param-none-dos
              languages: [python]
              severity: WARNING
              message: "Request parameter is used without visible None check. Missing parameter can cause 500 errors and simple DoS."
              metadata:
                category: security
                technology: [flask, input-validation, dos]
                confidence: HIGH
              pattern-either:
                - pattern: |
                    $X = request.args.get(...)
                    ...
                    $X.lower()
                - pattern: |
                    $X = request.form.get(...)
                    ...
                    $X.lower()

            - id: web-python-route-long-sleep-dos
              languages: [python]
              severity: WARNING
              message: "Request handler sleeps for a long time. This can tie up workers and cause denial of service."
              metadata:
                category: security
                technology: [flask, dos]
                confidence: HIGH
              patterns:
                - pattern: |
                    @app.route(...)
                    def $FUNC(...):
                        ...
                        time.sleep($SECONDS)
                        ...
                - metavariable-comparison:
                    metavariable: $SECONDS
                    comparison: $SECONDS >= 30

            - id: web-python-xss-blacklist-script-only
              languages: [python]
              severity: WARNING
              message: "Weak XSS mitigation: blacklist only checks literal <script>. Use contextual output encoding/sanitization."
              metadata:
                category: security
                technology: [xss, output-encoding]
                confidence: HIGH
              pattern-either:
                - pattern: |
                    if "<script>" in $VALUE:
                        ...
                - pattern: |
                    if '<script>' in $VALUE:
                        ...

            - id: code-python-subprocess-shell-true
              languages: [python]
              severity: WARNING
              message: "subprocess with shell=True detected. Review for command injection if input is attacker-controlled."
              metadata:
                category: security
                technology: [command-injection]
                confidence: HIGH
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)

            - id: code-python-broad-exception-hides-security-error
              languages: [python]
              severity: INFO
              message: "Broad exception handling may hide security-relevant errors and reduce observability."
              metadata:
                category: security
                technology: [error-handling]
                confidence: MEDIUM
              pattern-either:
                - pattern: |
                    except Exception as $ERR:
                        ...
                - pattern: |
                    except:
                        ...
          YAML_RULES

      - name: Run Semgrep official and custom rules
        run: |
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --sarif --output semgrep.sarif . || true

          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python --config p/javascript --config p/typescript --config p/secrets --config .semgrep/app-security \
            --exclude .github/workflows/** \
            --exclude tests/** \
            --exclude test/** \
            --exclude node_modules/** \
            --exclude .venv/** \
            --exclude venv/** \
            --exclude dist/** \
            --exclude build/** \
            --json --output semgrep.json . || true

      - name: Ensure Semgrep artifacts exist
        if: always()
        run: |
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep OSS","rules":[]}},"results":[]}]}' > semgrep.sarif
          test -f semgrep.json || echo '{"results":[]}' > semgrep.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
            .semgrep/app-security/app_rules.yml
          retention-days: 30

  ai-security:
    name: "AI Security — Precise LLM Vulns"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create precise AI Semgrep rules
        run: |
          mkdir -p .semgrep/ai-security
          cat > .semgrep/ai-security/ai_rules.yml <<'YAML_RULES'
          rules:
            - id: ai-python-flask-user-input-direct-to-openai-prompt
              languages: [python]
              severity: ERROR
              message: "AI Prompt Injection: request/user input flows directly into OpenAI or LLM prompt/messages."
              metadata:
                category: security
                technology: [ai, llm, openai, flask]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json.get(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: openai.ChatCompletion.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.chat.completions.create(..., messages=$SINK, ...)
                - pattern: $CLIENT.responses.create(..., input=$SINK, ...)
                - pattern: $MODEL.invoke($SINK, ...)
                - pattern: $CHAIN.invoke($SINK, ...)
                - pattern: $CHAIN.run($SINK, ...)

            - id: ai-python-user-input-to-rag-query
              languages: [python]
              severity: ERROR
              message: "AI RAG Injection: request/user input flows directly into RetrievalQA, retriever or vector search."
              metadata:
                category: security
                technology: [ai, llm, rag, langchain]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              mode: taint
              pattern-sources:
                - pattern: request.args.get(...)
                - pattern: request.form.get(...)
                - pattern: request.values.get(...)
                - pattern: request.get_json(...)
                - pattern: request.json.get(...)
                - pattern: request.json
              pattern-sinks:
                - pattern: $QA.run($SINK)
                - pattern: $QA.invoke($SINK)
                - pattern: $RETRIEVER.get_relevant_documents($SINK)
                - pattern: $VECTORSTORE.similarity_search($SINK)

            - id: ai-python-retrievalqa-run-user-query
              languages: [python]
              severity: ERROR
              message: "AI RAG Injection: RetrievalQA run receives variable user query. Validate prompt injection and authorization controls."
              metadata:
                category: security
                technology: [ai, llm, rag, langchain]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              patterns:
                - pattern: $QA.run($QUERY)
                - pattern-not: $QA.run("...")

            - id: ai-python-retrievalqa-stuff-chain
              languages: [python]
              severity: WARNING
              message: "RAG chain_type='stuff' detected. Retrieved content is stuffed into the prompt; review prompt injection and source trust."
              metadata:
                category: security
                technology: [ai, rag, langchain]
                owasp_llm: LLM01 Prompt Injection
                confidence: HIGH
              pattern-either:
                - pattern: RetrievalQA.from_chain_type(..., chain_type="stuff", ...)
                - pattern: RetrievalQA.from_chain_type(..., chain_type='stuff', ...)

            - id: ai-python-weak-keyword-policy-filter
              languages: [python]
              severity: WARNING
              message: "Prompt Injection: keyword blacklist appears to protect sensitive data or system rules."
              metadata:
