name: Security Pipeline

# ==============================================================================
# SECURITY PIPELINE — CODE-FIRST / REPORT ONLY
# ==============================================================================
#
# Foco principal:
# 1. Vulnerabilidades de código: CodeQL + Semgrep security + reglas locales high-signal.
# 2. AI / agentic code: reglas específicas para LLM, tools, RAG y ejecución peligrosa.
# 3. Dependencias: Dependency Review, OSV, pip-audit, Trivy.
# 4. Secretos: Gitleaks + Semgrep secrets + Trivy secrets.
# 5. Docker: Hadolint + Trivy image/filesystem.
# 6. Base mínima: OpenSSF Scorecard opcional por schedule/manual.
#
# Modo actual:
# - REPORT ONLY.
# - No bloquea PR/push aunque existan hallazgos críticos.
# - El resumen final queda en el job "Security Report — Centralized Verdict".
#
# Guardar como:
# .github/workflows/security.yml
#
# Secrets opcionales:
# - DAST_TARGET_URL
# - ENDOR_NAMESPACE
# - ENDOR_API_CREDENTIALS_KEY
# - ENDOR_API_CREDENTIALS_SECRET
#
# ==============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      run_endor:
        description: "Run Endor Labs if secrets are configured"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  TRIVY_SEVERITY: "HIGH,CRITICAL"

jobs:
  codeql:
    name: "Code Vulns — CodeQL"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - javascript-typescript
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        continue-on-error: true
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        continue-on-error: true
        uses: github/codeql-action/autobuild@v4

      - name: Analyze with CodeQL
        continue-on-error: true
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

      - name: Upload CodeQL metadata
        if: always()
        run: |
          mkdir -p codeql_metadata
          echo '{"tool":"CodeQL","language":"${{ matrix.language }}","status":"executed_or_attempted","focus":"code_vulnerabilities"}' > codeql_metadata/codeql_${{ matrix.language }}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-${{ matrix.language }}-metadata
          path: codeql_metadata/
          retention-days: 30

  semgrep-code-vulnerabilities:
    name: "Code Vulns — Semgrep"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create local high-confidence code vulnerability rules
        run: |
          mkdir -p .semgrep/local
          cat > .semgrep/local/code-vulns-high-signal.yml <<'YAML'
          rules:
            - id: python-command-injection-shell-true
              languages: [python]
              severity: ERROR
              message: "Command injection: subprocess con shell=True."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-78"
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: subprocess.call(..., shell=True, ...)
                - pattern: subprocess.check_output(..., shell=True, ...)

            - id: python-os-system-command-execution
              languages: [python]
              severity: ERROR
              message: "Command execution: os.system/os.popen. Revisar input externo y allowlist."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-78"
              pattern-either:
                - pattern: os.system(...)
                - pattern: os.popen(...)

            - id: python-dangerous-eval-exec
              languages: [python]
              severity: ERROR
              message: "Ejecución dinámica con eval/exec. Riesgo de RCE."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-94"
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: python-unsafe-yaml-load
              languages: [python]
              severity: ERROR
              message: "Uso inseguro de yaml.load sin SafeLoader."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-502"
              patterns:
                - pattern: yaml.load(...)
                - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
                - pattern-not: yaml.load(..., Loader=SafeLoader, ...)

            - id: python-pickle-load
              languages: [python]
              severity: WARNING
              message: "Deserialización con pickle. Riesgo si procesa datos no confiables."
              metadata:
                category: security
                confidence: medium
                cwe: "CWE-502"
              pattern-either:
                - pattern: pickle.load(...)
                - pattern: pickle.loads(...)

            - id: python-sql-string-formatting
              languages: [python]
              severity: WARNING
              message: "Posible SQL injection por query construida con string formatting."
              metadata:
                category: security
                confidence: medium
                cwe: "CWE-89"
              pattern-either:
                - pattern: $CUR.execute("..." % ...)
                - pattern: $CUR.execute("...".format(...))
                - pattern: $CUR.execute(f"...{...}...")

            - id: python-flask-debug-true
              languages: [python]
              severity: ERROR
              message: "Flask debug=True expone debugger interactivo."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-489"
              pattern-either:
                - pattern: app.run(..., debug=True, ...)
                - pattern: $APP.run(..., debug=True, ...)

            - id: python-requests-verify-false
              languages: [python]
              severity: WARNING
              message: "TLS verification deshabilitada con verify=False."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-295"
              pattern-either:
                - pattern: requests.get(..., verify=False, ...)
                - pattern: requests.post(..., verify=False, ...)
                - pattern: requests.put(..., verify=False, ...)
                - pattern: requests.delete(..., verify=False, ...)
                - pattern: requests.request(..., verify=False, ...)

            - id: js-dangerous-eval-function
              languages: [javascript, typescript]
              severity: ERROR
              message: "Ejecución dinámica con eval/new Function. Riesgo de RCE/XSS."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-94"
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: node-child-process-command-execution
              languages: [javascript, typescript]
              severity: ERROR
              message: "Ejecución de comandos con child_process. Revisar input externo y allowlist."
              metadata:
                category: security
                confidence: high
                cwe: "CWE-78"
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            - id: js-insecure-random-token
              languages: [javascript, typescript]
              severity: WARNING
              message: "Uso de Math.random para valor potencialmente sensible."
              metadata:
                category: security
                confidence: medium
                cwe: "CWE-338"
              pattern-either:
                - pattern: Math.random().toString(...)
                - pattern: Math.random()

            - id: js-express-disable-x-powered-by-missing
              languages: [javascript, typescript]
              severity: INFO
              message: "Express detectado. Revisar hardening: helmet, rate limit, CORS y deshabilitar x-powered-by."
              metadata:
                category: security
                confidence: low
              pattern: express()
          YAML

      - name: Run Semgrep code vulnerability rules
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/code-vulns-high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --sarif --output semgrep_code_vulns.sarif . || true

          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config .semgrep/local/code-vulns-high-signal.yml \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --json --output semgrep_code_vulns.json . || true

      - name: Ensure Semgrep artifacts
        if: always()
        run: |
          test -f semgrep_code_vulns.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep Code Vulnerabilities","rules":[]}},"results":[]}]}' > semgrep_code_vulns.sarif
          test -f semgrep_code_vulns.json || echo '{"results":[]}' > semgrep_code_vulns.json

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_code_vulns.sarif
          category: semgrep-code-vulnerabilities

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-code-vulnerabilities-results
          path: |
            semgrep_code_vulns.sarif
            semgrep_code_vulns.json
          retention-days: 30

  ai-agentic-security:
    name: "AI Security — Agentic Code"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Semgrep
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Create AI/agentic rules
        run: |
          mkdir -p .semgrep/ai-agentic
          cat > .semgrep/ai-agentic/rules.yml <<'YAML'
          rules:
            - id: ai-agent-shell-execution-python
              languages: [python]
              severity: ERROR
              message: "Agentic AI: tool/agente con ejecución de shell/comandos."
              metadata:
                category: security
                confidence: high
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: subprocess.run(..., shell=True, ...)
                - pattern: subprocess.Popen(..., shell=True, ...)
                - pattern: os.system(...)
                - pattern: os.popen(...)

            - id: ai-agent-shell-execution-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "Agentic AI: tool/agente con ejecución de comandos Node.js."
              metadata:
                category: security
                confidence: high
                owasp_llm: "LLM06 Excessive Agency"
              pattern-either:
                - pattern: child_process.exec(...)
                - pattern: child_process.execSync(...)
                - pattern: exec(...)
                - pattern: execSync(...)

            - id: ai-unsafe-dynamic-code-python
              languages: [python]
              severity: ERROR
              message: "AI/LLM: eval/exec puede convertir output del modelo o input externo en RCE."
              metadata:
                category: security
                confidence: high
                owasp_llm: "LLM02 Insecure Output Handling"
              pattern-either:
                - pattern: eval(...)
                - pattern: exec(...)

            - id: ai-unsafe-dynamic-code-js
              languages: [javascript, typescript]
              severity: ERROR
              message: "AI/LLM: eval/new Function puede convertir output del modelo o input externo en RCE."
              metadata:
                category: security
                confidence: high
                owasp_llm: "LLM02 Insecure Output Handling"
              pattern-either:
                - pattern: eval(...)
                - pattern: new Function(...)

            - id: ai-system-message-user-controlled-python
              languages: [python]
              severity: WARNING
              message: "LLM01: posible input externo dentro de mensaje system/developer."
              metadata:
                category: security
                confidence: medium
                owasp_llm: "LLM01 Prompt Injection"
              patterns:
                - pattern-either:
                    - pattern: '{"role": "system", "content": $X}'
                    - pattern: '{"role": "developer", "content": $X}'
                - metavariable-regex:
                    metavariable: $X
                    regex: (?i).*(input|user|query|question|request|message|payload|body|content).*

            - id: ai-openai-call-without-basic-limits-python
              languages: [python]
              severity: WARNING
              message: "LLM10: llamada LLM sin señales locales de max_tokens/max_output_tokens/timeout."
              metadata:
                category: security
                confidence: medium
                owasp_llm: "LLM10 Unbounded Consumption"
              patterns:
                - pattern-either:
                    - pattern: $CLIENT.chat.completions.create(...)
                    - pattern: $CLIENT.responses.create(...)
                - pattern-not: $CLIENT.chat.completions.create(..., max_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., max_output_tokens=$M, ...)
                - pattern-not: $CLIENT.responses.create(..., timeout=$T, ...)

            - id: ai-agent-tools-without-obvious-approval-python
              languages: [python]
              severity: WARNING
              message: "Agentic AI: tools/agente sin señal evidente de allowlist/aprobación humana."
              metadata:
                category: security
                confidence: medium
                owasp_llm: "LLM06 Excessive Agency"
              patterns:
                - pattern-either:
                    - pattern: initialize_agent(..., tools=$TOOLS, ...)
                    - pattern: AgentExecutor(..., tools=$TOOLS, ...)
                    - pattern: Tool(..., func=$FUNC, ...)
                    - pattern: StructuredTool.from_function($FUNC, ...)
                - pattern-not-regex: (?i)(allowlist|whitelist|approval|human|confirm|denylist|permissions)

            - id: ai-rag-ingestion-without-source-validation-python
              languages: [python]
              severity: WARNING
              message: "RAG: ingestión a vectorstore sin señal evidente de validación de fuente/tenant/metadata."
              metadata:
                category: security
                confidence: medium
                owasp_llm: "LLM04 Data and Model Poisoning"
              patterns:
                - pattern-either:
                    - pattern: $DB.add_documents($DOCS, ...)
                    - pattern: $DB.add_texts($TEXTS, ...)
                    - pattern: $VECTORSTORE.add_documents($DOCS, ...)
                    - pattern: $VECTORSTORE.from_documents($DOCS, ...)
                - pattern-not-regex: (?i)(metadata|tenant|source|sanitize|validate|trusted)
          YAML

      - name: Run AI/agentic rules
        continue-on-error: true
        run: |
          semgrep scan \
            --config .semgrep/ai-agentic \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --sarif --output semgrep_ai_agentic.sarif . || true

          semgrep scan \
            --config .semgrep/ai-agentic \
            --exclude .github/workflows/** \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude coverage \
            --exclude .venv \
            --exclude venv \
            --json --output semgrep_ai_agentic.json . || true

      - name: Ensure AI artifacts
        if: always()
        run: |
          test -f semgrep_ai_agentic.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"AI Agentic Security","rules":[]}},"results":[]}]}' > semgrep_ai_agentic.sarif
          test -f semgrep_ai_agentic.json || echo '{"results":[]}' > semgrep_ai_agentic.json

      - name: Upload AI SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep_ai_agentic.sarif
          category: ai-agentic-security

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-agentic-security-results
          path: |
            semgrep_ai_agentic.sarif
            semgrep_ai_agentic.json
          retention-days: 30

  endor-labs:
    name: "AI/SCA — Endor Labs Optional"
    runs-on: ubuntu-latest
    if: github.event.inputs.run_endor != 'false'
    permissions:
      contents: read
      id-token: write
      pull-requests: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate Endor Labs secrets
        id: endor_secrets
        env:
          ENDOR_NAMESPACE_VALUE: ${{ secrets.ENDOR_NAMESPACE }}
          ENDOR_API_KEY_VALUE: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          ENDOR_API_SECRET_VALUE: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
        run: |
          if [ -z "$ENDOR_NAMESPACE_VALUE" ] || [ -z "$ENDOR_API_KEY_VALUE" ] || [ -z "$ENDOR_API_SECRET_VALUE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Endor Labs
        if: steps.endor_secrets.outputs.skip != 'true'
        continue-on-error: true
        uses: endorlabs/github-action@v1
        with:
          namespace: ${{ secrets.ENDOR_NAMESPACE }}
          api_key: ${{ secrets.ENDOR_API_CREDENTIALS_KEY }}
          api_secret: ${{ secrets.ENDOR_API_CREDENTIALS_SECRET }}
          enable_github_action_token: false
          scan_dependencies: true
          scan_secrets: true
          scan_git_logs: false
          pr: ${{ github.event_name == 'pull_request' }}

      - name: Create Endor metadata
        if: always()
        run: |
          mkdir -p endor_results
          echo '{"tool":"Endor Labs","status":"executed_if_configured","mode":"report_only"}' > endor_results/endor_metadata.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endor-labs-results
          path: endor_results/
          retention-days: 30

  dependency-review:
    name: "Dependencies — Dependency Review PR"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          warn-only: true

      - name: Upload metadata
        if: always()
        run: |
          mkdir -p dependency_review
          echo '{"tool":"Dependency Review","status":"executed_or_attempted","mode":"report_only"}' > dependency_review/metadata.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-review-results
          path: dependency_review/
          retention-days: 30

  dependency-policy:
    name: "Dependencies — Pinning Policy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency pinning
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, pathlib, re, tomllib

          findings = []
          SKIP_DIRS = {".git",".github","node_modules",".venv","venv","env","dist","build","coverage","__pycache__",".tox"}

          def skip_path(p):
              return any(x in SKIP_DIRS for x in str(p).replace("\\","/").split("/"))

          def add(sev, rule, file, line, msg):
              findings.append({"tool":"Dependency Policy","severity":sev,"rule":rule,"file":str(file),"line":int(line or 1),"message":msg})

          def level(sev):
              sev = str(sev).lower()
              return "error" if sev in {"critical","high"} else "warning" if sev == "medium" else "note"

          req_skip = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          req_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")

          for req in sorted(pathlib.Path(".").glob("**/requirements*.txt")):
              if skip_path(req): continue
              for n, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if req_skip.match(line): continue
                  clean = line.split(" #",1)[0].strip()
                  if "\\" in clean: clean = clean.split("\\",1)[0].strip()
                  if not req_exact.match(clean):
                      add("medium","PYTHON_UNPINNED_DEPENDENCY",req,n,f"Dependencia Python sin pin exacto ==: {line}")

          pep508_exact = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+).*$")

          for pyproject in sorted(pathlib.Path(".").glob("**/pyproject.toml")):
              if skip_path(pyproject): continue
              has_lock = any(pyproject.with_name(x).exists() for x in ["poetry.lock","pdm.lock","uv.lock"])
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              project = data.get("project", {}) if isinstance(data, dict) else {}
              deps = []
              if isinstance(project.get("dependencies"), list):
                  deps.extend(project["dependencies"])
              optional = project.get("optional-dependencies", {})
              if isinstance(optional, dict):
                  for values in optional.values():
                      if isinstance(values, list): deps.extend(values)
              for dep in deps:
                  dep = str(dep)
                  if dep.strip().startswith(("git+","file:","http://","https://")):
                      add("info","PYPROJECT_EXTERNAL_DEPENDENCY",pyproject,1,f"Dependencia externa no validada por pinning: {dep}")
                  elif not pep508_exact.match(dep):
                      add("info" if has_lock else "medium","PYPROJECT_NON_EXACT_DEPENDENCY",pyproject,1,f"Dependencia pyproject sin versión exacta ==: {dep}")

          npm_exact = re.compile(r"^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$")
          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip_path(package_json): continue
              has_lock = any(package_json.with_name(x).exists() for x in ["package-lock.json","yarn.lock","pnpm-lock.yaml"])
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for section in ["dependencies","devDependencies","peerDependencies","optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict): continue
                  for name, version in deps.items():
                      version = str(version).strip()
                      if version.startswith(("file:","git+","github:","workspace:","link:")):
                          add("info","NPM_LOCAL_OR_WORKSPACE_DEPENDENCY",package_json,1,f"Dependencia npm local/workspace: {name}@{version}")
                      elif not npm_exact.match(version):
                          add("info" if has_lock else "medium","NPM_NON_EXACT_DEPENDENCY",package_json,1,f"Dependencia npm sin versión exacta: {name}@{version}")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool":"Dependency Policy","findings":findings}, indent=2, ensure_ascii=False), encoding="utf-8")
          rules, results = {}, []
          for f in findings:
              rid = f["rule"]
              rules.setdefault(rid, {"id":rid,"name":rid,"shortDescription":{"text":rid},"fullDescription":{"text":rid},"defaultConfiguration":{"level":level(f["severity"])}})
              results.append({"ruleId":rid,"level":level(f["severity"]),"message":{"text":f["message"]},"locations":[{"physicalLocation":{"artifactLocation":{"uri":f["file"]},"region":{"startLine":f["line"]}}}]})
