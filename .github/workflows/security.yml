name: Security Pipeline

# ==============================================================================
# SECURITY PIPELINE
# ==============================================================================

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      run_dast:
        description: "Force-run DAST even outside schedule"
        required: false
        default: "false"
      fail_on:
        description: "Security gate: never, critical, high"
        required: false
        default: "never"

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_FAIL_ON: "never"

jobs:
  dependency-policy:
    name: "Dependencies — Policy"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check dependency pinning, resolvable versions and generate SARIF
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import shutil
          import subprocess
          import sys
          import tempfile
          import tomllib

          findings = []
          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(severity, rule, file_path, line, message, kind="vulnerability"):
              findings.append({
                  "tool": "Dependency Policy",
                  "category": "Dependencias / Policy",
                  "severity": severity,
                  "rule": rule,
                  "file": str(file_path),
                  "line": int(line or 1),
                  "message": message,
                  "kind": kind
              })

          def level(severity):
              sev = str(severity or "").lower()
              if sev in {"critical", "high"}:
                  return "error"
              if sev == "medium":
                  return "warning"
              return "note"

          req_files = sorted(set(pathlib.Path(".").glob("requirements*.txt")) | set(pathlib.Path(".").glob("**/requirements*.txt")))
          skip_req = re.compile(r"^\s*($|#|-r\s+|-c\s+|-f\s+|--|(https?|git|ssh)://|file:)", re.I)
          exact_req = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*==\s*([A-Za-z0-9_.!+*-]+)\s*(;.*)?$")
          any_pkg = re.compile(r"^\s*([A-Za-z0-9_.-]+)(\[[A-Za-z0-9_,.-]+\])?\s*([<>=!~]=?|===)?\s*([^;#\s]+)?")
          pinned_python = []

          for req in req_files:
              if skip(req):
                  continue
              for lineno, raw in enumerate(req.read_text(encoding="utf-8", errors="ignore").splitlines(), 1):
                  line = raw.strip()
                  if skip_req.match(line):
                      continue
                  clean = line.split(" #", 1)[0].strip()
                  match = exact_req.match(clean)
                  if not match:
                      parsed = any_pkg.match(clean)
                      if parsed:
                          operator = parsed.group(3)
                          version = parsed.group(4)
                          if not operator or not version:
                              add("medium", "PYTHON_DEPENDENCY_WITHOUT_VERSION", req, lineno, f"Dependencia Python sin versión declarada: {line}", "vulnerability")
                          elif operator != "==":
                              add("medium", "PYTHON_DEPENDENCY_NOT_EXACT_PIN", req, lineno, f"Dependencia Python sin pin exacto ==: {line}", "hygiene")
                          else:
                              add("medium", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Dependencia Python con formato no validable: {line}", "hygiene")
                      else:
                          add("medium", "PYTHON_DEPENDENCY_INVALID_FORMAT", req, lineno, f"Línea de dependencia Python no validable: {line}", "hygiene")
                      continue
                  pinned_python.append((match.group(1), match.group(3), req, lineno, clean))

          for name, version, req, lineno, clean in pinned_python:
              with tempfile.TemporaryDirectory() as tmpdir:
                  cmd = [sys.executable, "-m", "pip", "download", "--no-deps", "--disable-pip-version-check", "-d", tmpdir, f"{name}=={version}"]
                  try:
                      proc = subprocess.run(cmd, text=True, capture_output=True, timeout=90)
                  except subprocess.TimeoutExpired:
                      add("info", "PYTHON_VERSION_VALIDATION_TIMEOUT", req, lineno, f"Timeout validando versión Python: {clean}", "hygiene")
                      continue
                  output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                  if proc.returncode == 0:
                      continue
                  if "no matching distribution found" in output or "could not find a version" in output:
                      add("high", "PYTHON_PACKAGE_OR_VERSION_NOT_RESOLVABLE", req, lineno, f"Paquete o versión Python no existe/no es resoluble en el índice configurado: {clean}", "vulnerability")
                  elif any(x in output for x in ["temporary failure", "connection", "timed out", "proxy", "ssl", "network"]):
                      add("info", "PYTHON_VERSION_VALIDATION_NETWORK_UNAVAILABLE", req, lineno, f"No se pudo validar por red/proxy/SSL: {clean}", "hygiene")
                  else:
                      add("info", "PYTHON_VERSION_VALIDATION_INCONCLUSIVE", req, lineno, f"Validación inconclusa de versión Python: {clean}", "hygiene")

          pep508_exact = re.compile(r"^\s*[A-Za-z0-9_.-]+(\[[A-Za-z0-9_,.-]+\])?\s*==\s*[A-Za-z0-9_.!+*-]+.*$")
          for pyproject in sorted(pathlib.Path(".").glob("**/pyproject.toml")):
              if skip(pyproject):
                  continue
              try:
                  data = tomllib.loads(pyproject.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              candidates = []
              project = data.get("project", {}) if isinstance(data, dict) else {}
              if isinstance(project.get("dependencies"), list):
                  candidates.extend(project["dependencies"])
              optional = project.get("optional-dependencies", {})
              if isinstance(optional, dict):
                  for deps in optional.values():
                      if isinstance(deps, list):
                          candidates.extend(deps)
              poetry_deps = data.get("tool", {}).get("poetry", {}).get("dependencies", {}) if isinstance(data, dict) else {}
              if isinstance(poetry_deps, dict):
                  for dep_name, dep_spec in poetry_deps.items():
                      if str(dep_name).lower() == "python":
                          continue
                      version = dep_spec if isinstance(dep_spec, str) else str(dep_spec.get("version", "") if isinstance(dep_spec, dict) else "")
                      candidates.append(f"{dep_name}{version}" if str(version).startswith("==") else f"{dep_name} {version}")
              for dep in candidates:
                  dep = str(dep)
                  if "==" not in dep:
                      add("medium", "PYPROJECT_DEPENDENCY_NOT_EXACT_PIN", pyproject, 1, f"Dependencia pyproject sin pin exacto ==: {dep}", "hygiene")
                  elif not pep508_exact.match(dep):
                      add("medium", "PYPROJECT_DEPENDENCY_INVALID_FORMAT", pyproject, 1, f"Dependencia pyproject con formato no validable: {dep}", "hygiene")

          exact_npm = re.compile(r"^\d+\.\d+\.\d+([-+][0-9A-Za-z.-]+)?$")
          npm_available = shutil.which("npm") is not None
          for package_json in sorted(pathlib.Path(".").glob("**/package.json")):
              if skip(package_json):
                  continue
              try:
                  pkg = json.loads(package_json.read_text(encoding="utf-8", errors="ignore"))
              except Exception:
                  continue
              for section in ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]:
                  deps = pkg.get(section, {})
                  if not isinstance(deps, dict):
                      continue
                  for dep_name, dep_version in deps.items():
                      version = str(dep_version).strip()
                      if version.startswith(("file:", "git+", "github:", "workspace:", "link:")):
                          add("info", "NPM_LOCAL_OR_WORKSPACE_DEPENDENCY", package_json, 1, f"Dependencia npm local/workspace no validada contra registry: {dep_name}@{version}", "hygiene")
                          continue
                      if version in {"", "*", "latest"}:
                          add("medium", "NPM_DEPENDENCY_WITHOUT_VERSION", package_json, 1, f"Dependencia npm sin versión exacta: {dep_name}@{version}", "vulnerability")
                          continue
                      if not exact_npm.match(version):
                          add("medium", "NPM_DEPENDENCY_NOT_EXACT_PIN", package_json, 1, f"Dependencia npm sin versión exacta: {dep_name}@{version}", "hygiene")
                          continue
                      if not npm_available:
                          add("info", "NPM_VALIDATION_UNAVAILABLE", package_json, 1, f"npm no disponible para validar versión: {dep_name}@{version}", "hygiene")
                          continue
                      try:
                          proc = subprocess.run(["npm", "view", f"{dep_name}@{version}", "version", "--json"], text=True, capture_output=True, timeout=90)
                      except subprocess.TimeoutExpired:
                          add("info", "NPM_VERSION_VALIDATION_TIMEOUT", package_json, 1, f"Timeout validando npm: {dep_name}@{version}", "hygiene")
                          continue
                      output = ((proc.stdout or "") + "\n" + (proc.stderr or "")).lower()
                      if proc.returncode != 0 and ("notarget" in output or "no matching version found" in output or "404" in output):
                          add("high", "NPM_PACKAGE_OR_VERSION_NOT_RESOLVABLE", package_json, 1, f"Paquete o versión npm no existe/no es resoluble: {dep_name}@{version}", "vulnerability")
                      elif proc.returncode != 0 and any(x in output for x in ["network", "timeout", "proxy", "econn", "ssl"]):
                          add("info", "NPM_VERSION_VALIDATION_NETWORK_UNAVAILABLE", package_json, 1, f"No se pudo validar npm por red/proxy/SSL: {dep_name}@{version}", "hygiene")
                      elif proc.returncode != 0:
                          add("info", "NPM_VERSION_VALIDATION_INCONCLUSIVE", package_json, 1, f"Validación npm inconclusa: {dep_name}@{version}", "hygiene")

          pathlib.Path("dependency_policy_findings.json").write_text(json.dumps({"tool": "Dependency Policy", "findings": findings}, indent=2, ensure_ascii=False), encoding="utf-8")

          rules = {}
          results = []
          for item in findings:
              rid = item["rule"]
              lvl = level(item["severity"])
              rules.setdefault(rid, {
                  "id": rid,
                  "name": rid,
                  "shortDescription": {"text": rid},
                  "fullDescription": {"text": item["message"]},
                  "defaultConfiguration": {"level": lvl}
              })
              results.append({
                  "ruleId": rid,
                  "level": lvl,
                  "message": {"text": item["message"]},
                  "properties": {"kind": item.get("kind", "vulnerability"), "category": item.get("category", "Dependencias / Policy")},
                  "locations": [{"physicalLocation": {"artifactLocation": {"uri": item["file"]}, "region": {"startLine": item["line"]}}}]
              })
          sarif = {"version": "2.1.0", "runs": [{"tool": {"driver": {"name": "Dependency Policy", "informationUri": "https://urldefense.com/v3/__https://docs.github.com/actions__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1XwcNknA$ ", "rules": list(rules.values())}}, "results": results}]}
          pathlib.Path("dependency_policy.sarif").write_text(json.dumps(sarif, indent=2, ensure_ascii=False), encoding="utf-8")
          print(f"Dependency policy findings: {len(findings)}")
          PY

      - name: Ensure dependency artifacts exist
        if: always()
        run: |
          test -f dependency_policy_findings.json || echo '{"tool":"Dependency Policy","findings":[]}' > dependency_policy_findings.json
          test -f dependency_policy.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Dependency Policy","rules":[]}},"results":[]}]}' > dependency_policy.sarif

      - name: Upload dependency SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dependency_policy.sarif
          category: dependency-policy

      - name: Upload dependency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-policy-results
          path: |
            dependency_policy_findings.json
            dependency_policy.sarif
          retention-days: 30

  code-ai-static:
    name: "AI/App Code — Precise Static Analyzer"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run precise Python AI/AppSec analyzer
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import ast
          import json
          import pathlib
          import re

          skip_dirs = {".git", ".github", "node_modules", ".venv", "venv", "dist", "build", "__pycache__"}
          findings = []

          def skip(path):
              return any(part in skip_dirs for part in str(path).replace("\\", "/").split("/"))

          def add(file, line, severity, rule, category, message, snippet=""):
              findings.append({
                  "tool": "AI/App Static Analyzer",
                  "file": str(file),
                  "line": int(line or 1),
                  "severity": severity,
                  "rule": rule,
                  "category": category,
                  "message": message,
                  "snippet": snippet[:300]
              })

          def call_name(node):
              if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1nzt4ITQ$ ):
                  return call_name(node.func)
              if isinstance(node, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ):
                  return https://urldefense.com/v3/__http://node.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo339CDs-g$ 
              if isinstance(node, ast.Attribute):
                  base = call_name(node.value)
                  return f"{base}.{node.attr}" if base else node.attr
              if isinstance(node, ast.Subscript):
                  return call_name(node.value)
              return ""

          def const_str(node):
              return node.value if isinstance(node, ast.Constant) and isinstance(node.value, str) else None

          def source_line(lines, line):
              if 1 <= line <= len(lines):
                  return lines[line - 1].strip()
              return ""

          def contains_request(node):
              for child in ast.walk(node):
                  name = call_name(child)
                  if name.startswith("request.") or name == "request":
                      return True
              return False

          def contains_env_set_yes(node):
              for child in ast.walk(node):
                  if isinstance(child, ast.Assign):
                      for target in child.targets:
                          if isinstance(target, ast.Subscript) and call_name(target.value) == "os.environ":
                              if isinstance(child.value, ast.Constant) and str(child.value.value).lower() == "yes":
                                  return True
              return False

          def has_string_literals(node, values):
              found = set()
              for child in ast.walk(node):
                  value = const_str(child)
                  if value:
                      for wanted in values:
                          if wanted.lower() in value.lower():
                              found.add(wanted.lower())
              return found

          for py in pathlib.Path(".").rglob("*.py"):
              if skip(py):
                  continue

              text = py.read_text(encoding="utf-8", errors="ignore")
              lines = text.splitlines()

              try:
                  tree = ast.parse(text)
              except SyntaxError as error:
                  add(py, error.lineno or 1, "MEDIUM", "PYTHON_SYNTAX_ERROR", "Código aplicativo", f"No se pudo analizar el archivo por SyntaxError: {error}", "")
                  continue

              tainted_names = set()
              sanitized_names = set()
              route_functions = set()
              function_defs = {}

              for node in ast.walk(tree):
                  if isinstance(node, ast.FunctionDef):
                      function_defs[https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo2YzbhHFg$ ] = node
                      for dec in node.decorator_list:
                          if isinstance(dec, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1nzt4ITQ$ ) and ".route" in call_name(dec):
                              route_functions.add(https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo2YzbhHFg$ )

              for node in ast.walk(tree):
                  if isinstance(node, ast.Assign):
                      value_name = call_name(node.value)
                      if value_name.startswith("request.") or contains_request(node.value):
                          for target in node.targets:
                              if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ):
                                  tainted_names.add(https://urldefense.com/v3/__http://target.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo115ysvug$ )

                      if isinstance(node.value, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1nzt4ITQ$ ) and call_name(node.value) == "re.sub":
                          for target in node.targets:
                              if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ):
                                  sanitized_names.add(https://urldefense.com/v3/__http://target.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo115ysvug$ )

                      # sensitive_keywords = [...]
                      for target in node.targets:
                          if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ) and "sensitive" in target.id.lower() and isinstance(node.value, (ast.List, ast.Tuple)):
                              words = []
                              for elt in node.value.elts:
                                  if isinstance(elt, ast.Constant):
                                      words.append(str(elt.value))
                              if any(w.lower() in {"secret", "secrets", "password", "passwords", "credential", "credentials", "key", "keys", "token"} for w in words):
                                  add(py, node.lineno, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Prompt injection / bypass: blacklist de keywords sensibles usada como control de seguridad. Es evadible con encoding, separación, idioma o reformulación.", source_line(lines, node.lineno))

                      # os.environ["x"] = ""
                      for target in node.targets:
                          if isinstance(target, ast.Subscript) and call_name(target.value) == "os.environ":
                              key = const_str(target.slice) if hasattr(target, "slice") else None
                              if key and any(k in key.lower() for k in ["secret", "owner", "token", "key", "password"]):
                                  add(py, node.lineno, "MEDIUM", "MUTABLE_SECURITY_STATE_IN_ENV", "AI / LLM / Agentic", f"Estado de seguridad/sensibilidad guardado en os.environ['{key}'] dentro de la app. Puede generar bypass si cambia en runtime.", source_line(lines, node.lineno))

                  if isinstance(node, ast.If):
                      text_literals = has_string_literals(node.test, {"forget", "rules", "new", "operator", "secret", "password", "owner", "key", "credential"})
                      if contains_env_set_yes(node) and len(text_literals) >= 2:
                          add(py, node.lineno, "HIGH", "PROMPT_TRIGGERED_SECURITY_FLAG_BYPASS", "AI / LLM / Agentic", "Prompt injection/backdoor: texto controlado por usuario puede activar flags de seguridad en runtime mediante os.environ = 'yes'.", source_line(lines, node.lineno))
                      if "script" in text_literals:
                          add(py, node.lineno, "MEDIUM", "WEAK_XSS_BLACKLIST_SCRIPT_ONLY", "Código aplicativo", "Mitigación XSS débil: solo bloquea literal '<script>'. No reemplaza sanitización/encoding contextual.", source_line(lines, node.lineno))

                  if isinstance(node, https://urldefense.com/v3/__http://ast.Call__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo1nzt4ITQ$ ):
                      cname = call_name(node)
                      line = getattr(node, "lineno", 1)

                      if cname in {"RetrievalQA.from_chain_type", "langchain.chains.RetrievalQA.from_chain_type"}:
                          add(py, line, "MEDIUM", "AI_RAG_RETRIEVALQA_CHAIN", "AI / LLM / Agentic", "Uso de RetrievalQA/RAG detectado. Revisar prompt injection, autorización sobre documentos, aislamiento por tenant y filtrado de fuentes.", source_line(lines, line))
                          for kw in node.keywords:
                              if kw.arg == "chain_type" and const_str(kw.value) == "stuff":
                                  add(py, line, "MEDIUM", "AI_RAG_STUFF_CHAIN_PROMPT_INJECTION_RISK", "AI / LLM / Agentic", "RAG chain_type='stuff': el contenido recuperado se inserta directamente en el prompt; riesgo de prompt injection desde documentos.", source_line(lines, line))

                      if cname.endswith(".run") or cname.endswith(".invoke"):
                          for arg in node.args:
                              if isinstance(arg, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0h6WM3Lg$ ):
                                  if https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0CKCZ_Wg$  in tainted_names or https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0CKCZ_Wg$  in {"query", "user_query", "prompt", "message", "msg"}:
                                      add(py, line, "HIGH", "AI_USER_INPUT_TO_LLM_OR_RAG", "AI / LLM / Agentic", f"Prompt injection: variable potencialmente controlada por usuario '{https://urldefense.com/v3/__http://arg.id__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo0CKCZ_Wg$ }' llega a {cname}().", source_line(lines, line))

                      if cname in {"PyPDFLoader", "UnstructuredFileLoader", "Docx2txtLoader", "CSVLoader", "TextLoader", "DirectoryLoader"}:
