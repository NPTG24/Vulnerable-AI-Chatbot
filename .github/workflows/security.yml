        run: |
          if [ -d checkov_results ]; then
            find checkov_results -name "*.sarif" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.sarif
            find checkov_results -name "*.json" -type f -print -quit | xargs -r -I{} cp "{}" checkov_results.json
          fi
          test -f checkov_results.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov","rules":[]}},"results":[]}]}' > checkov_results.sarif
          test -f checkov_results.json || echo '{"results":{"failed_checks":[]}}' > checkov_results.json

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov_results.sarif
          category: checkov-iac

      - name: Upload Checkov artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: |
            checkov_results.sarif
            checkov_results.json
          retention-days: 30

  centralized-report:
    name: "Report — Centralized Security Summary"
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - code-ai-static
      - ruff
      - codeql
      - semgrep
      - ai-security
      - sca
      - secret-scan
      - docker-security
      - iac-checkov
    if: always()
    continue-on-error: true
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_scan_results

      - name: Build centralized report
        run: |
          python3 - <<'PY'
          import json
          import pathlib

          root = pathlib.Path("all_scan_results")
          outdir = pathlib.Path("central-security-report")
          outdir.mkdir(exist_ok=True)
          findings = []
          quality = []

          def norm(s):
              s = str(s or "UNKNOWN").upper()
              return {"ERROR":"HIGH","WARNING":"MEDIUM","WARN":"MEDIUM","NOTE":"LOW","STYLE":"LOW"}.get(s, s)

          def add(category, severity, tool, location, detail, rule="", source=""):
              findings.append({
                  "category": category,
                  "severity": norm(severity),
                  "tool": tool,
                  "location": location or "?:?",
                  "detail": str(detail or "").replace("\n", " ")[:3000],
                  "rule": rule or "",
                  "source": source or ""
              })

          def load_all(name):
              for p in root.rglob(name):
                  try:
                      txt = p.read_text(encoding="utf-8", errors="ignore").strip()
                      if txt:
                          yield p, json.loads(txt)
                  except Exception as e:
                      add("Pipeline / Parser", "UNKNOWN", "Report parser", f"{p}:1", f"No se pudo leer JSON: {e}", "PARSER_ERROR", str(p))

          for p, data in load_all("ai_app_static_findings.json"):
              for x in data.get("findings", []):
                  add(x.get("category","AI / LLM / Agentic"), x.get("severity","UNKNOWN"), x.get("tool","AI/App Static Analyzer"), f"{x.get('file','?')}:{x.get('line','?')}", x.get("message",""), x.get("rule",""), str(p))

          for p, data in load_all("semgrep_ai.json"):
              for x in data.get("results", []):
                  e = x.get("extra", {})
                  add("AI / LLM / Agentic", e.get("severity","UNKNOWN"), "Semgrep AI", f"{x.get('path','?')}:{x.get('start',{}).get('line','?')}", e.get("message",""), x.get("check_id",""), str(p))

          for p, data in load_all("semgrep.json"):
              for x in data.get("results", []):
                  e = x.get("extra", {})
                  add("Código aplicativo", e.get("severity","UNKNOWN"), "Semgrep OSS", f"{x.get('path','?')}:{x.get('start',{}).get('line','?')}", e.get("message",""), x.get("check_id",""), str(p))

          for p, data in load_all("codeql_findings.json"):
              for x in data.get("findings", []):
                  add(x.get("category","Código aplicativo"), x.get("severity","UNKNOWN"), x.get("tool","CodeQL"), x.get("location","?:?"), x.get("message",""), x.get("rule",""), str(p))

          for p, data in load_all("dependency_policy_findings.json"):
              for x in data.get("findings", []):
                  add(x.get("category","Dependencias / Policy"), x.get("severity","UNKNOWN"), "Dependency Policy", f"{x.get('file','?')}:{x.get('line','?')}", x.get("message",""), x.get("rule",""), str(p))

          for p, data in load_all("pip_audit_osv.json"):
              deps = data.get("dependencies", []) if isinstance(data, dict) else []
              for dep in deps:
                  for v in dep.get("vulns", []) or []:
                      add("Dependencias / SCA", v.get("severity","HIGH"), "pip-audit", f"{dep.get('name','?')}:?", f"{dep.get('name','?')} {dep.get('version','')}: {v.get('id','')} - {v.get('description','')}", v.get("id",""), str(p))

          for p, data in load_all("trivy_results.json"):
              for r in data.get("Results", []) if isinstance(data, dict) else []:
                  target = r.get("Target","?")
                  for v in r.get("Vulnerabilities", []) or []:
                      add("Dependencias / SCA", v.get("Severity","UNKNOWN"), "Trivy", f"{target}:?", f"{v.get('PkgName','')} {v.get('InstalledVersion','')} - {v.get('VulnerabilityID','')} - {v.get('Title','')}", v.get("VulnerabilityID",""), str(p))
                  for s in r.get("Secrets", []) or []:
                      add("Secretos", s.get("Severity","HIGH"), "Trivy", f"{target}:?", s.get("Title","Possible secret"), s.get("RuleID",""), str(p))
                  for m in r.get("Misconfigurations", []) or []:
                      cat = "Docker / Contenedores" if "dockerfile" in str(target).lower() else "IaC / Cloud / Config"
                      add(cat, m.get("Severity","UNKNOWN"), "Trivy", f"{target}:?", f"{m.get('ID','')} - {m.get('Title','')}", m.get("ID",""), str(p))

          for p, data in load_all("gitleaks_report.json"):
              if isinstance(data, list):
                  for x in data:
                      add("Secretos", "HIGH", "Gitleaks", f"{x.get('File','?')}:{x.get('StartLine','?')}", x.get("Description","Possible exposed secret"), x.get("RuleID",""), str(p))

          for p, data in load_all("checkov_results.json"):
              reports = data if isinstance(data, list) else [data]
              for rep in reports:
                  if not isinstance(rep, dict):
                      continue
                  for c in rep.get("results", {}).get("failed_checks", []) or []:
                      fp = c.get("file_path","?")
                      cat = "Docker / Contenedores" if "dockerfile" in str(fp).lower() else "IaC / Cloud / Config"
                      lr = c.get("file_line_range") or ["?"]
                      add(cat, "HIGH", "Checkov", f"{fp}:{lr[0]}", c.get("check_name",""), c.get("check_id",""), str(p))

          for p, data in load_all("hadolint_results.json"):
              if isinstance(data, list):
                  for x in data:
                      add("Docker / Contenedores", x.get("level","warning"), "Hadolint", f"{x.get('file', x.get('filename','Dockerfile'))}:{x.get('line', x.get('lineNumber','?'))}", x.get("message", x.get("description","")), x.get("code",""), str(p))

          for p, data in load_all("ruff_dev_quality_findings.json"):
              for x in data.get("findings", []) if isinstance(data, dict) else []:
                  quality.append(x)

          categories = sorted(set([f["category"] for f in findings]) | {"AI / LLM / Agentic","Código aplicativo","Dependencias / SCA","Dependencias / Policy","Secretos","Docker / Contenedores","IaC / Cloud / Config","Pipeline / Parser"})
          severities = ["CRITICAL","HIGH","MEDIUM","LOW","INFO","UNKNOWN"]
          table = {c:{s:0 for s in severities} for c in categories}
          for f in findings:
              sev = f["severity"] if f["severity"] in severities else "UNKNOWN"
              table[f["category"]][sev] += 1

          order = {"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3,"INFO":4,"UNKNOWN":5}
          findings.sort(key=lambda x: (order.get(x["severity"], 99), x["category"], x["tool"], x["location"]))

          lines = []
          lines.append("REPORTE CENTRALIZADO DE SEGURIDAD")
          lines.append("="*90)
          lines.append("")
          lines.append("RESUMEN EJECUTIVO")
          lines.append("-"*90)
          lines.append(f"Hallazgos totales             : {len(findings)}")
          lines.append(f"Críticas + Altas              : {len([f for f in findings if f['severity'] in {'CRITICAL','HIGH'}])}")
          lines.append(f"Hallazgos de calidad Ruff     : {len(quality)}")
          lines.append("")
          lines.append("RESUMEN POR CATEGORÍA")
          lines.append("-"*90)
          lines.append(f"{'Categoría':35} {'CRITICAL':>8} {'HIGH':>5} {'MEDIUM':>7} {'LOW':>5} {'INFO':>5} {'UNKNOWN':>8}")
          for c in categories:
              lines.append(f"{c:35} {table[c]['CRITICAL']:>8} {table[c]['HIGH']:>5} {table[c]['MEDIUM']:>7} {table[c]['LOW']:>5} {table[c]['INFO']:>5} {table[c]['UNKNOWN']:>8}")
          lines.append("")
          lines.append("TODOS LOS HALLAZGOS ORDENADOS POR CRITICIDAD")
          lines.append("="*90)

          if not findings:
              lines.append("Sin hallazgos.")
          else:
              for i, f in enumerate(findings, 1):
                  lines.append("")
                  lines.append(f"{i}. [{f['severity']}] [{f['category']}] {f['rule']}")
                  lines.append(f"   Herramienta : {f['tool']}")
                  lines.append(f"   Línea/Error : {f['location']}")
                  lines.append(f"   Detalle     : {f['detail']}")
                  lines.append(f"   Fuente      : {f['source']}")

          (outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt").write_text("\n".join(lines), encoding="utf-8")
          (outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.json").write_text(json.dumps({"findings": findings, "quality": quality}, indent=2, ensure_ascii=False), encoding="utf-8")
          print((outdir / "REPORTE_CENTRALIZADO_SEGURIDAD.txt").read_text(encoding="utf-8"))
          PY

      - name: Upload centralized report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: central-security-report
          path: central-security-report
          retention-days: 30
