                          if cname in {"https://urldefense.com/v3/__http://app.run__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo30VuzpeQ$ ", "https://urldefense.com/v3/__http://Flask.run__;!!P110LumUDw!9NEtgvNexcS7WCK1usnY_GJzRcGeo9kSeA5SLyJCmlkzrAzskhiGNUCpahZScAN_ybY_Xmrm43XO_lh2pMh5Wo38H-tCWw$ "} or cname.endswith(".run"):
                              first = const_str(node.args[0]) if node.args else None
                              host_kw = None
                              for kw in node.keywords:
                                  if kw.arg == "host":
