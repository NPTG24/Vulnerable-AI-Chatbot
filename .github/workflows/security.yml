                          if key and any(k in key.lower() for k in ["reveal", "secret", "owner", "token", "key", "password"]):
                              add(py, line, "MEDIUM", "AI_MUTABLE_SECURITY_STATE_IN_ENV", "AI / LLM / Agentic", f"Estado de seguridad/sensibilidad guardado en os.environ['{key}']. Si cambia por flujo de usuario puede generar bypass.", src, "HIGH")

