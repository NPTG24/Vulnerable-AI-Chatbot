  docker-security:
    name: "Docker - Hadolint"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Hadolint on Dockerfiles
        continue-on-error: true
        shell: bash
        run: |
          echo "[]" > hadolint_results.json
          echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Hadolint","rules":[]}},"results":[]}]}' > hadolint.sarif
          dockerfiles="$(find . -type f \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -not -path './.git/*' -not -path './node_modules/*')"
          if [ -n "$dockerfiles" ]; then
            idx=0
            for file in $dockerfiles; do
              idx=$((idx+1))
              docker run --rm -i hadolint/hadolint:latest hadolint --format json - < "$file" > "hadolint_${idx}.json" || true
            done
            python3 - <<'PY'
          import json, pathlib
          data = []
          for path in pathlib.Path(".").glob("hadolint_*.json"):
              try:
                  item = json.loads(path.read_text(encoding="utf-8", errors="ignore") or "[]")
              except Exception:
                  item = []
              if isinstance(item, dict):
                  item = [item]
              data.extend([x for x in item if isinstance(x, dict)])
          pathlib.Path("hadolint_results.json").write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding="utf-8")
          PY
          fi
          echo "[]" > dockle_results.json
      - name: Upload Docker security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-security-results
          path: |
            hadolint_results.json
            hadolint.sarif
            dockle_results.json
          retention-days: 30

