                  src = line_text(lines, line)

                  if isinstance(node, ast.FunctionDef) and https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-29thjJzDA$  in routes:
                      add(py, line, "INFO", "WEB_FLASK_ROUTE_AUTH_REVIEW", "CÃ³digo aplicativo", f"Ruta Flask detectada en {https://urldefense.com/v3/__http://node.name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-29thjJzDA$ }(). Confirmar autenticaciÃ³n/autorizaciÃ³n si expone datos o acciones.", src, "MEDIUM", "Puede ser falso positivo si la ruta es pÃºblica por diseÃ±o.")

                  if isinstance(node, ast.Assign):
                      for target in node.targets:
                          if isinstance(target, https://urldefense.com/v3/__http://ast.Name__;!!P110LumUDw!4ay7_q5LmteEBDDUQmMz014urg7THKal-ufTakPFjA_7U9R_2ZDRkVEvprMPefeyLc36HjYUqEsh6jm0V9Cp-2_onOYkVg$ ) and "sensitive" in target.id.lower() and isinstance(node.value, (ast.List, ast.Tuple)):
                              words = [str(getattr(item, "value", "")).lower() for item in node.value.elts if isinstance(item, ast.Constant)]
                              if any(word in {"secret", "secrets", "password", "passwords", "credential", "credentials", "key", "keys", "token"} for word in words):
                                  add(py, line, "MEDIUM", "AI_KEYWORD_BLACKLIST_SECURITY_CONTROL", "AI / LLM / Agentic", "Prompt injection / bypass: blacklist de keywords sensibles usada como control de seguridad. Es evadible con encoding, separaciÃ³n de caracteres, idioma o reformulaciÃ³n.", src, "HIGH")

