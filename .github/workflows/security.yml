                              if var in request_vars and not request_vars[var]["default"] and not is_none_guarded(text[:text.find(src) if src in text else 0], var):
                                  add(py, line, "MEDIUM", "WEB_REQUEST_PARAM_NONE_DOS", "CÃ³digo aplicativo", f"ParÃ¡metro de request '{var}' usado con .lower() sin default/check visible de None; si falta el parÃ¡metro puede causar 500/DoS.", src, "HIGH")

